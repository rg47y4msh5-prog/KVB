let fB='alle', fT='alle', fZ='';
const BATCHES=['alle',...new Set(M.map(x=>x.batch))];
const TAGS=['alle',...new Set(M.map(x=>x.tag).filter(Boolean))];
function knoppen(el,lijst,get,set){el.innerHTML='';for(const v of lijst){const b=document.createElement('button');b.textContent=v;if(get()===v)b.className='actief';b.onclick=()=>{set(v);render();};el.appendChild(b);}}
function render(){
 knoppen(document.getElementById('batches'),BATCHES,()=>fB,v=>fB=v);
 knoppen(document.getElementById('tags'),TAGS,()=>fT,v=>fT=v);
 const z=fZ.toLowerCase();
 const sel=M.filter(x=>(fB==='alle'||x.batch===fB)&&(fT==='alle'||x.tag===fT)&&(!z||((x.code||'')+' '+x.title+' '+(x.caption||'')).toLowerCase().includes(z)));
 document.getElementById('tel').textContent=sel.length+' van '+M.length+' assets';
 const g=document.getElementById('grid');g.innerHTML='';
 for(const x of sel){
  const c=document.createElement('div');c.className='card';
  const kop=(x.batch?x.batch+' &middot; ':'')+(x.code?x.code+' &middot; ':'')+x.title;
  c.innerHTML='<h3>'+kop+(x.tag?' <span class="tag '+x.tag+'">'+x.tag+'</span>':'')+'</h3>'
   +'<img loading="lazy" src="data:image/svg+xml;base64,'+x.b64+'" alt="'+(x.code||'asset')+'">'
   +(x.caption?'<div class="cap">'+x.caption+'</div>':'');
  g.appendChild(c);
 }
}
document.getElementById('zoek').addEventListener('input',e=>{fZ=e.target.value;render();});
render();
</script></body></html>
