<body>
<header><h1>KVB2 Oefenbank v2</h1><p>Examensimulatie: 27 vragen (23 meerkeuze + 4 invulvragen) · 50 punten · geslaagd bij 35 · 90 minuten — of oefen per blok in de leermodus.</p></header>
<div id="timer">90:00</div>
<main>
<div class="menu" id="hoofdmenu">
 <button class="prim" onclick="startExamen()">▶ Start proefexamen</button>
 <button class="sec" onclick="startLeer('E')">Leermodus blok E (SRW)</button>
 <button class="sec" onclick="startLeer('F')">Leermodus blok F (navigatie)</button>
 <button class="sec" onclick="startLeer('')">Leermodus alles</button>
</div>
<div id="app"></div>
</main>
<script>
/* Toetsmatrijs: blok E = vraag 1-8 (13 pt, wettelijke bepalingen ruim water),
   blok F = vraag 9-27 (37 pt, navigatie), vraag 24-27 = open invulvragen (3 pt elk).
   Blokindeling en totalen conform CBR; per-vraagpunten pragmatisch verdeeld. */
const SLOTS=[["E.1",1],["E.2",1],["E.3",2],["E.4",2],["E.5",2],["E.6",2],["E.7",2],["E.8",1],
["F.9",1],["F.10",1],["F.11",1],["F.12",2],["F.13",2],["F.14",2],["F.15",2],["F.16",2],["F.17",1],
["F.18",2],["F.19",2],["F.20",2],["F.21",2],["F.22",1],["F.23",2],["F.24",3],["F.25",3],["F.26",3],["F.27",3]];
const BANK={};
/* ===== BLOK E — SRW (eerste optie = juist; engine schudt) ===== */
BANK["E.1"]=[
{t:"Je vaart op de Westerschelde onder zeil en zet ook de motor bij. Wat ben je volgens het SRW?",
 o:["Een motorschip — een zeilschip is alleen een schip onder zeil waarvan de motor níét wordt gebruikt","Een zeilschip, want de zeilen staan nog","Een motorsailer, een aparte categorie"],
 u:"<b>Zeil + motor = motorschip.</b> De definitie van zeilschip eist dat de voortstuwingswerktuigen niet worden gebruikt. Overdag hoort daar de zwarte kegel (punt omlaag) bij.",a:"SRW art. 2 (definities)"},
{t:"Je bent met je jacht vastgelopen op een plaat in de Westerschelde. Ben je volgens het SRW 'varend'?",
 o:["Nee — varend betekent: niet ten anker, niet gemeerd én niet aan de grond","Ja, zolang de reis nog niet is beëindigd","Ja, tenzij je een ankerbol toont"],
 u:"Een vastgevaren schip is <b>niet varend</b>. 'Varend' sluit ten anker liggen, gemeerd liggen én aan de grond zitten uit.",a:"SRW art. 2 (definities)"}];
BANK["E.2"]=[
{t:"Je kleine motorjacht (11 m) is uitgerust met een voor de binnenvaart goedgekeurde radar. Ben je op de Westerschelde marifoonplichtig?",
 o:["Ja — een klein schip mét binnenvaartradar is wél marifoonplichtig","Nee, de marifoonplicht geldt alleen voor grote schepen","Alleen bij beperkt zicht"],
 u:"De drietrap: groot (≥ 20 m) altijd plichtig · klein niet · <b>klein mét goedgekeurde binnenvaartradar wél</b>. En wie vrijwillig een marifoon heeft, moet hem gebruiken en uitluisteren waar voorgeschreven.",a:"SRW (marifoonbepalingen)"},
{t:"Je ligt met je marifoon-uitgeruste jacht ten anker op de rede van Vlissingen. Wat geldt er voor de 'verplichting tot wachthouden'?",
 o:["Die geldt óók nu: altijd uitluisteren en reageren op een oproep — ook gemeerd of ten anker, ook bij mooi weer","Die geldt alleen voor varende schepen","Die geldt alleen bij slecht zicht of 's nachts"],
 u:"<b>Wachthouden geldt altijd</b>: varend, gemeerd, ten anker of aan de grond, onder alle omstandigheden. Je moet reageren op een oproep van de Rijkshavenmeester of een opsporingsambtenaar.",a:"SRW art. 50"}];
BANK["E.3"]=[
{t:"Twee kleine zeilschepen naderen elkaar op de Westerschelde met gevaar voor aanvaring. Het ene voert het zeil over bakboord, het andere over stuurboord. Wie gaat vóór?",
 o:["Het schip met het zeil over bakboord (wind van stuurboord) — het schip over stuurboordboeg wijkt","Het schip met het zeil over stuurboord — bakboordboeg wijkt","Het loefwaartse schip gaat altijd vóór"],
 u:"SRW-boegtaal: het schip dat <b>over stuurboordboeg ligt</b> (zeil over stuurboord, wind van bakboord) <b>wijkt</b>. Uitkomst identiek aan de KVB1-regel: wind van stuurboord gaat vóór. Zelfde boeg: loef wijkt voor lij.",a:"SRW art. 42 (kleine schepen onderling)"},
{t:"Twee kleine motorschepen kruisen elkaar op de Westerschelde met gevaar voor aanvaring. Wat geldt?",
 o:["Het schip dat de ander aan stuurboord van zich heeft wijkt uit — tijdig, naar stuurboord en niet vóórlangs","Het snelste schip wijkt","Beide schepen wijken naar bakboord"],
 u:"<b>Rechts gaat vóór</b> (zoals in het BPR): wie de ander aan stuurboordzijde heeft, wijkt — tijdig, bij voorkeur naar stuurboord, en vermijdt vóór de ander over te lopen.",a:"SRW art. 42"}];
BANK["E.4"]=[
{t:"Je vaart met je jacht (9 m) een gestrekte koers langs de stuurboordzijde van het vaarwater. Een groot motorschip nadert met kruisende koers. Wie wijkt op de Westerschelde?",
 o:["Jij — op de Westerschelde wijkt klein áltijd voor groot; de gestrekte-koersregel geldt alleen tussen kleine schepen onderling","Het grote schip — gestrekte koers stuurboordzijde gaat altijd vóór","Beide schepen moeten naar stuurboord uitwijken"],
 u:"<b>Dé SRW-flip:</b> in het BPR beschermt de gestrekte koers je ook tegen groot; in het SRW niet. Klein wijkt voor groot, altijd.",a:"SRW art. 18"},
{t:"Een groot zeilschip (klipper, 32 m) en een groot motorvrachtschip naderen elkaar op de Westerschelde met gevaar voor aanvaring. Wie wijkt?",
 o:["Het grote zeilschip — op de Westerschelde wijkt groot zeil voor groot motor","Het motorschip — zeil gaat vóór motor","Wie de ander aan bakboord heeft"],
 u:"<b>Flip t.o.v. het BPR:</b> tussen grote schepen wijkt op de Westerschelde het zeilschip voor het werktuiglijk voortbewogen schip.",a:"SRW art. 18"},
{t:"Je hebt op de Westerschelde voorrang op een kruisend schip. Wat moet je doen?",
 o:["Je koers behouden — je snelheid mág je wel aanpassen","Koers én vaart behouden, zoals overal","Niets: het wijkende schip regelt alles"],
 u:"In het SRW betekent voorrang hebben: <b>alleen koers behouden</b>; de snelheid mag wijzigen (BPR en BVA eisen koers én vaart). Redt de wijker het alleen niet, dan moet ook jij meewerken om de aanvaring te voorkomen.",a:"SRW art. 17"}];
BANK["E.5"]=[
{t:"Het is nacht. Je zeilt op de Westerschelde met een open zeilboot van 8 meter en voert alleen een wit rondomschijnend licht in de masttop (zie beeld). Is dat voldoende?",
 v:'<svg viewBox="0 0 430 200" class="nacht"><line x1="215" y1="150" x2="215" y2="50" stroke="#5a6a7c" stroke-width="3"/><circle cx="215" cy="44" r="8" fill="#fff"/><path d="M150,150 L280,150 Q296,150 296,160 Q296,170 280,170 L150,170 Z" fill="#2a3a4c" stroke="#5a6a7c" stroke-width="2"/><text x="215" y="192" text-anchor="middle" font-size="11" fill="#dfe8f2" font-weight="bold">zeilboot 8 m — alleen wit rondomlicht</text></svg>',
 o:["Nee — één wit rondomlicht volstaat alleen voor boten korter dan 7 m (en niet sneller dan 13 km/u)","Ja, voor elk klein zeilschip is dit voldoende","Ja, want een open boot hoeft geen boordlichten te voeren"],
 u:"De alleen-witlicht-regel stopt bij <b>7 m</b>. Een zeilboot van 8 m voert minimaal boordlichten + heklicht (of een driekleurenlicht in de top).",a:"SRW art. 41"},
{t:"Je zeilt 's nachts met het driekleurenlicht in de masttop en start de motor. Wat doe je met de verlichting?",
 o:["Driekleurenlicht uit; boordlichten, toplicht en heklicht aan (en overdag: zwarte kegel hijsen)","Niets — het driekleurenlicht blijft geldig","Driekleurenlicht aan laten en er een toplicht bij voeren"],
 u:"Met de motor bij ben je een <b>motorschip</b>: motorverlichting voeren. Driekleurenlicht + toplicht combineren mag nooit. Het is óf-óf — en zeilend een haven binnenlopen mag niet, dus alléén een driekleurenlicht installeren is onhandig.",a:"SRW art. 25/41"}];
BANK["E.6"]=[
{t:"Je nadert 's nachts op de Westerschelde een baggerwerktuig dat aan de ene zijde twee rode lichten en aan de andere zijde twee groene lichten boven elkaar toont. Aan welke kant passeer je?",
 v:'<svg viewBox="0 0 430 200" class="nacht"><rect x="150" y="90" width="130" height="32" rx="6" fill="#3a4656" stroke="#5a6a7c" stroke-width="2"/><line x1="130" y1="90" x2="130" y2="46" stroke="#5a6a7c" stroke-width="2"/><circle cx="130" cy="52" r="7" fill="#c62828"/><circle cx="130" cy="74" r="7" fill="#c62828"/><line x1="300" y1="90" x2="300" y2="46" stroke="#5a6a7c" stroke-width="2"/><circle cx="300" cy="52" r="7" fill="#2e7d32"/><circle cx="300" cy="74" r="7" fill="#2e7d32"/><text x="215" y="160" text-anchor="middle" font-size="11" fill="#dfe8f2" font-weight="bold">baggerwerktuig, nacht</text></svg>',
 o:["Aan de zijde met de twee groene lichten — die kant van het vaarwater is vrij","Aan de zijde met de twee rode lichten","Aan beide zijden, mits langzaam"],
 u:"Dubbel <b>groen</b> (dag: twee ruiten) = vaarwater aan die zijde vrij; dubbel rood (twee bollen) = niet vrij. Hoofdteken beperkt manoeuvreerbaar: rood-wit-rood / bol-ruit-bol.",a:"SRW (lichten en dagmerken)"},
{t:"Je ziet 's nachts op de Westerschelde een schip met drie rode rondomschijnende lichten loodrecht boven elkaar. Wat is dit?",
 o:["Een bovenmaats zeeschip (door zijn diepgang beperkt manoeuvreerbaar) — overdag: een zwarte cilinder","Een onmanoeuvreerbaar schip","Een vissersschip met uitstaand vistuig"],
 u:"<b>3× rood = bovenmaats</b>: door de Rijkshavenmeester aangemerkt wegens lengte/diepgang. Onmanoeuvreerbaar = 2× rood (2 ballen); vissersschip = groen boven wit (diabolo).",a:"SRW art. 28"},
{t:"Een gemeerd zeeschip toont 's nachts twee rondomschijnende lichten boven elkaar: rood boven, wit onder. Wat betekent dit voor jou?",
 o:["Voorzichtig voorbijvaren: geen hinderlijke waterbeweging (golfslag/zuiging) veroorzaken","Passeren is verboden","Het schip heeft een politieopdracht"],
 u:"<b>Rood boven wit</b> (dag: vlag/bord rood boven wit) beschermt stilliggende schepen tegen golfslag en zuiging: langzaam en ruim passeren.",a:"SRW (voorzichtig voorbijvaren)"}];
BANK["E.7"]=[
{t:"In een nauwe, stromende engte van de Westerschelde nadert een tegenligger. Jij vaart tégen de stroom in. Wat schrijft het SRW voor?",
 o:["Jij houdt je gaande — je vaart de stroom 'dood' (snelheid door het water = stroomsnelheid) tot de tegenligger gepasseerd is","De tegenligger wacht, want jij hebt stuurboordwal","Wie het eerst bij de engte is, vaart door"],
 u:"Bij een engte, bocht of aanlegplaats mét stroom houdt het <b>opvarende</b> (tegen de stroom in varende) schip zich gaande. Zonder stroom in een nauwe bocht: het schip met de <b>buitenbocht aan stuurboord</b> vervolgt zijn weg.",a:"SRW art. 6/9"},
{t:"Vóór je vaart een motorschip dat één lange stoot gevolgd door twee korte stoten geeft. Wat gaat het doen?",
 o:["Keren (opdraaien) over bakboord — en een opdraaiend schip heeft voorrang","Bakboord uit gaan (kleine koerswijziging)","Achteruitslaan"],
 u:"SRW-keerseinen: 1 lang = attentie · lang + 1 kort = keren over stuurboord · <b>lang + 2 kort = keren over bakboord</b>. Opdraaien (van vóór naar tégen stroom) heeft voorrang; kop voor nemen niet. BPR-flip: daar is 1 of 2 kort zónder lange stoot een koerswijziging.",a:"SRW art. 10"}];
BANK["E.8"]=[
{t:"Je vaart van het Lauwersmeer over de Waddenzee en de Eemsmonding naar Delfzijl (zie kaartje). Met welke reglementen krijg je te maken?",
 v:'<svg viewBox="0 0 430 210"><rect x="0" y="0" width="430" height="80" fill="#a9cde6"/><rect x="0" y="80" width="430" height="130" fill="#dfe8d2"/><path d="M60,110 Q60,84 96,84 L250,84 Q296,84 320,110 L354,150" fill="none" stroke="#e07b00" stroke-width="3.5" stroke-dasharray="9,6"/><circle cx="60" cy="112" r="6" fill="#134a70"/><text x="60" y="132" text-anchor="middle" font-size="10" font-weight="bold">Lauwersmeer</text><text x="180" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="#134a70">Waddenzee</text><text x="330" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="#134a70">Eemsmonding</text><circle cx="356" cy="152" r="6" fill="#134a70"/><text x="356" y="172" text-anchor="middle" font-size="10" font-weight="bold">Delfzijl</text></svg>',
 o:["BPR (Lauwersmeer + Waddenzee) én SRE én BVA — het SRE is een aanvulling op de BVA","Alleen het SRE","BPR en SRW"],
 u:"BPR geldt óók op ruim binnenwater (Waddenzee, IJsselmeer, Markermeer, Oosterschelde). In de Eemsmonding geldt het <b>SRE als aanvulling op de BVA</b> — dus daar allebei.",a:"Toepassingsgebied reglementen"},
{t:"Op de radartoren van Vlissingen brandt een geel schitterlicht. Wat betekent dit?",
 o:["Er komen schepen van zee naar binnen via de Sardijngeul / het Oostgat","Het veer Vlissingen–Breskens steekt over","De haven van Vlissingen is gestremd"],
 u:"Het gele schitterlicht waarschuwt voor <b>binnenkomend verkeer door de Sardijngeul (Oostgat)</b>. In het hele voorzorgsgebied geldt bovendien een ankerverbod; oostgaand verkeer blijft ten zuiden, westgaand ten noorden van de scheidingslijn.",a:"SRW art. 46/47"}];
/* ===== BLOK F — navigatie, meerkeuze (F.9 t/m F.23) ===== */
BANK["F.9"]=[
{t:"De officiële zeekaarten voor kust- en binnenwater zijn mercatorprojecties. Wat is daarvan hét kenmerk?",
 o:["Hoeken op de kaart zijn gelijk aan de hoeken in werkelijkheid en een koerslijn is een rechte lijn","Afstanden zijn overal op de kaart gelijk af te passen","Lengtecirkels lopen evenwijdig aan elkaar"],
 u:"Mercator: <b>hoekgetrouw</b> en de koerslijn is recht — precies wat je voor het uitzetten van koersen nodig hebt.",a:"Les 5.1 (VBO)"},
{t:"Wat is juist over meridianen (lengtecirkels)?",
 o:["Ze lopen van pool tot pool en zijn állemaal even lang","Ze lopen evenwijdig aan de evenaar en worden richting de polen kleiner","Ze lopen tot maximaal 90° oost en west"],
 u:"Meridianen: pool → pool, even lang, tot 180° O/W. <b>Parallellen</b> lopen evenwijdig aan de evenaar en krimpen richting de polen (tot 90° N/Z).",a:"Les 5.1 (VBO)"}];
BANK["F.10"]=[
{t:"Waar pas je op een zeekaart een afstand af?",
 o:["Op de staande rand — 1 breedteminuut = 1 zeemijl (1852 m)","Op de liggende rand — daar staan de minuten het dichtst bij elkaar","Op beide randen, dat maakt niet uit"],
 u:"Alleen de <b>staande rand</b>: breedteminuten zijn overal 1 zeemijl. Lengteminuten (liggende rand) krimpen richting de polen.",a:"Les 5.1 (VBO)"},
{t:"Wat is de 'verheid'?",
 o:["De afstand tussen twee punten, uitgedrukt in zeemijlen","De in één uur afgelegde afstand","De afstand waarop je een object kunt waarnemen"],
 u:"Verheid = afstand in zeemijlen (afpassen met de passer). 1 zeemijl = 1852 m; 1 knoop = 1 zeemijl per uur.",a:"Les 5.1 (VBO)"}];
BANK["F.11"]=[
{t:"Wat betekent DST op je GPS-scherm?",
 o:["De afstand tot het eerstvolgende waypoint","De afstand vanaf je vertrekpunt","De tijdsduur van de tocht"],
 u:"DST = distance tot het volgende waypoint. Verder: COG = grondkoers, SOG = snelheid over de grond, XTE = afwijking van de koerslijn, ETA = vermoedelijke aankomsttijd.",a:"Les 5.1 (VBO)"},
{t:"Hoe bepaalt het GPS-systeem jouw positie?",
 o:["Door de afstanden te berekenen tussen de satellieten boven de horizon en de ontvanger","Door het tijdsverschil tussen jouw klok en de tijdzone","Door peilingen op de dichtstbijzijnde walstations"],
 u:"Afstandsmeting tot satellieten; vanaf elke plek op aarde zijn er minimaal <b>4</b> zichtbaar. Instellen: kaartdatum (WGS 84), eenheden en tijdzone.",a:"Les 5.1 (VBO)"}];
BANK["F.12"]=[
{t:"Op de kaart staat dit dieptecijfer (zie beeld). Wat betekent het?",
 v:'<svg viewBox="0 0 430 130"><rect x="0" y="0" width="430" height="130" fill="#cfe3f2"/><text x="200" y="76" font-size="30" font-weight="bold">2<tspan font-size="19" dy="-9">1</tspan></text><line x1="194" y1="84" x2="238" y2="84" stroke="#1a1a2e" stroke-width="3"/></svg>',
 o:["Droogvalling: de bodem ligt hier 2,1 m bóven het reductievlak","Diepte 2,1 m onder het reductievlak","Nagestreefde baggerdiepte 2,1 m"],
 u:"Het <b>onderstreepte</b> cijfer = droogvalling boven het reductievlak (LAT). Zonder streep: diepte ónder LAT; klein verhoogd cijfer = decimeters.",a:"Les 7.1 (1800-serie)"},
{t:"Bij een schutsluis staat op de 1800-serie het getal 22 in het symbool. Wat is dat?",
 o:["Het marifoonkanaal van de sluis","De schutlengte in meters","De doorvaartbreedte in meters"],
 u:"Cijfers bij sluis, brug of havenkantoor zijn <b>VHF-kanalen</b>. En let op: doorvaarthoogten staan op de 1800-serie in meters, op ANWB-binnenwaterkaarten in decimeters.",a:"Les 7.1 (1800-serie)"}];
BANK["F.13"]=[
{t:"De gegevens op de kaarten van de 1800-serie veranderen tussentijds. Waar worden die wijzigingen gepubliceerd?",
 o:["In de Berichten aan Zeevarenden","In de Vaarkrant","In de Wateralmanak deel 2"],
 u:"De 1800-serie verschijnt jaarlijks, bijgewerkt tot de datum op de <b>binnenzijde van de omslag</b>; daarna houd je hem bij met de <b>Berichten aan Zeevarenden</b>.",a:"Les 7.1 (1800-serie)"},
{t:"Kaartschaal 1:75.000. Twee havens liggen op de kaart 22 cm uit elkaar. Hoeveel zeemijl is dat ongeveer?",
 o:["Circa 9 zeemijl","Circa 16,5 zeemijl","Circa 22 zeemijl"],
 u:"22 cm × 750 m = 16,5 km; gedeeld door 1,852 = <b>± 9 zeemijl</b>. De valkuil is stoppen bij 16,5 (dat zijn kilometers).",a:"Les 7.1 (schaal)"}];
BANK["F.14"]=[
{t:"Hoe is de betonningsrichting in het Maritiem Betonningsstelsel systeem-A (IALA-A) vastgesteld?",
 o:["Als de aanlooprichting vanuit zee naar een haven of riviermonding — met de vloedstroom mee","Van de berg naar de zee, net als bij SIGNI","Per gebied vrij te bepalen door de vaarwegbeheerder"],

{t:"Je loopt vanuit zee een betond vaarwater binnen (in de betonningsrichting). Welke tonnen liggen aan stuurboord?",

/* ===== ENGINE ===== */
const $=id=>document.getElementById(id);
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function parseNum(s){s=(s||"").trim().replace(",",".").replace("°","").replace("'","");const v=parseFloat(s);return isNaN(v)?null:v}
function parseTijd(s){const m=(s||"").trim().match(/^(\d{1,2})[:.](\d{2})$/);return m?(+m[1])*60+(+m[2]):null}
function tijdNaarMin(s){const m=s.match(/^(\d{1,2}):(\d{2})$/);return (+m[1])*60+(+m[2])}
function checkInvul(q,inp){
 if(q.fmt==="tijd"){const g=parseTijd(inp);if(g===null)return{ok:false,leeg:true};return{ok:Math.abs(g-tijdNaarMin(q.ans))<=q.marge}}
 const g=parseNum(inp);if(g===null)return{ok:false,leeg:true};return{ok:Math.abs(g-q.ans)<=q.marge}}
function qhtml(q,slot,pt,nr,mode){
 let h='<div class="kaart" id="k'+nr+'"><div class="qkop">Vraag '+(nr+1)+' · slot '+slot+' · '+pt+' punt'+(pt>1?'en':'')+(slot[0]==="E"?' · blok E':' · blok F')+'</div>';
 h+='<div class="qtekst">'+q.t+'</div>';
 if(q.v)h+='<div class="qv">'+q.v+'</div>';
 if(q.typ==="in"){
  h+='<div class="invulrij"><input id="in'+nr+'" placeholder="'+(q.fmt==="tijd"?"UU:MM":"getal")+'" autocomplete="off"> <b>'+q.eh+'</b> <span class="marge">marge: ±'+q.marge+(q.fmt==="tijd"?" min":" "+q.eh)+'</span></div>';
 }else{
  q._ord.forEach((oi,k)=>{h+='<label class="optie" id="o'+nr+'_'+k+'"><input type="radio" name="q'+nr+'" value="'+oi+'">'+q.o[oi]+'</label>'});
 }
 h+='<div class="uitleg" id="u'+nr+'">'+q.u+' <span class="art">— '+q.a+'</span></div>';
 if(mode==="leer")h+='<div style="margin-top:10px"><button class="sec" onclick="leerCheck('+nr+')">Controleer</button> <button class="prim" onclick="leerVolgende()" style="display:none" id="vlg'+nr+'">Volgende ▶</button></div>';
 return h+'</div>'}
let EX=null,TIMER=null;
function startExamen(){
 $("hoofdmenu").style.display="none";
 EX={vragen:SLOTS.map(([slot,pt])=>{const q=Object.assign({},pick(BANK[slot]));if(!q.typ)q._ord=shuf(q.o.map((_,i)=>i));return{slot,pt,q}}),einde:Date.now()+90*60*1000};
 let h='<div class="voortgang">Proefexamen: 27 vragen · 50 punten · cesuur 35 · 90 minuten. Succes!</div>';
 EX.vragen.forEach((v,i)=>h+=qhtml(v.q,v.slot,v.pt,i,"examen"));
 h+='<button class="groen" style="font-size:16px" onclick="lever()">✔ Inleveren</button>';
 $("app").innerHTML=h;$("timer").style.display="block";window.scrollTo(0,0);
 TIMER=setInterval(()=>{const r=Math.max(0,EX.einde-Date.now());const m=Math.floor(r/60000),s=Math.floor(r%60000/1000);
  $("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  if(r<10*60*1000)$("timer").classList.add("laat");
  if(r<=0){clearInterval(TIMER);lever(true)}},500)}
function lever(auto){
 clearInterval(TIMER);$("timer").style.display="none";
 let tot=0,blok={E:0,F:0},max={E:0,F:0},rev="";
 EX.vragen.forEach((v,i)=>{
  const q=v.q,b=v.slot[0];max[b]+=v.pt;let goed=false,gegeven="—";
  if(q.typ==="in"){const inp=$("in"+i)?$("in"+i).value:"";gegeven=inp||"—";goed=checkInvul(q,inp).ok;}
  else{const sel=document.querySelector('input[name="q'+i+'"]:checked');
   if(sel){gegeven=q.o[+sel.value];goed=(+sel.value===0)}}
  if(goed){tot+=v.pt;blok[b]+=v.pt}
  rev+='<div class="kaart"><div class="qkop">Vraag '+(i+1)+' · '+v.slot+' · '+(goed?'<span style="color:#1e6b30">✔ goed (+'+v.pt+' pt)</span>':'<span style="color:#c62828">✘ fout (0/'+v.pt+' pt)</span>')+'</div>'
   +'<div class="qtekst" style="font-size:13px">'+q.t+'</div>'+(q.v?'<div class="qv">'+q.v+'</div>':'')
   +'<div style="font-size:12.5px">Jouw antwoord: <b>'+gegeven+'</b><br>Juist: <b style="color:#1e6b30">'+(q.typ==="in"?q.ans+" "+q.eh+" (±"+q.marge+(q.fmt==="tijd"?" min":"")+")":q.o[0])+'</b></div>'
   +'<div class="uitleg" style="display:block">'+q.u+' <span class="art">— '+q.a+'</span></div></div>'});
 const gesl=tot>=35;
 $("app").innerHTML='<div id="score"><div class="groot">'+tot+' / 50 punten — '+(gesl?'GESLAAGD 🎉':'gezakt')+'</div>'
  +(auto?'<div>⏱ De tijd was om; het examen is automatisch ingeleverd.</div>':'')
  +'<div>Cesuur: 35 punten (70%).</div>'
  +'<span class="blokscore">Blok E (SRW): '+blok.E+' / '+max.E+'</span><span class="blokscore">Blok F (navigatie): '+blok.F+' / '+max.F+'</span></div>'
  +'<div class="menu"><button class="prim" onclick="location.reload()">↺ Terug naar het menu</button></div>'
  +'<h2 style="font-size:16px">Nabespreking</h2>'+rev;
 window.scrollTo(0,0)}
let LEER=null;
function startLeer(blok){
 $("hoofdmenu").style.display="none";
 LEER={slots:SLOTS.filter(s=>!blok||s[0][0]===blok),nr:0,goed:0,tot:0};
 leerVolgende(true)}
function leerVolgende(eerste){
 const [slot,pt]=pick(LEER.slots);const q=Object.assign({},pick(BANK[slot]));if(!q.typ)q._ord=shuf(q.o.map((_,i)=>i));
 LEER.q=q;LEER.slot=slot;LEER.pt=pt;LEER.nr++;
 $("app").innerHTML='<div class="voortgang">Leermodus · vraag '+LEER.nr+' · score tot nu: '+LEER.goed+' van '+LEER.tot+' <button class="sec" style="padding:4px 10px;font-size:12px" onclick="location.reload()">stoppen</button></div>'+qhtml(q,slot,pt,0,"leer");
 window.scrollTo(0,0)}
function leerCheck(nr){
 const q=LEER.q;LEER.tot++;let goed=false;
 if(q.typ==="in"){const r=checkInvul(q,$("in0").value);goed=r.ok;
  $("in0").style.borderColor=goed?"#1e6b30":"#c62828";$("in0").style.background=goed?"#e3f2e6":"#fde8e8";
 }else{const sel=document.querySelector('input[name="q0"]:checked');if(!sel){LEER.tot--;return}
  goed=(+sel.value===0);
  q._ord.forEach((oi,k)=>{const el=$("o0_"+k);if(oi===0)el.classList.add("goed");else if(sel&&+sel.value===oi&&!goed)el.classList.add("fout")})}
 if(goed)LEER.goed++;
 $("u0").style.display="block";$("vlg0").style.display="inline-block"}
</script>
