uim afstand en blijf actief sturen.","a":"Toetsterm D.4 (VAMEX-kernpunt)"},{"s":"D.5","t":"Hoe groot kan de dode hoek vóór de boeg van een groot binnenschip zijn?","o":["Tot zo'n 350 meter","Hooguit 50 meter","Ruim 1 kilometer"],"u":"Vanuit de stuurhut is het water vlak vóór het schip tot ca. 350 m onzichtbaar. Blijf er dus uit, kijk regelmatig achterom, en gebruik de vuistregel: zie jij de stuurhut, dan ziet de schipper jou.","a":"Toetsterm D.5"}]};
CONTENT["2.3.2"]={"theorie":"<h4>Slepen</h4><ul><li><b>Twee korte gekruiste trossen</b>: veel controle over de pechboot, maar bij golven komt er te veel spanning op — voor rustig water.</li><li><b>Eén lange tros</b>: de rek vangt de klappen van golven op. Vraag de pechboot in bochten naar buiten te sturen en neem zelf de bochten ruim.</li><li><b>Langszij slepen</b>: de meeste controle, perfect om mee af te meren. Let op: naar de kant van de pechboot draai je veel korter dan over de andere boeg. Een schip mag zich niet tussen de delen van een sleep begeven.</li></ul><h4>Man overboord (KNRM-aanpak)</h4><ol><li>Gooi alles wat drijft overboord (kussens, reddingsboei met licht, joon) — houvast én zichtbaarheid.</li><li>Laat één opvarende <b>onafgebroken wijzen</b> naar de drenkeling.</li><li>Ga <b>niet zelf te water</b>.</li><li>Druk de <b>MOB-knop</b> op de GPS in (maar reken op stroomverzet).</li><li>Alarmeer de kustwacht: telefoon <b>0900-0111</b> of marifoon <b>kanaal 16</b>.</li><li>Overschat jezelf niet bij het binnenhalen — hulp van een ander schip is welkom.</li></ol><p><b>Naderen</b>: bovenwinds laat je je naar de drenkeling toe verlijeren (risico: te veel vaart, je vaart eroverheen); benedenwinds nader je op de motor tegen de wind in (risico: motoruitval). De wind heeft veel meer vat op de boot dan op de drenkeling. Aan boord nemen kan <b>ruggelings</b> (vrij gangboord, met z'n tweeën) of <b>over de borst</b> onder de zeereling door.</p><h4>Overige calamiteiten</h4><p>Blijf kalm en zorg eerst voor je eigen veiligheid. Lek geslagen: zet de boot tegen de kant of op een zandbank. Brand, motorstoring of roerproblemen: zoek een veilige plek en anker. Waarschuw hulpdiensten via <b>112 of de marifoon</b> en trek de aandacht met noodsignalen.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_slp\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_slp\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_slp\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"11.5\" fill=\"#fff\" font-weight=\"bold\">2 toplichten boven elkaar = sleep · 3 = niet in kiellinie</text>\n <text x=\"215\" y=\"37\" text-anchor=\"middle\" font-size=\"11.5\" fill=\"#fff\" font-weight=\"bold\">3 in driehoek = duwstel (zie C6)</text>\n <path d=\"M38,170 Q40,152 56,148 L138,148 Q152,152 154,170 Q95,178 38,170 Z\" fill=\"#16283c\" stroke=\"#2c4763\"></path>\n <line x1=\"96\" y1=\"148\" x2=\"96\" y2=\"90\" stroke=\"#2c4763\" stroke-width=\"3\"></line>\n <circle cx=\"96\" cy=\"94\" r=\"6.5\" fill=\"#fff\"></circle><circle cx=\"96\" cy=\"118\" r=\"6.5\" fill=\"#fff\"></circle>\n <circle cx=\"58\" cy=\"142\" r=\"6\" fill=\"#ff2d2d\"></circle><circle cx=\"152\" cy=\"160\" r=\"6\" fill=\"#f2c500\"></circle>\n <line x1=\"156\" y1=\"162\" x2=\"234\" y2=\"162\" stroke=\"#2c4763\" stroke-width=\"2\" stroke-dasharray=\"5,5\"></line>\n <path d=\"M234,172 Q236,156 250,152 L318,152 Q332,156 334,172 Q284,180 234,172 Z\" fill=\"#16283c\" stroke=\"#2c4763\"></path>\n <circle cx=\"284\" cy=\"128\" r=\"6.5\" fill=\"#fff\"></circle><line x1=\"284\" y1=\"152\" x2=\"284\" y2=\"132\" stroke=\"#2c4763\" stroke-width=\"3\"></line>\n <text x=\"96\" y=\"204\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"bold\">sleepboot: 2 toplichten + GEEL heklicht</text>\n <text x=\"284\" y=\"222\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"bold\">gesleept schip: wit rondom</text>\n</svg>","cap":"Sleep in kiellinie: de lange tros vangt met zijn rek de klappen van de golven op."}],"vragen":[{"s":"D.6","t":"Iemand valt overboord. Wat zijn de éérste acties aan boord?","o":["Alles wat drijft toewerpen, één opvarende laten wijzen, MOB-knop op de GPS indrukken — en zelf níét te water gaan","Direct achter de drenkeling aan springen met een lijn","Eerst de kustwacht bellen en daarna pas keren"],"u":"Het KNRM-protocol: drijvend materiaal (kussens, boei met licht, joon) geeft houvast en markeert de plek; de aanwijzer verliest de drenkeling geen seconde uit het oog; de MOB-knop legt de positie vast. Zelf te water gaan maakt van één drenkeling twee.","a":"Toetsterm D.6"},{"s":"D.6","t":"Man overboord bij stevige wind. Hoe nader je de drenkeling voor het oppikken?","o":["Benedenwinds beginnen en tegen de wind in óp de motor naderen","Bovenwinds stilleggen en laten verlijeren","Met volle vaart in één rechte lijn"],"u":"Wind grijpt vooral op de bóót, nauwelijks op de drenkeling. Tegen de wind in nader je gecontroleerd; leg de schroef vrij bij het oppikken. Stroom werkt op beiden gelijk. Eerst: drijfmiddelen erbij, één aanwijzer, MOB-knop, kustwacht.","a":"Toetsterm D.6"},{"s":"D.6","t":"Je sleept een pechboot op één lange tros. Waar let je op in bochten?","o":["De pechboot stuurt in bochten naar buiten — neem bochten dus extra ruim","De pechboot snijdt de bocht juist af","Er verandert niets aan de stuurlijn"],"u":"Een gesleept schip heeft nauwelijks roerdruk en zwaait uit. De lange lijn vangt met zijn rek de klappen op; verleng hem op ruim water voor een gunstiger trekhoek.","a":"Toetsterm D.6"},{"s":"D.6","t":"Wanneer kies je voor langszij slepen?","o":["Op rustig water, vooral om de pechboot ergens af te meren — maximale controle","Juist op zee, bij golven","Nooit: langszij slepen is verboden"],"u":"Langszij geeft de beste controle, maar werkt niet op golven. Let op: het koppel stuurt asymmetrisch en de draaicirkel is aan de pechbootzijde veel kleiner.","a":"Toetsterm D.6"}]};
CONTENT["2.4.1"]={"theorie":"<p><b>Lateraal</b> betekent: de zijkanten van het vaarwater zijn gemarkeerd. Het <b>SIGNI</b>-stelsel geldt op vrijwel alle Nederlandse binnenwateren — behalve de Eems-Dollard, de Waddenzee en de Westerschelde, waar de zeebetonning ligt (die komt bij les 7).</p><h4>Betonningsrichting</h4><ul><li>De <b>betonningsrichting</b> is de stroomrichting: <b>van de berg naar de zee</b>. Vaar je in de betonningsrichting, dan ligt de <b>rechteroever</b> aan je rechterhand — die naamgeving ligt vast, ook als jij tegen de stroom in vaart.</li><li>De <b>nummering</b> loopt op vanaf zee: rood even, groen oneven.</li></ul><h4>Rood en groen</h4><ul><li><b>Rechteroever</b>: rode <b>stompe</b> tonnen, topteken een rode <b>cilinder</b>, even nummers; op de kribben rode kribbakens (driehoek met de punt <b>omlaag</b>).</li><li><b>Linkeroever</b>: groene <b>spitse</b> tonnen, topteken een groene <b>kegel</b>, oneven nummers; kribbakens met de punt <b>omhoog</b>.</li><li>Voor de pleziervaart ligt er vaak een <b>aanvullende betonning</b> (rood-wit of groen-wit horizontaal gestreept) tussen de grote tonnen en de wal: het \"fietspad\" voor kleine schepen.</li></ul><h4>Havens en lichten</h4><p>Bij een haven geldt: de haven <b>uitvaren = betonningsrichting</b>. Uitvarend zie je rechts een rood-wit gestreepte paal met rode cilinder en een rood licht. Een boei met licht heet een <b>lichtboei</b>; een navigatielicht op een vaste constructie een <b>lichtopstand</b>.</p>","vis":[{"svg":"<svg viewBox=\"0 0 460 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><defs><marker id=\"ah_t2r\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#134a70\"/></marker></defs><g class=\"art\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"55\" fill=\"#cfe3cf\"/><rect x=\"0\" y=\"145\" width=\"460\" height=\"55\" fill=\"#cfe3cf\"/><rect x=\"0\" y=\"55\" width=\"460\" height=\"90\" fill=\"#bfd9ec\"/><line x1=\"0\" y1=\"55\" x2=\"460\" y2=\"55\" stroke=\"#1a5e8f\" stroke-width=\"2\"/><line x1=\"0\" y1=\"145\" x2=\"460\" y2=\"145\" stroke=\"#1a5e8f\" stroke-width=\"2\"/><line x1=\"120\" y1=\"100\" x2=\"340\" y2=\"100\" stroke=\"#134a70\" stroke-width=\"3\" marker-end=\"url(#ah_t2r)\"/><circle cx=\"80\" cy=\"72\" r=\"8\" fill=\"#1e6b30\"/><path d=\"M76,64 l8,0 -4,-12 z\" fill=\"#1e6b30\"/><circle cx=\"150\" cy=\"72\" r=\"8\" fill=\"#1e6b30\"/><path d=\"M146,64 l8,0 -4,-12 z\" fill=\"#1e6b30\"/><circle cx=\"290\" cy=\"72\" r=\"8\" fill=\"#1e6b30\"/><path d=\"M286,64 l8,0 -4,-12 z\" fill=\"#1e6b30\"/><rect x=\"72\" y=\"118\" width=\"16\" height=\"14\" fill=\"#c22222\"/><rect x=\"76\" y=\"108\" width=\"8\" height=\"10\" fill=\"#c22222\"/><rect x=\"142\" y=\"118\" width=\"16\" height=\"14\" fill=\"#c22222\"/><rect x=\"146\" y=\"108\" width=\"8\" height=\"10\" fill=\"#c22222\"/><rect x=\"282\" y=\"118\" width=\"16\" height=\"14\" fill=\"#c22222\"/><rect x=\"286\" y=\"108\" width=\"8\" height=\"10\" fill=\"#c22222\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"12\" fill=\"#1a1a2e\"><text x=\"10\" y=\"24\" font-weight=\"bold\" fill=\"#1e6b30\">linkeroever — groen, spits, oneven (1·3·5…)</text><text x=\"10\" y=\"192\" font-weight=\"bold\" fill=\"#c22222\">rechteroever — rood, stomp, even (2·4·6…)</text><text x=\"230\" y=\"92\" text-anchor=\"middle\" font-weight=\"bold\" fill=\"#134a70\">betonningsrichting: van de berg naar de zee →</text><text x=\"418\" y=\"104\" font-size=\"11\" fill=\"#555\">zee</text><text x=\"16\" y=\"104\" font-size=\"11\" fill=\"#555\">berg</text><text x=\"230\" y=\"140\" text-anchor=\"middle\" font-size=\"11\" fill=\"#555\">nummering loopt op vanaf zee</text></g></svg>","cap":"Betonningsrichting van de berg naar de zee: rood-stomp-even aan de rechteroever, groen-spits-oneven aan de linkeroever."},{"svg":"<svg viewBox=\"0 0 430 250\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <clipPath id=\"cb26_hm\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_hm\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_hm\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Betonningsrichting = van de berg naar de zee (stroomrichting)</text>\n <text x=\"215\" y=\"37\" text-anchor=\"middle\" font-size=\"10.5\">Stroomopwaarts varend: groene tonnen aan jouw stuurboord ✓</text>\n <rect x=\"0\" y=\"188\" width=\"430\" height=\"62\" fill=\"#a9cde6\"></rect><line x1=\"0\" y1=\"188\" x2=\"430\" y2=\"188\" stroke=\"#5b87a8\" stroke-width=\"2\"></line>\n <g transform=\"translate(58,188)\"><rect x=\"-16\" y=\"-42\" width=\"32\" height=\"42\" rx=\"3\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"2\"></rect><rect x=\"-7\" y=\"-57\" width=\"14\" height=\"13\" fill=\"#c62828\" stroke=\"#7a1010\"></rect>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\">rood · stomp · cilinder</text><text x=\"0\" y=\"33\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\">rechteroever (even)</text></g>\n <g transform=\"translate(164,188)\"><path d=\"M-18,0 L0,-52 L18,0 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"2\"></path><path d=\"M-6,-52 L0,-65 L6,-52 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\">groen · spits · kegel</text><text x=\"0\" y=\"33\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\">linkeroever (oneven)</text></g>\n <g transform=\"translate(266,188)\"><line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"-46\" stroke=\"#6b4a2b\" stroke-width=\"4\"></line><path d=\"M-13,-46 L13,-46 L0,-25 Z\" fill=\"#c62828\" stroke=\"#7a1010\"></path>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\">kribbaken RO</text><text x=\"0\" y=\"33\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\">punt omlaag</text></g>\n <g transform=\"translate(364,188)\"><line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"-46\" stroke=\"#6b4a2b\" stroke-width=\"4\"></line><path d=\"M-13,-25 L13,-25 L0,-46 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\">kribbaken LO</text><text x=\"0\" y=\"33\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\">punt omhoog</text></g>\n</svg>","cap":"Hoofdmarkering en kribbakens: stomp-rood met cilinder, spits-groen met kegel."},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_hv\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_hv\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_hv\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <rect x=\"0\" y=\"0\" width=\"215\" height=\"250\" fill=\"#bfd9ec\"></rect><rect x=\"215\" y=\"0\" width=\"215\" height=\"250\" fill=\"#0d1b2a\"></rect>\n <rect x=\"0\" y=\"172\" width=\"430\" height=\"78\" fill=\"#3d6f94\"></rect>\n <text x=\"108\" y=\"24\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">OVERDAG (uitvarend)</text>\n <text x=\"322\" y=\"24\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#fff\">&#39;S NACHTS (uitvarend)</text>\n <g transform=\"translate(68,172)\"><g><rect x=\"-7\" y=\"-68\" width=\"14\" height=\"14\" fill=\"#c62828\"></rect><rect x=\"-7\" y=\"-54\" width=\"14\" height=\"14\" fill=\"#fff\"></rect><rect x=\"-7\" y=\"-40\" width=\"14\" height=\"14\" fill=\"#c62828\"></rect><rect x=\"-7\" y=\"-26\" width=\"14\" height=\"14\" fill=\"#fff\"></rect><rect x=\"-7\" y=\"-12\" width=\"14\" height=\"12\" fill=\"#c62828\"></rect></g><rect x=\"-7\" y=\"-83\" width=\"14\" height=\"15\" fill=\"#c62828\" stroke=\"#5a0e0e\"></rect>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"bold\">rood/wit + cilinder</text></g>\n <g transform=\"translate(158,172)\"><g><rect x=\"-7\" y=\"-68\" width=\"14\" height=\"14\" fill=\"#2e7d32\"></rect><rect x=\"-7\" y=\"-54\" width=\"14\" height=\"14\" fill=\"#fff\"></rect><rect x=\"-7\" y=\"-40\" width=\"14\" height=\"14\" fill=\"#2e7d32\"></rect><rect x=\"-7\" y=\"-26\" width=\"14\" height=\"14\" fill=\"#fff\"></rect><rect x=\"-7\" y=\"-12\" width=\"14\" height=\"12\" fill=\"#2e7d32\"></rect></g><path d=\"M-8,-68 L0,-85 L8,-68 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"bold\">groen/wit + kegel</text></g>\n <g transform=\"translate(285,172)\"><rect x=\"-4\" y=\"-66\" width=\"8\" height=\"66\" fill=\"#233648\"></rect><circle cy=\"-74\" r=\"8\" fill=\"#ff2d2d\"></circle>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"bold\">rood (flikker)</text></g>\n <g transform=\"translate(372,172)\"><rect x=\"-4\" y=\"-66\" width=\"8\" height=\"66\" fill=\"#233648\"></rect><circle cy=\"-74\" r=\"8\" fill=\"#28e05a\"></circle>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"bold\">groen (flikker)</text></g>\n <text x=\"215\" y=\"240\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"bold\">Uitvaren = betonningsrichting: rood aan je rechterhand</text>\n</svg>","cap":"Haveningang bij dag en nacht: uitvarend rood aan stuurboord."}],"vragen":[{"s":"C.1","t":"Je vaart een rivier stroomopwaarts (tegen de betonningsrichting in). Aan welke kant liggen de groene spitse tonnen?","o":["Aan je stuurboordzijde","Aan je bakboordzijde","Dat wisselt per riviervak"],"u":"Groen markeert de linkeroever (in de betonningsrichting berg→zee). Vaar je stroomopwaarts, dan ligt die linkeroever — en dus de groene reeks — aan jouw stuurboord. Jouw eigen ezelsbrug, nu examenklaar.","a":"Bijlage 8 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 180\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"40\" width=\"430\" height=\"105\" fill=\"#a9cde6\"></rect><rect x=\"0\" y=\"0\" width=\"430\" height=\"40\" fill=\"#9fbf8f\"></rect><rect x=\"0\" y=\"145\" width=\"430\" height=\"35\" fill=\"#9fbf8f\"></rect><g fill=\"#2e7d32\"><path d=\"M60,40 L72,14 L84,40 Z\"></path><path d=\"M200,40 L212,14 L224,40 Z\"></path><path d=\"M340,40 L352,14 L364,40 Z\"></path></g><g fill=\"#c62828\"><rect x=\"66\" y=\"145\" width=\"22\" height=\"26\" rx=\"2\"></rect><rect x=\"206\" y=\"145\" width=\"22\" height=\"26\" rx=\"2\"></rect><rect x=\"346\" y=\"145\" width=\"22\" height=\"26\" rx=\"2\"></rect></g><use href=\"#kschip\" transform=\"translate(120,95)\"></use><line x1=\"155\" y1=\"95\" x2=\"215\" y2=\"95\" stroke=\"#1a1a2e\" stroke-width=\"2.2\" marker-end=\"url(#ah)\"></line><g stroke=\"#134a70\" fill=\"#134a70\"><line x1=\"330\" y1=\"95\" x2=\"395\" y2=\"95\" stroke-width=\"5\" marker-end=\"url(#ah)\"></line><text x=\"362\" y=\"82\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">stroom</text></g></svg>"},{"s":"C.1","t":"Langs de rechteroever (gezien in de betonningsrichting) staan kribbakens. Welke vorm en kleur hebben ze?","o":["Rood, driehoek met de punt omlaag","Groen, driehoek met de punt omhoog","Rood-wit horizontaal gestreept met een cilinder"],"u":"Kribbakens volgen de oeverkleuren van SIGNI: rechteroever rood (driehoek punt omlaag, denk aan de rode stompe ton), linkeroever groen (punt omhoog, als de groene spitse ton). Rood-wit horizontaal hoort bij de aanvullende betonning voor kleine schepen.","a":"Bijlage 8 BPR"}]};
CONTENT["2.4.2"]={"theorie":"<h4>Scheidingstonnen</h4><p>Op scheidingen en splitsingen liggen <b>bolvormige</b> tonnen:</p><ul><li><b>Gelijk belang</b>: rood/groen horizontaal gestreept, topteken een rood-groene bol — links- of rechtsaf maakt niet uit.</li><li><b>Hoofdvaarwater rechts</b>: groen boven rood, topteken groene kegel (ligt in de groene reeks van het hoofdvaarwater).</li><li><b>Hoofdvaarwater links</b>: rood boven groen, topteken rode cilinder (ligt in de rode reeks).</li></ul><p>De gouden regel: <b>hoofdvaarwater = tussen twee kleuren door</b> (rood én groen), <b>nevenvaarwater = tussen twee dezelfde kleuren door</b>. Op de wal kan een <b>splitsingsbaken</b> staan: twee kegels met de punten naar elkaar, rood boven groen.</p><h4>Bijzondere markeringen</h4><ul><li><b>Midvaarwaterton</b>: bolvormig, rood-wit <b>verticaal</b> gestreept, ter oriëntatie op ruim water — aan beide zijden te passeren.</li><li><b>Geel</b> markeert bijzondere gebieden (verboden gebieden, bagger-, anker- en visserijzones), vaak met een geel liggend kruis; met een rood-wit-rood gestreepte cilinder als topteken bakent hij een verboden (natuur)gebied af.</li><li><b>Sparboei</b>: cilindervormige winterboei bij ijsgang. Daarnaast bestaan de nood-wrak-boei (nieuw gevaar) en de markering van een <b>afzonderlijk gevaar</b> (rondom passeerbaar obstakel).</li></ul><h4>Lichtenlijn en sectorlicht</h4><p>Een <b>lichtenlijn</b> markeert het diepste deel van een geul of een havenaanloop: twee lichten achter elkaar, het voorste lager. <b>Stuur altijd naar het laagste licht toe</b> om in de lijn te komen. Een <b>sectorlicht</b> verandert van kleur afhankelijk van de richting waaruit je kijkt. Op een <b>bovenrivier</b> stroomt het water altijd één kant op; op een benedenrivier wisselen eb- en vloedstroom.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <clipPath id=\"cb26_sch\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_sch\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_sch\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Bolvormig — het topteken verraadt de reeks</text>\n <g transform=\"translate(72,118)\"><g clip-path=\"url(#cb26_sch)\"><circle r=\"26\" fill=\"#c62828\"></circle><rect x=\"-26\" y=\"0\" width=\"52\" height=\"26\" fill=\"#2e7d32\"></rect></g><circle r=\"26\" fill=\"none\" stroke=\"#5a0e0e\" stroke-width=\"2\"></circle><rect x=\"-6\" y=\"-41\" width=\"12\" height=\"12\" fill=\"#c62828\" stroke=\"#5a0e0e\"></rect>\n  <text x=\"0\" y=\"44\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">rood boven groen + cilinder</text><text x=\"0\" y=\"57\" text-anchor=\"middle\" font-size=\"9.5\">HVW links · rode reeks</text></g>\n <g transform=\"translate(215,118)\"><g clip-path=\"url(#cb26_sch)\"><circle r=\"26\" fill=\"#2e7d32\"></circle><rect x=\"-26\" y=\"0\" width=\"52\" height=\"26\" fill=\"#c62828\"></rect></g><circle r=\"26\" fill=\"none\" stroke=\"#14401a\" stroke-width=\"2\"></circle><path d=\"M-8,-28 L0,-43 L8,-28 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path>\n  <text x=\"0\" y=\"44\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">groen boven rood + kegel</text><text x=\"0\" y=\"57\" text-anchor=\"middle\" font-size=\"9.5\">HVW rechts · groene reeks</text></g>\n <g transform=\"translate(358,118)\"><g clip-path=\"url(#cb26_sch)\"><circle r=\"26\" fill=\"#c62828\"></circle><rect x=\"-26\" y=\"-9\" width=\"52\" height=\"9\" fill=\"#2e7d32\"></rect><rect x=\"-26\" y=\"9\" width=\"52\" height=\"9\" fill=\"#2e7d32\"></rect></g><circle r=\"26\" fill=\"none\" stroke=\"#5a0e0e\" stroke-width=\"2\"></circle><g clip-path=\"url(#cb22_sch)\"><circle cy=\"-24\" r=\"9\" fill=\"#c62828\"></circle><rect x=\"-9\" y=\"-24\" width=\"18\" height=\"9\" fill=\"#2e7d32\"></rect></g><circle cy=\"-38\" r=\"9\" fill=\"none\" stroke=\"#5a0e0e\" transform=\"translate(0,14)\"></circle>\n  <text x=\"0\" y=\"44\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">rood/groen banden + bol</text><text x=\"0\" y=\"57\" text-anchor=\"middle\" font-size=\"9.5\">gelijk belang · beide mag</text></g>\n <text x=\"215\" y=\"208\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#1a5e8f\">Hoofdvaarwater volgen = tussen twee VERSCHILLENDE kleuren door</text>\n <text x=\"215\" y=\"228\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#1a5e8f\">Nevenvaarwater in/uit = tussen twee GELIJKE kleuren door</text>\n</svg>","cap":"De drie scheidingstonnen en de gouden regel: twee kleuren = hoofdvaarwater, één kleur = nevenvaarwater."},{"svg":"<svg viewBox=\"0 0 430 260\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <clipPath id=\"cb26_bb\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_bb\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_bb\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">Let op kleurvolgorde: afzonderlijk gevaar = zwart mét rode band</text>\n <rect x=\"0\" y=\"190\" width=\"430\" height=\"70\" fill=\"#a9cde6\"></rect><line x1=\"0\" y1=\"190\" x2=\"430\" y2=\"190\" stroke=\"#5b87a8\" stroke-width=\"2\"></line>\n <g transform=\"translate(45,190)\"><g clip-path=\"url(#cb26_bb)\" transform=\"scale(.88)\"><circle r=\"26\" fill=\"#fff\"></circle><g fill=\"#c62828\"><rect x=\"-26\" y=\"-26\" width=\"10\" height=\"52\"></rect><rect x=\"-5\" y=\"-26\" width=\"10\" height=\"52\"></rect><rect x=\"16\" y=\"-26\" width=\"10\" height=\"52\"></rect></g></g><circle r=\"23\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.6\" transform=\"translate(0,0)\"></circle>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">midvaarwater</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">rondom vrij</text></g>\n <g transform=\"translate(122,190)\"><rect x=\"-14\" y=\"-42\" width=\"28\" height=\"42\" rx=\"3\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"2\"></rect><g stroke=\"#f2c500\" stroke-width=\"6\" transform=\"translate(0,-51)\"><line x1=\"-9\" y1=\"-5\" x2=\"9\" y2=\"5\"></line><line x1=\"-9\" y1=\"5\" x2=\"9\" y2=\"-5\"></line></g>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">bijzonder</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">geel (+ kruis)</text></g>\n <g transform=\"translate(199,190)\"><rect x=\"-14\" y=\"-42\" width=\"28\" height=\"42\" rx=\"3\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"2\"></rect><g transform=\"translate(0,-53)\"><rect x=\"-9\" y=\"-12\" width=\"18\" height=\"24\" fill=\"#c62828\"></rect><rect x=\"-9\" y=\"-4\" width=\"18\" height=\"8\" fill=\"#fff\"></rect></g>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">geel + r/w/r</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">verboden gebied</text></g>\n <g transform=\"translate(276,190)\"><rect x=\"-13\" y=\"-46\" width=\"26\" height=\"46\" rx=\"3\" fill=\"#1a1a2e\" stroke=\"#000\" stroke-width=\"2\"></rect><rect x=\"-13\" y=\"-32\" width=\"26\" height=\"12\" fill=\"#c62828\"></rect><circle cy=\"-56\" r=\"6\" fill=\"#1a1a2e\"></circle><circle cy=\"-70\" r=\"6\" fill=\"#1a1a2e\"></circle>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">afz. gevaar · 2 bollen</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">zwart + rode band</text></g>\n <g transform=\"translate(353,190)\"><g><rect x=\"-12\" y=\"-46\" width=\"12\" height=\"46\" fill=\"#1a5ec2\" stroke=\"#0d3a7a\"></rect><rect x=\"0\" y=\"-46\" width=\"12\" height=\"46\" fill=\"#f2c500\" stroke=\"#8a6d00\"></rect></g><g fill=\"#f2c500\" stroke=\"#8a6d00\" transform=\"translate(0,-56)\"><rect x=\"-3\" y=\"-10\" width=\"6\" height=\"20\"></rect><rect x=\"-10\" y=\"-3\" width=\"20\" height=\"6\"></rect></g>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">nood-wrak</text><text x=\"-8\" y=\"30\" text-anchor=\"middle\" font-size=\"7\">blauw/geel · staand kruis</text></g>\n <g transform=\"translate(412,190)\"><rect x=\"-6\" y=\"-58\" width=\"12\" height=\"58\" rx=\"2\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.6\"></rect>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">sparboei</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">winter/ijsgang</text></g>\n</svg>","cap":"Bijzondere boeien: midvaarwaterton, gele markeringen, sparboei en gevaarmarkeringen."},{"svg":"<svg viewBox=\"0 0 430 250\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_ll\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_ll\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_ll\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"11.8\" fill=\"#fff\" font-weight=\"bold\">Stuur richting het láágste licht tot ze onder elkaar staan</text>\n <g font-size=\"10\" fill=\"#8fb3d1\" text-anchor=\"middle\">\n  <g transform=\"translate(78,0)\"><line x1=\"0\" y1=\"46\" x2=\"0\" y2=\"170\" stroke=\"#39597a\" stroke-dasharray=\"4,5\"></line><circle cx=\"0\" cy=\"66\" r=\"6\" fill=\"#f2c500\"></circle><circle cx=\"-26\" cy=\"118\" r=\"6\" fill=\"#f2c500\"></circle>\n   <text y=\"196\" fill=\"#fff\" font-weight=\"bold\">onderste links</text><text y=\"211\">→ lijn ligt aan bakboord</text><text y=\"225\">→ stuur bakboord</text></g>\n  <g transform=\"translate(215,0)\"><line x1=\"0\" y1=\"46\" x2=\"0\" y2=\"170\" stroke=\"#39597a\" stroke-dasharray=\"4,5\"></line><circle cx=\"0\" cy=\"66\" r=\"6\" fill=\"#f2c500\"></circle><circle cx=\"0\" cy=\"118\" r=\"6\" fill=\"#f2c500\"></circle>\n   <text y=\"196\" fill=\"#fff\" font-weight=\"bold\">recht onder elkaar</text><text y=\"211\">→ je zit ín de lijn</text><text y=\"225\">→ koers houden</text></g>\n  <g transform=\"translate(352,0)\"><line x1=\"0\" y1=\"46\" x2=\"0\" y2=\"170\" stroke=\"#39597a\" stroke-dasharray=\"4,5\"></line><circle cx=\"0\" cy=\"66\" r=\"6\" fill=\"#f2c500\"></circle><circle cx=\"26\" cy=\"118\" r=\"6\" fill=\"#f2c500\"></circle>\n   <text y=\"196\" fill=\"#fff\" font-weight=\"bold\">onderste rechts</text><text y=\"211\">→ lijn aan stuurboord</text><text y=\"225\">→ stuur stuurboord</text></g>\n </g>\n <text x=\"215\" y=\"244\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8fb3d1\">Voorste baak is lager · sectorlicht (kleur per richting) volgt als zusterkaart</text>\n</svg>","cap":"Lichtenlijn: stuur naar het laagste licht — staan de lichten boven elkaar, dan zit je in de lijn."}],"vragen":[{"s":"C.1","t":"Op een splitsing ligt een bolvormige ton: groen bovenvlak, rood ondervlak, met een groene kegel als topteken. Wat betekent dit?","o":["Het hoofdvaarwater loopt rechts van de ton (hij ligt in de groene reeks)","Het hoofdvaarwater loopt links van de ton","Vaarwateren van gelijk belang: kies zelf"],"u":"De bovenkleur en het topteken verraden de reeks: groen-boven-rood + kegel = hoofdvaarwater rechts. Gouden regel: hoofdvaarwater volgen = tussen twee verschíllende kleuren door; nevenvaarwater in/uit = tussen twee gelijke kleuren.","a":"Bijlage 8 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 190\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"30\" width=\"430\" height=\"130\" fill=\"#a9cde6\"></rect><g transform=\"translate(215,108)\"><g clip-path=\"url(#cb26)\"><circle r=\"26\" fill=\"#2e7d32\"></circle><rect x=\"-26\" y=\"0\" width=\"52\" height=\"26\" fill=\"#c62828\"></rect></g><circle r=\"26\" fill=\"none\" stroke=\"#14401a\" stroke-width=\"2\"></circle><path d=\"M-8,-28 L0,-44 L8,-28 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path></g><path d=\"M180,62 Q150,45 118,40\" fill=\"none\" stroke=\"#1a1a2e\" stroke-width=\"2\" stroke-dasharray=\"5,5\" marker-end=\"url(#ah)\"></path><path d=\"M250,62 Q280,45 312,40\" fill=\"none\" stroke=\"#1a1a2e\" stroke-width=\"2\" stroke-dasharray=\"5,5\" marker-end=\"url(#ah)\"></path><text x=\"215\" y=\"178\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#134a70\">splitsing vóór je — welke kant is het hoofdvaarwater?</text></svg>"},{"s":"C.1","t":"Midden op het ruime water ligt een bolvormige, rood-wit verticaal gestreepte ton met een rond topteken. Wat betekent die?","o":["Veilig vaarwater (midvaarwater-/aanloopton) — aan beide zijden te passeren","Afzonderlijk gevaar — ruim eromheen blijven","Verboden vaargebied"],"u":"De midvaarwaterton (uiterton/verkenner) is puur oriëntatie: rondom veilig water. Het afzonderlijk-gevaarteken is juist zwárt met rode band(en) en twee zwarte bollen als topteken.","a":"Bijlage 8 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 190\"><rect x=\"0\" y=\"30\" width=\"430\" height=\"130\" fill=\"#a9cde6\"/><g transform=\"translate(215,112)\"><g clip-path=\"url(#cb26)\"><circle r=\"26\" fill=\"#fff\"/><rect x=\"-26\" y=\"-26\" width=\"11\" height=\"52\" fill=\"#c62828\"/><rect x=\"-4\" y=\"-26\" width=\"11\" height=\"52\" fill=\"#c62828\"/><rect x=\"18\" y=\"-26\" width=\"11\" height=\"52\" fill=\"#c62828\"/></g><circle CONTENT["2.5.1"]={"theorie":"<p><b>Cardinale betonning</b> markeert gevaren (banken, klippen, wrakken). De naam zegt aan welke kant het <b>veilige</b> vaarwater ligt: een noordcardinaal passeer je aan de noordzijde.</p><ul><li>De boeien zijn <b>geel met zwart</b>; het topteken bestaat uit twee driehoeken en verklapt waar de zwarte band zit: punten <b>omhoog</b> = noord (zwart boven), punten <b>omlaag</b> = zuid (zwart onder), punten <b>van elkaar af</b> = oost (zwart boven én onder), punten <b>naar elkaar toe</b> = west (zwart in het midden).</li><li>De <b>lichten</b> onthoud je met de klok: oost = 3 flitsen, zuid = 6 + lange flits (LFl), west = 9, noord = doorlopend flikkeren (VQ of Q). Alle cardinale lichten zijn wit.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 300 340\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:linear-gradient(#dcecf7,#cfe3f2)\">\n<defs>\n <linearGradient id=\"sky_cn\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#dcecf7\"></stop><stop offset=\"1\" stop-color=\"#c3dbee\"></stop></linearGradient>\n <linearGradient id=\"sea_cn\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#8fc0e2\"></stop><stop offset=\".25\" stop-color=\"#69a2cc\"></stop><stop offset=\"1\" stop-color=\"#3f6f96\"></stop></linearGradient>\n <linearGradient id=\"shade_cn\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\"><stop offset=\"0\" stop-color=\"#000\" stop-opacity=\".5\"></stop><stop offset=\".28\" stop-color=\"#000\" stop-opacity=\"0\"></stop><stop offset=\".42\" stop-color=\"#fff\" stop-opacity=\".32\"></stop><stop offset=\".58\" stop-color=\"#fff\" stop-opacity=\"0\"></stop><stop offset=\"1\" stop-color=\"#000\" stop-opacity=\".55\"></stop></linearGradient>\n <linearGradient id=\"rust_cn\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#7a5b2d\" stop-opacity=\"0\"></stop><stop offset=\"1\" stop-color=\"#6b4a1e\" stop-opacity=\".5\"></stop></linearGradient>\n</defs>\n<rect x=\"0\" y=\"0\" width=\"300\" he ath d=\"M-12.48,130 L12.48,130 L11.34,168 L-11.34,168 Z\" fill=\"#23272b\"></path><path d=\"M-12.48,130 L-7.48,130 L-6.34,168 L-11.34,168 Z\" fill=\"#fff\" opacity=\".22\"></path><path d=\"M7.48,130 L12.48,130 L11.34,168 L6.34,168 Z\" fill=\"#000\" opacity=\".3\"></path><path d=\"M-11.34,168 L11.34,168 L10.32,202 L-10.32,202 Z\" fill=\"#e6b800\"></path><path d=\"M-11.34,168 L-6.34,168 L-5.32,202 L-10.32,202 Z\" fill=\"#fff\" opacity=\".22\"></path><path d=\"M6.34,168 L11.34,168 L10.32,202 L5.32,202 Z\" fill=\"#000\" opacity=\".3\"></path><path d=\"M0,52 L15,18 L-15,18 Z\" fill=\"#23272b\"></path><path d=\"M0,52 L-15,18 L-7,18 Q-2,40 0,52 Z\" fill=\"#fff\" opacity=\".2\"></path><path d=\"M0,56 L15,90 L-15,90 Z\" fill=\"#23272b\"></path><path d=\"M0,56 L-15,90 L-7,90 Q-2,68 0,56 Z\" fill=\"#fff\" opacity=\".2\"></path><line x1=\"0\" y1=\"92\" x2=\"0\" y2=\"96\" stroke=\"#2d3338\" stroke-width=\"3.4\"></line>\n <text x=\"0\" y=\"292\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#0e2a40\">cardinaal West</text>\n <text x=\"0\" y=\"304\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">kegels naar elkaar toe · geel-zwart-geel</text><text x=\"0\" y=\"318\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">· passeer aan de westzijde</text>\n</g></svg>","cap":"Westcardinaal: punten naar elkaar toe, geel-zwart-geel — 9 flitsen (klok: 9 uur).","half":true}],"vragen":[{"s":"C.1","t":"Je nadert een gele boei met zwarte bovenzijde; het topteken bestaat uit twee zwarte kegels met de punten omhoog. Waar passeer je?","o":["Ten noorden van de boei — dit is een noordkardinaal (obstakelmarkering)","Ten zuiden van de boei","Aan weerszijden: de boei markeert veilig water"],"u":"Kardinalen zeggen aan welke kant het véilige water ligt. De kegelpunten wijzen naar het zwarte deel: beide omhoog + zwart boven = noord. Klok-ezelsbrug voor de lichten: N=12 (continu), O=3, Z=6, W=9.","a":"Bijlage 8 BPR (SIGNI)","v":"<svg class=\"qv\" viewBox=\"0 0 430 200\"><rect x=\"0\" y=\"30\" width=\"430\" height=\"140\" fill=\"#a9cde6\"/><g transform=\"translate(215,118)\"><path d=\"M-20,42 L20,42 L14,-30 L-14,-30 Z\" fill=\"#f2c500\" stroke=\"#7a5c00\" stroke-width=\"1.5\"/><path d=\"M-14,-30 L14,-30 L12,0 L-12,0 Z\" fill=\"#1a1a2e\"/><line x1=\"0\" y1=\"-30\" x2=\"0\" y2=\"-72\" stroke=\"#333\" stroke-width=\"3\"/><g fill=\"#1a1a2e\"><path d=\"M-10,-56 L10,-56 L0,-74 Z\"/><path d=\"M-10,-34 L10,-34 L0,-52 Z\"/></g></g><text x=\"215\" y=\"190\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#134a70\">geel drijflichaam, zwarte bovenzijde · twee kegels met de punten omhoog</text></svg>"},{"s":"C.2","t":"Welk lichtkarakter hoort bij een zuidkardinaal?","o":["VQ(6) of Q(6) mét een lange schittering (LFl) — de klok wijst 6 uur","VQ(9), zoals de klok 9 uur","Ononderbroken snel flikkeren"],"u":"Klok-ezelsbrug: N=12 (continu flikkeren), O=3, Z=6, W=9 flitsen per groep. De extra LFl bij zuid voorkomt mistellen tussen 6 en 9 als golven het zicht onderbreken.","a":"Bijlage 8 BPR"}]};
CONTENT["2.6.1"]={"theorie":"<p>Om tonnen 's nachts te herkennen dragen ze lichten met een vast <b>lichtkarakter</b>:</p><table><tr><th>Code</th><th>Naam</th><th>Ritme</th></tr><tr><td><b>VQ</b></td><td>very quick — snel flikkerlicht</td><td>zeer korte flitsen (¼ s)</td></tr><tr><td><b>Q</b></td><td>quick — flikkerlicht</td><td>korte flitsen (½ s)</td></tr><tr><td><b>Fl</b></td><td>flash — schitterlicht</td><td>korter aan dan uit (± 1 s aan)</td></tr><tr><td><b>LFl</b></td><td>long flash</td><td>lange schittering van 2 s</td></tr><tr><td><b>Iso</b></td><td>isofase</td><td>even lang aan als uit</td></tr><tr><td><b>Oc</b></td><td>occulting</td><td>langer aan dan uit</td></tr><tr><td><b>F</b></td><td>fixed — vast licht</td><td>brandt permanent</td></tr></table><p>Achter de code staat de <b>periode</b>: Iso 8s betekent 4 seconden aan, 4 seconden uit; VQ(3) 5s betekent telkens 3 snelle flitsen binnen een cyclus van 5 seconden.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 300\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_lk\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_lk\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_lk\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"22\" text-anchor=\"middle\" font-size=\"12\" fill=\"#fff\" font-weight=\"bold\">Balk = ritme, bol = live</text>\n <g font-size=\"11\" fill=\"#fff\">\n  <g transform=\"translate(0,52)\"><text x=\"14\" y=\"4\">VQ</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"95\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"105\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"115\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"125\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"135\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"145\" y=\"-5\" width=\"5\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">zeer snel flikker (¼ s)</text></g>\n  <g transform=\"translate(0,88)\"><text x=\"14\" y=\"4\">Q</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"9\" height=\"10\"></rect><rect x=\"103\" y=\"-5\" width=\"9\" height=\"10\"></rect><rect x=\"121\" y=\"-5\" width=\"9\" height=\"10\"></rect><rect x=\"139\" y=\"-5\" width=\"9\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">flikker (½ s)</text></g>\n  <g transform=\"translate(0,124)\"><text x=\"14\" y=\"4\">Fl</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"18\" height=\"10\"></rect><rect x=\"158\" y=\"-5\" width=\"18\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">schitter: korter áán dan uit</text></g>\n  <g transform=\"translate(0,160)\"><text x=\"14\" y=\"4\">LFl</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"36\" height=\"10\"></rect><rect x=\"178\" y=\"-5\" width=\"36\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">lange schittering (≈2 s)</text></g>\n  <g transform=\"translate(0,196)\"><text x=\"14\" y=\"4\">Iso</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"34\" height=\"10\"></rect><rect x=\"153\" y=\"-5\" width=\"34\" height=\"10\"></rect><rect x=\"221\" y=\"-5\" width=\"34\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">even lang aan als uit</text></g>\n  <g transform=\"translate(0,232)\"><text x=\"14\" y=\"4\">Oc</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"52\" height=\"10\"></rect><rect x=\"152\" y=\"-5\" width=\"52\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">langer áán dan uit</text></g>\n  <g transform=\"translate(0,268)\"><text x=\"14\" y=\"4\">F</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><rect x=\"85\" y=\"-5\" width=\"170\" height=\"10\" fill=\"#f2c500\"></rect><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">vast licht</text></g>\n </g>\n</svg>","cap":"De lichtkarakters als tijdstrip — van snel flikkerlicht (VQ) tot vast licht (F)."}],"vragen":[{"s":"C.2","t":"Een licht brandt 4 seconden en is daarna 4 seconden gedoofd, steeds opnieuw. Welk lichtkarakter is dit?","o":["Iso 8s (isofase)","Fl 8s (schitterlicht)","Oc 8s (onderbroken licht)"],"u":"Iso = even lang aan als uit; de 8s is de volledige periode. Fl = korter áán dan uit; Oc = juist langer áán dan uit. Ezelsbrug: Fl = flits, Oc = bijna altijd aan.","a":"Bijlage 8 BPR","v":"<svg class=\"qv nacht\" viewBox=\"0 0 430 150\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#101a2b\"> <circle cx=\"215\" cy=\"62\" r=\"12\" fill=\"#f2c500\"></circle><text x=\"215\" y=\"120\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8fb3d1\">kijk naar het ritme — volledige periode: 8 seconden</text></svg>"},{"s":"C.2","t":"Een licht is steeds duidelijk lánger aan dan uit. Welk lichtkarakter is dit?","o":["Oc (onderbroken licht)","Iso (isofase)","Fl (schitterlicht)"],"u":"Oc/onderbroken = langer aan dan uit; Iso = precies even lang aan als uit; Fl/schitter = juist kórter aan dan uit. F is permanent vast licht.","a":"Bijlage 8 BPR"},{"s":"C.2","t":"'s Nachts zie je een wit licht met groepen van drie zeer snelle flitsen, elke 5 seconden herhaald — VQ(3) 5s. Bij welke boei hoort dit?","o":["De oostkardinaal","De zuidkardinaal","De noordkardinaal"],"u":"De klok-ezelsbrug: noord = continu flikkeren (12 uur), oost = groepen van 3 (3 uur), zuid = 6 + lange schittering (6 uur), west = groepen van 9 (9 uur). VQ(3) 5s is dus oost.","a":"Bijlage 8 BPR"}]};
CONTENT["3.1.1"]={"theorie":"<h4>Wetten</h4><ul><li><b>Scheepvaartverkeerswet (SVW)</b>: de basiswet (\"raamwet\") voor de ordening van al het scheepvaartverkeer; de uitwerking staat in de reglementen. Uitzondering die wél in de wet zelf staat (art. 27): maximaal <b>0,5‰</b> alcohol, voor schipper én roerganger. En los daarvan: wie merkbaar belemmerd is door vermoeidheid, alcohol, medicijnen of drugs mag niet varen — ook onder de 0,5‰.</li><li><b>Binnenvaartwet (BVW)</b>: veiligheid van de vaart en aan boord (vooral grote schepen); hier staan ook de vaarbewijsregels.</li><li><b>Wetboek van Koophandel</b>: hulpplicht bij een schip in nood (behalve als eigen schip of opvarenden in gevaar komen) en na een aanvaring naam en thuishaven doorgeven (art. 785).</li></ul><h4>Reglementen</h4><p>Het <b>BPR</b> geldt bijna overal, tot en met de Waddenzee. Leer niet wáár het geldt, maar waar het <b>niet</b> geldt: op de Rijntakken (Boven- en Neder-Rijn, Waal, Lek en het Pannerdensch Kanaal) geldt het <b>RPR</b>; verder bestaan het SRKGT (Kanaal Gent–Terneuzen), SRGM (Grensmaas), SRE (Eemsmonding) en SRW (Westerschelde) — daarvan hoef je alleen het toepassingsgebied te kennen. De volledige teksten staan in Wateralmanak deel 1. In het BPR-gebied moet elk schip (behalve open boten) het <b>BPR aan boord</b> hebben, en met een marifoon ook het <b>Handboek Marifonie</b> — beide mogen digitaal.</p>","vragen":[{"s":"A.3","t":"Je vaart op de Lek. Welk reglement geldt daar?","o":["Het RPR","Het BPR","Het SRGM"],"u":"RPR-gebied = Boven-Rijn, Waal, Pannerdensch Kanaal, Neder-Rijn én Lek. Vrijwel al het overige binnenwater (inclusief Waddenzee en IJsselmeer) is BPR.","a":"Besluit RPR 1995 art. 1"},{"s":"A.3","t":"Je vaart van Alkmaar via het Noordhollandsch Kanaal over de Waddenzee naar het IJsselmeer (zie kaart). Welke reglementen kom je tegen?","o":["Alleen het BPR","Eerst het BPR, op de Waddenzee het BVA","Het BPR en daarna het SRE"],"u":"Klassieke instinker: het kanaal, de Waddenzee én het IJsselmeer vallen álle drie gewoon onder het BPR — nergens op deze route ligt RPR- of ander reglementsgebied. Het BVA geldt op zee (Noordzee), het SRE alleen in de Eemsmonding.","a":"Vaststellingsbesluit BPR","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 250\"><rect x=\"0\" y=\"0\" width=\"430\" height=\"250\" fill=\"#7fb2d9\"/><text x=\"418\" y=\"18\" text-anchor=\"end\" font-size=\"9\" fill=\"#0d3350\">niet op schaal</text><path d=\"M0,60 L96,54 L128,66 L138,96 L128,250 L0,250 Z\" fill=\"#e6eede\" stroke=\"#8aa382\" stroke-width=\"1.5\"/><path d=\"M118,74 L124,74 L118,232 L106,232 Z\" fill=\"#7fb2d9\" stroke=\"#4a80a8\"/><text x=\"96\" y=\"160\" font-size=\"10\" font-weight=\"bold\" fill=\"#0d3350\" transform=\"rotate(-87 96,160)\">Noordhollandsch Kanaal</text><circle cx=\"112\" cy=\"224\" r=\"5\" fill=\"#c22222\"/><text x=\"88\" y=\"243\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#0d3350\">Alkmaar</text><circle cx=\"120\" cy=\"80\" r=\"4\" fill=\"#333\"/><text x=\"64\" y=\"72\" text-anchor=\"end\" font-size=\"10\" font-weight=\"bold\" fill=\"#0d3350\">Den Helder</text><path d=\"M150,92 L430,158 L430,172 L150,106 Z\" fill=\"#c9c2a8\" stroke=\"#8f876b\" stroke-width=\"1.5\"/><text x=\"292\" y=\"126\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#4d4630\" transform=\"rotate(13 292,126)\">Afsluitdijk</text><g stroke=\"#333\" stroke-width=\"3\" fill=\"none\"><path d=\"M196,100 L206,110 L216,105\"/></g><text x=\"196\" y=\"90\" font-size=\"10\" font-weight=\"bold\" fill=\"#0d3350\">sluis Den Oever</text><text x=\"300\" y=\"60\" font-size=\"13\" font-weight=\"bold\" fill=\"#0d3350\">WADDENZEE</text><text x=\"300\" y=\"225\" font-size=\"13\" font-weight=\"bold\" fill=\"#0d3350\">IJSSELMEER</text><path d=\"M112,216 L114,96 Q114,80 132,72 Q168,58 200,72 L206,96 L216,132 L250,180\" fill=\"none\" stroke=\"#e07b00\" stroke-width=\"3\" stroke-dasharray=\"8,5\" marker-end=\"url(#ah)\"/></svg>"},{"s":"A.1","t":"Je hebt 0,4 promille alcohol op, maar voelt je door alcohol plus medicijnen merkbaar beïnvloed. Mag je varen?","o":["Nee — ook onder de 0,5‰ is varen verboden als je functioneren merkbaar belemmerd is","Ja, je zit onder de wettelijke grens","Ja, mits een nuchtere opvarende uitkijk houdt"],"u":"De 0,5‰-grens werkt twee kanten op: eronder maar merkbaar beïnvloed (alcohol, medicijnen, vermoeidheid) → tóch verboden. Erboven zonder er iets van te merken → óók verboden. De grens geldt voor schipper én roerganger.","a":"Art. 27 SVW"}]};
CONTENT["3.1.2"]={"theorie":"<p>De reglementen zijn geschreven voor de beroepsvaart. Een <b>groot schip</b> is 20 m of langer (over de stevens); een <b>klein schip</b> is korter dan 20 m, gemeten zonder boegspriet, papegaaistok en trimvlak. Groot heeft meer rechten dan klein — en er zijn <b>vijf kleine schepen met grote-schip-rechten</b>, de \"grote vijf\": passagiersschip, vissersschip, veerpont, duwbak, en een sleepboot die een groot schip sleept of assisteert.</p><h4>Definities die het examen vraagt</h4><ul><li><b>Passagiersschip</b>: mag meer dan 12 passagiers vervoeren; klein exemplaar voert een gele ruit.</li><li><b>Zeilschip</b>: wordt uitsluitend door zeilen voortbewogen — zeil plus motor = <b>motorschip</b>.</li><li><b>Stilliggend</b>: ten anker, gemeerd of op spudpalen (\"veilig geparkeerd\"). Een <b>vastgevaren</b> schip hoort daar niet bij; een schip dat zonder voortstuwing <b>voortdrijft is \"varend\"</b>. Meedrijven op de stroom zonder voortstuwing is verboden: zonder roerdruk ben je onbestuurbaar.</li><li><b>Vaarweg</b> = al het water dat openstaat voor scheepvaart; <b>vaarwater</b> = het deel dat feitelijk bevaarbaar is.</li><li><b>Snelle motorboot</b> = klein schip dat &gt; 20 km/u kan; <b>snel schip</b> = groot schip dat &gt; 40 km/u kan.</li><li><b>'s Nachts</b> = tussen zonsondergang en zonsopgang.</li></ul><p>De <b>schipper</b> is verantwoordelijk voor naleving, moet aan boord zijn, en moet alles doen om gevaar, schade en oponthoud te voorkomen.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_gv\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_gv\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_gv\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_gv\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_gv\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_gv\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_gv\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Klein van maat, rechten van een groot schip</text>\n <g transform=\"translate(85,72)\"><use href=\"#kschip_gv\" transform=\"scale(.72)\"></use><path d=\"M0,-30 L9,-17 L0,-4 L-9,-17 Z\" fill=\"#f2c500\" stroke=\"#8a6d00\"></path><text x=\"0\" y=\"32\" text-anchor=\"middle\" font-size=\"10\">passagiersschip &gt;12 pax (gele ruit)</text></g>\n <g transform=\"translate(305,72)\"><use href=\"#kschip_gv\" transform=\"scale(.72)\"></use><path d=\"M-8,-30 L8,-30 L0,-18 Z M0,-18 L-8,-6 L8,-6 Z\" fill=\"#1a1a2e\"></path><text x=\"0\" y=\"32\" text-anchor=\"middle\" font-size=\"10\">vissend vissersschip (diabolo)</text></g>\n <g transform=\"translate(85,152)\"><use href=\"#pont_gv\" transform=\"scale(.85)\"></use><text x=\"0\" y=\"32\" text-anchor=\"middle\" font-size=\"10\">veerpont (groen boven wit)</text></g>\n <g transform=\"translate(305,152)\"><rect x=\"-38\" y=\"-11\" width=\"76\" height=\"22\" fill=\"#c9871f\" stroke=\"#5a3d10\" stroke-width=\"2\"></rect><text x=\"0\" y=\"32\" text-anchor=\"middle\" font-size=\"10\">duwbak</text></g>\n <g transform=\"translate(178,212)\"><use href=\"#kschip_gv\" transform=\"scale(.66)\"></use><line x1=\"26\" y1=\"0\" x2=\"66\" y2=\"0\" stroke=\"#555\" stroke-width=\"2\"></line><rect x=\"66\" y=\"-10\" width=\"56\" height=\"20\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect><text x=\"42\" y=\"28\" text-anchor=\"middle\" font-size=\"10\">sleepboot mét groot schip op sleep</text></g>\n</svg>","cap":"De grote vijf: kleine schepen met de rechten van een groot schip."}],"vragen":[{"s":"A.4","t":"Een motorbootje dobbert met uitgevallen motor midden op het water. Wat is de juridische status?","o":["Het is een varend schip","Het is een stilliggend schip","Het is een onmanoeuvreerbaar groot schip"],"u":"Varend = niet ten anker, niet gemeerd en niet vastgevaren. Een driftende boot zonder voortstuwing is dus gewoon 'varend' — met alle plichten van dien.","a":"Art. 1.01 D.3/D.4 BPR"},{"s":"A.4","t":"Een schip ligt vast op spudpalen. Wat is de juridische status?","o":["Het ligt stil — spudpalen staan juridisch gelijk aan ankeren (ankerbol verplicht)","Het is varend zolang de motor aanstaat","Het is een vastgevaren schip"],"u":"Stilliggen = ten anker, gemeerd óf op spudpalen. Bord E.6.1 kan spudpalen zelfs toestaan waar een ankerverbod geldt. Vastgevaren (aan de grond) is een aparte categorie met eigen tekens.","a":"Art. 1.01 / 7.03 BPR"},{"s":"A.4","t":"Een sleepboot van 17 m sleept een groot vrachtschip. Wat is de sleepboot op dat moment juridisch?","o":["Een groot schip — wie een groot schip sleept of assisteert, telt zelf als groot","Een klein schip, want hij is korter dan 20 m","Dat hangt af van het motorvermogen"],"u":"De 'grote vijf': passagiersschip, veerpont, vissend vissersschip, duwbak, en een schip dat een groot schip sleept/assisteert/duwt/langszij meevoert. Vaart dezelfde sleepboot los, dan is hij (in het BPR) gewoon een klein schip.","a":"Art. 1.01 BPR"},{"s":"A.4","t":"Wat is het verschil tussen een 'snelle motorboot' en een 'snel schip'?","o":["Snelle motorboot = klein schip dat sneller kan dan 20 km/u; snel schip = groot schip dat sneller vaart dan 40 km/u","Dat is hetzelfde begrip; 'snel schip' is de officiële term","Snelle motorboot = tot 20 m; snel schip = alles daarboven, ongeacht snelheid"],"u":"Struikelblok uit de definities: de snelle motorboot is een kléin schip (>20 km/u, registratieplicht); het snelle schip is een gróót schip (>40 km/u, herkenbaar aan twee gele snelle flikkerlichten boven elkaar, zoals draagvleugelboten).","a":"Art. 1.01 BPR"}]};
CONTENT["3.1.3"]={"theorie":"<h4>Minimumleeftijd</h4><table><tr><th>Leeftijd</th><th>Mag besturen</th></tr><tr><td>alle leeftijden</td><td>boten &lt; 7 m zonder motor</td></tr><tr><td>vanaf 12 jaar</td><td>open bootjes &lt; 7 m met motortje (&lt; 13 km/u)</td></tr><tr><td>vanaf 16 jaar</td><td>alle schepen behalve snelle motorboten</td></tr><tr><td>vanaf 18 jaar</td><td>alles, inclusief snelle motorboten</td></tr></table><p>Kinderen onder de 16 mogen nooit een motorboot van 7 m of langer besturen, ook niet onder toezicht; een snelle motorboot nooit onder de 18. De vaarbewijshouder hoeft niet zelf te sturen, maar moet zo dichtbij zijn dat hij kan ingrijpen.</p><h4>Marifoon</h4><ul><li><b>Grote schepen</b>: marifoonplicht. <b>Kleine schepen</b> niet — behalve als er een goedgekeurde <b>radar</b> aan boord is.</li><li>Heb je vrijwillig een marifoon, dan gelden de marifoonregels gewoon: <b>uitluisteren</b> waar dat is voorgeschreven.</li><li>Aan boord horen dan: het Handboek Marifonie (digitaal mag), het registratiebewijs en het bedieningscertificaat.</li><li>Op <b>Bijlage 9-vaarwegen</b> luisteren grote schepen uit op het schip-schipkanaal (kanaal 10, tenzij anders) én het nautische informatiekanaal — daarvoor zijn twee marifoons nodig. Voertaal: Nederlands (of Duits bij problemen); richting zeehavens Nederlands of Engels.</li></ul>","vragen":[{"s":"A.9","t":"Je hebt vrijwillig een marifoon aan boord van je sloep. Moet je daarmee uitluisteren?","o":["Ja — heb je er een, dan gelden alle gebruiksplichten","Nee, voor kleine schepen blijft alles vrijblijvend","Alleen op de Waddenzee"],"u":"Marifoonplicht geldt voor grote schepen (en klein-op-radar), maar wie er vrijwillig een voert móét uitluisteren en informatie geven, en hem gebruiken waar bord B.11 dat aanwijst.","a":"Art. 4.05 BPR"},{"s":"A.9","t":"Jouw kleine schip is uitgerust met een goedgekeurde radar. Ben je dan verplicht óók een marifoon te hebben?","o":["Ja — wie op radar vaart, moet een marifoon aan boord hebben","Nee, radar en marifoon staan los van elkaar","Alleen op de Waddenzee"],"u":"Voor een klein schip is de marifoon vrijwillig — behálve als het op radar vaart. Bij slecht zicht op Bijlage 9-vaarwegen is die combinatie zelfs de enige manier waarop een klein schip mag (door)varen.","a":"Art. 4.05 / 6.32 BPR"},{"s":"A.9","t":"Welke documenten horen aan boord als je een marifoon hebt?","o":["Registratiebewijs, bedieningscertificaat én het Handboek voor de Marifonie (digitaal mag)","Alleen het aankoopbewijs","Geen — een vrijwillige marifoon kent geen documentplichten"],"u":"Registratie loopt via de RDI; ten minste één opvarende heeft het Basiscertificaat Marifonie. Digitaal raadpleegbaar is prima — een lege telefoon voldoet niet.","a":"Art. 4.05 BPR"}]};
CONTENT["3.2.1"]={"theorie":"<p>Navigatieverlichting voer je <b>'s nachts en bij slecht zicht ook overdag</b>, en alleen als je vaart (wachtend voor brug of sluis mag hij blijven branden). De lichten zijn er niet om zelf te zien, maar om <b>gezien te worden</b>. Ezelsbrug: <b>GRAS</b> — Groen Rechts Aan Stuurboord.</p><h4>De vier basislichten</h4><ul><li><b>Boordlichten</b> (elk 112,5°): groen aan stuurboord, rood aan bakboord. Zie je groen, dan kijk je tegen de rechterkant aan; zie je beide, dan komt het schip recht op je af.</li><li><b>Toplicht</b>: helder wit, 225° naar voren, minimaal 1 m boven de boordlichten.</li><li><b>Heklicht</b>: wit, 135° naar achteren.</li><li><b>Ankerlicht</b>: wit rondomschijnend; overdag een zwarte <b>ankerbol</b>.</li></ul><h4>Kleine schepen</h4><ul><li><b>Open boten &lt; 7 m</b> (max 13 km/u): één wit rondomschijnend licht; een klein zeilbootje toont bij aanvaringsgevaar bovendien een tweede licht (zaklamp).</li><li><b>Kajuitmotorboot &lt; 20 m</b> minimaal: één lantaarn met beide boordlichten vóór, plus een wit rondomschijnend licht (toplicht + heklicht ineen) minstens 1 m hoger. Maximaal: als een groot schip, maar het toplicht mag op gelijke hoogte met de boordlichten.</li><li><b>Kajuitzeilboot</b>: boordlichten + heklicht, <b>geen toplicht</b> — óf het <b>driekleurenlicht</b> in de masttop (nooit beide tegelijk). Gaat de motor aan, dan ben je een motorschip: driekleurenlicht uit, motorbootverlichting aan, en overdag een <b>zwarte kegel</b> met de punt omlaag.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 260\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <clipPath id=\"cb26_bls\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_bls\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_bls\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">GRAS: Groen Rechts Aan Stuurboord — de kleur verraadt de kant</text>\n <g transform=\"translate(215,138)\">\n  <path d=\"M0,0 L0,-108 A108,108 0 0 1 100,42 Z\" fill=\"#c9ecd2\"></path>\n  <path d=\"M0,0 L0,-108 A108,108 0 0 0 -100,42 Z\" fill=\"#f6cccc\"></path>\n  <path d=\"M0,0 L-100,42 A108,108 0 0 0 100,42 Z\" fill=\"#e8e8e8\"></path>\n  <path d=\"M-13,-28 L8,-28 Q15,-28 15,-21 L15,21 Q15,28 8,28 L-13,28 Z\" fill=\"#fff\" stroke=\"#333\" stroke-width=\"2\" transform=\"rotate(-90)\"></path>\n  <text x=\"62\" y=\"-52\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#1e6b30\">GROEN 112,5°</text>\n  <text x=\"-62\" y=\"-52\" text-anchor=\"end\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#c22222\">ROOD 112,5°</text>\n  <text x=\"0\" y=\"76\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#555\">WIT heklicht 135°</text>\n  <text x=\"0\" y=\"-92\" text-anchor=\"middle\" font-size=\"10\" fill=\"#7a5c00\" font-weight=\"bold\">toplicht 225°</text>\n </g>\n <text x=\"215\" y=\"238\" text-anchor=\"middle\" font-size=\"10.5\">alleen wit = je zit áchter hem (veilig)</text>\n <text x=\"215\" y=\"253\" text-anchor=\"middle\" font-size=\"10.5\">beide kleuren tegelijk = recht op je af</text>\n</svg>","cap":"De lichtsectoren: boordlichten 112,5°, toplicht 225°, heklicht 135° — samen precies 360°."},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#101a2b\">\n<rect x=\"0\" y=\"168\" width=\"430\" height=\"82\" fill=\"#0b1626\"></rect>\n<g><g transform=\"translate(215,168)\"><path d=\"M-90,-26 L66,-26 Q90,-26 90,-22 L76,8 L-78,8 Q-90,6 -90,0 Z\" fill=\"#1d2a3a\" stroke=\"#2e405a\" stroke-width=\"2\"></path><rect x=\"-2\" y=\"-64\" width=\"4\" height=\"40\" fill=\"#2e405a\"></rect></g><circle cx=\"213\" cy=\"102\" r=\"23.8\" fill=\"#ffffff\" opacity=\".16\"></circle><circle cx=\"213\" cy=\"102\" r=\"13.299999999999999\" fill=\"#ffffff\" opacity=\".35\"></circle><circle cx=\"213\" cy=\"102\" r=\"7\" fill=\"#ffffff\"></circle><circle cx=\"299\" cy=\"152\" r=\"23.8\" fill=\"#3fe06c\" opacity=\".16\"></circle><circle cx=\"299\" cy=\"152\" r=\"13.299999999999999\" fill=\"#3fe06c\" opacity=\".35\"></circle><circle cx=\"299\" cy=\"152\" r=\"7\" fill=\"#3fe06c\"></circle></g>\n<text x=\"215\" y=\"216\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#cfe3f2\">klein motorschip bij nacht</text>\n<text x=\"215\" y=\"234\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#8fb3d1\">toplicht, boordlichten en heklicht (of één wit rondschijnend licht: korter dan 7 m en max 13 km/u)</text>\n</svg>","cap":"Klein motorschip bij nacht.","half":true},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#101a2b\">\n<rect x=\"0\" y=\"168\" width=\"430\" height=\"82\" fill=\"#0b1626\"></rect>\n<g><g transform=\"translate(215,168)\"><path d=\"M-110,-28 L86,-28 Q110,-28 110,-24 L96,8 L-98,8 Q-110,6 -110,0 Z\" fill=\"#1d2a3a\" stroke=\"#2e405a\" stroke-width=\"2\"></path><rect x=\"-2\" y=\"-136\" width=\"4\" height=\"110\" fill=\"#2e405a\"></rect></g><circle cx=\"319\" cy=\"150\" r=\"23.8\" fill=\"#3fe06c\" opacity=\".16\"></circle><circle cx=\"319\" cy=\"150\" r=\"13.299999999999999\" fill=\"#3fe06c\" opacity=\".35\"></circle><circle cx=\"319\" cy=\"150\" r=\"7\" fill=\"#3fe06c\"></circle><circle cx=\"112\" cy=\"144\" r=\"23.8\" fill=\"#ffffff\" opacity=\".16\"></circle><circle cx=\"112\" cy=\"144\" r=\"13.299999999999999\" fill=\"#ffffff\" opacity=\".35\"></circle><circle cx=\"112\" cy=\"144\" r=\"7\" fill=\"#ffffff\"></circle></g>\n<text x=\"215\" y=\"216\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#cfe3f2\">zeilschip bij nacht</text>\n<text x=\"215\" y=\"234\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#8fb3d1\">alleen boordlichten + heklicht — géén toplicht</text>\n</svg>","cap":"Zeilschip bij nacht: boordlichten en heklicht, géén toplicht.","half":true}],"vragen":[{"s":"A.7","t":"Overdag zie je op een zeilend jacht dit teken. Wat betekent het?","o":["Het zeilschip gebruikt óók zijn motor (het is nu een motorschip)","Het schip ligt ten anker","Het schip is beperkt manoeuvreerbaar"],"u":"De zwarte kegel met de punt omlaag betekent: varen onder zeil én motor tegelijk. Reglementair is het dan een motorschip — zijn zeil-voorrangsrechten vervallen.","a":"Art. 3.13 lid 7 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 190\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <g transform=\"translate(215,120)\"><use href=\"#zboot\" transform=\"scale(1.4)\"></use><line x1=\"3\" y1=\"0\" x2=\"-33\" y2=\"19\" stroke=\"#333\" stroke-width=\"4\"></line></g><path d=\"M200,52 L230,52 L215,84 Z\" fill=\"#1a1a2e\"></path><text x=\"252\" y=\"70\" font-size=\"11.5\" font-weight=\"bold\">dagteken in het want</text></svg>"},{"s":"A.6","t":"'s Nachts zie je vlak bij elkaar een groen en een rood licht — géén toplicht en géén wit licht. Wat nadert?","o":["Een klein zeilschip dat recht op je af komt","Een klein motorschip dat recht op je af komt","Een motorschip dat van je af vaart"],"u":"Twee boordlichten tegelijk = vooraanzicht (kop-sector). Géén toplicht = zeilschip. Een schip dat wegvaart laat alleen zijn witte heklicht zien.","a":"Art. 3.13 BPR","v":"<svg class=\"qv nacht\" viewBox=\"0 0 430 180\"><circle cx=\"192\" cy=\"95\" r=\"8\" fill=\"#28e05a\"/><circle cx=\"238\" cy=\"95\" r=\"8\" fill=\"#ff2d2d\"/><text x=\"215\" y=\"160\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8fb3d1\">donker water — géén ander licht zichtbaar</text></svg>"},{"s":"A.7","t":"Overdag zie je op het voordek van een stilliggend jacht een zwarte bol. Wat betekent dit?","o":["Het schip ligt ten anker","Het schip vervoert gevaarlijke stoffen","Het schip is beperkt manoeuvreerbaar"],"u":"De zwarte bol is het dagteken voor een ten anker liggend schip ('s nachts: wit rondom ankerlicht). Gevaarlijke stoffen = blauwe kegel(s); beperkt manoeuvreerbaar = bol-ruit-bol.","a":"Toetsterm A.7 (ankerbol)"}]};
CONTENT["3.2.2"]={"theorie":"<h4>Grote motorschepen</h4><ul><li>Mogen een <b>tweede toplicht</b> voeren: het achterste hóger dan het voorste (vergelijk een geleidelijn).</li><li>Ten anker: <b>twee ankerlichten</b>, en daar is het juist andersom — het voorste hoger dan het achterste.</li></ul><p>Grote <b>zeilschepen</b> voeren naast boordlichten en heklicht ook <b>rood boven groen</b> in de masttop (alleen grote; kleine zeilschepen mogen dit niet).</p><h4>Samenstellen en werktuigen</h4><ul><li><b>Gekoppeld samenstel</b> (twee grote motorschepen langszij): elk schip een toplicht en een heklicht, boordlichten aan de buitenzijde. Langer dan 140 m telt het als duwstel.</li><li><b>(Bagger)werktuig</b>: dubbel groen = vaarwater aan die zijde vrij; enkel rood = niet vrij; <b>rood boven wit</b> = vrij, maar zonder hinderlijke waterbeweging. Overdag: borden, of twee groene ruiten (vrij) en een rode bol (niet vrij).</li></ul><h4>Slepen</h4><ul><li><b>In kiellinie</b>: de sleepboot voert twee toplichten boven elkaar, boordlichten en een <b>geel heklicht</b>; overdag een gele cilinder. Elk gesleept groot schip: wit rondomschijnend licht (het laatste ook een heklicht); overdag een gele bol.</li><li><b>Niet in kiellinie</b> (meerdere slepers op één schip): elke sleper drie toplichten boven elkaar.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#101a2b\">\n<rect x=\"0\" y=\"168\" width=\"430\" height=\"82\" fill=\"#0b1626\"></rect>\n<g><g transform=\"translate(215,168)\"><path d=\"M-170,-34 L146,-34 Q170,-34 170,-30 L156,8 L-158,8 Q-170,6 -170,0 Z\" fill=\"#1d2a3a\" stroke=\"#2e405a\" stroke-width=\"2\"></path><rect x=\"70\" y=\"-72\" width=\"4\" height=\"38\" fill=\"#2e405a\"></rect><rect x=\"-120\" y=\"-56\" width=\"4\" height=\"22\" fill=\"#2e405a\"></rect></g><circle cx=\"287\" cy=\"102\" r=\"23.8\" fill=\"#ffffff\" opacity=\".16\"></circle><circle cx=\"287\" cy=\"102\" r=\"13.299999999999999\" fill=\"#ffffff\" opa t daarboven/erachter twéé witte toplichten, het achterste het hoogst. Wat vaart daar?","o":["Een groot motorschip, gezien op zijn bakboordzijde","Een klein motorschip, vooraanzicht","Een groot zeilschip, gezien op zijn stuurboordzijde"],"u":"Toplicht(en) = motorschip; twee toplichten = groot schip; rood = bakboordzijde. Ezelsbrug: achterste toplicht hoger + één kleur = zij-aanzicht.","a":"Art. 3.08 BPR","v":"<svg class=\"qv nacht\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#101a2b\"> <circle cx=\"118\" cy=\"112\" r=\"7\" fill=\"#ff2d2d\"></circle><circle cx=\"168\" cy=\"84\" r=\"7\" fill=\"#fff\"></circle><circle cx=\"300\" cy=\"60\" r=\"7\" fill=\"#fff\"></circle><text x=\"215\" y=\"152\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8fb3d1\">donker water — alleen deze drie lichten zichtbaar</text></svg>"},{"s":"A.6","t":"'s Nachts zie je één groen licht met daarboven een wit toplicht. Wat weet je van dit schip?","o":["Je kijkt op de stuurboordzijde van een motorschip — het kruist naar jouw rechterkant","Je kijkt op de bakboordzijde van een motorschip","Het is een zeilschip dat recht op je af komt"],"u":"Alleen groen = je ziet zijn stuurboordzijde; het toplicht verraadt de motor. Ezelsbrug GRAS: Groen Rechts Aan Stuurboord. Zie je alleen rood, dan kruist hij naar jouw linkerkant.","a":"Art. 3.08 / 3.13 BPR","v":"<svg class=\"qv nacht\" viewBox=\"0 0 430 180\"><circle cx=\"228\" cy=\"70\" r=\"7\" fill=\"#fff\"/><circle cx=\"205\" cy=\"108\" r=\"8\" fill=\"#28e05a\"/><text x=\"215\" y=\"162\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8fb3d1\">donker water — alleen deze twee lichten zichtbaar</text></svg>"}]};
CONTENT["3.2.3"]={"theorie":"<ul><li><b>Duwstel</b>: drie toplichten in een driehoek voorop de voorste bak; de duwboot voert achter drie heklichten naast elkaar.</li><li><b>Gevaarlijke stoffen</b>: 1, 2 of 3 <b>blauwe kegels</b> (dag) of blauwe lichten (nacht) loodrecht onder elkaar — hoe meer, hoe gevaarlijker; afmeerafstand respectievelijk 10, 50 en 100 m.</li><li><b>Eén geel flikkerlicht</b>: werkzaamheden in of nabij het vaarwater. <b>Twee gele flikkerlichten</b> boven elkaar: snel schip (&gt; 40 km/u). <b>Blauw flikkerlicht</b>: toezicht, blusboot of officiële reddingsdienst.</li><li><b>Beperkt manoeuvreerbaar</b>: overdag bol–ruit–bol (zwart), 's nachts rood–wit–rood rondomschijnend.</li><li><b>Vissersschip</b>: overdag een diabolo (twee zwarte kegels punt tegen punt); 's nachts wit rondom met daarboven <b>groen</b> rondom (toplicht facultatief).</li><li><b>Veerpont</b>: 's nachts <b>groen boven wit</b> rondomschijnend; een vrijvarende pont voert daarnaast boordlichten en heklicht (aan het boordlicht zie je zijn vaarrichting), een kabel-/gierpont alleen groen-boven-wit en de ankerschuit een wit licht.</li><li><b>Duikers te water</b>: blauw-wit bord (seinvlag A). <b>Passagiersschip</b> &lt; 20 m voor meer dan 12 personen: gele ruit op het voordek.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_dw\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_dw\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_dw\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"22\" text-anchor=\"middle\" font-size=\"11.8\" fill=\"#fff\" font-weight=\"bold\">Duwstel vooraanzicht · gevaarlijke stoffen op zij-aanzicht</text>\n <line x1=\"215\"
