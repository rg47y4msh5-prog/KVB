uim afstand en blijf actief sturen.","a":"Toetsterm D.4 (VAMEX-kernpunt)"},{"s":"D.5","t":"Hoe groot kan de dode hoek vóór de boeg van een groot binnenschip zijn?","o":["Tot zo'n 350 meter","Hooguit 50 meter","Ruim 1 kilometer"],"u":"Vanuit de stuurhut is het water vlak vóór het schip tot ca. 350 m onzichtbaar. Blijf er dus uit, kijk regelmatig achterom, en gebruik de vuistregel: zie jij de stuurhut, dan ziet de schipper jou.","a":"Toetsterm D.5"}]};
CONTENT["2.3.2"]={"theorie":"<h4>Slepen</h4><ul><li><b>Twee korte gekruiste trossen</b>: veel controle over de pechboot, maar bij golven komt er te veel spanning op — voor rustig water.</li><li><b>Eén lange tros</b>: de rek vangt de klappen van golven op. Vraag de pechboot in bochten naar buiten te sturen en neem zelf de bochten ruim.</li><li><b>Langszij slepen</b>: de meeste controle, perfect om mee af te meren. Let op: naar de kant van de pechboot draai je veel korter dan over de andere boeg. Een schip mag zich niet tussen de delen van een sleep begeven.</li></ul><h4>Man overboord (KNRM-aanpak)</h4><ol><li>Gooi alles wat drijft overboord (kussens, reddingsboei met licht, joon) — houvast én zichtbaarheid.</li><li>Laat één opvarende <b>onafgebroken wijzen</b> naar de drenkeling.</li><li>Ga <b>niet zelf te water</b>.</li><li>Druk de <b>MOB-knop</b> op de GPS in (maar reken op stroomverzet).</li><li>Alarmeer de kustwacht: telefoon <b>0900-0111</b> of marifoon <b>kanaal 16</b>.</li><li>Overschat jezelf niet bij het binnenhalen — hulp van een ander schip is welkom.</li></ol><p><b>Naderen</b>: bovenwinds laat je je naar de drenkeling toe verlijeren (risico: te veel vaart, je vaart eroverheen); benedenwinds nader je op de motor tegen de wind in (risico: motoruitval). De wind heeft veel meer vat op de boot dan op de drenkeling. Aan boord nemen kan <b>ruggelings</b> (vrij gangboord, met z'n tweeën) of <b>over de borst</b> onder de zeereling door.</p><h4>Overige calamiteiten</h4><p>Blijf kalm en zorg eerst voor je eigen veiligheid. Lek geslagen: zet de boot tegen de kant of op een zandbank. Brand, motorstoring of roerproblemen: zoek een veilige plek en anker. Waarschuw hulpdiensten via <b>112 of de marifoon</b> en trek de aandacht met noodsignalen.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_slp\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_slp\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_slp\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"11.5\" fill=\"#fff\" font-weight=\"bold\">2 toplichten boven elkaar = sleep · 3 = niet in kiellinie</text>\n <text x=\"215\" y=\"37\" text-anchor=\"middle\" font-size=\"11.5\" fill=\"#fff\" font-weight=\"bold\">3 in driehoek = duwstel (zie C6)</text>\n <path d=\"M38,170 Q40,152 56,148 L138,148 Q152,152 154,170 Q95,178 38,170 Z\" fill=\"#16283c\" stroke=\"#2c4763\"></path>\n <line x1=\"96\" y1=\"148\" x2=\"96\" y2=\"90\" stroke=\"#2c4763\" stroke-width=\"3\"></line>\n <circle cx=\"96\" cy=\"94\" r=\"6.5\" fill=\"#fff\"></circle><circle cx=\"96\" cy=\"118\" r=\"6.5\" fill=\"#fff\"></circle>\n <circle cx=\"58\" cy=\"142\" r=\"6\" fill=\"#ff2d2d\"></circle><circle cx=\"152\" cy=\"160\" r=\"6\" fill=\"#f2c500\"></circle>\n <line x1=\"156\" y1=\"162\" x2=\"234\" y2=\"162\" stroke=\"#2c4763\" stroke-width=\"2\" stroke-dasharray=\"5,5\"></line>\n <path d=\"M234,172 Q236,156 250,152 L318,152 Q332,156 334,172 Q284,180 234,172 Z\" fill=\"#16283c\" stroke=\"#2c4763\"></path>\n <circle cx=\"284\" cy=\"128\" r=\"6.5\" fill=\"#fff\"></circle><line x1=\"284\" y1=\"152\" x2=\"284\" y2=\"132\" stroke=\"#2c4763\" stroke-width=\"3\"></line>\n <text x=\"96\" y=\"204\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"bold\">sleepboot: 2 toplichten + GEEL heklicht</text>\n <text x=\"284\" y=\"222\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"bold\">gesleept schip: wit rondom</text>\n</svg>","cap":"Sleep in kiellinie: de lange tros vangt met zijn rek de klappen van de golven op."}],"vragen":[{"s":"D.6","t":"Iemand valt overboord. Wat zijn de éérste acties aan boord?","o":["Alles wat drijft toewerpen, één opvarende laten wijzen, MOB-knop op de GPS indrukken — en zelf níét te water gaan","Direct achter de drenkeling aan springen met een lijn","Eerst de kustwacht bellen en daarna pas keren"],"u":"Het KNRM-protocol: drijvend materiaal (kussens, boei met licht, joon) geeft houvast en markeert de plek; de aanwijzer verliest de drenkeling geen seconde uit het oog; de MOB-knop legt de positie vast. Zelf te water gaan maakt van één drenkeling twee.","a":"Toetsterm D.6"},{"s":"D.6","t":"Man overboord bij stevige wind. Hoe nader je de drenkeling voor het oppikken?","o":["Benedenwinds beginnen en tegen de wind in óp de motor naderen","Bovenwinds stilleggen en laten verlijeren","Met volle vaart in één rechte lijn"],"u":"Wind grijpt vooral op de bóót, nauwelijks op de drenkeling. Tegen de wind in nader je gecontroleerd; leg de schroef vrij bij het oppikken. Stroom werkt op beiden gelijk. Eerst: drijfmiddelen erbij, één aanwijzer, MOB-knop, kustwacht.","a":"Toetsterm D.6"},{"s":"D.6","t":"Je sleept een pechboot op één lange tros. Waar let je op in bochten?","o":["De pechboot stuurt in bochten naar buiten — neem bochten dus extra ruim","De pechboot snijdt de bocht juist af","Er verandert niets aan de stuurlijn"],"u":"Een gesleept schip heeft nauwelijks roerdruk en zwaait uit. De lange lijn vangt met zijn rek de klappen op; verleng hem op ruim water voor een gunstiger trekhoek.","a":"Toetsterm D.6"},{"s":"D.6","t":"Wanneer kies je voor langszij slepen?","o":["Op rustig water, vooral om de pechboot ergens af te meren — maximale controle","Juist op zee, bij golven","Nooit: langszij slepen is verboden"],"u":"Langszij geeft de beste controle, maar werkt niet op golven. Let op: het koppel stuurt asymmetrisch en de draaicirkel is aan de pechbootzijde veel kleiner.","a":"Toetsterm D.6"}]};
CONTENT["2.4.1"]={"theorie":"<p><b>Lateraal</b> betekent: de zijkanten van het vaarwater zijn gemarkeerd. Het <b>SIGNI</b>-stelsel geldt op vrijwel alle Nederlandse binnenwateren — behalve de Eems-Dollard, de Waddenzee en de Westerschelde, waar de zeebetonning ligt (die komt bij les 7).</p><h4>Betonningsrichting</h4><ul><li>De <b>betonningsrichting</b> is de stroomrichting: <b>van de berg naar de zee</b>. Vaar je in de betonningsrichting, dan ligt de <b>rechteroever</b> aan je rechterhand — die naamgeving ligt vast, ook als jij tegen de stroom in vaart.</li><li>De <b>nummering</b> loopt op vanaf zee: rood even, groen oneven.</li></ul><h4>Rood en groen</h4><ul><li><b>Rechteroever</b>: rode <b>stompe</b> tonnen, topteken een rode <b>cilinder</b>, even nummers; op de kribben rode kribbakens (driehoek met de punt <b>omlaag</b>).</li><li><b>Linkeroever</b>: groene <b>spitse</b> tonnen, topteken een groene <b>kegel</b>, oneven nummers; kribbakens met de punt <b>omhoog</b>.</li><li>Voor de pleziervaart ligt er vaak een <b>aanvullende betonning</b> (rood-wit of groen-wit horizontaal gestreept) tussen de grote tonnen en de wal: het \"fietspad\" voor kleine schepen.</li></ul><h4>Havens en lichten</h4><p>Bij een haven geldt: de haven <b>uitvaren = betonningsrichting</b>. Uitvarend zie je rechts een rood-wit gestreepte paal met rode cilinder en een rood licht. Een boei met licht heet een <b>lichtboei</b>; een navigatielicht op een vaste constructie een <b>lichtopstand</b>.</p>","vis":[{"svg":"<svg viewBox=\"0 0 460 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><defs><marker id=\"ah_t2r\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#134a70\"/></marker></defs><g class=\"art\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"55\" fill=\"#cfe3cf\"/><rect x=\"0\" y=\"145\" width=\"460\" height=\"55\" fill=\"#cfe3cf\"/><rect x=\"0\" y=\"55\" width=\"460\" height=\"90\" fill=\"#bfd9ec\"/><line x1=\"0\" y1=\"55\" x2=\"460\" y2=\"55\" stroke=\"#1a5e8f\" stroke-width=\"2\"/><line x1=\"0\" y1=\"145\" x2=\"460\" y2=\"145\" stroke=\"#1a5e8f\" stroke-width=\"2\"/><line x1=\"120\" y1=\"100\" x2=\"340\" y2=\"100\" stroke=\"#134a70\" stroke-width=\"3\" marker-end=\"url(#ah_t2r)\"/><circle cx=\"80\" cy=\"72\" r=\"8\" fill=\"#1e6b30\"/><path d=\"M76,64 l8,0 -4,-12 z\" fill=\"#1e6b30\"/><circle cx=\"150\" cy=\"72\" r=\"8\" fill=\"#1e6b30\"/><path d=\"M146,64 l8,0 -4,-12 z\" fill=\"#1e6b30\"/><circle cx=\"290\" cy=\"72\" r=\"8\" fill=\"#1e6b30\"/><path d=\"M286,64 l8,0 -4,-12 z\" fill=\"#1e6b30\"/><rect x=\"72\" y=\"118\" width=\"16\" height=\"14\" fill=\"#c22222\"/><rect x=\"76\" y=\"108\" width=\"8\" height=\"10\" fill=\"#c22222\"/><rect x=\"142\" y=\"118\" width=\"16\" height=\"14\" fill=\"#c22222\"/><rect x=\"146\" y=\"108\" width=\"8\" height=\"10\" fill=\"#c22222\"/><rect x=\"282\" y=\"118\" width=\"16\" height=\"14\" fill=\"#c22222\"/><rect x=\"286\" y=\"108\" width=\"8\" height=\"10\" fill=\"#c22222\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"12\" fill=\"#1a1a2e\"><text x=\"10\" y=\"24\" font-weight=\"bold\" fill=\"#1e6b30\">linkeroever — groen, spits, oneven (1·3·5…)</text><text x=\"10\" y=\"192\" font-weight=\"bold\" fill=\"#c22222\">rechteroever — rood, stomp, even (2·4·6…)</text><text x=\"230\" y=\"92\" text-anchor=\"middle\" font-weight=\"bold\" fill=\"#134a70\">betonningsrichting: van de berg naar de zee →</text><text x=\"418\" y=\"104\" font-size=\"11\" fill=\"#555\">zee</text><text x=\"16\" y=\"104\" font-size=\"11\" fill=\"#555\">berg</text><text x=\"230\" y=\"140\" text-anchor=\"middle\" font-size=\"11\" fill=\"#555\">nummering loopt op vanaf zee</text></g></svg>","cap":"Betonningsrichting van de berg naar de zee: rood-stomp-even aan de rechteroever, groen-spits-oneven aan de linkeroever."},{"svg":"<svg viewBox=\"0 0 430 250\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <clipPath id=\"cb26_hm\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_hm\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_hm\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Betonningsrichting = van de berg naar de zee (stroomrichting)</text>\n <text x=\"215\" y=\"37\" text-anchor=\"middle\" font-size=\"10.5\">Stroomopwaarts varend: groene tonnen aan jouw stuurboord ✓</text>\n <rect x=\"0\" y=\"188\" width=\"430\" height=\"62\" fill=\"#a9cde6\"></rect><line x1=\"0\" y1=\"188\" x2=\"430\" y2=\"188\" stroke=\"#5b87a8\" stroke-width=\"2\"></line>\n <g transform=\"translate(58,188)\"><rect x=\"-16\" y=\"-42\" width=\"32\" height=\"42\" rx=\"3\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"2\"></rect><rect x=\"-7\" y=\"-57\" width=\"14\" height=\"13\" fill=\"#c62828\" stroke=\"#7a1010\"></rect>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\">rood · stomp · cilinder</text><text x=\"0\" y=\"33\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\">rechteroever (even)</text></g>\n <g transform=\"translate(164,188)\"><path d=\"M-18,0 L0,-52 L18,0 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"2\"></path><path d=\"M-6,-52 L0,-65 L6,-52 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\">groen · spits · kegel</text><text x=\"0\" y=\"33\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\">linkeroever (oneven)</text></g>\n <g transform=\"translate(266,188)\"><line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"-46\" stroke=\"#6b4a2b\" stroke-width=\"4\"></line><path d=\"M-13,-46 L13,-46 L0,-25 Z\" fill=\"#c62828\" stroke=\"#7a1010\"></path>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\">kribbaken RO</text><text x=\"0\" y=\"33\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\">punt omlaag</text></g>\n <g transform=\"translate(364,188)\"><line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"-46\" stroke=\"#6b4a2b\" stroke-width=\"4\"></line><path d=\"M-13,-25 L13,-25 L0,-46 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\">kribbaken LO</text><text x=\"0\" y=\"33\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\">punt omhoog</text></g>\n</svg>","cap":"Hoofdmarkering en kribbakens: stomp-rood met cilinder, spits-groen met kegel."},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_hv\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_hv\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_hv\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <rect x=\"0\" y=\"0\" width=\"215\" height=\"250\" fill=\"#bfd9ec\"></rect><rect x=\"215\" y=\"0\" width=\"215\" height=\"250\" fill=\"#0d1b2a\"></rect>\n <rect x=\"0\" y=\"172\" width=\"430\" height=\"78\" fill=\"#3d6f94\"></rect>\n <text x=\"108\" y=\"24\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">OVERDAG (uitvarend)</text>\n <text x=\"322\" y=\"24\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#fff\">&#39;S NACHTS (uitvarend)</text>\n <g transform=\"translate(68,172)\"><g><rect x=\"-7\" y=\"-68\" width=\"14\" height=\"14\" fill=\"#c62828\"></rect><rect x=\"-7\" y=\"-54\" width=\"14\" height=\"14\" fill=\"#fff\"></rect><rect x=\"-7\" y=\"-40\" width=\"14\" height=\"14\" fill=\"#c62828\"></rect><rect x=\"-7\" y=\"-26\" width=\"14\" height=\"14\" fill=\"#fff\"></rect><rect x=\"-7\" y=\"-12\" width=\"14\" height=\"12\" fill=\"#c62828\"></rect></g><rect x=\"-7\" y=\"-83\" width=\"14\" height=\"15\" fill=\"#c62828\" stroke=\"#5a0e0e\"></rect>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"bold\">rood/wit + cilinder</text></g>\n <g transform=\"translate(158,172)\"><g><rect x=\"-7\" y=\"-68\" width=\"14\" height=\"14\" fill=\"#2e7d32\"></rect><rect x=\"-7\" y=\"-54\" width=\"14\" height=\"14\" fill=\"#fff\"></rect><rect x=\"-7\" y=\"-40\" width=\"14\" height=\"14\" fill=\"#2e7d32\"></rect><rect x=\"-7\" y=\"-26\" width=\"14\" height=\"14\" fill=\"#fff\"></rect><rect x=\"-7\" y=\"-12\" width=\"14\" height=\"12\" fill=\"#2e7d32\"></rect></g><path d=\"M-8,-68 L0,-85 L8,-68 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"bold\">groen/wit + kegel</text></g>\n <g transform=\"translate(285,172)\"><rect x=\"-4\" y=\"-66\" width=\"8\" height=\"66\" fill=\"#233648\"></rect><circle cy=\"-74\" r=\"8\" fill=\"#ff2d2d\"></circle>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"bold\">rood (flikker)</text></g>\n <g transform=\"translate(372,172)\"><rect x=\"-4\" y=\"-66\" width=\"8\" height=\"66\" fill=\"#233648\"></rect><circle cy=\"-74\" r=\"8\" fill=\"#28e05a\"></circle>\n  <text x=\"0\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"bold\">groen (flikker)</text></g>\n <text x=\"215\" y=\"240\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"bold\">Uitvaren = betonningsrichting: rood aan je rechterhand</text>\n</svg>","cap":"Haveningang bij dag en nacht: uitvarend rood aan stuurboord."}],"vragen":[{"s":"C.1","t":"Je vaart een rivier stroomopwaarts (tegen de betonningsrichting in). Aan welke kant liggen de groene spitse tonnen?","o":["Aan je stuurboordzijde","Aan je bakboordzijde","Dat wisselt per riviervak"],"u":"Groen markeert de linkeroever (in de betonningsrichting berg→zee). Vaar je stroomopwaarts, dan ligt die linkeroever — en dus de groene reeks — aan jouw stuurboord. Jouw eigen ezelsbrug, nu examenklaar.","a":"Bijlage 8 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 180\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"40\" width=\"430\" height=\"105\" fill=\"#a9cde6\"></rect><rect x=\"0\" y=\"0\" width=\"430\" height=\"40\" fill=\"#9fbf8f\"></rect><rect x=\"0\" y=\"145\" width=\"430\" height=\"35\" fill=\"#9fbf8f\"></rect><g fill=\"#2e7d32\"><path d=\"M60,40 L72,14 L84,40 Z\"></path><path d=\"M200,40 L212,14 L224,40 Z\"></path><path d=\"M340,40 L352,14 L364,40 Z\"></path></g><g fill=\"#c62828\"><rect x=\"66\" y=\"145\" width=\"22\" height=\"26\" rx=\"2\"></rect><rect x=\"206\" y=\"145\" width=\"22\" height=\"26\" rx=\"2\"></rect><rect x=\"346\" y=\"145\" width=\"22\" height=\"26\" rx=\"2\"></rect></g><use href=\"#kschip\" transform=\"translate(120,95)\"></use><line x1=\"155\" y1=\"95\" x2=\"215\" y2=\"95\" stroke=\"#1a1a2e\" stroke-width=\"2.2\" marker-end=\"url(#ah)\"></line><g stroke=\"#134a70\" fill=\"#134a70\"><line x1=\"330\" y1=\"95\" x2=\"395\" y2=\"95\" stroke-width=\"5\" marker-end=\"url(#ah)\"></line><text x=\"362\" y=\"82\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">stroom</text></g></svg>"},{"s":"C.1","t":"Langs de rechteroever (gezien in de betonningsrichting) staan kribbakens. Welke vorm en kleur hebben ze?","o":["Rood, driehoek met de punt omlaag","Groen, driehoek met de punt omhoog","Rood-wit horizontaal gestreept met een cilinder"],"u":"Kribbakens volgen de oeverkleuren van SIGNI: rechteroever rood (driehoek punt omlaag, denk aan de rode stompe ton), linkeroever groen (punt omhoog, als de groene spitse ton). Rood-wit horizontaal hoort bij de aanvullende betonning voor kleine schepen.","a":"Bijlage 8 BPR"}]};
CONTENT["2.4.2"]={"theorie":"<h4>Scheidingstonnen</h4><p>Op scheidingen en splitsingen liggen <b>bolvormige</b> tonnen:</p><ul><li><b>Gelijk belang</b>: rood/groen horizontaal gestreept, topteken een rood-groene bol — links- of rechtsaf maakt niet uit.</li><li><b>Hoofdvaarwater rechts</b>: groen boven rood, topteken groene kegel (ligt in de groene reeks van het hoofdvaarwater).</li><li><b>Hoofdvaarwater links</b>: rood boven groen, topteken rode cilinder (ligt in de rode reeks).</li></ul><p>De gouden regel: <b>hoofdvaarwater = tussen twee kleuren door</b> (rood én groen), <b>nevenvaarwater = tussen twee dezelfde kleuren door</b>. Op de wal kan een <b>splitsingsbaken</b> staan: twee kegels met de punten naar elkaar, rood boven groen.</p><h4>Bijzondere markeringen</h4><ul><li><b>Midvaarwaterton</b>: bolvormig, rood-wit <b>verticaal</b> gestreept, ter oriëntatie op ruim water — aan beide zijden te passeren.</li><li><b>Geel</b> markeert bijzondere gebieden (verboden gebieden, bagger-, anker- en visserijzones), vaak met een geel liggend kruis; met een rood-wit-rood gestreepte cilinder als topteken bakent hij een verboden (natuur)gebied af.</li><li><b>Sparboei</b>: cilindervormige winterboei bij ijsgang. Daarnaast bestaan de nood-wrak-boei (nieuw gevaar) en de markering van een <b>afzonderlijk gevaar</b> (rondom passeerbaar obstakel).</li></ul><h4>Lichtenlijn en sectorlicht</h4><p>Een <b>lichtenlijn</b> markeert het diepste deel van een geul of een havenaanloop: twee lichten achter elkaar, het voorste lager. <b>Stuur altijd naar het laagste licht toe</b> om in de lijn te komen. Een <b>sectorlicht</b> verandert van kleur afhankelijk van de richting waaruit je kijkt. Op een <b>bovenrivier</b> stroomt het water altijd één kant op; op een benedenrivier wisselen eb- en vloedstroom.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <clipPath id=\"cb26_sch\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_sch\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_sch\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Bolvormig — het topteken verraadt de reeks</text>\n <g transform=\"translate(72,118)\"><g clip-path=\"url(#cb26_sch)\"><circle r=\"26\" fill=\"#c62828\"></circle><rect x=\"-26\" y=\"0\" width=\"52\" height=\"26\" fill=\"#2e7d32\"></rect></g><circle r=\"26\" fill=\"none\" stroke=\"#5a0e0e\" stroke-width=\"2\"></circle><rect x=\"-6\" y=\"-41\" width=\"12\" height=\"12\" fill=\"#c62828\" stroke=\"#5a0e0e\"></rect>\n  <text x=\"0\" y=\"44\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">rood boven groen + cilinder</text><text x=\"0\" y=\"57\" text-anchor=\"middle\" font-size=\"9.5\">HVW links · rode reeks</text></g>\n <g transform=\"translate(215,118)\"><g clip-path=\"url(#cb26_sch)\"><circle r=\"26\" fill=\"#2e7d32\"></circle><rect x=\"-26\" y=\"0\" width=\"52\" height=\"26\" fill=\"#c62828\"></rect></g><circle r=\"26\" fill=\"none\" stroke=\"#14401a\" stroke-width=\"2\"></circle><path d=\"M-8,-28 L0,-43 L8,-28 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path>\n  <text x=\"0\" y=\"44\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">groen boven rood + kegel</text><text x=\"0\" y=\"57\" text-anchor=\"middle\" font-size=\"9.5\">HVW rechts · groene reeks</text></g>\n <g transform=\"translate(358,118)\"><g clip-path=\"url(#cb26_sch)\"><circle r=\"26\" fill=\"#c62828\"></circle><rect x=\"-26\" y=\"-9\" width=\"52\" height=\"9\" fill=\"#2e7d32\"></rect><rect x=\"-26\" y=\"9\" width=\"52\" height=\"9\" fill=\"#2e7d32\"></rect></g><circle r=\"26\" fill=\"none\" stroke=\"#5a0e0e\" stroke-width=\"2\"></circle><g clip-path=\"url(#cb22_sch)\"><circle cy=\"-24\" r=\"9\" fill=\"#c62828\"></circle><rect x=\"-9\" y=\"-24\" width=\"18\" height=\"9\" fill=\"#2e7d32\"></rect></g><circle cy=\"-38\" r=\"9\" fill=\"none\" stroke=\"#5a0e0e\" transform=\"translate(0,14)\"></circle>\n  <text x=\"0\" y=\"44\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">rood/groen banden + bol</text><text x=\"0\" y=\"57\" text-anchor=\"middle\" font-size=\"9.5\">gelijk belang · beide mag</text></g>\n <text x=\"215\" y=\"208\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#1a5e8f\">Hoofdvaarwater volgen = tussen twee VERSCHILLENDE kleuren door</text>\n <text x=\"215\" y=\"228\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#1a5e8f\">Nevenvaarwater in/uit = tussen twee GELIJKE kleuren door</text>\n</svg>","cap":"De drie scheidingstonnen en de gouden regel: twee kleuren = hoofdvaarwater, één kleur = nevenvaarwater."},{"svg":"<svg viewBox=\"0 0 430 260\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <clipPath id=\"cb26_bb\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_bb\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_bb\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">Let op kleurvolgorde: afzonderlijk gevaar = zwart mét rode band</text>\n <rect x=\"0\" y=\"190\" width=\"430\" height=\"70\" fill=\"#a9cde6\"></rect><line x1=\"0\" y1=\"190\" x2=\"430\" y2=\"190\" stroke=\"#5b87a8\" stroke-width=\"2\"></line>\n <g transform=\"translate(45,190)\"><g clip-path=\"url(#cb26_bb)\" transform=\"scale(.88)\"><circle r=\"26\" fill=\"#fff\"></circle><g fill=\"#c62828\"><rect x=\"-26\" y=\"-26\" width=\"10\" height=\"52\"></rect><rect x=\"-5\" y=\"-26\" width=\"10\" height=\"52\"></rect><rect x=\"16\" y=\"-26\" width=\"10\" height=\"52\"></rect></g></g><circle r=\"23\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.6\" transform=\"translate(0,0)\"></circle>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">midvaarwater</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">rondom vrij</text></g>\n <g transform=\"translate(122,190)\"><rect x=\"-14\" y=\"-42\" width=\"28\" height=\"42\" rx=\"3\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"2\"></rect><g stroke=\"#f2c500\" stroke-width=\"6\" transform=\"translate(0,-51)\"><line x1=\"-9\" y1=\"-5\" x2=\"9\" y2=\"5\"></line><line x1=\"-9\" y1=\"5\" x2=\"9\" y2=\"-5\"></line></g>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">bijzonder</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">geel (+ kruis)</text></g>\n <g transform=\"translate(199,190)\"><rect x=\"-14\" y=\"-42\" width=\"28\" height=\"42\" rx=\"3\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"2\"></rect><g transform=\"translate(0,-53)\"><rect x=\"-9\" y=\"-12\" width=\"18\" height=\"24\" fill=\"#c62828\"></rect><rect x=\"-9\" y=\"-4\" width=\"18\" height=\"8\" fill=\"#fff\"></rect></g>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">geel + r/w/r</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">verboden gebied</text></g>\n <g transform=\"translate(276,190)\"><rect x=\"-13\" y=\"-46\" width=\"26\" height=\"46\" rx=\"3\" fill=\"#1a1a2e\" stroke=\"#000\" stroke-width=\"2\"></rect><rect x=\"-13\" y=\"-32\" width=\"26\" height=\"12\" fill=\"#c62828\"></rect><circle cy=\"-56\" r=\"6\" fill=\"#1a1a2e\"></circle><circle cy=\"-70\" r=\"6\" fill=\"#1a1a2e\"></circle>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">afz. gevaar · 2 bollen</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">zwart + rode band</text></g>\n <g transform=\"translate(353,190)\"><g><rect x=\"-12\" y=\"-46\" width=\"12\" height=\"46\" fill=\"#1a5ec2\" stroke=\"#0d3a7a\"></rect><rect x=\"0\" y=\"-46\" width=\"12\" height=\"46\" fill=\"#f2c500\" stroke=\"#8a6d00\"></rect></g><g fill=\"#f2c500\" stroke=\"#8a6d00\" transform=\"translate(0,-56)\"><rect x=\"-3\" y=\"-10\" width=\"6\" height=\"20\"></rect><rect x=\"-10\" y=\"-3\" width=\"20\" height=\"6\"></rect></g>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">nood-wrak</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">blauw/geel · staand kruis</text></g>\n <g transform=\"translate(412,190)\"><rect x=\"-6\" y=\"-58\" width=\"12\" height=\"58\" rx=\"2\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.6\"></rect>\n  <text x=\"0\" y=\"18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">sparboei</text><text x=\"0\" y=\"30\" text-anchor=\"middle\" font-size=\"8.5\">winter/ijsgang</text></g>\n</svg>","cap":"Bijzondere boeien: midvaarwaterton, gele markeringen, sparboei en gevaarmarkeringen."},{"svg":"<svg viewBox=\"0 0 430 250\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_ll\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_ll\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_ll\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"11.8\" fill=\"#fff\" font-weight=\"bold\">Stuur richting het láágste licht tot ze onder elkaar staan</text>\n <g font-size=\"10\" fill=\"#8fb3d1\" text-anchor=\"middle\">\n  <g transform=\"translate(78,0)\"><line x1=\"0\" y1=\"46\" x2=\"0\" y2=\"170\" stroke=\"#39597a\" stroke-dasharray=\"4,5\"></line><circle cx=\"0\" cy=\"66\" r=\"6\" fill=\"#f2c500\"></circle><circle cx=\"-26\" cy=\"118\" r=\"6\" fill=\"#f2c500\"></circle>\n   <text y=\"196\" fill=\"#fff\" font-weight=\"bold\">onderste links</text><text y=\"211\">→ lijn ligt aan bakboord</text><text y=\"225\">→ stuur bakboord</text></g>\n  <g transform=\"translate(215,0)\"><line x1=\"0\" y1=\"46\" x2=\"0\" y2=\"170\" stroke=\"#39597a\" stroke-dasharray=\"4,5\"></line><circle cx=\"0\" cy=\"66\" r=\"6\" fill=\"#f2c500\"></circle><circle cx=\"0\" cy=\"118\" r=\"6\" fill=\"#f2c500\"></circle>\n   <text y=\"196\" fill=\"#fff\" font-weight=\"bold\">recht onder elkaar</text><text y=\"211\">→ je zit ín de lijn</text><text y=\"225\">→ koers houden</text></g>\n  <g transform=\"translate(352,0)\"><line x1=\"0\" y1=\"46\" x2=\"0\" y2=\"170\" stroke=\"#39597a\" stroke-dasharray=\"4,5\"></line><circle cx=\"0\" cy=\"66\" r=\"6\" fill=\"#f2c500\"></circle><circle cx=\"26\" cy=\"118\" r=\"6\" fill=\"#f2c500\"></circle>\n   <text y=\"196\" fill=\"#fff\" font-weight=\"bold\">onderste rechts</text><text y=\"211\">→ lijn aan stuurboord</text><text y=\"225\">→ stuur stuurboord</text></g>\n </g>\n <text x=\"215\" y=\"244\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8fb3d1\">Voorste baak is lager · sectorlicht (kleur per richting) volgt als zusterkaart</text>\n</svg>","cap":"Lichtenlijn: stuur naar het laagste licht — staan de lichten boven elkaar, dan zit je in de lijn."}],"vragen":[{"s":"C.1","t":"Op een splitsing ligt een bolvormige ton: groen bovenvlak, rood ondervlak, met een groene kegel als topteken. Wat betekent dit?","o":["Het hoofdvaarwater loopt rechts van de ton (hij ligt in de groene reeks)","Het hoofdvaarwater loopt links van de ton","Vaarwateren van gelijk belang: kies zelf"],"u":"De bovenkleur en het topteken verraden de reeks: groen-boven-rood + kegel = hoofdvaarwater rechts. Gouden regel: hoofdvaarwater volgen = tussen twee verschíllende kleuren door; nevenvaarwater in/uit = tussen twee gelijke kleuren.","a":"Bijlage 8 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 190\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"30\" width=\"430\" height=\"130\" fill=\"#a9cde6\"></rect><g transform=\"translate(215,108)\"><g clip-path=\"url(#cb26)\"><circle r=\"26\" fill=\"#2e7d32\"></circle><rect x=\"-26\" y=\"0\" width=\"52\" height=\"26\" fill=\"#c62828\"></rect></g><circle r=\"26\" fill=\"none\" stroke=\"#14401a\" stroke-width=\"2\"></circle><path d=\"M-8,-28 L0,-44 L8,-28 Z\" fill=\"#2e7d32\" stroke=\"#14401a\"></path></g><path d=\"M180,62 Q150,45 118,40\" fill=\"none\" stroke=\"#1a1a2e\" stroke-width=\"2\" stroke-dasharray=\"5,5\" marker-end=\"url(#ah)\"></path><path d=\"M250,62 Q280,45 312,40\" fill=\"none\" stroke=\"#1a1a2e\" stroke-width=\"2\" stroke-dasharray=\"5,5\" marker-end=\"url(#ah)\"></path><text x=\"215\" y=\"178\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#134a70\">splitsing vóór je — welke kant is het hoofdvaarwater?</text></svg>"},{"s":"C.1","t":"Midden op het ruime water ligt een bolvormige, rood-wit verticaal gestreepte ton met een rond topteken. Wat betekent die?","o":["Veilig vaarwater (midvaarwater-/aanloopton) — aan beide zijden te passeren","Afzonderlijk gevaar — ruim eromheen blijven","Verboden vaargebied"],"u":"De midvaarwaterton (uiterton/verkenner) is puur oriëntatie: rondom veilig water. Het afzonderlijk-gevaarteken is juist zwárt met rode band(en) en twee zwarte bollen als topteken.","a":"Bijlage 8 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 190\"><rect x=\"0\" y=\"30\" width=\"430\" height=\"130\" fill=\"#a9cde6\"/><g transform=\"translate(215,112)\"><g clip-path=\"url(#cb26)\"><circle r=\"26\" fill=\"#fff\"/><rect x=\"-26\" y=\"-26\" width=\"11\" height=\"52\" fill=\"#c62828\"/><rect x=\"-4\" y=\"-26\" width=\"11\" height=\"52\" fill=\"#c62828\"/><rect x=\"18\" y=\"-26\" width=\"11\" height=\"52\" fill=\"#c62828\"/></g><circl CONTENT["2.5.1"]={"theorie":"<p><b>Cardinale betonning</b> markeert gevaren (banken, klippen, wrakken). De naam zegt aan welke kant het <b>veilige</b> vaarwater ligt: een noordcardinaal passeer je aan de noordzijde.</p><ul><li>De boeien zijn <b>geel met zwart</b>; het topteken bestaat uit twee driehoeken en verklapt waar de zwarte band zit: punten <b>omhoog</b> = noord (zwart boven), punten <b>omlaag</b> = zuid (zwart onder), punten <b>van elkaar af</b> = oost (zwart boven én onder), punten <b>naar elkaar toe</b> = west (zwart in het midden).</li><li>De <b>lichten</b> onthoud je met de klok: oost = 3 flitsen, zuid = 6 + lange flits (LFl), west = 9, noord = doorlopend flikkeren (VQ of Q). Alle cardinale lichten zijn wit.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 300 340\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:linear-gradient(#dcecf7,#cfe3f2)\">\n<defs>\n <linearGradient id=\"sky_cn\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#dcecf7\"></stop><stop offset=\"1\" stop-color=\"#c3dbee\"></stop></linearGradient>\n <linearGradient id=\"sea_cn\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#8fc0e2\"></stop><stop offset=\".25\" stop-color=\"#69a2cc\"></stop><stop offset=\"1\" stop-color=\"#3f6f96\"></stop></linearGradient>\n <linearGradient id=\"shade_cn\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\"><stop offset=\"0\" stop-color=\"#000\" stop-opacity=\".5\"></stop><stop offset=\".28\" stop-color=\"#000\" stop-opacity=\"0\"></stop><stop offset=\".42\" stop-color=\"#fff\" stop-opacity=\".32\"></stop><stop offset=\".58\" stop-color=\"#fff\" stop-opacity=\"0\"></stop><stop offset=\"1\" stop-color=\"#000\" stop-opacity=\".55\"></stop></linearGradient>\n <linearGradient id=\"rust_cn\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#7a5b2d\" stop-opacity=\"0\"></stop><stop offset=\"1\" stop-color=\"#6b4a1e\" stop-opacity=\".5\"></stop></linearGradient>\n</defs>\n<rect x=\"0\" y=\"0\" width=\"300\" he CONTENT["2.6.1"]={"theorie":"<p>Om tonnen 's nachts te herkennen dragen ze lichten met een vast <b>lichtkarakter</b>:</p><table><tr><th>Code</th><th>Naam</th><th>Ritme</th></tr><tr><td><b>VQ</b></td><td>very quick — snel flikkerlicht</td><td>zeer korte flitsen (¼ s)</td></tr><tr><td><b>Q</b></td><td>quick — flikkerlicht</td><td>korte flitsen (½ s)</td></tr><tr><td><b>Fl</b></td><td>flash — schitterlicht</td><td>korter aan dan uit (± 1 s aan)</td></tr><tr><td><b>LFl</b></td><td>long flash</td><td>lange schittering van 2 s</td></tr><tr><td><b>Iso</b></td><td>isofase</td><td>even lang aan als uit</td></tr><tr><td><b>Oc</b></td><td>occulting</td><td>langer aan dan uit</td></tr><tr><td><b>F</b></td><td>fixed — vast licht</td><td>brandt permanent</td></tr></table><p>Achter de code staat de <b>periode</b>: Iso 8s betekent 4 seconden aan, 4 seconden uit; VQ(3) 5s betekent telkens 3 snelle flitsen binnen een cyclus van 5 seconden.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 300\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_lk\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_lk\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_lk\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"22\" text-anchor=\"middle\" font-size=\"12\" fill=\"#fff\" font-weight=\"bold\">Balk = ritme, bol = live</text>\n <g font-size=\"11\" fill=\"#fff\">\n  <g transform=\"translate(0,52)\"><text x=\"14\" y=\"4\">VQ</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"95\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"105\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"115\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"125\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"135\" y=\"-5\" width=\"5\" height=\"10\"></rect><rect x=\"145\" y=\"-5\" width=\"5\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">zeer snel flikker (¼ s)</text></g>\n  <g transform=\"translate(0,88)\"><text x=\"14\" y=\"4\">Q</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"9\" height=\"10\"></rect><rect x=\"103\" y=\"-5\" width=\"9\" height=\"10\"></rect><rect x=\"121\" y=\"-5\" width=\"9\" height=\"10\"></rect><rect x=\"139\" y=\"-5\" width=\"9\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">flikker (½ s)</text></g>\n  <g transform=\"translate(0,124)\"><text x=\"14\" y=\"4\">Fl</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"18\" height=\"10\"></rect><rect x=\"158\" y=\"-5\" width=\"18\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">schitter: korter áán dan uit</text></g>\n  <g transform=\"translate(0,160)\"><text x=\"14\" y=\"4\">LFl</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"36\" height=\"10\"></rect><rect x=\"178\" y=\"-5\" width=\"36\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">lange schittering (≈2 s)</text></g>\n  <g transform=\"translate(0,196)\"><text x=\"14\" y=\"4\">Iso</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"34\" height=\"10\"></rect><rect x=\"153\" y=\"-5\" width=\"34\" height=\"10\"></rect><rect x=\"221\" y=\"-5\" width=\"34\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">even lang aan als uit</text></g>\n  <g transform=\"translate(0,232)\"><text x=\"14\" y=\"4\">Oc</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><g fill=\"#f2c500\"><rect x=\"85\" y=\"-5\" width=\"52\" height=\"10\"></rect><rect x=\"152\" y=\"-5\" width=\"52\" height=\"10\"></rect></g><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">langer áán dan uit</text></g>\n  <g transform=\"translate(0,268)\"><text x=\"14\" y=\"4\">F</text><circle cx=\"60\" cy=\"0\" r=\"7\" fill=\"#fff\"></circle><rect x=\"85\" y=\"-5\" width=\"170\" height=\"10\" fill=\"#f2c500\"></rect><text x=\"290\" y=\"4\" fill=\"#8fb3d1\" font-size=\"10.5\">vast licht</text></g>\n </g>\n</svg>","cap":"De lichtkarakters als tijdstrip — van snel flikkerlicht (VQ) tot vast licht (F)."}],"vragen":[{"s":"C.2","t":"Een licht brandt 4 seconden en is daarna 4 seconden gedoofd, steeds opnieuw. Welk lichtkarakter is dit?","o":["Iso 8s (isofase)","Fl 8s (schitterlicht)","Oc 8s (onderbroken licht)"],"u":"Iso = even lang aan als uit; de 8s is de volledige periode. Fl = korter áán dan uit; Oc = juist langer áán dan uit. Ezelsbrug: Fl = flits, Oc = bijna altijd aan.","a":"Bijlage 8 BPR","v":"<svg class=\"qv nacht\" viewBox=\"0 0 430 150\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#101a2b\"> <circle cx=\"215\" cy=\"62\" r=\"12\" fill=\"#f2c500\"></circle><text x=\"215\" y=\"120\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8fb3d1\">kijk naar het ritme — volledige periode: 8 seconden</text></svg>"},{"s":"C.2","t":"Een licht is steeds duidelijk lánger aan dan uit. Welk lichtkarakter is dit?","o":["Oc (onderbroken licht)","Iso (isofase)","Fl (schitterlicht)"],"u":"Oc/onderbroken = langer aan dan uit; Iso = precies even lang aan als uit; Fl/schitter = juist kórter aan dan uit. F is permanent vast licht.","a":"Bijlage 8 BPR"},{"s":"C.2","t":"'s Nachts zie je een wit licht met groepen van drie zeer snelle flitsen, elke 5 seconden herhaald — VQ(3) 5s. Bij welke boei hoort dit?","o":["De oostkardinaal","De zuidkardinaal","De noordkardinaal"],"u":"De klok-ezelsbrug: noord = continu flikkeren (12 uur), oost = groepen van 3 (3 uur), zuid = 6 + lange schittering (6 uur), west = groepen van 9 (9 uur). VQ(3) 5s is dus oost.","a":"Bijlage 8 BPR"}]};

/* ===== ENGINE ===== */
const LSKEY="kvb-leeromgeving-v1";
let gelezen={};
try{gelezen=JSON.parse(localStorage.getItem(LSKEY)||"{}")}catch(e){gelezen={}}
function bewaar(){try{localStorage.setItem(LSKEY,JSON.stringify(gelezen))}catch(e){}}

const app=document.getElementById("app");
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;");

function lesVoortgang(les){
 const af=les.paras.filter(p=>gelezen[p[0]]).length;
 return {af,tot:les.paras.length,pct:Math.round(100*af/les.paras.length)};
}

function toonHome(){
 let h="";
 for(const deel of ["KVB1","KVB2"]){
  h+=`<h2>${deel==="KVB1"?"Deel 1 — Klein Vaarbewijs 1 (les 1–4)":"Deel 2 — Klein Vaarbewijs 2 (les 5–8)"}</h2>`;
  for(const les of LESSEN.filter(l=>l.deel===deel)){
   const v=lesVoortgang(les);
   h+=`<a class="kaart${v.af===v.tot?" af":""}" href="#les${les.nr}">
    <div class="titel">Les ${les.nr} · ${esc(les.titel)} →</div>
    <div class="sub">${les.paras.length} paragrafen</div>
    <div class="voortgang"><div style="width:${v.pct}%"></div></div>
    <div class="pct">${v.af} van ${v.tot} paragrafen gelezen</div></a>`;
  }
 }
 app.innerHTML=h;
}

function toonLes(nr){
 const les=LESSEN.find(l=>l.nr===nr);
 if(!les){location.hash="";return}
 const v=lesVoortgang(les);
 let h=`<div class="kruimel"><a href="#">← Alle lessen</a></div>
  <div class="paneel">
   <div class="titel" style="font-size:18px;font-weight:bold;color:var(--donker)">Les ${les.nr} · ${esc(les.titel)}</div>
   <div class="sub" style="font-size:13px;color:#555">${les.deel} · ${les.paras.length} paragrafen</div>
   <div class="voortgang"><div style="width:${v.pct}%"></div></div>
   <div class="pct">${v.af} van ${v.tot} paragrafen gelezen</div>`;
 for(const [id,titel] of les.paras){
  const c=CONTENT[id];
  h+=`<div class="para${gelezen[id]?" gelezen":""}" id="p${id.replace(/\./g,"-")}">
   <div class="pkop"><span class="pnr">${id}</span><span class="ptitel">${esc(titel)}</span>
    <button class="vink${gelezen[id]?" aan":""}" onclick="vink('${id}')">${gelezen[id]?"✓ gelezen":"markeer als gelezen"}</button></div>`;
  h+=c?renderInhoud(id,c)
      :`<div class="placeholder">Inhoud volgt — theorie, visuals en oefenvragen worden per les toegevoegd.</div>`;
  h+=`</div>`;
 }
 h+=`</div>
  <div class="lesnav">
   <span>${nr>1?`<button onclick="location.hash='#les${nr-1}'">← Les ${nr-1}</button>`:""}</span>
   <span><a href="${les.oefen}"><button>Oefenbank ${les.deel} ↗</button></a>
   ${nr<8?`<button class="primair" onclick="location.hash='#les${nr+1}'">Les ${nr+1} →</button>`:""}</span>
  </div>`;
 app.innerHTML=h;
 window.scrollTo(0,0);
}

/* Vraagweergave: vragen komen ongewijzigd uit de oefenbanken; de eerste
   optie in q.o is altijd het juiste antwoord, de weergavevolgorde wordt
   geschud. VORD/ANS onthouden volgorde en antwoord binnen de sessie. */
const VORD={},ANS={};
function shuf(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function renderInhoud(id,c){
 let h=`<div class="inhoud">`;
 if(c.theorie)h+=`<div class="theorie">${c.theorie}</div>`;
 const vis=c.vis||[];
 for(let i=0;i<vis.length;i++){
  const kaart=v=>`<div class="vis">${v.svg}<div class="cap">${esc(v.cap||"")}</div></div>`;
  if(vis[i].half){
   let j=i;while(j<vis.length&&vis[j].half)j++;
   h+=`<div class="visrij">${vis.slice(i,j).map(kaart).join("")}</div>`;
   i=j-1;
  }else h+=kaart(vis[i]);
 }
 if((c.vragen||[]).length){
  h+=`<div class="oefkop">Oefenvragen (uit de oefenbank)</div>`;
  c.vragen.forEach((q,i)=>{
   const uid=id.replace(/\./g,"-")+"-"+i;
   if(!VORD[uid])VORD[uid]=shuf(q.o.map((_,k)=>k));
   const beantw=ANS[uid]!==undefined,keuze=ANS[uid];
   h+=`<div class="vraag" id="v${uid}"><div class="vt"><b>${i+1}.</b> ${esc(q.t)}</div>${q.v||""}`;
   for(const o of VORD[uid]){
    let cls="optie";
    if(beantw){if(o===0)cls+=" goed";else if(o===keuze)cls+=" fout"}
    h+=`<button class="${cls}" ${beantw?"disabled":""} onclick="antwoord('${uid}',${i},'${id}',${o})">${esc(q.o[o])}</button>`;
   }
   if(beantw)h+=`<div class="uitleg${keuze===0?"":" fout"}">${keuze===0?"✔ Goed!":"✘ Niet juist."} ${esc(q.u)}<div class="artref">${esc(q.a)}</div></div>`;
   h+=`</div>`;
  });
 }
 if(c.noot)h+=`<div class="placeholder">${esc(c.noot)}</div>`;
 return h+`</div>`;
}
function antwoord(uid,i,pid,gekozen){
 if(ANS[uid]!==undefined)return;
 ANS[uid]=gekozen;
 const q=CONTENT[pid].vragen[i],el=document.getElementById("v"+uid);
 const btns=el.querySelectorAll(".optie");
 btns.forEach(b=>b.disabled=true);
 VORD[uid].forEach((o,p)=>{
  if(o===0)btns[p].classList.add("goed");
  else if(o===gekozen)btns[p].classList.add("fout");
 });
 const u=document.createElement("div");
 u.className="uitleg"+(gekozen===0?"":" fout");
 u.innerHTML=`${gekozen===0?"✔ Goed!":"✘ Niet juist."} ${esc(q.u)}<div class="artref">${esc(q.a)}</div>`;
 el.appendChild(u);
}
function vink(id){
 gelezen[id]=!gelezen[id];
 if(!gelezen[id])delete gelezen[id];
 bewaar();render();
}

function render(){
 const m=location.hash.match(/^#les(\d+)$/);
 if(m)toonLes(+m[1]);else toonHome();
}
window.addEventListener("hashchange",render);
render();
</script>
