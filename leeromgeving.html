/circle></g>\n<text x=\"215\" y=\"216\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#cfe3f2\">vissersschip in bedrijf</text>\n<text x=\"215\" y=\"234\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#8fb3d1\">groen boven wit rondschijnend (trawler); niet-trawler: rood boven wit</text>\n</svg>","cap":"Vissersschip in bedrijf: groen boven wit rondomschijnend.","half":true},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#101a2b\">\n<rect x=\"0\" y=\"168\" width=\"430\" height=\"82\" fill=\"#0b1626\"></rect>\n<g><g transform=\"translate(215,168)\"><path d=\"M-100,-30 L76,-30 Q100,-30 100,-26 L86,8 L-88,8 Q-100,6 -100,0 Z\" fill=\"#1d2a3a\" stroke=\"#2e405a\" stroke-width=\"2\"></path><rect x=\"-2\" y=\"-96\" width=\"4\" height=\"70\" fill=\"#2e405a\"></rect></g><circle cx=\"213\" cy=\"78\" r=\"20.4\" fill=\"#3fe06c\" opacity=\".16\"></circle><circle cx=\"213\" cy=\"78\" r=\"11.399999999999999\" fill=\"#3fe06c\" opacity=\".35\"></circle><circle cx=\"213\" cy=\"78\" r=\"6\" fill=\"#3fe06c\"></circle><circle cx=\"213\" cy=\"102\" r=\"20.4\" fill=\"#ffffff\" opacity=\".16\"></circle><circle cx=\"213\" cy=\"102\" r=\"11.399999999999999\" fill=\"#ffffff\" opacity=\".35\"></circle><circle cx=\"213\" cy=\"102\" r=\"6\" fill=\"#ffffff\"></circle><circle cx=\"299\" cy=\"152\" r=\"17\" fill=\"#3fe06c\" opacity=\".16\"></circle><circle cx=\"299\" cy=\"152\" r=\"9.5\" fill=\"#3fe06c\" opacity=\".35\"></circle><circle cx=\"299\" cy=\"152\" r=\"5\" fill=\"#3fe06c\"></circle></g>\n<text x=\"215\" y=\"216\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#cfe3f2\">veerpont in bedrijf</text>\n<text x=\"215\" y=\"234\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#8fb3d1\">groen rondschijnend licht boven wit rondschijnend licht</text>\n</svg>","cap":"Veerpont in bedrijf: groen boven wit.","half":true},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#101a2b\">\n<rect x=\"0\" y=\"168\" width=\"430\" height=\"82\" fill=\"#0b1626\"></rect>\n<g><g transform=\"translate(215,168)\"><path d=\"M-120,-32 L96,-32 Q120,-32 120,-28 L106,8 L-108,8 Q-120,6 -120,0 Z\" fill=\"#1d2a3a\" stroke=\"#2e405a\" stroke-width=\"2\"></path><rect x=\"-2\" y=\"-110\" width=\"4\" height=\"82\" fill=\"#2e405a\"></rect></g><circle cx=\"213\" cy=\"64\" r=\"20.4\" fill=\"#ff5340\" opacity=\".16\"></circle><circle cx=\"213\" cy=\"64\" r=\"11.399999999999999\" fill=\"#ff5340\" opacity=\".35\"></circle><circle cx=\"213\" cy=\"64\" r=\"6\" fill=\"#ff5340\"></circle><circle cx=\"213\" cy=\"86\" r=\"20.4\" fill=\"#ffffff\" opacity=\".16\"></circle><circle cx=\"213\" cy=\"86\" r=\"11.399999999999999\" fill=\"#ffffff\" opacity=\".35\"></circle><circle cx=\"213\" cy=\"86\" r=\"6\" fill=\"#ffffff\"></circle><circle cx=\"213\" cy=\"108\" r=\"20.4\" fill=\"#ff5340\" opacity=\".16\"></circle><circle cx=\"213\" cy=\"108\" r=\"11.399999999999999\" fill=\"#ff5340\" opacity=\".35\"></circle><circle cx=\"213\" cy=\"108\" r=\"6\" fill=\"#ff5340\"></circle></g>\n<text x=\"215\" y=\"216\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#cfe3f2\">beperkt manoeuvreerbaar schip</text>\n<text x=\"215\" y=\"234\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#8fb3d1\">rood-wit-rood rondschijnend boven elkaar (bijv. baggeraar)</text>\n</svg>","cap":"Beperkt manoeuvreerbaar schip: rood–wit–rood.","half":true}],"vragen":[{"s":"A.7","t":"Een schip toont overdag drie blauwe kegels loodrecht onder elkaar. Wat betekent dat en hoeveel afstand houd je bij ligplaats nemen?","o":["Vervoer van ontplofbare stoffen — bij ligplaats minstens 100 m afstand houden","Ontvlambare stoffen — 10 m volstaat","Het schip is onmanoeuvreerbaar"],"u":"Vuistregel 1-2-3 = 10/50/100 m: 1 kegel = ontvlambaar (10 m), 2 = giftig (50 m), 3 = ontplofbaar (100 m). 's Nachts blauwe lichten in plaats van kegels. Hoe meer kegels, hoe meer afstand.","a":"Art. 3.14 / 7.07 BPR","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 200\"><path d=\"M60,150 L340,150 Q378,150 378,132 L378,120 L60,120 Z\" fill=\"#c9871f\" stroke=\"#5a3d10\" stroke-width=\"2\"/><rect x=\"90\" y=\"94\" width=\"60\" height=\"26\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"/><line x1=\"215\" y1=\"120\" x2=\"215\" y2=\"28\" stroke=\"#5a3d10\" stroke-width=\"4\"/><g fill=\"#1a5ec2\" stroke=\"#0d3a7a\"><path d=\"M203,30 L227,30 L215,52 Z\"/><path d=\"M203,58 L227,58 L215,80 Z\"/><path d=\"M203,86 L227,86 L215,108 Z\"/></g><text x=\"248\" y=\"70\" font-size=\"11.5\" font-weight=\"bold\">3 blauwe kegels, punt omlaag</text><rect x=\"0\" y=\"150\" width=\"430\" height=\"50\" fill=\"#a9cde6\"/></svg>"},{"s":"A.7","t":"Een klein schip van 15 m voert op het voordek een gele ruit. Wat betekent dat?","o":["Het is een passagiersschip (meer dan 12 passagiers) met de rechten van een groot schip","Het schip biedt waterskiles aan","Het is een loodsboot"],"u":"Het kleine passagiersschip hoort met de gele ruit bij de 'grote vijf': jij wijkt er als klein schip voor. Een gróót passagiersschip heeft de ruit niet nodig — dat is al groot.","a":"Art. 3.15 BPR","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 170\"><g transform=\"translate(215,105) scale(1.3)\"><path d=\"M-40,-12 L20,-12 Q40,-12 40,0 Q40,12 20,12 L-40,12 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"/><rect x=\"-30\" y=\"-7\" width=\"30\" height=\"14\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"/></g><path d=\"M252,58 L268,78 L252,98 L236,78 Z\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"2\"/><text x=\"284\" y=\"82\" font-size=\"11.5\" font-weight=\"bold\">gele ruit op het voordek</text></svg>"},{"s":"A.7","t":"Een klein schip voert overdag twee zwarte kegels met de punten tegen elkaar (diabolo). Wat betekent dit voor jou?","o":["Het is een vissend vissersschip — het heeft de rechten van een groot schip, dus jij wijkt","Het schip is onmanoeuvreerbaar en drijft — ruim passeren volstaat","Het schip sleept onder water en jij mag er niet binnen 100 m van afmeren"],"u":"De diabolo markeert een vissersschip dat daadwerkelijk vist. Vissersschepen horen bij de 'grote vijf': kleine schepen met de rechten van een groot schip. De 100 m-regel hoort bij drie blauwe kegels (gevaarlijke stoffen).","a":"Toetsterm A.7 (diabolo / grote vijf)"},{"s":"A.14","t":"'s Nachts zie je groen-boven-wit rondom schijnend, mét een rood boordlicht. Wat zie je?","o":["Een vrijvarende veerpont die vaart — je kijkt op zijn bakboordzijde","Een niet-vrijvarende kabelpont die stilligt","Een vissersschip dat voor anker ligt"],"u":"De vrijvarende pont voert boordlichten + heklicht met groen-boven-wit in plaats van het toplicht. Het zichtbare rode boordlicht vertelt de richting: je ziet zijn bakboordzijde. De niet-vrijvarende pont toont alléén groen-boven-wit, en een geankerd schip toont juist ankerlicht(en), geen boordlicht.","a":"Art. 3.16 BPR"}]};
CONTENT["3.2.4"]={"theorie":"<p>De nachtvragen op het examen (\"wat zie je?\") los je op met drie stappen:</p><ul><li><b>Groen</b> = je ziet de stuurboordzijde; <b>rood</b> = bakboordzijde; <b>groen én rood</b> = het schip komt recht op je af.</li><li>Toplicht? Dan is het <b>geen zeilschip</b> — een zeilschip voert nooit een toplicht.</li><li>Tel de bijzondere lichten en herken de combinatie.</li></ul><h4>Samenvatting bijzondere lichten</h4><table><tr><th>Beeld</th><th>Betekenis</th></tr><tr><td>rood boven wit</td><td>geen hinderlijke waterbeweging maken</td></tr><tr><td>wit boven rood</td><td>loodsboot</td></tr><tr><td>rood boven groen</td><td>groot zeilschip</td></tr><tr><td>groen boven wit</td><td>veerpont of vissersschip</td></tr><tr><td>2 toplichten boven elkaar</td><td>sleepboot in kiellinie</td></tr><tr><td>3 toplichten boven elkaar</td><td>sleepboot niet in kiellinie</td></tr><tr><td>3 toplichten in driehoek</td><td>duwstel</td></tr><tr><td>1–3 blauwe lichten</td><td>gevaarlijke stoffen</td></tr><tr><td>1 geel flikkerlicht</td><td>werkzaamheden</td></tr><tr><td>blauw flikkerlicht</td><td>toezichthouder</td></tr><tr><td>rood–wit–rood</td><td>beperkt manoeuvreerbaar</td></tr></table>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_vam\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_vam\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_vam\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"24\" text-anchor=\"middle\" font-size=\"11.8\" fill=\"#fff\" font-weight=\"bold\">Beide boordlichten tegelijk = vooraanzicht: recht op je af</text>\n <line x1=\"215\" y1=\"42\" x2=\"215\" y2=\"204\" stroke=\"#22374d\" stroke-width=\"1.5\"></line>\n <g transform=\"translate(107,0)\"><circle cx=\"-26\" cy=\"132\" r=\"7\" fill=\"#ff2d2d\"></circle><circle cx=\"26\" cy=\"132\" r=\"7\" fill=\"#28e05a\"></circle>\n  <text x=\"0\" y=\"168\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"bold\">alleen rood + groen</text>\n  <text x=\"0\" y=\"184\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">géén toplicht → klein ZEILSCHIP</text></g>\n <g transform=\"translate(322,0)\"><circle cx=\"0\" cy=\"88\" r=\"7\" fill=\"#fff\"></circle><circle cx=\"-26\" cy=\"132\" r=\"7\" fill=\"#ff2d2d\"></circle><circle cx=\"26\" cy=\"132\" r=\"7\" fill=\"#28e05a\"></circle>\n  <text x=\"0\" y=\"168\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"bold\">rood + groen + wit erboven</text>\n  <text x=\"0\" y=\"184\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">toplicht → MOTORschip</text></g>\n <text x=\"215\" y=\"216\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">Denkstappen: beide kleuren? → vooraanzicht · toplicht? → motor</text>\n <text x=\"215\" y=\"232\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">rood-boven-groen in de masttop? → gróót zeilschip</text>\n</svg>","cap":"Vooraanzicht: beide boordlichten zichtbaar — met toplicht een motorschip, zonder een zeilschip."},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#101a2b\">\n<rect x=\"0\" y=\"168\" width=\"430\" height=\"82\" fill=\"#0b1626\"></rect>\n<g><g transform=\"translate(215,168)\"><path d=\"M-44,-58 Q0,-74 44,-58 L36,6 L-36,6 Z\" fill=\"#1d2a3a\" stroke=\"#2e405a\" stroke-width=\"2\"></path><rect x=\"-2\" y=\"-108\" width=\"4\" height=\"36\" fill=\"#2e405a\"></rect></g><circle cx=\"215\" cy=\"56\" r=\"23.8\" fill=\"#ffffff\" opacity=\".16\"></circle><circle cx=\"215\" cy=\"56\" r=\"13.299999999999999\" fill=\"#ffffff\" opacity=\".35\"></circle><circle cx=\"215\" cy=\"56\" r=\"7\" fill=\"#ffffff\"></circle><circle cx=\"172\" cy=\"126\" r=\"23.8\" fill=\"#3fe06c\" opacity=\".16\"></circle><circle cx=\"172\" cy=\"126\" r=\"13.299999999999999\" fill=\"#3fe06c\" opacity=\".35\"></circle><circle cx=\"172\" cy=\"126\" r=\"7\" fill=\"#3fe06c\"></circle><circle cx=\"258\" cy=\"126\" r=\"23.8\" fill=\"#ff5340\" opacity=\".16\"></circle><circle cx=\"258\" cy=\"126\" r=\"13.299999999999999\" fill=\"#ff5340\" opacity=\".35\"></circle><circle cx=\"258\" cy=\"126\" r=\"7\" fill=\"#ff5340\"></circle></g>\n<text x=\"215\" y=\"216\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#cfe3f2\">motorschip — recht op je af</text>\n<text x=\"215\" y=\"234\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#8fb3d1\">beide boordlichten (rood rechts van groen) + toplicht: uitwijken!</text>\n</svg>","cap":"Motorschip recht op je af: rood én groen plus toplicht.","half":true},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#101a2b\">\n<rect x=\"0\" y=\"168\" width=\"430\" height=\"82\" fill=\"#0b1626\"></rect>\n<g><g transform=\"translate(215,168)\"><path d=\"M-40,-52 Q0,-64 40,-52 L32,6 L-32,6 Z\" fill=\"#1d2a3a\" stroke=\"#2e405a\" stroke-width=\"2\"></path></g><circle cx=\"215\" cy=\"132\" r=\"23.8\" fill=\"#ffffff\" opacity=\".16\"></circle><circle cx=\"215\" cy=\"132\" r=\"13.299999999999999\" fill=\"#ffffff\" opacity=\".35\"></circle><circle cx=\"215\" cy=\"132\" r=\"7\" fill=\"#ffffff\"></circle></g>\n<text x=\"215\" y=\"216\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#cfe3f2\">schip van achteren — alleen heklicht</text>\n<text x=\"215\" y=\"234\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#8fb3d1\">je loopt op: alleen het witte heklicht is zichtbaar</text>\n</svg>","cap":"Alleen een wit heklicht: je kijkt tegen de achterkant aan.","half":true}],"vragen":[{"s":"A.6","t":"'s Nachts zie je dit lichtbeeld. Wat zie je en wat doet dat schip?","o":["Klein zeilschip dat recht op je af komt","Klein motorschip dat van je af vaart","Groot motorschip, zij-aanzicht"],"u":"Beide boordlichten tegelijk zie je alléén in de kop-sector: hij komt recht op je af, met zijn stuurboord (groen) aan jóúw linkerhand. Rood-links/groen-rechts zou 'van je af' suggereren — maar van achteren zie je in werkelijkheid alleen het witte heklicht. Géén toplicht = zeilschip.","a":"Art. 3.13 BPR","v":"<svg class=\"qv nacht\" viewBox=\"0 0 430 200\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#101a2b\"> <circle cx=\"187\" cy=\"105\" r=\"8\" fill=\"#28e05a\"></circle><circle cx=\"243\" cy=\"105\" r=\"8\" fill=\"#ff2d2d\"></circle><text x=\"215\" y=\"180\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8fb3d1\">donker wateroppervlak — alleen deze twee lichten zichtbaar</text></svg>"},{"s":"A.6","t":"'s Nachts zie je alleen een groen licht met daaronder een wit licht, beide rondom schijnend. Verder geen boordlichten of toplicht. Wat zie je?","o":["Een niet-vrijvarende veerpont (kabel- of gierpont)","Een vissersschip dat bezig is met vissen","Een loodsboot in functie"],"u":"Groen-boven-wit hoort bij veerpont óf visser. Het verschil: de niet-vrijvarende pont toont uitsluitend groen-boven-wit; een varend vissersschip voert daarnaast zijn boordlichten. Een loodsboot toont juist wit-boven-rood.","a":"Art. 3.16 BPR"}]};
CONTENT["3.3.1"]={"theorie":"<p>Geluidsseinen zijn dé communicatie met schepen zonder marifoon — dus vaak met jou. Grote motorschepen tonen synchroon met elk sein een geel rondomschijnend <b>fluitlicht</b>. Tijdsduur: zeer kort ± ¼ s, kort ± 1 s, lang ± 4 s.</p><h4>De algemene seinen</h4><table><tr><th>Sein</th><th>Betekenis</th></tr><tr><td>1 × kort</td><td>ik ga stuurboord (rechts) uit</td></tr><tr><td>2 × kort</td><td>ik ga bakboord (links) uit</td></tr><tr><td>3 × kort</td><td>ik sla achteruit</td></tr><tr><td>4 × kort</td><td>ik kan niet manoeuvreren</td></tr><tr><td>5 × kort</td><td>je kunt niet voorbijlopen</td></tr><tr><td>1 × lang</td><td>attentie · (+1/2 kort: ik keer over SB/BB)</td></tr><tr><td>2 × lang + 1/2 kort</td><td>ik wil oplopen (inhalen)</td></tr><tr><td>3 × lang (+1/2 kort)</td><td>in-/uitvaren of oversteken</td></tr><tr><td>reeks lange stoten</td><td>noodsein</td></tr><tr><td>reeks zeer korte stoten</td><td>gevaar voor aanvaring</td></tr><tr><td>kort–lang (15 min)</td><td>blijf-weg-sein: gevaarlijke stoffen vrijgekomen</td></tr><tr><td>lang–kort–lang</td><td>verzoek om bediening brug of sluis</td></tr></table><p>Een klein schip <b>mag</b> alle seinen geven, maar is <b>verplicht</b> zo nodig: 4 × kort, het attentiesein en het noodsein. Bij aanvaringsgevaar <b>moet</b> een groot schip de reeks zeer korte stoten geven, een klein schip <b>mag</b> dat. Keren mag pas na vergewissen dat het veilig kan — ook een groot schip ten opzichte van een klein schip.</p><h4>Mistseinen</h4><p>Varend zonder radar bij slecht zicht: <b>één lange stoot</b>, ten hoogste elke minuut herhaald. Stilliggend op een gevaarlijke plek: positie per marifoon doorgeven óf een <b>reeks klokslagen</b> (ten hoogste elke minuut).</p>","vragen":[{"s":"A.8","t":"Een groot motorschip vóór je geeft twee korte stoten. Wat zegt hij?","o":["Ik ga bakboord uit","Ik ga stuurboord uit","Ik sla achteruit"],"u":"1 kort = stuurboord uit, 2 kort = bakboord uit, 3 kort = ik sla achteruit, 4 kort = ik kan niet manoeuvreren. Grote motorschepen tonen synchroon een geel 'fluitlicht'.","a":"Bijlage 6 BPR"},{"s":"A.8","t":"Met welk geluidssein vraag je om bediening van een brug of sluis?","o":["Lang – kort – lang","Drie korte stoten","Een reeks lange stoten"],"u":"— • — is het bedieningsverzoek. Drie kort = ik sla achteruit; een reeks lange stoten is een noodsein. Duur: kort ≈ 1 sec, lang ≈ 4 sec.","a":"Bijlage 6 BPR"},{"s":"A.8","t":"Je hoort van een naderend schip een reeks zeer korte stoten. Wat betekent dat?","o":["Gevaar voor aanvaring — blijf weg en maak ruimte","Verzoek om bediening van de brug","Ik keer over stuurboord"],"u":"Minstens zes stoten van elk ±¼ seconde. Een groot schip móét dit sein bij dreigend gevaar geven, een klein schip mág. Verwar het niet met het blijfweg-sein (kort-lang, ≥15 minuten herhaald) van een gevaarlijke-stoffenschip.","a":"Bijlage 6 BPR"},{"s":"A.16","t":"Welk mistsein geeft een varend klein schip zonder radar (buiten de Bijlage 9-vaarwegen)?","o":["Eén lange stoot, herhaald met tussenpozen van ten hoogste één minuut","Een reeks klokslagen","Drie korte stoten per minuut"],"u":"Varend bij slecht zicht: één lange stoot, minstens elke minuut. De reeks klokslagen is juist het sein van een stílliggend schip op een gevaarlijke plek.","a":"Hfdst. 6 afd. VI BPR"},{"s":"A.16","t":"Je ligt bij dichte mist noodgedwongen stil op een gevaarlijke plek in het vaarwater (BPR-gebied). Hoe maak je je positie kenbaar?","o":["Positie per marifoon melden óf een reeks klokslagen geven, telkens binnen de minuut herhaald","Eén lange stoot per minuut geven, net als een varend schip","Het ankerlicht voeren volstaat — geluidsseinen zijn voor varende schepen"],"u":"Een stilliggend schip op een gevaarlijke plek meldt zich bij slecht zicht via de marifoon of met een reeks klokslagen (interval maximaal één minuut). De ene lange stoot hoort juist bij het várende schip zonder radar.","a":"Art. 6.31 BPR"}]};
CONTENT["3.4.1"]={"theorie":"<p>Verbodsborden zijn (op twee na) wit met een rode rand en een rode schuine streep; gebods- en beperkingstekens zijn doorgaans ook wit met rode rand.</p><h4>Verboden die je moet kennen</h4><ul><li><b>A.1</b> algeheel doorvaartverbod — geldt óók voor kleine schepen zonder motor. <b>A.1a</b> buiten gebruik gesteld vaarwegdeel — geldt <b>niet</b> voor kleine schepen zonder motor.</li><li><b>A.2</b> verboden voorbij te lopen · <b>A.5.1</b> verboden ligplaats binnen de aangegeven breedte (meters).</li><li><b>A.12</b> verboden voor kleine <b>motor</b>schepen (motor uit en roeien mag) · <b>A.13</b> (SPORT) verboden voor kleine schepen · <b>A.18</b> vanaf hier verboden <b>snel te varen</b> (let op: niet \"verboden voor snelle motorboten\") · <b>A.20</b> verboden voor waterscooters en jetski's.</li></ul><h4>Geboden en beperkingen</h4><ul><li><b>B.1</b> verplichte vaarrichting · <b>B.3b</b> stuurboordzijde houden · <b>B.5</b> vóór het bord stilhouden · <b>B.6</b> snelheidsbeperking (getal in km/u) · <b>B.8</b> bijzonder goed opletten.</li><li><b>B.9a</b> schepen op het hoofdvaarwater voorrang geven · <b>B.11</b> verplicht marifoongebruik op het aangegeven kanaal.</li><li><b>C.1</b> beperkte waterdiepte · <b>C.2</b> beperkte doorvaarthoogte (meters).</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 240 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs><filter id=\"sch_ba1\" x=\"-15%\" y=\"-15%\" width=\"130%\" height=\"130%\"><feDropShadow dx=\"0\" dy=\"3\" stdDeviation=\"4\" flood-color=\"#00000033\"></feDropShadow></filter></defs>\n<g transform=\"translate(29,30)\">\n <g filter=\"url(#sch_ba1)\"><rect x=\"0\" y=\"0\" width=\"182\" height=\"182\" fill=\"#c8102e\"></rect><rect x=\"0\" y=\"61\" width=\"182\" height=\"60\" fill=\"#ffffff\"></rect></g>\n <text x=\"91\" y=\"-10\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"15\" font-weight=\"bold\" fill=\"#0e2a40\">A.1</text>\n <text x=\"91\" y=\"249\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">algemeen doorvaartverbod (ook</text><text x=\"91\" y=\"263\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">kleine schepen zonder motor)</text>\n</g></svg>","cap":"A.1 — algeheel doorvaartverbod, ook zonder motor.","half":true},{"svg":"<svg viewBox=\"0 0 240 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs><filter id=\"sch_ba1a\" x=\"-15%\" y=\"-15%\" width=\"130%\" height=\"130%\"><feDropShadow dx=\"0\" dy=\"3\" stdDeviation=\"4\" flood-color=\"#00000033\"></feDropShadow></filter></defs>\n<g transform=\"translate(29,30)\">\n <g filter=\"url(#sch_ba1a)\"><circle cx=\"91\" cy=\"91\" r=\"88\" fill=\"#c8102e\"></circle><rect x=\"18\" y=\"73\" width=\"146\" height=\"36\" fill=\"#ffffff\"></rect></g>\n <text x=\"91\" y=\"-10\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"15\" font-weight=\"bold\" fill=\"#0e2a40\">A.1a</text>\n <text x=\"91\" y=\"249\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">buiten gebruik gesteld vaarweggedeelte</text><text x=\"91\" y=\"263\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">(niet voor klein schip zonder motor)</text>\n</g></svg>","cap":"A.1a — buiten gebruik; klein zonder motor mag wél.","half":true},{"svg":"<svg viewBox=\"0 0 240 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs><filter id=\"sch_ba12\" x=\"-15%\" y=\"-15%\" width=\"130%\" height=\"130%\"><feDropShadow dx=\"0\" dy=\"3\" stdDeviation=\"4\" flood-color=\"#00000033\"></feDropShadow></filter></defs>\n<g transform=\"translate(29,30)\">\n <g filter=\"url(#sch_ba12)\"><rect x=\"0\" y=\"0\" width=\"182\" height=\"182\" fill=\"#c8102e\"></rect><rect x=\"22\" y=\"22\" width=\"138\" height=\"138\" fill=\"#ffffff\"></rect><g transform=\"translate(91,88)\" fill=\"#111111\"><circle r=\"10\"></circle><path d=\"M0,-8 C26,-34 44,-18 30,2 C22,12 8,6 0,-8Z\"></path><path d=\"M0,-8 C26,-34 44,-18 30,2 C22,12 8,6 0,-8Z\" transform=\"rotate(120)\"></path><path d=\"M0,-8 C26,-34 44,-18 30,2 C22,12 8,6 0,-8Z\" transform=\"rotate(240)\"></path></g><line x1=\"25\" y1=\"25\" x2=\"157\" y2=\"157\" stroke=\"#c8102e\" stroke-width=\"15\"></line><g transform=\"translate(0,188)\"><rect x=\"28\" y=\"0\" width=\"126\" height=\"32\" fill=\"#ffffff\" stroke=\"#111111\" stroke-width=\"3\"></rect><text x=\"91\" y=\"24\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"22\" font-weight=\"bold\" fill=\"#111111\">SPORT</text></g></g>\n <text x=\"91\" y=\"-10\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"15\" font-weight=\"bold\" fill=\"#0e2a40\">A.12</text>\n <text x=\"91\" y=\"249\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">verboden voor kleine motorschepen:</text><text x=\"91\" y=\"263\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">motor uit, roeien mag</text>\n</g></svg>","cap":"A.12 — verboden voor kleine motorschepen.","half":true},{"svg":"<svg viewBox=\"0 0 240 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs><filter id=\"sch_ba18\" x=\"-15%\" y=\"-15%\" width=\"130%\" height=\"130%\"><feDropShadow dx=\"0\" dy=\"3\" stdDeviation=\"4\" flood-color=\"#00000033\"></feDropShadow></filter></defs>\n<g transform=\"translate(29,30)\">\n <g filter=\"url(#sch_ba18)\"><rect x=\"0\" y=\"0\" width=\"182\" height=\"182\" fill=\"#c8102e\"></rect><rect x=\"22\" y=\"22\" width=\"138\" height=\"138\" fill=\"#ffffff\"></rect><g fill=\"#111111\"><path d=\"M34,102 L120,102 L148,82 L152,108 Q120,120 44,116 Z\"></path><path d=\"M96,82 L118,82 L112,100 L90,100 Z\"></path><path d=\"M30,116 Q60,126 88,120 M96,122 Q120,126 150,116\" stroke=\"#111111\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"></path></g><line x1=\"25\" y1=\"25\" x2=\"157\" y2=\"157\" stroke=\"#c8102e\" stroke-width=\"15\"></line></g>\n <text x=\"91\" y=\"-10\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"15\" font-weight=\"bold\" fill=\"#0e2a40\">A.18</text>\n <text x=\"91\" y=\"256\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">vanaf hier verboden snel te varen</text>\n</g></svg>","cap":"A.18 — verboden snel te varen.","half":true},{"svg":"<svg viewBox=\"0 0 240 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs><filter id=\"sch_bb3b\" x=\"-15%\" y=\"-15%\" width=\"130%\" height=\"130%\"><feDropShadow dx=\"0\" dy=\"3\" stdDeviation=\"4\" flood-color=\"#00000033\"></feDropShadow></filter></defs>\n<g transform=\"translate(29,30)\">\n <g filter=\"url(#sch_bb3b)\"><rect x=\"0\" y=\"0\" width=\"182\" height=\"182\" fill=\"#c8102e\"></rect><rect x=\"22\" y=\"22\" width=\"138\" height=\"138\" fill=\"#ffffff\"></rect><g transform=\"translate(62,91)\" fill=\"#111111\"><rect x=\"-6\" y=\"-52\" width=\"12\" height=\"16\"></rect><rect x=\"-6\" y=\"-28\" width=\"12\" height=\"16\"></rect><rect x=\"-6\" y=\"-4\" width=\"12\" height=\"16\"></rect><path d=\"M-16,18 L16,18 L0,52 Z\"></path></g><g transform=\"translate(122,91) scale(0.9)\" fill=\"#111111\"><path d=\"M0,-52 L18,-20 L7,-20 L7,52 L-7,52 L-7,-20 L-18,-20 Z\"></path></g></g>\n <text x=\"91\" y=\"-10\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"15\" font-weight=\"bold\" fill=\"#0e2a40\">B.3b</text>\n <text x=\"91\" y=\"249\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">verplicht de stuurboordzijde</text><text x=\"91\" y=\"263\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">van het vaarwater te houden</text>\n</g></svg>","cap":"B.3b — stuurboordzijde van het vaarwater houden.","half":true},{"svg":"<svg viewBox=\"0 0 240 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs><filter id=\"sch_bb6\" x=\"-15%\" y=\"-15%\" width=\"130%\" height=\"130%\"><feDropShadow dx=\"0\" dy=\"3\" stdDeviation=\"4\" flood-color=\"#00000033\"></feDropShadow></filter></defs>\n<g transform=\"translate(29,30)\">\n <g filter=\"url(#sch_bb6)\"><rect x=\"0\" y=\"0\" width=\"182\" height=\"182\" fill=\"#c8102e\"></rect><rect x=\"22\" y=\"22\" width=\"138\" height=\"138\" fill=\"#ffffff\"></rect><text x=\"91\" y=\"116\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"72\" font-weight=\"bold\" fill=\"#111111\">12</text></g>\n <text x=\"91\" y=\"-10\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"15\" font-weight=\"bold\" fill=\"#0e2a40\">B.6</text>\n <text x=\"91\" y=\"249\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">verplicht de snelheid te</text><text x=\"91\" y=\"263\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">beperken tot (12) km/u</text>\n</g></svg>","cap":"B.6 — snelheid beperken tot het aangegeven aantal km/u.","half":true}],"vragen":[{"s":"C.8","t":"Bord A.1a (rood rond bord) markeert een buiten gebruik gesteld vaarwegdeel. Je zet je buitenboordmotor uit en pakt de roeispanen. Mag je erin?","o":["Nee — een boot mét (stilgezette) motor is geen 'klein schip zonder motor'","Ja — je vaart nu immers op spierkracht","Ja, mits langzamer dan 6 km/u"],"u":"Alleen een klein schip zónder motor (kano, roeiboot) mag voorbij A.1a. Een stilgezette motor telt niet. Bij A.12 (motorschepen verboden) mag roeien met stilgezette motor juist wél — klassiek instinker-paar.","a":"Bijlage 7 BPR","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"60\" stroke=\"#6b4a2b\" stroke-width=\"5\"></line><circle cx=\"215\" cy=\"58\" r=\"34\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"3\"></circle><text x=\"215\" y=\"126\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">A.1a</text></svg>"},{"s":"C.8","t":"Wat betekent een wit bord met rode rand en het getal 9, zonder verdere symbolen?","o":["Maximumsnelheid 9 km/u","Minimaal 9 dm waterdiepte","Vaarwater ligt 9 m uit de oever"],"u":"Het snelheidsbord (B.6) is — anders dan de meeste gebodstekens — wit met rode rand en een getal in km/u. Diepte/hoogte-beperkingen (C-serie) dragen een rode driehoek: punt omlaag = diepte, punt omhoog = hoogte.","a":"Bijlage 7 BPR (B.6)","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"66\" stroke=\"#6b4a2b\" stroke-width=\"5\"></line><rect x=\"181\" y=\"24\" width=\"68\" height=\"68\" fill=\"#fff\" stroke=\"#c62828\" stroke-width=\"6\"></rect><text x=\"215\" y=\"72\" text-anchor=\"middle\" font-size=\"34\" font-weight=\"bold\">9</text></svg>"},{"s":"C.8","t":"Langs het vaarwater staat een verbodsbord met het woord SPORT. Voor wie geldt dit verbod?","o":["Voor kleine schepen","Voor alle vormen van watersport","Alleen voor zeilplanken"],"u":"Bord A.13 verbiedt de doorvaart voor kleine schepen — het woord SPORT slaat op de sport-/pleziervaart, niet op 'alle watersport'. Zeilplanken hebben een eigen bord (A.17).","a":"Bijlage 7 BPR (A.13)","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 170\"><line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"66\" stroke=\"#6b4a2b\" stroke-width=\"5\"/><rect x=\"171\" y=\"20\" width=\"88\" height=\"60\" fill=\"#fff\" stroke=\"#c62828\" stroke-width=\"6\"/><text x=\"215\" y=\"58\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"bold\">SPORT</text><text x=\"215\" y=\"122\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">A.13</text></svg>"},{"s":"A.18","t":"Bord A.18 staat aan het begin van een vaarwater. Mag je er met je snelle motorboot in?","o":["Ja — het bord verbiedt het snélvaren, niet het boottype; langzaam varen mag","Nee — het bord verbiedt de toegang voor snelle motorboten","Alleen als je waterskiërs aan de lijn hebt"],"u":"Instinker: A.18 betekent 'verboden snel te varen'. Een snelle motorboot mag het vaarwater dus wél op, zolang hij zich aan de normale snelheid houdt (max. 20 km/u, tenzij anders aangegeven).","a":"Bijlage 7 BPR (A.18)","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"60\" stroke=\"#6b4a2b\" stroke-width=\"5\"></line><g transform=\"translate(181,22) scale(0.3736)\"><rect x=\"0\" y=\"0\" width=\"182\" height=\"182\" fill=\"#c8102e\"></rect><rect x=\"22\" y=\"22\" width=\"138\" height=\"138\" fill=\"#ffffff\"></rect><g fill=\"#111111\"><path d=\"M34,102 L120,102 L148,82 L152,108 Q120,120 44,116 Z\"></path><path d=\"M96,82 L118,82 L112,100 L90,100 Z\"></path><path d=\"M30,116 Q60,126 88,120 M96,122 Q120,126 150,116\" stroke=\"#111111\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"></path></g><line x1=\"25\" y1=\"25\" x2=\"157\" y2=\"157\" stroke=\"#c8102e\" stroke-width=\"15\"></line></g><text x=\"215\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">A.18</text></svg>"}]};
CONTENT["3.4.2"]={"theorie":"<p>Aanbevelings- en aanwijzingsborden zijn blauw met witte tekens: <b>D.3a</b> aanbevolen richting, <b>E.5</b> ligplaats toegestaan, <b>E.10a</b> je nadert een hoofdvaarwater, <b>E.17</b> waterskiën toegestaan, <b>E.21</b> snelvaren toegestaan (alléén snelvaren, niet waterskiën!), <b>E.22</b> te water laten toegestaan, <b>E.23</b> marifoonkanaal voor nautische informatie, <b>E.24</b> jetboten toegestaan.</p><h4>Lichten bij bruggen en sluizen</h4><table><tr><th>Licht</th><th>Betekenis</th></tr><tr><td>rood</td><td>doorvaart verboden</td></tr><tr><td>groen</td><td>doorvaart toegestaan</td></tr><tr><td>rood + groen</td><td>doorvaart dadelijk mogelijk</td></tr><tr><td>enkel rood of groen</td><td>de brug/sluis wordt bediend</td></tr><tr><td>dubbel rood / dubbel groen</td><td>geen bediening (dubbel groen: vrije doorvaart, ook tegenliggers)</td></tr><tr><td>geel op de brug</td><td>kun je onder de gesloten brug door, dan mag je ondanks rood doorvaren; gaat het geel uit, dan stoppen</td></tr></table><h4>Borden boven brugopeningen</h4><p><b>A.1</b> doorvaart verboden · <b>A.10</b> verboden buiten de begrenzing te varen · <b>D.1a</b> (gele ruit) aanbevolen opening, beide richtingen · <b>D.1b</b> (twee gele ruiten) aanbevolen opening, alleen jouw richting — de andere kant toont A.1 · <b>D.2</b> aanbeveling binnen de begrenzing te blijven.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 278\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#12263a\">\n\n\n  <g font-size=\"10.5\" fill=\"#cfe0ee\" text-anchor=\"middle\">\n    <g transform=\"translate(75,60)\"><rect x=\"-48\" y=\"-26\" width=\"96\" height=\"16\" fill=\"#233648\"></rect><circle cx=\"0\" cy=\"0\" r=\"8\" fill=\"#ff2d2d\"></circle><text y=\"26\">rood: doorvaart verboden</text><text y=\"39\">(enkel = wordt bediend)</text></g>\n    <g transform=\"translate(215,60)\"><rect x=\"-48\" y=\"-26\" width=\"96\" height=\"16\" fill=\"#233648\"></rect><circle cx=\"0\" cy=\"0\" r=\"8\" fill=\"#28e05a\"></circle><text y=\"26\">groen: toegestaan</text><text y=\"39\">tegenliggers verboden</text></g>\n    <g transform=\"translate(355,60)\"><rect x=\"-48\" y=\"-26\" width=\"96\" height=\"16\" fill=\"#233648\"></rect><circle cx=\"0\" cy=\"-1\" r=\"8\" fill=\"#ff2d2d\"></circle><circle cx=\"0\" cy=\"19\" r=\"8\" fill=\"#28e05a\"></circle><text y=\"42\">rood boven groen:</text><text y=\"55\">dadelijk — wachten</text></g>\n    <g transform=\"translate(75,168)\"><rect x=\"-48\" y=\"-26\" width=\"96\" height=\"16\" fill=\"#233648\"></rect><circle cx=\"-14\" cy=\"0\" r=\"8\" fill=\"#ff2d2d\"></circle><circle cx=\"14\" cy=\"0\" r=\"8\" fill=\"#ff2d2d\"></circle><text y=\"26\">dubbel rood:</text><text y=\"39\">buiten bedrijf</text></g>\n    <g transform=\"translate(215,168)\"><rect x=\"-48\" y=\"-26\" width=\"96\" height=\"16\" fill=\"#233648\"></rect><circle cx=\"0\" cy=\"0\" r=\"8\" fill=\"#f2c500\"></circle><circle cx=\"0\" cy=\"-38\" r=\"8\" fill=\"#ff2d2d\"></circle><text y=\"26\">rood + geel: gesloten brug,</text><text y=\"39\">past je? dan mag je varen</text></g>\n    <g transform=\"translate(355,168)\"><rect x=\"-48\" y=\"-26\" width=\"96\" height=\"16\" fill=\"#233648\"></rect><circle cx=\"-14\" cy=\"0\" r=\"8\" fill=\"#f2c500\"></circle><circle cx=\"14\" cy=\"0\" r=\"8\" fill=\"#f2c500\"></circle><circle cx=\"0\" cy=\"-38\" r=\"8\" fill=\"#ff2d2d\"></circle><text y=\"26\">2× geel: ook voor</text><text y=\"39\">beide richtingen mogelijk</text></g>\n  </g>\n  <text x=\"215\" y=\"250\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">Enkel licht = brug wordt bediend · dubbel = niet bediend</text>\n  <text x=\"215\" y=\"266\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">1 geel = tegenliggers verboden · 2 geel = beide richtingen</text>\n</svg>","cap":"De zes basisbeelden bij een brug: van dubbel rood (dicht, geen bediening) tot dubbel groen."},{"svg":"<svg viewBox=\"0 0 430 265\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n\n\n  <rect x=\"15\" y=\"55\" width=\"400\" height=\"24\" fill=\"#4a5560\"></rect>\n  <g transform=\"translate(60,67)\"><rect x=\"-16\" y=\"-9\" width=\"32\" height=\"7\" fill=\"#c62828\"></rect><rect x=\"-16\" y=\"-1\" width=\"32\" height=\"4\" fill=\"#fff\"></rect><rect x=\"-16\" y=\"4\" width=\"32\" height=\"7\" fill=\"#c62828\"></rect><text x=\"0\" y=\"34\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">A.1</text><text x=\"0\" y=\"48\" text-anchor=\"middle\" font-size=\"9\">doorvaart verboden</text></g>\n  <g transform=\"translate(148,67)\"><g fill=\"#f2c500\" stroke=\"#8a6d00\"><path d=\"M-22,0 L-12,-11 L-2,0 L-12,11 Z\"></path><path d=\"M2,0 L12,-11 L22,0 L12,11 Z\"></path></g><text x=\"0\" y=\"34\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">D.1b (dubbel)</text><text x=\"0\" y=\"48\" text-anchor=\"middle\" font-size=\"9\">ÉÉN richting</text></g>\n  <g transform=\"translate(236,67)\"><path d=\"M-11,0 L0,-12 L11,0 L0,12 Z\" fill=\"#f2c500\" stroke=\"#8a6d00\"></path><text x=\"0\" y=\"34\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">D.1a (enkel)</text><text x=\"0\" y=\"48\" text-anchor=\"middle\" font-size=\"9\">BEIDE richtingen</text></g>\n  <g transform=\"translate(330,67)\"><g fill=\"#f2c500\" stroke=\"#8a6d00\"><path d=\"M-24,0 L-14,-11 L-4,0 L-14,11 Z\"></path><path d=\"M4,0 L14,-11 L24,0 L14,11 Z\"></path></g><rect x=\"-30\" y=\"-14\" width=\"60\" height=\"28\" fill=\"none\" stroke=\"#c62828\" stroke-width=\"3\"></rect><text x=\"0\" y=\"34\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">A.10</text><text x=\"0\" y=\"48\" text-anchor=\"middle\" font-size=\"9\">niet buiten randen</text></g>\n  <text x=\"215\" y=\"150\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#a12020\">A.10 verbiedt de doorvaart NIET — 75% denkt van wel</text>\n  <text x=\"215\" y=\"168\" text-anchor=\"middle\" font-size=\"11.5\">Het markeert de randen van de opening: erdóór mag, erbuiten niet</text>\n  <rect x=\"35\" y=\"185\" width=\"360\" height=\"66\" fill=\"#fff\" stroke=\"#1a5e8f\" rx=\"6\"></rect>\n  <text x=\"215\" y=\"205\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" fill=\"#1a5e8f\">DE OMKERING — borden vs. lichten:</text>\n  <text x=\"215\" y=\"223\" text-anchor=\"middle\" font-size=\"10.8\">borden: 1 ruit = beide richtingen · 2 ruiten = één richting</text>\n  <text x=\"215\" y=\"240\" text-anchor=\"middle\" font-size=\"10.8\">lichten: 1 geel = één richting · 2 geel = beide richtingen</text>\n</svg>","cap":"Borden aan de brug en de omkering: één ruit = beide richtingen, twee ruiten = alleen jouw richting."},{"svg":"<svg viewBox=\"0 0 430 262\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n\n\n  <g font-size=\"11\" fill=\"#cfe0ee\" text-anchor=\"middle\">\n    <g transform=\"translate(75,75)\"><rect x=\"-14\" y=\"-40\" width=\"28\" height=\"80\" fill=\"#233648\" rx=\"4\"></rect><circle cx=\"0\" cy=\"-20\" r=\"8\" fill=\"#ff2d2d\"></circle><text y=\"60\" font-size=\"11\">rood: verboden</text><text y=\"75\" font-size=\"11\">(wordt bediend)</text></g>\n    <g transform=\"translate(185,75)\"><rect x=\"-14\" y=\"-40\" width=\"28\" height=\"80\" fill=\"#233648\" rx=\"4\"></rect><circle cx=\"-9\" cy=\"-20\" r=\"7\" fill=\"#ff2d2d\"></circle><circle cx=\"9\" cy=\"-20\" r=\"7\" fill=\"#ff2d2d\"></circle><text y=\"60\" font-size=\"11\">dubbel rood:</text><text y=\"75\" font-size=\"11\">buiten bedrijf</text></g>\n    <g transform=\"translate(295,75)\"><rect x=\"-14\" y=\"-40\" width=\"28\" height=\"80\" fill=\"#233648\" rx=\"4\"></rect><circle cx=\"0\" cy=\"-24\" r=\"8\" fill=\"#ff2d2d\"></circle><circle cx=\"0\" cy=\"-2\" r=\"8\" fill=\"#28e05a\"></circle><text y=\"60\" font-size=\"11\">rood-groen:</text><text y=\"75\" font-size=\"11\">dadelijk — paraat</text></g>\n    <g transform=\"translate(384,75)\"><rect x=\"-14\" y=\"-40\" width=\"28\" height=\"80\" fill=\"#233648\" rx=\"4\"></rect><circle cx=\"-9\" cy=\"-20\" r=\"7\" fill=\"#28e05a\"></circle><circle cx=\"9\" cy=\"-20\" r=\"7\" fill=\"#28e05a\"></circle><text y=\"60\" font-size=\"11\">dubbel groen:</text><text y=\"75\" font-size=\"11\">geen bediening</text></g>\n  </g>\n  <text x=\"215\" y=\"194\" text-anchor=\"middle\" font-size=\"11.8\" fill=\"#fff\" font-weight=\"bold\">Tweede groen licht verschijnt: aanstonds doorvaart</text><text x=\"215\" y=\"211\" text-anchor=\"middle\" font-size=\"11.8\" fill=\"#fff\" font-weight=\"bold\">uit beide richtingen — tegenliggers!</text>\n  <text x=\"215\" y=\"230\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">Volgorde zonder instructie: grote schepen eerst, dan kleine (elk op aankomst)</text>\n  <text x=\"215\" y=\"246\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">— en eruit in dezelfde volgorde</text>\n</svg>","cap":"Sluislichten: zelfde kleurlogica als bij bruggen."},{"svg":"<svg viewBox=\"0 0 240 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs><filter id=\"sch_bd1a\" x=\"-15%\" y=\"-15%\" width=\"130%\" height=\"130%\"><feDropShadow dx=\"0\" dy=\"3\" stdDeviation=\"4\" flood-color=\"#00000033\"></feDropShadow></filter></defs>\n<g transform=\"translate(29,30)\">\n <g filter=\"url(#sch_bd1a)\"><g transform=\"translate(91,91) rotate(45)\"><rect x=\"-52\" y=\"-52\" width=\"104\" height=\"104\" fill=\"#f7c600\" stroke=\"#8a6d00\" stroke-width=\"3\"></rect></g></g>\n <text x=\"91\" y=\"-10\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"15\" font-weight=\"bold\" fill=\"#0e2a40\">D.1a</text>\n <text x=\"91\" y=\"249\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">aanbevolen doorvaartopening,</text><text x=\"91\" y=\"263\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">bevaarbaar in beide richtingen</text>\n</g></svg>","cap":"D.1a — aanbevolen opening, beide richtingen.","half":true},{"svg":"<svg viewBox=\"0 0 240 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs><filter id=\"sch_bd1b\" x=\"-15%\" y=\"-15%\" width=\"130%\" height=\"130%\"><feDropShadow dx=\"0\" dy=\"3\" stdDeviation=\"4\" flood-color=\"#00000033\"></feDropShadow></filter></defs>\n<g transform=\"translate(29,30)\">\n <g filter=\"url(#sch_bd1b)\"><g transform=\"translate(56,91) rotate(45)\"><rect x=\"-36\" y=\"-36\" width=\"72\" height=\"72\" fill=\"#f7c600\" stroke=\"#8a6d00\" stroke-width=\"3\"></rect></g><g transform=\"translate(126,91) rotate(45)\"><rect x=\"-36\" y=\"-36\" width=\"72\" height=\"72\" fill=\"#f7c600\" stroke=\"#8a6d00\" stroke-width=\"3\"></rect></g></g>\n <text x=\"91\" y=\"-10\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"15\" font-weight=\"bold\" fill=\"#0e2a40\">D.1b</text>\n <text x=\"91\" y=\"249\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">aanbevolen doorvaartopening, alleen</text><text x=\"91\" y=\"263\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">deze richting (tegenliggers verboden)</text>\n</g></svg>","cap":"D.1b — aanbevolen opening, één richting (andere zijde: A.1).","half":true}],"vragen":[{"s":"A.15","t":"Gesloten brug: rood licht mét daaronder een brandend geel licht. Jouw sloep (kruiphoogte 1,4 m) past onder de brug (vrije hoogte 1,8 m). Mag je doorvaren?","o":["Ja — het gele licht staat doorvaart onder de gesloten brug toe voor wie eronderdoor past","Nee — rood is altijd stoppen","Alleen als er ook groen brandt"],"u":"Geel bij een gesloten brug = kleine schepen die eronderdoor kunnen mógen varen ondanks rood. Let op: dooft het geel, dan stop je — óók al pas je eronderdoor.","a":"Art. 6.26 BPR","v":"<svg class=\"qv nacht\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#101a2b\"> <rect x=\"45\" y=\"55\" width=\"340\" height=\"24\" fill=\"#233648\"></rect><rect x=\"45\" y=\"79\" width=\"18\" height=\"70\" fill=\"#1b2c3f\"></rect><rect x=\"367\" y=\"79\" width=\"18\" height=\"70\" fill=\"#1b2c3f\"></rect><circle cx=\"215\" cy=\"40\" r=\"9\" fill=\"#ff2d2d\"></circle><circle cx=\"253\" cy=\"40\" r=\"9\" fill=\"#f2c500\"></circle><text x=\"215\" y=\"130\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8fb3d1\">vrije hoogte 1,8 m · jouw kruiphoogte 1,4 m</text></svg>"},{"s":"A.15","t":"Bij een beweegbare brug brandt rood bóven groen. Wat betekent dat?","o":["Doorvaart nog verboden, maar wordt dadelijk toegestaan — wachten, niet afmeren","Doorvaart toegestaan voor kleine schepen","De brug wordt vandaag niet meer bediend"],"u":"Rood-boven-groen = de bediening komt eraan. Dubbel rood = langdurig gesloten (niet bediend). Komt er een geel licht bij, dan mag je (2016-regel) alvast varen zodra de brug voor jouw schip hoog genoeg geheven is.","a":"Art. 6.26 BPR","v":"<svg class=\"qv nacht\" viewBox=\"0 0 430 170\"><rect x=\"45\" y=\"60\" width=\"340\" height=\"24\" fill=\"#233648\"/><rect x=\"45\" y=\"84\" width=\"18\" height=\"66\" fill=\"#1b2c3f\"/><rect x=\"367\" y=\"84\" width=\"18\" height=\"66\" fill=\"#1b2c3f\"/><circle cx=\"215\" cy=\"26\" r=\"9\" fill=\"#ff2d2d\"/><circle cx=\"215\" cy=\"48\" r=\"9\" fill=\"#28e05a\"/><text x=\"215\" y=\"132\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8fb3d1\">rood boven groen aan de brug</text></svg>"},{"s":"C.9","t":"Aan een vaste brug hangt boven één opening één gele ruit (D.1a). Wat betekent dat?","o":["Aanbevolen opening, bevaarbaar in beide richtingen","Aanbevolen opening, alleen voor jouw richting","Doorvaart door die opening verboden"],"u":"Borden: één ruit = beide richtingen, dubbele ruit (D.1b) = één richting. Bij líchten is het precies andersom: één geel licht = tegenliggers verboden, twee gele = beide richtingen. En A.10 verbiedt de doorvaart níét — het markeert alleen de randen.","a":"Bijlage 7 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"15\" y=\"40\" width=\"400\" height=\"26\" fill=\"#4a5560\"></rect><rect x=\"70\" y=\"66\" width=\"16\" height=\"90\" fill=\"#5b6470\"></rect><rect x=\"344\" y=\"66\" width=\"16\" height=\"90\" fill=\"#5b6470\"></rect><rect x=\"200\" y=\"66\" width=\"16\" height=\"90\" fill=\"#5b6470\"></rect><path d=\"M132,80 L146,64 L160,80 L146,96 Z\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"2\"></path><rect x=\"0\" y=\"130\" width=\"430\" height=\"40\" fill=\"#3f8cc4\"></rect></svg>"},{"s":"C.9","t":"Bord E.10a (blauw met wit kruis) langs je route. Wat nadert er?","o":["Een hoofdvaarwater — reken op de 6.16-regels","Een nevenvaarwater","Een verboden gebied"],"u":"E.10 kondigt aan dat het vaarwater dat je volgt zo dadelijk als nevenvaarwater een hoofdvaarwater kruist of erin uitkomt: vergewisplicht en de bijbehorende voorrang/medewerking.","a":"Bijlage 7 BPR","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"64\" stroke=\"#6b4a2b\" stroke-width=\"5\"></line><rect x=\"181\" y=\"22\" width=\"68\" height=\"68\" fill=\"#1a5ec2\" stroke=\"#0d3a7a\" stroke-width=\"2\"></rect><rect x=\"211\" y=\"30\" width=\"8\" height=\"52\" fill=\"#fff\"></rect><rect x=\"189\" y=\"47\" width=\"52\" height=\"18\" fill=\"#fff\"></rect><text x=\"215\" y=\"122\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">E.10a</text></svg>"},{"s":"C.9","t":"Wat betekent bord E.11?","o":["Einde van een verbod, gebod of beperking","Begin van een stremming","Einde van het bevaarbare water"],"u":"De E-serie geeft toestemming of inlichtingen; E.11 sluit een eerder verbod, gebod of beperking af — bijvoorbeeld het einde van een snelheidsbeperking.","a":"Bijlage 7 BPR (E.11)","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"60\" stroke=\"#6b4a2b\" stroke-width=\"5\"></line><g transform=\"translate(181,22) scale(0.3736)\"><rect x=\"0\" y=\"0\" width=\"182\" height=\"182\" fill=\"#0d4ea0\"></rect><line x1=\"26\" y1=\"26\" x2=\"156\" y2=\"156\" stroke=\"#ffffff\" stroke-width=\"20\"></line></g><text x=\"215\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">E.11</text></svg>"}]};
CONTENT["4.1.1"]={"theorie":"<p>Voorrang op het water draait om <b>begrip voor elkaar</b>. En let op de vangnetregel van <b>goed zeemanschap</b>: kan het uitwijkplichtige schip een aanvaring alléén niet meer voorkomen, dan moet ook het schip dat voorrang heeft maatregelen nemen.</p><h4>Begrippen</h4><p><b>Opvarend</b> = tegen de stroom in (richting bron); <b>afvarend</b> = met de stroom mee (richting zee). \"Klein schip\" omvat hier ook een sleep, duwstel of gekoppeld samenstel van uitsluitend kleine schepen.</p><h4>Motorboten onderling</h4><ul><li><b>Kruisende koersen</b>: rechts gaat voor; wie van links komt past koers en snelheid aan en vaart nooit vóórlangs. Wie voorrang heeft, houdt koers en snelheid.</li><li><b>Tegengestelde koersen</b>: beide wijken naar stuurboord — bakboord-op-bakboord passeren. Let op: een klein motorschip moet bij tegengestelde koersen voorrang verlenen aan een klein zeilschip (als geen van beide stuurboordwal vaart).</li><li><b>Oplopen</b>: de inhaler verleent altijd voorrang, wie ingehaald wordt verleent zo nodig medewerking.</li></ul><h4>Zeilboten onderling</h4><ul><li>Niet links/rechts maar de <b>zeilstand</b> telt: <b>bakboordzeil gaat voor stuurboordzeil</b> (de stand van het grootzeil is bepalend).</li><li>Zelfde boeg: <b>loef wijkt voor lij</b> — het loefwaartse schip (kant waar de wind vandaan komt) verleent voorrang.</li><li>Oplopen: opgelopene heeft voorrang; oplopen bij voorkeur (BPR) aan <b>loefzijde</b>, in het RPR verplicht aan loefzijde.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_kk\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_kk\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_kk\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_kk\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_kk\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_kk\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_kk\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"22\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">Rechts gaat voor: Bo wijkt voor Cas</text>\n <use href=\"#kschip_kk\" transform=\"translate(110,125)\"></use><text x=\"110\" y=\"155\" text-anchor=\"middle\" font-size=\"12\" font-weight= e=\"#777\"></path></g>\n <text x=\"330\" y=\"80\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">Kia — zeil over stuurboord</text>\n <path d=\"M296,110 C258,110 243,126 230,150\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.6\" stroke-dasharray=\"7,5\" marker-end=\"url(#ah_bb)\"></path>\n <text x=\"215\" y=\"226\" text-anchor=\"middle\" font-size=\"11.5\">Niet links/rechts maar de <tspan font-weight=\"bold\">zeilstand (giek)</tspan> beslist</text>\n</svg>","cap":"Bakboordzeil gaat voor stuurboordzeil: de zeilstand bepaalt, niet links of rechts.","half":true},{"svg":"<svg viewBox=\"0 0 430 240\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_lw\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_lw\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_lw\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_lw\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_lw\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_lw\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_lw\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"22\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">Beiden zelfde boeg → Loa (loefzijde) wijkt</text>\n <g transform=\"translate(52,48)\"><use href=\"#wroos_lw\"></use><path d=\"M0,-14 L0,8\" stroke=\"#c22222\" stroke-width=\"2.2\" marker-end=\"url(#ah_lw)\"></path></g>\n <g transform=\"translate(160,102)\"><use href=\"#zboot_lw\"></use><line x1=\"2\" y1=\"0\" x2=\"-22\" y2=\"13\" stroke=\"#333\" stroke-width=\"3\"></line></g>\n <text x=\"160\" y=\"82\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">Loa (loef)</text>\n <g transform=\"translate(262,172)\"><use href=\"#zboot_lw\"></use><line x1=\"2\" y1=\"0\" x2=\"-22\" y2=\"13\" stroke=\"#333\" stroke-width=\"3\"></line></g>\n <text x=\"262\" y=\"205\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">Mo (lij)</text>\n <path d=\"M160,114 C170,140 184,151 202,159\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.6\" stroke-dasharray=\"7,5\" marker-end=\"url(#ah_lw)\"></path>\n <line x1=\"296\" y1=\"172\" x2=\"345\" y2=\"172\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_lw)\"></line>\n <text x=\"215\" y=\"230\" text-anchor=\"middle\" font-size=\"11.5\">Loef = kant waar de wind vandaan komt: <tspan font-weight=\"bold\">loef wijkt voor lij</tspan></text>\n</svg>","cap":"Zelfde boeg: loef wijkt voor lij.","half":true}],"vragen":[{"s":"A.11","t":"Twee kleine motorschepen sturen recht tegen elkaar in; er dreigt aanvaringsgevaar. Wat is juist?","o":["Beide wijken naar stuurboord uit en passeren bakboord op bakboord","Het kleinste van de twee wijkt","Beide wijken naar bakboord uit"],"u":"Gelijkwaardige schepen op tegengestelde koersen: beiden naar stuurboord. Let op de instinker: was één van beiden een zeilschip (en niemand op stuurboordwal), dan wijkt de motorboot.","a":"Art. 6.04 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <use href=\"#kschip\" transform=\"translate(95,85)\"></use><line x1=\"132\" y1=\"85\" x2=\"190\" y2=\"85\" stroke=\"#1a1a2e\" stroke-width=\"2.2\" marker-end=\"url(#ah)\"></line><use href=\"#kschip\" transform=\"translate(335,85) rotate(180)\"></use><line x1=\"298\" y1=\"85\" x2=\"240\" y2=\"85\" stroke=\"#1a1a2e\" stroke-width=\"2.2\" marker-end=\"url(#ah)\"></line></svg>"},{"s":"A.11","t":"Twee kleine zeilschepen naderen elkaar met aanvaringsgevaar. X zeilt met de wind van stuurboord (giek over bakboord), Y met de wind van bakboord. Wie wijkt?","o":["Y — het schip over bakboordsboeg wijkt voor het schip over stuurboordsboeg","X — een giek over bakboord betekent wijken","De kleinste van de twee"],"u":"Verschillende boeg: 'bakboordsboeg wijkt'. Zelfde boeg: loef wijkt voor lij. Kijk dus éérst waar de wind vandaan komt en over welke boeg elk schip ligt.","a":"Art. 6.04 / 6.05 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 200\"><g transform=\"translate(385,42)\"><use href=\"#wroos\"/><path d=\"M0,-14 L0,8\" stroke=\"#c22222\" stroke-width=\"2.2\" marker-end=\"url(#ah)\"/></g><g transform=\"translate(320,105) rotate(180)\"><use href=\"#zboot\" transform=\"scale(1.2)\"/></g><line x1=\"322\" y1=\"105\" x2=\"292\" y2=\"123\" stroke=\"#333\" stroke-width=\"4\"/><text x=\"320\" y=\"145\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">X — wind van stuurboord</text><g transform=\"translate(105,105)\"><use href=\"#zboot\" transform=\"scale(1.2)\"/></g><line x1=\"107\" y1=\"105\" x2=\"77\" y2=\"123\" stroke=\"#333\" stroke-width=\"4\"/><text x=\"105\" y=\"145\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">Y — wind van bakboord</text><line x1=\"140\" y1=\"105\" x2=\"185\" y2=\"105\" stroke=\"#1a1a2e\" stroke-width=\"2.2\" marker-end=\"url(#ah)\"/><line x1=\"285\" y1=\"105\" x2=\"240\" y2=\"105\" stroke=\"#1a1a2e\" stroke-width=\"2.2\" marker-end=\"url(#ah)\"/></svg>"},{"s":"A.11","t":"Een klein zeilschip loopt een klein motorschip op en wil voorbij. Wie wijkt?","o":["Het zeilschip — de oploper wijkt altijd, ongeacht scheepstype","Het motorschip — motor wijkt voor zeil","Niemand: oplopen is vrij"],"u":"Bij oplopen vervallen de soortregels: wie inhaalt wijkt en blijft vrij van de opgelopene — óók zeil ten opzichte van motor. De opgelopene verleent hooguit medewerking als het inhalen alleen zó kan.","a":"Art. 6.09–6.11 BPR"},{"s":"A.11","t":"Een klein motorschip en een klein zeilschip naderen elkaar kruisend op open water (niemand volgt de stuurboordwal). Wie wijkt?","o":["Het motorschip — zeil gaat vóór motor","Het zeilschip — rechts gaat altijd voor","Wie de ander aan bakboord heeft"],"u":"Tussen ongelijke kleine schepen geldt de soortregel: zeil > spierkracht > motor. De rechts-gaat-voor-regel geldt tussen kleine mótorschepen onderling.","a":"Art. 6.17 BPR"}]};
CONTENT["4.2.1"]={"theorie":"<p>Het <b>hoofdvaarwater</b> is de snelweg: je mag er alleen op als dat zonder gevaar kan, en het verkeer erop verleent — meestal — medewerking.</p><ul><li><b>Klein uit nevenvaarwater</b>: mag het hoofdvaarwater pas op als het veilig kan; kleine schepen op het hoofdvaarwater verlenen medewerking.</li><li><b>Groot uit nevenvaarwater</b>: ook kleine schepen op het hoofdvaarwater verlenen medewerking.</li><li><b>Groot op het hoofdvaarwater</b>: een klein schip uit een haven of nevenvaarwater moet gewoon <b>voorrang</b> verlenen.</li><li><b>Bord B.9</b> bij de uitmonding: wie het nevenvaarwater uitvaart (groot óf klein) moet al het verkeer op het hoofdvaarwater voorrang geven — vanaf het hoofdvaarwater is dat bord meestal niet te zien. Let op: dit is de BPR-regel; in het RPR gaat groot altijd voor klein.</li></ul><h4>Overige regels</h4><ul><li>Opdraaien (van vóór stroom naar tegen stroom draaien) geeft voorrang; kop-voor-nemen niet. Een klein schip dat tegen stroom een haven in wil, verleent voorrang aan een schip dat vóór stroom — zonder opdraaien — dezelfde haven invaart.</li><li>Niet langszij komen, vastmaken of in het kielzog meevaren zonder toestemming; geen anker, kabel of ketting laten slepen.</li><li>Gelijkwaardige kruising: rechts gaat voor (motorboten), zeilregels voor zeilboten, groot voor klein, en zeil &gt; roei &gt; motor.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_hg\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_hg\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_hg\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_hg\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_hg\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_hg\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_hg\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Klein verlaat de haven → verleent voorrang aan groot</text>\n <text x=\"215\" y=\"37\" text-anchor=\"middle\" font-size=\"10.5\">Stuurboordwal claimen helpt Quin niet (fase 1-correctie)</text>\n <rect x=\"0\" y=\"62\" width=\"430\" height=\"95\" fill=\"#a9cde6\"></rect>\n <rect x=\"235\" y=\"157\" width=\"11
