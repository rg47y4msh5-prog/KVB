<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klein Vaarbewijs — leeromgeving</title>
<style>
 :root{--blauw:#1a5e8f;--donker:#134a70;--groen:#1e6b30;--rood:#c22222;--ink:#1a1a2e}
 body{font-family:Helvetica,Arial,sans-serif;background:#eef3f8;color:var(--ink);margin:0;padding:0;line-height:1.55}
 header{background:var(--donker);color:#fff;padding:22px}
 header h1{margin:0 0 4px;font-size:22px}
 header p{margin:0;opacity:.9;font-size:13.5px}
 header a{color:#bfe0f5}
 main{max-width:820px;margin:0 auto;padding:20px 16px 60px}
 h2{font-size:17px;border-bottom:2px solid var(--blauw);padding-bottom:5px;margin-top:30px;color:var(--donker)}
 .kaart{display:block;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:14px 16px;margin:10px 0;text-decoration:none;color:inherit;border-left:4px solid var(--blauw);cursor:pointer;transition:box-shadow .15s}
 .kaart:hover{box-shadow:0 3px 12px rgba(0,0,0,.18)}
 .kaart .titel{font-size:15.5px;font-weight:bold;color:var(--blauw)}
 .kaart .sub{font-size:12.5px;color:#555;margin-top:2px}
 .kaart.af{border-left-color:var(--groen)}
 .voortgang{height:7px;background:#e1e9f0;border-radius:4px;margin-top:9px}
 .voortgang>div{height:100%;background:var(--blauw);border-radius:4px;transition:width .25s}
 .af .voortgang>div{background:var(--groen)}
 .pct{font-size:11.5px;color:#777;margin-top:3px}
 .paneel{background:#fff;border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.12);padding:16px 18px;margin-top:14px}
 .para{border-top:1px solid #e4ebf1;padding:12px 0}
 .para:first-of-type{border-top:none}
 .para .pkop{display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap}
 .para .pnr{font-size:12px;font-weight:bold;color:var(--blauw);background:#e8f1f8;border-radius:6px;padding:2px 8px;white-space:nowrap}
 .para .ptitel{font-weight:bold;font-size:15px;flex:1}
 .para.gelezen .ptitel{color:var(--groen)}
 .placeholder{font-size:13px;color:#888;font-style:italic;margin:8px 0 0}
 .inhoud{font-size:14.5px;margin-top:8px}
 button{font-size:13.5px;padding:8px 14px;border-radius:8px;border:1.5px solid var(--blauw);background:#fff;color:var(--blauw);cursor:pointer;font-weight:bold;margin:8px 6px 0 0}
 button.primair{background:var(--blauw);color:#fff}
 button.vink{border-color:#9db8c9;color:#557;font-weight:normal;font-size:12.5px;padding:5px 10px}
 button.vink.aan{border-color:var(--groen);background:#e3f2e6;color:var(--groen);font-weight:bold}
 .theorie{font-size:14.5px}
 .theorie h4{margin:14px 0 4px;font-size:14.5px;color:var(--donker)}
 .theorie ul{margin:6px 0;padding-left:20px}
 .theorie p{margin:6px 0}
 .theorie table{border-collapse:collapse;font-size:13px;margin:8px 0}
 .theorie td,.theorie th{border:1px solid #d5dee6;padding:4px 8px;text-align:left}
 .vis{background:#fff;border:1px solid #e4ebf1;border-radius:8px;padding:8px;margin:10px 0;box-sizing:border-box}
 .visrij{display:grid;grid-template-columns:1fr 1fr;gap:10px}
 .visrij .vis{margin:0}
 @media (max-width:560px){.visrij{grid-template-columns:1fr}}
 .vis svg{width:100%;max-width:540px;height:auto;display:block;margin:0 auto}
 .vis .cap{font-size:12.5px;color:#555;text-align:center;margin-top:4px}
 .oefkop{font-weight:bold;color:var(--donker);margin-top:16px;font-size:14px}
 .vraag{border:1px solid #dbe5ee;border-radius:9px;padding:10px 12px;margin:10px 0;background:#fbfdff}
 .vraag .vt{font-size:14px;margin:2px 0 6px}
 .vraag svg{width:100%;height:auto;background:#bfd9ec;border-radius:8px;margin:6px 0}
 .optie{display:block;width:100%;text-align:left;margin:6px 0;padding:9px 12px;border:1.5px solid #c6d2dc;background:#fff;color:var(--ink);font-weight:normal;border-radius:9px;font-size:14px;cursor:pointer}
 .optie.goed{border-color:var(--groen);background:#e3f2e6;font-weight:bold}
 .optie.fout{border-color:var(--rood);background:#fde8e8}
 .optie:disabled{cursor:default}
 .uitleg{border-left:4px solid var(--groen);background:#f2faf3;padding:9px 11px;border-radius:6px;font-size:13.5px;margin-top:8px;line-height:1.5}
 .uitleg.fout{border-color:var(--rood);background:#fdf3f3}
 .artref{font-size:12px;color:#666;margin-top:4px}
 .kruimel{font-size:13px;margin:14px 0 4px}
 .kruimel a{color:var(--blauw);text-decoration:none;font-weight:bold;cursor:pointer}
 .lesnav{display:flex;justify-content:space-between;margin-top:18px}
 footer{text-align:center;font-size:12px;color:#888;padding:20px}
 footer a{color:var(--blauw)}
</style>

/* Lesinhoud wordt per les toegevoegd: CONTENT["1.1.1"]={...} met theorie,
   visuals en vraagverwijzingen. Leeg = paragraaf toont een placeholder. */
const CONTENT={};
CONTENT["1.1.1"]={"theorie":"<p>Een Klein Vaarbewijs is verplicht voor <b>snelle motorboten</b> (kunnen sneller varen dan 20 km/u), <b>pleziervaartuigen van 15 tot 25 meter</b>, sleep- en duwboten van 15–25 m die uitsluitend als pleziervaartuig dienen, en beroepsvaartuigen van 15–20 m.</p><h4>Leeftijd en afgifte</h4><ul><li><b>18 jaar</b> is de minimumleeftijd voor afgifte van het vaarbewijs én voor het besturen van een vaarbewijsplichtig schip.</li><li>Afgifte alleen tegen overlegging van het <b>getuigschrift theoretische kennis</b> (examen) en een <b>verklaring van lichamelijke geschiktheid</b>.</li><li>Het vaarbewijs is <b>onbeperkt geldig</b>.</li></ul><h4>KVB1, KVB2 en verder</h4><ul><li><b>KVB1</b>: rivieren, kanalen en kleine meren (gecombineerd met ICC Inland Waters).</li><li><b>KVB2</b>: álle binnenwateren, dus ook Wadden, IJsselmeer, Markermeer en Ooster-/Westerschelde (ICC Inland and Coastal Waters).</li><li>Uitsluitend op zee varen kan in Nederland zonder vaarbewijs; diverse Europese landen eisen voor kustwater wel een ICC.</li><li><b>Groot Pleziervaartbewijs</b>: o.a. pleziervaartuigen van 25–40 m.</li></ul><h4>Intrekken</h4><p>Bij ernstige overtredingen of gevaarlijk gedrag kan de vaarbevoegdheid worden ontzegd; boven <b>1,8‰</b> alcohol kan het vaarbewijs direct worden ingevorderd.</p><h4>Groot of klein schip</h4><p>De wettelijke grens ligt bij <b>20 meter</b>: een groot schip is 20 m of langer, een klein schip korter dan 20 m. De rompvorm bepaalt de geschiktheid voor golven: een <b>rondspant</b> is aan te bevelen op ruim water, een <b>knikspant</b> past bij klein binnenwater.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><g class=\"art\"><rect x=\"0\" y=\"88\" width=\"430\" height=\"62\" fill=\"#bfd9ec\"/><line x1=\"0\" y1=\"88\" x2=\"430\" y2=\"88\" stroke=\"#1a5e8f\" stroke-width=\"1.5\"/><polygon points=\"35,55 125,55 113,88 80,112 47,88\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2\"/><polygon points=\"175,55 265,55 256,84 238,95 220,104 202,95 184,84\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2\"/><path d=\"M315,55 h90 c-2,26 -18,49 -45,53 c-27,-4 -43,-27 -45,-53 z\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"13\" fill=\"#1a1a2e\" text-anchor=\"middle\"><text x=\"80\" y=\"136\">knikspant</text><text x=\"220\" y=\"136\">multiknikspant</text><text x=\"360\" y=\"136\">rondspant</text><text x=\"80\" y=\"45\" font-size=\"11\" fill=\"#555\">klein binnenwater</text><text x=\"360\" y=\"45\" font-size=\"11\" fill=\"#555\">ruim water met golfslag</text></g></svg>","cap":"Rompvormen (vooraanzicht): de rondspant rolt mee met golven, de knikspant ligt stiller op vlak water."}],"vragen":[{"s":"A.1","t":"Wat is de minimumleeftijd om een Klein Vaarbewijs te krijgen?","o":["18 jaar","16 jaar","21 jaar"],"u":"Een vaarbewijs wordt niet afgegeven onder de 18. Jongeren mogen wél bepaalde boten besturen (leeftijdsladder), maar het document zelf vereist 18 jaar én een verklaring van geschiktheid.","a":"Art. 27 BVW"},{"s":"A.1","t":"Voor welke pleziervaartuigen is een Klein Vaarbewijs verplicht?","o":["Voor snelle motorboten (>20 km/u) en voor plezierschepen van 15 tot 25 meter","Alleen voor schepen langer dan 25 meter","Voor elk vaartuig met een motor"],"u":"KVB-plicht: snelle motorboot (die >20 km/u t.o.v. het water kán) en pleziervaartuigen van 15–25 m. Boven de 25 m: Groot Pleziervaartbewijs. Het vaarbewijs zelf is onbeperkt geldig.","a":"Binnenvaartwet / Binnenvaartbesluit"},{"s":"A.1","t":"Een bestuurder van een snelle motorboot heeft 2,2 promille alcohol in zijn bloed. Wat kan er met zijn vaarbewijs gebeuren?","o":["Het kan direct worden ingevorderd","Niets, alleen een boete is mogelijk","Alleen de rechter kan het na maanden innemen"],"u":"Boven 1,8‰ kan het vaarbewijs direct worden ingevorderd; de rechter kan daarna de vaarbevoegdheid ontzeggen. De wettelijke grens is 0,5‰ en geldt voor schipper én roerganger.","a":"Art. 27/35a SVW"}]};
CONTENT["1.2.1"]={"theorie":"<p>Aan gewone kleine schepen stelt de wet <b>geen uitrustingseisen</b>. Voor eigen veiligheid (en de verzekering) hoort er wel een minimum aan boord: een <b>anker</b>, een <b>brandblusser</b> (min. 2 kg, goed bereikbaar), een <b>bijgewerkt BPR</b> (papier of digitaal), een <b>lens- of bilgepomp</b>, dichte <b>buitenboordafsluiters</b> bij vertrek, een <b>reddingsvest per opvarende</b> en op ruim water een <b>zeereling</b>.</p><h4>Snelle motorboot</h4><ul><li>Elk klein schip dat sneller kan dan 20 km/u — jetski, waterscooter, speedboot óók snelle kajuitjachten.</li><li><b>Registratieteken</b> op de boot plus <b>registratiebewijs</b> aan boord; geldt op alle Nederlandse vaarwateren, ook in het RPR-gebied.</li><li>De <b>schipper</b> is in eerste instantie verantwoordelijk voor de naleving van de inrichtingsvoorschriften; de geregistreerde eigenaar is medeverantwoordelijk.</li><li>Algemene maximumsnelheid op de Nederlandse vaarwegen: <b>20 km/u</b> (tenzij anders aangegeven).</li></ul><h4>Verplichte uitrusting snelle motorboot</h4><ul><li><b>Dodemansknop</b> (motoronderbreking) — niet vereist bij gesloten binnenbesturing;</li><li>goed passend <b>reddingsvest per opvarende</b> onder handbereik;</li><li><b>brandblusser</b>, <b>vaarbewijs</b>, <b>registratiebewijs</b>;</li><li><b>naam</b> aan beide zijden van de boeg (niet voor jetski/waterscooter).</li></ul><h4>Verplichtingen bestuurder</h4><p>De bestuurder (18+) zit op de bestemde zitplaats; wie staand stuurt <b>draagt</b> een reddingsvest en gebruikt het dodemanskoord (beide niet bij gesloten binnenbesturing). Veroorzaak geen hinder, gevaar of onnodig motorgeluid. Bij <b>waterskiën</b> moet een mede-opvarende van minimaal <b>15 jaar</b> als uitkijk fungeren.</p>","vragen":[{"s":"A.18","t":"Wat is volgens het BPR een 'snelle motorboot'?","o":["Een klein schip dat sneller dan 20 km/u ten opzichte van het water kán varen","Een groot schip dat sneller dan 40 km/u kan","Elke boot met een buitenboordmotor"],"u":"Sneller dan 20 km/u kúnnen is genoeg — ook als je feitelijk langzaam vaart. Verwar de snelle motorboot (klein) niet met het 'snelle schip' (groot, >40 km/u, twee gele flikkerlichten).","a":"Art. 1.01 BPR"},{"s":"A.18","t":"De bestuurder van een snelle open motorboot stuurt staand. Wat is dan verplicht?","o":["Reddingsvest dragen én het dodemanskoord gebruiken","Alleen een zwemvest aantrekken","Niets extra's, zolang hij langzaam vaart"],"u":"Staand sturen = vest dragen + dodemanskoord vast (beide vervallen bij een gesloten binnenbesturing). Verder: 18+, zittend op de bestemde zitplaats, geen onnodig motorgeluid of hinder.","a":"Hfdst. 8 BPR"},{"s":"A.18","t":"Je gaat waterskiën waar dat is toegestaan. Wat is er aan boord van de trekkende boot verplicht geregeld?","o":["Een uitkijk van minimaal 15 jaar naast de bestuurder","Niets extra's — de bestuurder houdt zelf de skiër in de gaten","Een tweede vaarbewijshouder aan boord"],"u":"Bij waterskiën is een uitkijk (mede-opvarende) van ten minste 15 jaar verplicht: de bestuurder kijkt vooruit, de uitkijk let op de skiër.","a":"Toetsterm A.18 (waterski-uitkijk)"}]};
CONTENT["1.3.1"]={"theorie":"<p>Brand ontstaat alleen als <b>brandbare stof</b>, voldoende hoge <b>temperatuur</b> en <b>zuurstof</b> tegelijk aanwezig zijn — de branddriehoek. Neem je één element weg, dan dooft de brand.</p><h4>Brandklassen</h4><table><tr><th>Klasse</th><th>Brandt</th><th>Voorbeeld</th></tr><tr><td><b>A</b></td><td>vaste stoffen (kernbrand)</td><td>hout, papier</td></tr><tr><td><b>B</b></td><td>vloeistoffen</td><td>benzine, olie, spiritus</td></tr><tr><td><b>C</b></td><td>gassen</td><td>propaan, butaan</td></tr><tr><td><b>D</b></td><td>metalen</td><td>magnesium, aluminium</td></tr><tr><td><b>F</b></td><td>vet en olie in de pan</td><td>vlam in de pan</td></tr></table><h4>Blusmiddelen</h4><ul><li><b>Water</b>: alleen geschikt bij A-branden. Een oliebrand nooit met water blussen — de brandende olie drijft en verspreidt zich over de boot.</li><li><b>Schuim</b>: bij uitstek geschikt aan boord (A- en B-branden, weinig schade na gebruik); gebruik in de winter een vorstvrije schuimblusser.</li><li><b>Poeder</b>: A-, B- en C-branden; nadeel is schade aan elektrische apparatuur en metalen.</li><li><b>Branddeken</b>: alleen A-branden (kleding, prullenbak); de brandweer raadt branddekens bij vetbranden af.</li></ul><h4>Eisen en plaats brandblusser</h4><p>Rijkskeurmerk en typegoedkeuring, minimaal <b>2 kg</b>, elke <b>2 jaar</b> keuren door een deskundige instantie. Hang de (enige) blusser waar je er van meerdere kanten bij kunt: bij de in-/uitgang van de kajuit. Slaat de <b>vlam in de pan</b>, dek de pan dan af met een deksel of vochtige doek.</p>","vis":[{"svg":"<svg viewBox=\"0 0 340 230\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><g class=\"art\"><polygon points=\"170,25 305,195 35,195\" fill=\"#fdf0d5\" stroke=\"#e67e22\" stroke-width=\"4\"/><path d=\"M170,105 c14,16 22,26 22,42 a22,22 0 0 1 -44,0 c0,-16 8,-26 22,-42 z\" fill=\"#e67e22\"/><path d=\"M170,128 c7,9 11,14 11,23 a11,11 0 0 1 -22,0 c0,-9 4,-14 11,-23 z\" fill=\"#f6c445\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"13\" font-weight=\"bold\" fill=\"#1a5e8f\"><text x=\"82\" y=\"100\" transform=\"rotate(-52 82 100)\" text-anchor=\"middle\">TEMPERATUUR</text><text x=\"258\" y=\"100\" transform=\"rotate(52 258 100)\" text-anchor=\"middle\">ZUURSTOF</text><text x=\"170\" y=\"215\" text-anchor=\"middle\">BRANDBARE STOF</text></g></svg>","cap":"De branddriehoek: neem één van de drie elementen weg en de brand dooft."}],"vragen":[{"s":"B.4","t":"Uit welke drie elementen bestaat de branddriehoek?","o":["Brandbare stof, ontbrandingstemperatuur en zuurstof — neem er één weg en de brand dooft","Vuur, rook en hitte","Benzine, gas en olie"],"u":"Elke blusmethode grijpt op één element aan: deksel op de pan = zuurstof weg; water = temperatuur omlaag; brandstofkraan dicht = brandbare stof weg.","a":"Toetsterm B.4"},{"s":"B.4","t":"De vlam slaat in de pan in de kombuis. Wat is de juiste actie?","o":["Afdekken met een deksel of vochtige doek","Blussen met water","De pan snel overboord gooien"],"u":"Vet-/oliebrand (klasse F) nooit met water: brandende olie drijft en verspreidt zich explosief. Zuurstof afsluiten met deksel of vochtige doek; de brandweer raadt ook de blusdeken bij vetbrand af.","a":"Toetsterm B.4"},{"s":"B.4","t":"Aan welke eisen moet de brandblusser aan boord voldoen?","o":["Rijkskeurmerk/typegoedkeuring, minimaal 2 kg en elke 2 jaar deskundige keuring","Minimaal 1 kg; jaarlijks zelf even schudden volstaat","Er gelden geen eisen voor de pleziervaart"],"u":"Plaats de blusser bij de in-/uitgang van de kajuit, zodat hij van twee kanten bereikbaar is — een brand kan je immers de weg naar de blusser afsnijden.","a":"Toetsterm B.4"}]};
CONTENT["1.3.2"]={"theorie":"<p>Brandbare gassen en benzinedampen zijn <b>zwaarder dan lucht</b> en kunnen uit een boot niet weg: ze zakken naar het laagste punt. Daarom is het explosiegevaar aan boord groter dan in een auto of caravan.</p><h4>Gasinstallatie</h4><ul><li><b>Gasdetector</b>: sensoren op het laagst gelegen punt van de ruimte plaatsen.</li><li><b>Kooktoestel</b> met thermische beveiliging: waait de vlam uit, dan sluit de gastoevoer automatisch.</li><li>Leidingen van <b>koper</b>; per gastoestel een afsluiter; naar het (cardanisch opgehangen) toestel maximaal <b>1 m rubberen gasslang</b>, elke <b>3 jaar</b> vervangen; wanddoorvoeren van messing.</li><li>Lek zoeken met <b>zeepsop</b> — nooit met een vlammetje.</li><li><b>Propaan</b> (kookpunt −42 °C) werkt ook bij vorst; <b>butaan</b> (0 °C) bevriest in de winter.</li><li><b>Gasbun</b>: aparte ruimte met gasafvoer naar buiten op het laagste punt én beluchting van bovenaf.</li></ul><h4>Benzine en elektriciteit</h4><ul><li>Vóór het starten van een ingebouwde <b>benzinemotor</b> eerst de motorruimte ventileren met een vonkvrije ventilator die onder de motor afzuigt; bij een dieselmotor is dat niet nodig.</li><li>Jerrycans met reservebenzine in een aparte, geventileerde ruimte.</li><li>Tegen kortsluitingsbrand: zet de installatie bij het verlaten van de boot uit met de <b>hoofdschakelaar</b>.</li></ul>","vragen":[{"s":"B.7","t":"Waar hoort de gasafvoer van een gasbun te zitten, en waarom?","o":["Op het laagste punt, naar buitenboord — gas is zwaarder dan lucht","Bovenin — gas stijgt op","Maakt niet uit, als er maar ventilatie is"],"u":"Propaan/butaan zakt naar het laagste punt. Daarom: afvoer onderin naar buiten, beluchting bovenin, gasdetector op het laagste punt van de ruimte, en lekzoeken met zeepsop — nooit met een vlam.","a":"Toetsterm B.7"},{"s":"B.7","t":"Hoe zoek je een lek in de gasinstallatie?","o":["Met zeepsop — belletjes verraden het lek","Met een aansteker langs de leiding","Gas even open laten staan en goed ruiken"],"u":"Nooit met een vlam zoeken. Verder: koperen leidingen, per toestel een afsluiter, en maximaal 1 m rubberen gasslang die je elke 3 jaar vervangt.","a":"Toetsterm B.7"},{"s":"B.7","t":"Welk gas kies je voor het koken aan boord in de winter?","o":["Propaan — kookpunt −42 °C; butaan werkt bij vorst niet meer","Butaan — dat is juist winterbestendig","Maakt niet uit, ze zijn identiek"],"u":"Butaan houdt rond 0 °C op met verdampen ('butaan bevriest'); propaan blijft ook 's winters gewoon werken.","a":"Toetsterm B.7"}]};
CONTENT["1.3.3"]={"theorie":"<p>Wie overboord slaat, raakt snel <b>onderkoeld</b>; door onderkoeling stoppen de spieren en verdrink je — ook als je goed zwemt. In het water: <b>blijf drijven</b>, houd warmte vast (foetushouding, niet bewegen) en zorg dat je <b>gezien wordt</b>. Reddingsmiddelen zijn internationaal <b>oranje</b>.</p><h4>Reddingsvesten</h4><p>Een reddingsvest draait ook een <b>bewusteloze</b> drenkeling op de rug, met het hoofd op de kraag. Een goed onderhouden automatisch opblaasbaar vest is even goed als een vast vest en is ook met de hand te activeren. Voor de pleziervaart geldt geen algemene draagplicht; uitzondering is de <b>staand sturende bestuurder</b> van een snelle open motorboot. Snelle motorboten: per opvarende een passend vest <b>onder handbereik</b>. Beroepsvaart: draagplicht.</p><h4>Reddingsboeien, drijflijn en joon</h4><ul><li><b>Ronde boei</b> (beroepsvaart): 2–3 kg, goed gericht te werpen.</li><li><b>Hoefijzerboei</b> (jachten): licht en open — makkelijk in te komen, vaak met drijflicht dat ondersteboven hangt en gaat branden zodra het rechtop drijft.</li><li><b>Drijflijn</b>: blijft drijven (niet in de schroef) en is over de hele lengte te grijpen, maar kan bij het werpen in de knoop raken.</li><li><b>Joon</b>: oranje dobber van ±3 m met vlag en knipperlicht die de plek van de drenkeling markeert, vooral 's nachts op stromend water.</li></ul><h4>Overige voorzieningen</h4><p><b>Parachutelichten</b> zijn noodseinen. Een <b>radarreflector</b> (op sommige wateren verplicht) hangt zo hoog mogelijk, minstens <b>4 m</b> boven het water, en werkt alleen in de juiste stand — niet plat 'als een tafelblad'. Een <b>vluchtluik</b> biedt een tweede uitgang bij calamiteiten; een <b>zwemtrap</b> is de veilige weg terug aan boord.</p>","vis":[{"svg":"<svg viewBox=\"0 0 460 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><defs><g id=\"drenk_t1v\"><path d=\"M-30,18 q10,-8 20,0 t20,0 t20,0\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2\"/><circle cx=\"0\" cy=\"0\" r=\"7\" fill=\"#f2c9a0\" stroke=\"#1a1a2e\" stroke-width=\"1.5\"/></g></defs><g class=\"art\"><g transform=\"translate(65,60)\"><use href=\"#drenk_t1v\"/><rect x=\"-9\" y=\"6\" width=\"18\" height=\"10\" rx=\"3\" fill=\"#f6c445\" stroke=\"#1a1a2e\"/></g><g transform=\"translate(175,58)\"><use href=\"#drenk_t1v\"/><rect x=\"-10\" y=\"5\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#e67e22\" stroke=\"#1a1a2e\"/></g><g transform=\"translate(285,56)\"><use href=\"#drenk_t1v\"/><rect x=\"-11\" y=\"4\" width=\"22\" height=\"13\" rx=\"3\" fill=\"#e67e22\" stroke=\"#1a1a2e\"/><circle cx=\"0\" cy=\"-2\" r=\"9\" fill=\"none\" stroke=\"#e67e22\" stroke-width=\"3\"/></g><g transform=\"translate(395,54)\"><use href=\"#drenk_t1v\"/><rect x=\"-12\" y=\"3\" width=\"24\" height=\"14\" rx=\"3\" fill=\"#c22222\" stroke=\"#1a1a2e\"/><circle cx=\"0\" cy=\"-2\" r=\"10\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"4\"/></g></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" text-anchor=\"middle\" fill=\"#1a1a2e\"><text x=\"65\" y=\"105\" font-size=\"14\" font-weight=\"bold\">50 N</text><text x=\"175\" y=\"105\" font-size=\"14\" font-weight=\"bold\">100 N</text><text x=\"285\" y=\"105\" font-size=\"14\" font-weight=\"bold\">150 N</text><text x=\"395\" y=\"105\" font-size=\"14\" font-weight=\"bold\">275 N</text><text x=\"65\" y=\"122\" font-size=\"10.5\" fill=\"#555\">zwemvest · beschut water</text><text x=\"175\" y=\"122\" font-size=\"10.5\" fill=\"#555\">binnenwater</text><text x=\"285\" y=\"122\" font-size=\"10.5\" fill=\"#555\">open en kustwater</text><text x=\"395\" y=\"122\" font-size=\"10.5\" fill=\"#555\">zee, extreem weer</text><text x=\"12\" y=\"136\" text-anchor=\"start\" font-size=\"10.5\" fill=\"#c22222\">niet veilig bij bewusteloosheid</text><text x=\"285\" y=\"136\" font-size=\"10.5\" fill=\"#555\">draait bewusteloze op de rug</text></g></svg>","cap":"Drijfhulpmiddelen naar drijfvermogen: alleen 100N, 150N en 275N zijn reddingsvesten."},{"svg":"<svg viewBox=\"0 0 340 240\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><g class=\"art\"><rect x=\"0\" y=\"150\" width=\"340\" height=\"90\" fill=\"#bfd9ec\"/><path d=\"M0,150 q20,-6 40,0 t40,0 t40,0 t40,0 t40,0 t40,0 t40,0 t40,0 t20,0\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2\"/><line x1=\"120\" y1=\"30\" x2=\"120\" y2=\"205\" stroke=\"#1a1a2e\" stroke-width=\"4\"/><circle cx=\"120\" cy=\"24\" r=\"7\" fill=\"#f6c445\" stroke=\"#e67e22\" stroke-width=\"2\"/><path d=\"M124,42 l38,10 -38,10 z\" fill=\"#e67e22\"/><rect x=\"111\" y=\"128\" width=\"18\" height=\"46\" rx=\"8\" fill=\"#e67e22\" stroke=\"#1a1a2e\" stroke-width=\"1.5\"/><rect x=\"114\" y=\"196\" width=\"12\" height=\"12\" rx=\"2\" fill=\"#555\"/><path d=\"M129,170 q45,26 84,8\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2.5\" stroke-dasharray=\"5 3\"/><ellipse cx=\"242\" cy=\"172\" rx=\"34\" ry=\"13\" fill=\"none\" stroke=\"#e67e22\" stroke-width=\"9\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"12\" fill=\"#1a1a2e\"><line x1=\"132\" y1=\"24\" x2=\"180\" y2=\"24\" stroke=\"#999\" stroke-width=\"1\"/><text x=\"185\" y=\"28\">knipperlicht</text><line x1=\"165\" y1=\"52\" x2=\"200\" y2=\"52\" stroke=\"#999\" stroke-width=\"1\"/><text x=\"205\" y=\"56\">vlag</text><line x1=\"132\" y1=\"140\" x2=\"40\" y2=\"120\" stroke=\"#999\" stroke-width=\"1\"/><text x=\"8\" y=\"114\">drijflichaam</text><line x1=\"123\" y1=\"205\" x2=\"60\" y2=\"222\" stroke=\"#999\" stroke-width=\"1\"/><text x=\"14\" y=\"230\">gewichtje</text><text x=\"160\" y=\"196\">lijn</text><text x=\"242\" y=\"212\" text-anchor=\"middle\">reddingsboei</text></g></svg>","cap":"De joon markeert de plaats van de drenkeling en zit vaak met een lijn aan de reddingsboei vast."}],"vragen":[{"s":"B.5","t":"Welk drijfhulpmiddel draait een bewusteloze drenkeling betrouwbaar op de rug?","o":["Een reddingsvest van 100 N of meer","Een zwemvest van 50 N","Elk vest, mits goed vastgemaakt"],"u":"50 N is een zwémvest: prima voor sporters op beschut water, maar niet veilig bij bewusteloosheid. Vanaf 100 N (reddingsvest) draait het je op de rug met het hoofd op de kraag; 150/275 N voor ruiger water en zware kleding.","a":"Toetsterm B.5"},{"s":"B.5","t":"Je valt in koud water; hulp is onderweg. Wat is het beste gedrag?","o":["Foetushouding aannemen en zo stil mogelijk blijven drijven — bewegen versnelt de afkoeling","Watertrappelen om warm te blijven","Meteen naar de wal zwemmen, hoe ver ook"],"u":"Onderkoeling is de echte moordenaar: koud water schakelt je spieren uit, ook bij goede zwemmers. Drijf, houd warmte vast en zorg dat je gezien wordt (oranje = internationale reddingskleur).","a":"Toetsterm B.5"},{"s":"B.5","t":"Waarvoor dient de joon aan een reddingsboei?","o":["De positie van de drenkeling zichtbaar maken — een oranje staak met vlag of knipperlicht","Extra drijfvermogen leveren","De drenkeling tegen onderkoeling beschermen"],"u":"Op golvend of donker water raak je een drenkeling zó uit het oog; de joon (±3 m hoog) blijft zichtbaar boven de golven. Zichtbaarheid is de functie — niet drijfvermogen.","a":"Toetsterm B.5"},{"s":"B.8","t":"Hoe hang je een radarreflector op?","o":["Zo hoog mogelijk, minimaal ±4 m boven water, in de juiste vangstand","Zo laag mogelijk bij de waterlijn","Plat op het kajuitdak"],"u":"Hoogte bepaalt het bereik; de reflector werkt alleen in de juiste stand ('punt omhoog'). Op Bijlage 15B-wegen is hij verplicht bij slecht zicht — varend én ten anker.","a":"Toetsterm B.8 / Bijlage 15B"}]};
CONTENT["1.4.1"]={"theorie":"<p>Een verbrandingsmotor heeft vier dingen nodig: <b>brandstof, zuurstof, smering en ontsteking</b>.</p><h4>Benzine of diesel</h4><ul><li><b>Benzine</b>: ontsteking door de bougievonk — valt de stroom uit, dan stopt de motor. Benzinedamp is explosief: vóór het starten motorruimte ventileren. <b>2-takt</b> (vaak buitenboord) heeft geen carter en smeert via mengsmering (1:40/1:50); <b>4-takt</b> smeert uit het carter.</li><li><b>Diesel</b>: ontsteking door samenpersing, geen bougies; loopt door als de stroom uitvalt (behalve bij elektronische inspuiting/common rail). Weinig explosiegevaar.</li></ul><h4>Smering en brandstof</h4><ul><li>Te laag oliepeil → te lage <b>oliedruk</b> → motor wordt heet en loopt vast. Gaat het oliedruklampje branden: <b>direct stoppen</b> en olie bijvullen. Te veel olie verbrandt: blauwe rook.</li><li>Condenswater in de tank vormt <b>sludge</b>; bij golfslag raken filters verstopt en valt de motor uit. Controleer de <b>waterafscheider/brandstoffilter</b> jaarlijks.</li></ul><h4>Koeling</h4><p>Buitenwater komt via de inlaatkraan, het <b>wierfilter</b> en de <b>impeller</b> (rubberen schoepenrad, jaarlijks controleren) naar de motor of een <b>warmtewisselaar</b>. De <b>V-snaar</b> drijft koelwaterpomp én dynamo aan: slipt hij, dan raakt de motor oververhit en laden de accu's niet. Komt er na het starten <b>geen water uit de uitlaat</b>, dan werkt de koeling niet — stoppen. Vul het systeem vóór de winter met antivries.</p><h4>Aandrijving en sturen</h4><ul><li><b>Keerkoppeling</b>: schroef vooruit, vrij of achteruit. De <b>schroefas</b> loopt door de schroefaskoker; de <b>gland</b> houdt water buiten (druppelen mag, meer niet). Vetgesmeerde koker: elke 6 motoruren de vetpers aandraaien. <b>Slipkoppeling</b> of breekpen beperkt schade als de schroef de grond raakt.</li><li>Een <b>roerblad</b> werkt alleen met vaart door het water; helmstok naar bakboord = stuurboordroer. <b>Boeg- en hekschroeven</b> maken manoeuvreren bij lage snelheid mogelijk.</li><li>Sturen met <b>schroef of straal</b> (buitenboordmotor, hekdrive, waterjet): wendbaar bij lage snelheid, maar stuurloos zodra de motor uitvalt.</li></ul><h4>Boot verlaten</h4><p>Alle buitenboordafsluiters en gasflessen dicht, hoofdschakelaar uit, en controleer landvasten, rek en stootwillen.</p>","vragen":[{"s":"B.1","t":"Wat doe je vóór het starten van een benzine-binnenboordmotor?","o":["De motorruimte minimaal 5 minuten ventileren met een vonkvrije afzuigventilator","Direct starten — ventileren is alleen na het tanken nodig","Eerst vol gas geven met de choke dicht"],"u":"Benzinedamp is zwaarder dan lucht en verzamelt zich onderin: explosiegevaar bij één vonk. Bij een dieselmotor is dit niet nodig — diesel verdampt nauwelijks.","a":"Toetsterm B.1 / B.7"},{"s":"B.1","t":"Tijdens het varen gaat het oliedruklampje branden. Wat doe je?","o":["Direct stoppen, motor uit en oliepeil controleren/bijvullen","Rustig doorvaren naar de haven","Toerental verhogen zodat de pomp meer druk maakt"],"u":"Te lage oliedruk betekent binnen minuten oververhitting en een vastloper. Direct stoppen. (Vergelijk: bij een kapotte dynamo kán een klassieke diesel wel doorvaren — die heeft geen stroom nodig om te lopen.)","a":"Toetsterm B.1"},{"s":"B.1","t":"Na het starten komt er geen koelwater uit de uitlaat. Wat is de meest waarschijnlijke oorzaak en wat doe je?","o":["Buitenboordkraan dicht, wierfilter vol of impeller defect — motor direct uit en controleren","Dat is normaal zolang de motor koud is","De dynamo laadt niet — doorvaren kan"],"u":"Na het starten hoort koelwater uit de uitlaat te pruttelen. Blijft dat uit: kraan open? Wierfilter schoon? Impeller heel? Doorvaren zonder koeling betekent binnen korte tijd oververhitting.","a":"Toetsterm B.1"},{"s":"B.1","t":"Tijdens het varen loopt de motortemperatuur snel op én laadt de accu niet meer. Wat is de meest waarschijnlijke gezamenlijke oorzaak?","o":["Een slappe of gebroken V-snaar — die drijft de koelwaterpomp én de dynamo aan","Vervuilde brandstof die het filter verstopt","Een verstopt luchtfilter"],"u":"De V-snaar-kettingredenering: één snaar drijft koelwaterpomp en dynamo aan. Slap of kapot betekent dus tegelijk geen koeling (temperatuur stijgt) én geen lading (laadlampje). Vervuilde brandstof laat de motor stilvallen, maar verklaart het laadprobleem niet.","a":"Toetsterm B.1"}]};
CONTENT["1.4.2"]={"theorie":"<p>Aan boord zijn twee spanningsbronnen: de <b>accu</b> (gelijkspanning, meestal 12 V) voor onderweg en <b>walstroom</b> (wisselspanning, 230 V) in de haven.</p><h4>Accu's</h4><ul><li>Meestal gescheiden: een <b>startaccu</b> en een <b>lichtaccu</b> — is de lichtaccu leeg, dan start de motor nog gewoon. De dynamo laadt beide tijdens het varen.</li><li>Bij het laden kan explosief <b>knalgas</b> ontstaan: accu's in een geventileerde ruimte.</li><li><b>Parallel</b> (+ aan +, − aan −): spanning blijft 12 V, capaciteit verdubbelt; laden met een 12V-lader.</li><li><b>Serie</b> (+ aan −): spanning wordt 24 V (grote schepen); laden met een 24V-lader op de buitenste polen.</li></ul><h4>Stroom, capaciteit en veiligheid</h4><ul><li>Stroomsterkte in <b>ampère</b> (A); accucapaciteit in <b>ampère-uur</b> (Ah). Hoe meer watt een apparaat vraagt, hoe meer stroom er loopt.</li><li>Veel stroom vraagt <b>dikke kabels</b>: hetzelfde apparaat trekt op 12 V veel méér stroom dan op 230 V — te dunne kabels worden heet en veroorzaken brand.</li><li>Let bij marifoon en radio op de <b>polariteit</b> (+ op +, − op −); een <b>smeltveiligheid</b> brandt door bij kortsluiting of verkeerd aansluiten.</li><li>Bij langere tijd van boord: installatie stroomloos met de <b>hoofdschakelaar(s)</b>.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 460 190\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><defs><g id=\"accu_t1a\"><rect x=\"0\" y=\"0\" width=\"70\" height=\"95\" rx=\"6\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2\"/><text x=\"35\" y=\"55\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"15\" font-weight=\"bold\" text-anchor=\"middle\" fill=\"#1a1a2e\">12V</text></g></defs><g class=\"art\"><g transform=\"translate(35,45)\"><use href=\"#accu_t1a\"/><text x=\"12\" y=\"18\" font-size=\"15\" font-weight=\"bold\" fill=\"#c22222\" font-family=\"Helvetica,Arial,sans-serif\">+</text><text x=\"56\" y=\"19\" font-size=\"16\" font-weight=\"bold\" fill=\"#1a5e8f\" font-family=\"Helvetica,Arial,sans-serif\">−</text></g><g transform=\"translate(125,45)\"><use href=\"#accu_t1a\"/><text x=\"12\" y=\"18\" font-size=\"15\" font-weight=\"bold\" fill=\"#c22222\" font-family=\"Helvetica,Arial,sans-serif\">+</text><text x=\"56\" y=\"19\" font-size=\"16\" font-weight=\"bold\" fill=\"#1a5e8f\" font-family=\"Helvetica,Arial,sans-serif\">−</text></g><path d=\"M50,42 v-14 h90 v14\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.5\"/><path d=\"M85,148 v14 h90 v-14\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2.5\"/><g transform=\"translate(265,45)\"><use href=\"#accu_t1a\"/><text x=\"12\" y=\"18\" font-size=\"15\" font-weight=\"bold\" fill=\"#c22222\" font-family=\"Helvetica,Arial,sans-serif\">+</text><text x=\"56\" y=\"19\" font-size=\"16\" font-weight=\"bold\" fill=\"#1a5e8f\" font-family=\"Helvetica,Arial,sans-serif\">−</text></g><g transform=\"translate(355,45)\"><use href=\"#accu_t1a\"/><text x=\"12\" y=\"18\" font-size=\"15\" font-weight=\"bold\" fill=\"#c22222\" font-family=\"Helvetica,Arial,sans-serif\">+</text><text x=\"56\" y=\"19\" font-size=\"16\" font-weight=\"bold\" fill=\"#1a5e8f\" font-family=\"Helvetica,Arial,sans-serif\">−</text></g><path d=\"M320,42 v-14 h47 v14\" fill=\"none\" stroke=\"#1a1a2e\" stroke-width=\"2.5\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" fill=\"#1a1a2e\" text-anchor=\"middle\"><text x=\"115\" y=\"24\" font-size=\"13\" font-weight=\"bold\">parallel: + aan +, − aan −</text><text x=\"115\" y=\"180\" font-size=\"12\" fill=\"#555\">blijft 12 V · dubbele capaciteit · 12V-lader</text><text x=\"345\" y=\"24\" font-size=\"13\" font-weight=\"bold\">serie: + aan −</text><text x=\"345\" y=\"180\" font-size=\"12\" fill=\"#555\">wordt 24 V · 24V-lader op buitenste polen</text></g></svg>","cap":"Parallel houdt 12 V met dubbele capaciteit; serie maakt van twee 12V-accu's een 24V-bron."}],"noot":"Voor dit onderwerp bevat de oefenbank geen apart vragenblok; de leerstof komt terug in de motor- en uitrustingsvragen."};
CONTENT["1.5.1"]={"theorie":"<p>Een goed afgestelde motor heeft <b>kleurloze uitlaatgassen</b>; zwarte, blauwe of witte rook betekent dat er iets mis is. Zet de motor af als je ligt en vaar rustig: meer toeren is meer uitstoot.</p><h4>Lozingsverbod</h4><ul><li>Voor de hele pleziervaart op alle Nederlandse binnenwateren geldt een lozingsverbod voor <b>toiletwater</b> (het onderwatertoilet gebruiken is verboden) en voor <b>bilgewater</b> met olie of brandstof.</li><li>Nieuwe boten met pomptoilet hebben een <b>vuilwatertank</b> die in de jachthaven wordt leeggepompt; ook voor bilgewater zijn daar innamepunten.</li><li>Alternatieven: chemisch of droog toilet (storten op de wal), de puts (legen op de wal, niet in het water) of een plaszak. Overboord plassen is wildplassen: altijd verboden.</li><li>Overig afvalwater (afwas-, douche-, schrobwater) mag voorlopig nog geloosd worden — liever niet.</li></ul><h4>Geluid en golfslag</h4><p>Beperk motorlawaai (onderhoud!), radio en stemgeluid. Snel varen met een niet-planerend schip geeft onnodig veel golven: schadelijk voor oevers en hinderlijk voor kanoërs en zeilers.</p>","vragen":[{"s":"B.8","t":"Mag je bilgewater met olie- of dieselsporen overboord pompen?","o":["Nee — bilgewater met olieresten lozen is verboden","Ja, buiten de havens mag het","Ja, kleine hoeveelheden zijn vrijgesteld"],"u":"Gebruik een bilgepomp met oliedetectie of een biosok en lever vervuild water in bij de haven. De bilge is het laagste punt van het schip — daar verzamelt alles zich.","a":"Toetsterm B.8 / milieu"}]};
CONTENT["1.6.1"]={"theorie":"<p>Op de waterkaart staan dieptes en doorvaarthoogtes, maar die gelden ten opzichte van een <b>gemiddelde</b> waterstand: het <b>kanaalpeil (KP)</b> of bij rivieren het <b>stuwpeil (SP)</b>, beide opgegeven ten opzichte van <b>NAP</b> (Normaal Amsterdams Peil, het nulpunt). De <b>werkelijke waterstand (WW)</b> lees je af op de blauwe peilschalen langs het water, eveneens ten opzichte van NAP.</p><h4>De ene vraag die telt</h4><p>Bij elke hoogte- of diepteberekening: <b>staat het water hoger of lager dan 'normaal' (KP), en hoeveel?</b> Maak altijd een tekening met NAP, KP, WW en de brug of bodem, en zet de gegeven maten erbij.</p><p><i>Voorbeeld:</i> brug H 30 (dm boven KP), KP = NAP − 5 dm, peilschaal wijst NAP + 1 dm, schip 22 dm hoog. Het water staat 6 dm boven KP, dus onder de brug blijft 30 − 6 = 24 dm over: <b>2 dm speling</b>.</p><h4>Hoogteschaal</h4><p>Bij veel bruggen hangt een zwart-gele <b>hoogteschaal</b> (omgekeerde peilschaal) die de actuele doorvaarthoogte direct aangeeft, in blokken van 1 m: zie je de 6 helemaal plus een stuk van de 7, dan is de doorvaarthoogte ± 6,7 m.</p><h4>Kaartschaal</h4><p>Schaal 1 : 50.000 betekent: 1 cm op de kaart = 50.000 cm = <b>500 m</b> in werkelijkheid. Dus 7 cm op een 1:50.000-kaart is 3500 m; 5 cm op 1:25.000 is 1250 m.</p>","vis":[{"svg":"<svg viewBox=\"0 0 460 260\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><defs><marker id=\"ah_t1nap\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#1a1a2e\"/></marker></defs><g class=\"art\"><rect x=\"0\" y=\"18\" width=\"460\" height=\"16\" fill=\"#555\"/><rect x=\"0\" y=\"150\" width=\"460\" height=\"110\" fill=\"#bfd9ec\"/><line x1=\"0\" y1=\"150\" x2=\"460\" y2=\"150\" stroke=\"#1a5e8f\" stroke-width=\"2\"/><line x1=\"0\" y1=\"160\" x2=\"460\" y2=\"160\" stroke=\"#1a1a2e\" stroke-width=\"1.5\" stroke-dasharray=\"7 4\"/><line x1=\"0\" y1=\"210\" x2=\"460\" y2=\"210\" stroke=\"#1a1a2e\" stroke-width=\"1.5\" stroke-dasharray=\"7 4\"/><path d=\"M60,150 l10,-18 h55 l10,18 z\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2\"/><line x1=\"97\" y1=\"132\" x2=\"97\" y2=\"52\" stroke=\"#1a1a2e\" stroke-width=\"2.5\"/><line x1=\"97\" y1=\"52\" x2=\"97\" y2=\"150\" stroke=\"none\"/><line x1=\"150\" y1=\"150\" x2=\"150\" y2=\"52\" stroke=\"#1a1a2e\" stroke-width=\"1.5\" marker-start=\"url(#ah_t1nap)\" marker-end=\"url(#ah_t1nap)\"/><line x1=\"230\" y1=\"150\" x2=\"230\" y2=\"34\" stroke=\"#1a1a2e\" stroke-width=\"1.5\" marker-start=\"url(#ah_t1nap)\" marker-end=\"url(#ah_t1nap)\"/><line x1=\"330\" y1=\"210\" x2=\"330\" y2=\"34\" stroke=\"#1a1a2e\" stroke-width=\"1.5\" marker-start=\"url(#ah_t1nap)\" marker-end=\"url(#ah_t1nap)\"/><line x1=\"400\" y1=\"150\" x2=\"400\" y2=\"160\" stroke=\"#1a1a2e\" stroke-width=\"1.5\" marker-start=\"url(#ah_t1nap)\" marker-end=\"url(#ah_t1nap)\"/><line x1=\"415\" y1=\"160\" x2=\"415\" y2=\"210\" stroke=\"#1a1a2e\" stroke-width=\"1.5\" marker-start=\"url(#ah_t1nap)\" marker-end=\"url(#ah_t1nap)\"/><line x1=\"97\" y1=\"52\" x2=\"97\" y2=\"34\" stroke=\"#c22222\" stroke-width=\"1.5\" marker-start=\"url(#ah_t1nap)\" marker-end=\"url(#ah_t1nap)\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"12.5\" fill=\"#1a1a2e\"><text x=\"8\" y=\"14\" font-weight=\"bold\">brug · H 30 (t.o.v. KP)</text><text x=\"455\" y=\"146\" text-anchor=\"end\" font-weight=\"bold\" fill=\"#1a5e8f\">WW = NAP + 1</text><text x=\"360\" y=\"175\" font-weight=\"bold\">NAP</text><text x=\"360\" y=\"226\" font-weight=\"bold\">KP = NAP − 5</text><text x=\"156\" y=\"100\">22 (schip)</text><text x=\"236\" y=\"95\">24 = 30 − 5 − 1</text><text x=\"336\" y=\"120\">30</text><text x=\"103\" y=\"46\" fill=\"#c22222\" font-weight=\"bold\">2 dm speling</text></g></svg>","cap":"Brugberekening uit het voorbeeld: teken NAP, KP en WW en werk stap voor stap naar de speling toe."},{"svg":"<svg viewBox=\"0 0 430 260\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n\n\n  <rect x=\"0\" y=\"0\" width=\"430\" height=\"260\" fill=\"#dceefb\"></rect>\n  <rect x=\"0\" y=\"150\" width=\"430\" height=\"110\" fill=\"#3f8cc4\"></rect>\n  \n  <rect x=\"185\" y=\"30\" width=\"46\" height=\"220\" fill=\"#1a5ec2\" stroke=\"#0d3a7a\" stroke-width=\"2\"></rect>\n  <g fill=\"#fff\" font-size=\"15\" font-weight=\"bold\" text-anchor=\"middle\">\n    <text x=\"208\" y=\"63\">+5</text><text x=\"208\" y=\"107\">+3</text><text x=\"208\" y=\"151\">+1</text>\n    <text x=\"208\" y=\"196\" opacity=\".45\">-1</text>\n  </g>\n  <g stroke=\"#fff\" stroke-width=\"2\">\n    <line x1=\"185\" y1=\"84\" x2=\"196\" y2=\"84\"></line><line x1=\"185\" y1=\"128\" x2=\"196\" y2=\"128\"></line><line x1=\"185\" y1=\"172\" x2=\"196\" y2=\"172\"></line><line x1=\"185\" y1=\"216\" x2=\"196\" y2=\"216\"></line>\n  </g>\n  <line x1=\"140\" y1=\"172\" x2=\"185\" y2=\"172\" stroke=\"#1a1a2e\" stroke-width=\"2\"></line>\n  <text x=\"132\" y=\"176\" text-anchor=\"end\" font-size=\"12\" font-weight=\"bold\">NAP (0)</text>\n  <line x1=\"60\" y1=\"150\" x2=\"185\" y2=\"150\" stroke=\"#d62828\" stroke-width=\"2.5\" stroke-dasharray=\"7,5\"></line>\n  <text x=\"60\" y=\"142\" font-size=\"12\" fill=\"#d62828\" font-weight=\"bold\">waterlijn</text>\n  <text x=\"322\" y=\"120\" text-anchor=\"middle\" font-size=\"12.8\" font-weight=\"bold\">Waterlijn snijdt de schaal</text>\n  <text x=\"322\" y=\"140\" text-anchor=\"middle\" font-size=\"12.8\" font-weight=\"bold\">tussen +1 en de streep erboven</text>\n  <text x=\"322\" y=\"166\" text-anchor=\"middle\" font-size=\"13.5\" font-weight=\"bold\" fill=\"#d62828\">WW = NAP + 1 dm</text>\n  <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"11.8\" font-weight=\"bold\">Peilschaal: lees de wérkelijke waterstand (t.o.v. NAP) af op de waterlijn</text>\n</svg>","cap":"De blauwe peilschaal langs het water toont de werkelijke waterstand ten opzichte van NAP."},{"svg":"<svg viewBox=\"0 0 430 260\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<g><rect x=\"20\" y=\"40\" width=\"390\" height=\"22\" fill=\"#5f676d\"></rect>\n<rect x=\"90\" y=\"62\" width=\"30\" height=\"120\" fill=\"#8a939b\"></rect>\n<rect x=\"0\" y=\"168\" width=\"430\" height=\"36\" fill=\"#a8cbe4\"></rect>\n<rect x=\"120\" y=\"62\" width=\"26\" height=\"120\" fill=\"#ffffff\" stroke=\"#0e2a40\" stroke-width=\"2\"></rect>\n<line x1=\"120\" y1=\"74\" x2=\"146\" y2=\"74\" stroke=\"#0e2a40\" stroke-width=\"2\"></line><line x1=\"120\" y1=\"94\" x2=\"134\" y2=\"94\" stroke=\"#0e2a40\" stroke-width=\"2\"></line><line x1=\"120\" y1=\"114\" x2=\"146\" y2=\"114\" stroke=\"#0e2a40\" stroke-width=\"2\"></line><line x1=\"120\" y1=\"134\" x2=\"134\" y2=\"134\" stroke=\"#0e2a40\" stroke-width=\"2\"></line><line x1=\"120\" y1=\"154\" x2=\"146\" y2=\"154\" stroke=\"#0e2a40\" stroke-width=\"2\"></line><line x1=\"120\" y1=\"174\" x2=\"134\" y2=\"174\" stroke=\"#0e2a40\" stroke-width=\"2\"></line>\n<text x=\"152\" y=\"80\" font-family=\"Helvetica,Arial\" font-size=\"11\" font-weight=\"bold\" fill=\"#0e2a40\">55</text>\n<text x=\"152\" y=\"120\" font-family=\"Helvetica,Arial\" font-size=\"11\" font-weight=\"bold\" fill=\"#0e2a40\">50</text>\n<text x=\"152\" y=\"160\" font-family=\"Helvetica,Arial\" font-size=\"11\" font-weight=\"bold\" fill=\"#0e2a40\">45</text>\n<line x1=\"320\" y1=\"62\" x2=\"320\" y2=\"168\" stroke=\"#c8102e\" stroke-width=\"2.5\"></line><path d=\"M315,71 L320,62 L325,71\" fill=\"none\" stroke=\"#c8102e\" stroke-width=\"2.5\"></path><path d=\"M315,159 L320,168 L325,159\" fill=\"none\" stroke=\"#c8102e\" stroke-width=\"2.5\"></path><text x=\"334\" y=\"119\" font-family=\"Helvetica,Arial\" font-size=\"13\" font-weight=\"bold\" fill=\"#c8102e\">doorvaarthoogte</text></g>\n<text x=\"215\" y=\"226\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"14\" font-weight=\"bold\" fill=\"#0e2a40\">peilschaal aan de brug</text>\n<text x=\"215\" y=\"244\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"11.5\" fill=\"#123a56\">de schaal toont de actuele doorvaarthoogte onder de brug</text>\n</svg>","cap":"De zwart-gele hoogteschaal aan de brugpijler: de actuele doorvaarthoogte lees je direct af."}],"vragen":[{"s":"C.4","t":"Wat is NAP?","o":["Het landelijke referentievlak (nulpunt) voor waterstanden","Het lokale streefpeil van een kanaal","De gemiddelde vaardiepte van Nederland"],"u":"Normaal Amsterdams Peil. Kanaalpeil (KP) en stuwpeil zijn lokále streefpeilen, uitgedrukt ten opzichte van NAP — bijvoorbeeld KP = NAP − 2 dm.","a":"Toetsterm C.4"},{"s":"C.4","t":"De blauwe peilschaal toont de waterlijn één streep boven het cijfer 0 (= NAP), bij strepen per decimeter. Wat is de werkelijke waterstand?","o":["NAP + 1 dm","NAP − 1 dm","KP + 1 dm"],"u":"De peilschaal geeft de werkelijke waterstand (WW) ten opzichte van NAP — het startpunt van elke brug- en diepteberekening. Verwar hem niet met de hoogteschaal, die direct doorvaarthoogte geeft.","a":"Toetsterm C.4","v":"<svg class=\"qv\" viewBox=\"0 0 430 200\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"120\" width=\"430\" height=\"80\" fill=\"#3f8cc4\"></rect><rect x=\"190\" y=\"20\" width=\"46\" height=\"180\" fill=\"#1a5ec2\" stroke=\"#0d3a7a\" stroke-width=\"2\"></rect><g fill=\"#fff\" font-size=\"14\" font-weight=\"bold\" text-anchor=\"middle\"><text x=\"213\" y=\"52\">+3</text><text x=\"213\" y=\"96\">+1</text><text x=\"213\" y=\"140\">0</text><text x=\"213\" y=\"184\" opacity=\".5\">-1</text></g><g stroke=\"#fff\" stroke-width=\"2\"><line x1=\"190\" y1=\"69\" x2=\"200\" y2=\"69\"></line><line x1=\"190\" y1=\"113\" x2=\"200\" y2=\"113\"></line><line x1=\"190\" y1=\"157\" x2=\"200\" y2=\"157\"></line></g><line x1=\"60\" y1=\"113\" x2=\"190\" y2=\"113\" stroke=\"#d62828\" stroke-width=\"2.4\" stroke-dasharray=\"7,5\"></line><text x=\"62\" y=\"105\" font-size=\"10.5\" fill=\"#d62828\" font-weight=\"bold\">waterlijn</text><text x=\"320\" y=\"145\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">0 = NAP · strepen per dm</text></svg>"},{"s":"C.3","t":"Op de hoogteschaal aan een brugpijler zie je de hele 6 boven water plus een stuk van de 7. Wat is de actuele doorvaarthoogte?","o":["Ongeveer 6,7 m","Ongeveer 7,6 m","Ongeveer 5,3 m"],"u":"De zwart-gele hoogteschaal lees je direct af op de waterlijn: kleinste getal boven, grootste onder. Stijgt het water, dan verdwijnt de 7 en houd je minder hoogte over.","a":"Teken G.5.1","v":"<svg class=\"qv\" viewBox=\"0 0 430 200\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"20\" width=\"430\" height=\"30\" fill=\"#5b6470\"></rect><rect x=\"185\" y=\"50\" width=\"56\" height=\"150\" fill=\"#8a919b\"></rect><g><rect x=\"198\" y=\"50\" width=\"30\" height=\"46\" fill=\"#f7c600\" stroke=\"#000\"></rect><text x=\"213\" y=\"82\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"bold\">6</text><rect x=\"198\" y=\"96\" width=\"30\" height=\"46\" fill=\"#f7c600\" stroke=\"#000\"></rect><text x=\"213\" y=\"128\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"bold\">7</text><rect x=\"198\" y=\"142\" width=\"30\" height=\"46\" fill=\"#f7c600\" stroke=\"#000\"></rect><text x=\"213\" y=\"174\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"bold\">8</text></g><rect x=\"0\" y=\"128\" width=\"430\" height=\"72\" fill=\"#3f8cc4\" opacity=\".92\"></rect><line x1=\"30\" y1=\"128\" x2=\"198\" y2=\"128\" stroke=\"#d62828\" stroke-width=\"2.4\" stroke-dasharray=\"7,5\"></line><text x=\"34\" y=\"120\" font-size=\"10.5\" fill=\"#d62828\" font-weight=\"bold\">waterlijn</text></svg>"},{"s":"C.5","t":"Brug H30 (dm boven KP). KP = NAP − 5 dm; de peilschaal toont NAP + 1 dm. Jouw scheepshoogte is 22 dm. Kun je eronderdoor?","o":["Ja — doorvaarthoogte 24 dm, dus 2 dm speling","Nee — je komt 2 dm tekort","Het is precies gelijk: niet doen"],"u":"Water staat (NAP+1) − (NAP−5) = 6 dm bóven KP → doorvaarthoogte 30 − 6 = 24 dm → speling 24 − 22 = 2 dm. Teken het even uit: dat voorkomt plus/min-fouten.","a":"Toetsterm C.5"}]};
CONTENT["1.7.1"]={"theorie":"<p>Weer is zich verplaatsende lucht. Voor de verwachting letten we vooral op twee dingen: de <b>verandering van de luchtdruk</b> en de <b>verandering van de windrichting</b>.</p><h4>Krimpen en ruimen</h4><ul><li><b>Krimpende wind</b> draait tegen de klok in (bv. zuidwest → zuidoost): meestal nadert een depressie met regen; samen met dalende luchtdruk een teken van verslechtering.</li><li><b>Ruimende wind</b> draait met de klok mee (bv. zuidoost → zuidwest) en hangt vaak samen met beter weer.</li></ul><h4>Luchtdruk, H en L</h4><ul><li>Gemiddelde luchtdruk: <b>1013 hPa</b>. Een stijgende barometer wijst op (nadering van) een hogedrukgebied.</li><li>Lucht stroomt van <b>hoge naar lage druk</b>; op het noordelijk halfrond met een afwijking naar <b>rechts</b>.</li><li><b>Isobaren</b> verbinden punten met gelijke luchtdruk: liggen ze dicht bij elkaar, dan veel wind; ver uit elkaar, weinig wind.</li><li>Rond een <b>H</b> spiraalt de wind met de klok mee van het centrum af; rond een <b>L</b> tegen de klok in naar het centrum toe.</li></ul><h4>Windrichting en windkracht</h4><p>De windrichting is waar de wind <b>vandaan</b> komt: zuidoostenwind waait van zuidoost naar noordwest. Windkracht gaat in <b>Beaufort</b> (0 windstil … 12 orkaan): 5 is vrij krachtig (overal schuimkoppen), 6 krachtig, 7 hard, 8 stormachtig, 9 storm. Vanaf <b>windkracht 6</b> geven de berichten een waarschuwing voor kust- en binnenwateren. Van <b>mist</b> spreekt de scheepvaart bij minder dan <b>1 km</b> zicht.</p>","vis":[{"svg":"<svg viewBox=\"0 0 340 230\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><defs><marker id=\"ah_t1kr\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#1a5e8f\"/></marker></defs><g class=\"art\"><circle cx=\"170\" cy=\"118\" r=\"78\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2\"/><path d=\"M133,50 a78,78 0 0 0 -37,61\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"3\" marker-end=\"url(#ah_t1kr)\"/><path d=\"M207,50 a78,78 0 0 1 37,61\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"3\" marker-end=\"url(#ah_t1kr)\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" fill=\"#1a1a2e\" text-anchor=\"middle\"><text x=\"170\" y=\"28\" font-size=\"13\" font-weight=\"bold\">N · 360°</text><text x=\"298\" y=\"122\" font-size=\"13\" font-weight=\"bold\">O · 90°</text><text x=\"170\" y=\"222\" font-size=\"13\" font-weight=\"bold\">Z · 180°</text><text x=\"40\" y=\"122\" font-size=\"13\" font-weight=\"bold\">W · 270°</text><text x=\"66\" y=\"48\" font-size=\"12.5\" fill=\"#1a5e8f\" font-weight=\"bold\">krimpen −</text><text x=\"66\" y=\"62\" font-size=\"11\" fill=\"#555\">tegen de klok in</text><text x=\"274\" y=\"48\" font-size=\"12.5\" fill=\"#1a5e8f\" font-weight=\"bold\">ruimen +</text><text x=\"274\" y=\"62\" font-size=\"11\" fill=\"#555\">met de klok mee</text></g></svg>","cap":"Krimpen is tegen de klok in, ruimen met de klok (en de schijnbare zonnebeweging) mee."},{"svg":"<svg viewBox=\"0 0 460 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"><defs><marker id=\"ah_t1hl\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#1a5e8f\"/></marker></defs><g class=\"art\"><circle cx=\"120\" cy=\"100\" r=\"24\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2\"/><circle cx=\"340\" cy=\"100\" r=\"24\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2\"/><path d=\"M120,40 a60,60 0 0 0 -60,60\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2.5\" marker-end=\"url(#ah_t1hl)\"/><path d=\"M180,100 a60,60 0 0 0 -60,60\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2.5\" marker-end=\"url(#ah_t1hl)\"/><path d=\"M400,100 a60,60 0 0 0 -60,-60\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2.5\" marker-end=\"url(#ah_t1hl)\"/><path d=\"M340,160 a60,60 0 0 0 60,-60\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2.5\" marker-end=\"url(#ah_t1hl)\"/><line x1=\"305\" y1=\"100\" x2=\"160\" y2=\"100\" stroke=\"#c22222\" stroke-width=\"2.5\" stroke-dasharray=\"7 4\" marker-end=\"url(#ah_t1hl)\"/></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" text-anchor=\"middle\" fill=\"#1a1a2e\"><text x=\"120\" y=\"106\" font-size=\"17\" font-weight=\"bold\">L</text><text x=\"340\" y=\"106\" font-size=\"17\" font-weight=\"bold\">H</text><text x=\"120\" y=\"30\" font-size=\"12\">tegen de klok in, naar het centrum toe</text><text x=\"340\" y=\"30\" font-size=\"12\">met de klok mee, van het centrum af</text><text x=\"232\" y=\"88\" font-size=\"12\" fill=\"#c22222\" font-weight=\"bold\">lucht stroomt van H naar L</text><text x=\"120\" y=\"190\" font-size=\"12.5\" font-weight=\"bold\">lagedrukgebied</text><text x=\"340\" y=\"190\" font-size=\"12.5\" font-weight=\"bold\">hogedrukgebied</text></g></svg>","cap":"Windspiralen op het noordelijk halfrond — let op: de lijnen tonen de windrichting, geen isobaren."}],"vragen":[{"s":"C.6","t":"De wind 'ruimt'. Wat gebeurt er?","o":["De windrichting draait met de klok mee","De windrichting draait tegen de klok in","De wind neemt af"],"u":"Ruimen = met de klok mee (vaak voorbode van beter weer); krimpen = tegen de klok in. Windrichting is altijd waar de wind vandáán komt.","a":"Toetsterm C.6"},{"s":"C.6","t":"Wat betekent 'zuidoostenwind'?","o":["Wind die uít het zuidoosten komt en naar het noordwesten waait","Wind die naar het zuidoosten toe waait","Wind die langs de zuidoostelijke oever staat"],"u":"Windrichting = waar de wind vandáán komt. Let bij weerkaart-vragen wel op de legenda: een enkele kaart tekent pijlen juist in de richting waar de wind naartoe gaat.","a":"Toetsterm C.6"},{"s":"C.7","t":"Hoe stroomt de lucht rond een lagedrukgebied op het noordelijk halfrond?","o":["Tegen de klok in, naar het centrum toe","Met de klok mee, van het centrum af","Recht naar het centrum, zonder draaiing"],"u":"Lucht stroomt van hoog naar laag en wijkt op het noordelijk halfrond naar rechts af ('nooRdelijk → Rechts'). Daardoor spiraalt hij bij een L tegen de klok in naar binnen, en bij een H met de klok mee naar buiten.","a":"Toetsterm C.7"},{"s":"C.7","t":"De isobaren op de weerkaart liggen dicht op elkaar. Wat betekent dat?","o":["Veel wind — het drukverschil per afstand is groot","Weinig wind","Vooral neerslag"],"u":"Isobaren zijn lijnen van gelijke luchtdruk: hoe dichter op elkaar, hoe harder het waait. Ver uiteen = rustig weer.","a":"Toetsterm C.7"}]};
CONTENT["2.1.1"]={"theorie":"<p>Er zijn twee hoofdvormen van varen met een motorboot: met <b>roer en vaste schroef</b> (hier draait alles om roerdruk en wieleffect) en met een <b>buitenboordmotor of hekdrive</b>, waarbij je met de schroefrichting zelf stuurt.</p><h4>Roerdruk</h4><p>Een roer werkt alleen als er water langs het blad stroomt (<b>roerdruk</b>); het schroefwater geeft extra druk. Hoe sneller je vaart, hoe beter de boot stuurt. Je stuurt met de <b>achterkant</b>: bij stuurboordroer duwt het water het achterschip naar bakboord, waardoor de boeg naar stuurboord gaat. Het draaipunt ligt op ongeveer een derde vanaf de boeg, dus het achterschip zwenkt flink uit. Roer recht naar achteren heet <b>midscheeps</b>. Onthoud: stuu<b>R</b>boord = <b>R</b>echts, bakboord = links.</p><h4>De rechtse schroef en het wieleffect</h4><ul><li>Een <b>rechtse schroef</b> draait vooruitvarend rechtsom (achteruit linksom, maar blijft een rechtse schroef). Studietip uit het boek: leer alléén de rechtse schroef — de linkse doet alles gespiegeld.</li><li>Elke vaste schroef geeft naast stuwkracht een zijwaartse kracht: het <b>wieleffect</b>. Vooruitvarend is dat gering (achterschip naar stuurboord, kop naar bakboord); <b>achteruitvarend is het veel sterker</b> (achterschip trekt naar bakboord).</li><li>Het wieleffect geldt <b>niet</b> voor buitenboordmotor of hekdrive.</li></ul><h4>Drie onthoudregels</h4><ul><li><b>Afmeren</b>: bij voorkeur aan bakboordwal — bij het afremmen (achteruitslaan) trekt het achterschip vanzelf naar de wal.</li><li><b>Keren in ruim water</b>: kleinste draaicirkel over bakboord.</li><li><b>Keren in nauw vaarwater</b>: begin aan de bakboordzijde en zet de draai in over stuurboord — zodra je achteruitslaat, trekt het sterke wieleffect je rond.</li></ul><p>Op stromend water recht oversteken lukt alleen door <b>op te sturen tegen de stroom in</b>.</p>","vis":[{"svg":"<svg viewBox=\"0 0 460 240\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\"><defs><marker id=\"ah_t2w\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#c22222\"/></marker></defs><g class=\"art\"><g transform=\"translate(120,110)\"><path d=\"M0,-72 Q26,-42 26,10 L26,58 Q26,66 18,66 L-18,66 Q-26,66 -26,58 L-26,10 Q-26,-42 0,-72 z\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2.5\"/><path d=\"M0,-40 l0,80\" stroke=\"#9db8c9\" stroke-width=\"2\" stroke-dasharray=\"4 4\"/><circle cx=\"0\" cy=\"76\" r=\"9\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2.5\"/><path d=\"M9,76 a9,9 0 1 1 -4,-8\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2\" marker-end=\"url(#ah_t2w)\"/><line x1=\"10\" y1=\"60\" x2=\"52\" y2=\"60\" stroke=\"#c22222\" stroke-width=\"3\" marker-end=\"url(#ah_t2w)\"/><line x1=\"-8\" y1=\"-52\" x2=\"-42\" y2=\"-52\" stroke=\"#c22222\" stroke-width=\"2\" stroke-dasharray=\"6 3\" marker-end=\"url(#ah_t2w)\"/></g><g transform=\"translate(340,110)\"><path d=\"M0,-72 Q26,-42 26,10 L26,58 Q26,66 18,66 L-18,66 Q-26,66 -26,58 L-26,10 Q-26,-42 0,-72 z\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2.5\"/><circle cx=\"0\" cy=\"76\" r=\"9\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2.5\"/><path d=\"M-9,76 a9,9 0 1 0 4,-8\" fill=\"none\" stroke=\"#1a5e8f\" stroke-width=\"2\" marker-end=\"url(#ah_t2w)\"/><line x1=\"-10\" y1=\"60\" x2=\"-64\" y2=\"60\" stroke=\"#c22222\" stroke-width=\"4\" marker-end=\"url(#ah_t2w)\"/></g></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"12.5\" fill=\"#1a1a2e\" text-anchor=\"middle\"><text x=\"120\" y=\"20\" font-weight=\"bold\">vooruit — wieleffect gering</text><text x=\"120\" y=\"228\">achterschip → stuurboord, kop → bakboord</text><text x=\"340\" y=\"20\" font-weight=\"bold\">achteruit — wieleffect sterk</text><text x=\"340\" y=\"228\">achterschip trekt naar bakboord</text></g></svg>","cap":"Het wieleffect bij een rechtse schroef: vooruit een kleine afwijking, achteruit een sterke trek naar bakboord."}],"vragen":[{"s":"D.1","t":"Rechtse schroef, je vaart vooruit. Welk (gering) wieleffect merk je?","o":["Achterschip iets naar stuurboord, boeg naar bakboord — corrigeer met een beetje stuurboordroer","Achterschip sterk naar bakboord","Vooruitvarend is er geen enkel effect"],"u":"Vooruit is het wieleffect gering (het roer corrigeert direct); achteruit is het juist sterk. Studietruc: leer alléén de rechtse schroef — links is het spiegelbeeld.","a":"Toetsterm D.1"},{"s":"D.1","t":"Rechtse schroef, je slaat achteruit. Welke kant zwenkt het achterschip op?","o":["Naar bakboord — en dat effect is achteruit extra sterk","Naar stuurboord","Achteruit is er geen wieleffect"],"u":"Rechtse schroef achteruit = hek naar bakboord (sterk). Daarom: kleinste draaicirkel over bakboord en het liefst afmeren aan bakboordwal — achteruitslaan trekt je er keurig parallel tegenaan.","a":"Toetsterm D.1"},{"s":"D.1","t":"Rechtse schroef: over welke boeg maak je de kleinste draaicirkel?","o":["Over bakboord — bij het achteruitslaan versterkt het wieleffect de draai","Over stuurboord — de schroef draait vooruit immers rechtsom","Dat maakt niet uit; de draaicirkel hangt alleen van het roer af"],"u":"Leer alleen de rechtse schroef: achteruitslaand trekt het wieleffect het achterschip krachtig naar bakboord. Wie de draai over bakboord inzet, kan tussendoor achteruitslaan zonder de draai te verliezen — vandaar de kleinste cirkel over bakboord.","a":"Toetsterm D.1"}]};
CONTENT["2.1.2"]={"theorie":"<p>Zonder vaart doet het roer niets — maar er zijn hulpmiddelen.</p><ul><li><b>Kunstmatige roerdruk</b>: zet de schroef in z'n vooruit, dan stroomt er schroefwater langs het roer en kun je het achterschip ook stilliggend naar links of rechts sturen.</li><li><b>Boeg- en hekschroef</b> staan haaks op de vaarrichting. \"Boegschroef bakboord\" duwt de kop naar bakboord. Met een hekschroef kun je het wieleffect van de vaste schroef volledig compenseren.</li><li><b>Kortste draai</b> (rechtse schroef + boegschroef): bakboordroer, motor vooruit, en de boegschroef duwt de kop naar bakboord — roer en boegschroef werken dan samen.</li></ul><h4>Buitenboordmotor en hekdrive</h4><p>Hier beweegt de schroef zelf naar links en rechts: de motor ís het roer. Daardoor heb je <b>geen last van het wieleffect</b> (vooruit noch achteruit) en ben je ook bij lage snelheid wendbaar. Keerzijde: valt de motor uit, dan kun je niet varen én niet sturen. Let op het verschil: een <b>hekdrive</b> is een aandrijving met beweegbaar staartstuk, een <b>hekschroef</b> is een dwarsschroef in het achterschip.</p><p>Met <b>twee schroeven</b> stuur je ook met de gashendels: draait de linkerschroef sneller, dan ga je over stuurboord; zet je de rechter bovendien in z'n achteruit, dan draai je nog korter.</p>","vragen":[{"s":"D.9","t":"Wat gebeurt er als je varend 'boegschroef bakboord' geeft?","o":["De kop wordt naar bakboord geduwd; het achterschip zwenkt licht naar stuurboord uit","Het hele schip schuift dwars naar bakboord","Het achterschip gaat naar bakboord"],"u":"De boegschroef duwt alleen de kóp; het schip draait om zijn draaipunt (±1/3 vanaf voren), dus het hek zwenkt licht de andere kant op. Hekschroef: hetzelfde verhaal, maar dan voor het achterschip.","a":"Toetsterm D.9"},{"s":"D.9","t":"Rechtse schroef mét boegschroef: hoe maak je vooruitvarend de kortste draai?","o":["Bakboordroer + motor vooruit + boegschroef naar bakboord — alles werkt dezelfde draai over bakboord in","Stuurboordroer + achteruit + boegschroef naar stuurboord","Alleen de boegschroef gebruiken, motor in neutraal"],"u":"Vooruitvarend zet het wieleffect de boeg al licht naar bakboord; met bakboordroer en de boegschroef erbij werkt álles dezelfde kant op — de kleinste cirkel over bakboord. (Keren mét achteruitslaan in nauw water gaat juist over stuurboord: dan helpt het sterke wieleffect achteruit.)","a":"Toetsterm D.9"},{"s":"D.9","t":"Wat is het verschil tussen een hekschroef en een hekdrive?","o":["Een hekschroef is een dwarsschroef in het achterschip (kan het wieleffect opheffen); een hekdrive is een stuurbare aandrijving","Twee namen voor hetzelfde","Een hekdrive is de dwarsschroef, een hekschroef de hoofdmotor"],"u":"Boeg- en hekschroef duwen het schip dwars bij lage snelheid; de hekdrive (net als een buitenboordmotor) richt de hoofd-schroefstraal en compenseert het wieleffect daardoor vanzelf.","a":"Toetsterm D.9"},{"s":"D.1","t":"Bij welke voortstuwing speelt het wieleffect géén rol van betekenis?","o":["Buitenboordmotor en hekdrive — je richt de schroefstraal zelf, vooruit én achteruit","Elke binnenboordmotor met keerkoppeling","Alleen bij schepen met twee vaste schroeven"],"u":"Het wieleffect hoort bij de vaste schroef. Bij buitenboordmotor en hekdrive draait de hele schroefstraal mee met de besturing, waardoor het effect wordt gecompenseerd — achteruitslaan in een sluis vraagt daar dus geen correctie.","a":"Toetsterm D.1"}]};
CONTENT["2.2.1"]={"theorie":"<h4>Begrippen</h4><ul><li><b>Voortros</b>: van de voorkant naar voren · <b>voorspring</b>: van de voorkant naar achteren · <b>achtertros</b>: van de achterkant naar achteren · <b>achterspring</b>: van de achterkant naar voren · <b>middenbolderspring</b>: vanaf het midden.</li><li><b>Hogerwal</b>: de wal waar de wind vandaan komt; <b>lagerwal</b>: waar de wind naartoe waait. <b>Loefzijde</b>: de scheepszijde waar de wind tegenaan waait; <b>lijzijde</b>: waar hij vanaf waait. <b>Verlijeren</b> is je door de wind naar lij laten drijven. Een <b>bolder</b> (kikker) is het bevestigingspunt voor je lijnen.</li></ul><h4>Welke lijn eerst?</h4><p>Manoeuvres doe je waar mogelijk <b>tegen stroom of wind in</b>. Bij aankomen telt vooral welke lijn als eerste vast moet:</p><table><tr><th>Situatie</th><th>Eerst vastmaken</th></tr><tr><td>Stroom of wind van voren</td><td>voortros</td></tr><tr><td>Stroom of wind van achteren</td><td>achtertros</td></tr><tr><td>Hogerwal</td><td>voorspring</td></tr><tr><td>In een box</td><td>voorspring</td></tr></table><p>Tegen de stroom in kun je bij de ligplaats de stroom <b>\"doodvaren\"</b>: net zo hard vooruit draaien als het water tegenstroomt, stil ten opzichte van de wal, en dan rustig naar de kant.</p><p>De <b>middenbolderspring</b> is ideaal voor wie alleen vaart (motorjacht van ± 7–14 m): lus om de walbolder, gas vooruit en van de wal afsturen — midden én achterschip liggen dan stevig tegen de kant.</p><h4>Langszij, stootwillen en lijnen</h4><ul><li>Een afgemeerd jacht moet <b>altijd toestaan</b> dat een ander langszij afmeert en dat opvarenden over het voordek aan wal gaan (alleen grote schepen mogen weigeren bij laden/lossen).</li><li><b>Stootwillen</b> hangen op het breedste punt (of op steigerhoogte), normaal verticaal; bij een <b>damwand of palen</b> horizontaal, anders zakken ze in de sleuven.</li><li><b>Lijnen</b>: voldoende rek en lengte (denk aan getij), en laat ze nergens <b>schavielen</b> (schuren).</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 460 260\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\"><defs><marker id=\"ah_t2l\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#134a70\"/></marker></defs><g class=\"art\"><rect x=\"0\" y=\"0\" width=\"110\" height=\"260\" fill=\"#cfe3cf\"/><line x1=\"110\" y1=\"0\" x2=\"110\" y2=\"260\" stroke=\"#1a5e8f\" stroke-width=\"2.5\"/><g transform=\"translate(150,130)\"><path d=\"M-14,-66 Q14,-40 14,-8 L14,52 Q14,60 6,60 L-8,60 Q-14,60 -14,52 z\" fill=\"#fff\" stroke=\"#1a1a2e\" stroke-width=\"2.5\" transform=\"rotate(0)\"/></g><circle cx=\"104\" cy=\"30\" r=\"5\" fill=\"#555\"/><circle cx=\"104\" cy=\"130\" r=\"5\" fill=\"#555\"/><circle cx=\"104\" cy=\"228\" r=\"5\" fill=\"#555\"/><line x1=\"140\" y1=\"70\" x2=\"104\" y2=\"30\" stroke=\"#134a70\" stroke-width=\"2.5\"/><line x1=\"140\" y1=\"70\" x2=\"104\" y2=\"130\" stroke=\"#c22222\" stroke-width=\"2.5\"/><line x1=\"146\" y1=\"188\" x2=\"104\" y2=\"228\" stroke=\"#134a70\" stroke-width=\"2.5\"/><line x1=\"146\" y1=\"188\" x2=\"104\" y2=\"130\" stroke=\"#e67e22\" stroke-width=\"2.5\"/><g stroke=\"#1a5e8f\" stroke-width=\"2.5\" fill=\"none\"><line x1=\"420\" y1=\"50\" x2=\"360\" y2=\"50\" marker-end=\"url(#ah_t2l)\"/><line x1=\"420\" y1=\"130\" x2=\"360\" y2=\"130\" marker-end=\"url(#ah_t2l)\"/><line x1=\"420\" y1=\"210\" x2=\"360\" y2=\"210\" marker-end=\"url(#ah_t2l)\"/></g></g><g class=\"lbl\" font-family=\"Helvetica,Arial,sans-serif\" font-size=\"12\" fill=\"#1a1a2e\"><text x=\"14\" y=\"20\" font-weight=\"bold\" fill=\"#1e6b30\">lagerwal</text><text x=\"14\" y=\"36\" font-size=\"10.5\" fill=\"#555\">wind waait er naartoe</text><text x=\"384\" y=\"26\" font-weight=\"bold\">wind</text><text x=\"118\" y=\"52\">voortros</text><text x=\"118\" y=\"118\" fill=\"#c22222\">voorspring</text><text x=\"160\" y=\"246\">achtertros</text><text x=\"118\" y=\"170\" fill=\"#e67e22\">achterspring</text><text x=\"196\" y=\"76\" font-size=\"11\">lijzijde</text><text x=\"196\" y=\"196\" font-size=\"11\" fill=\"#555\">(wal-kant)</text><text x=\"250\" y=\"136\" font-size=\"11\">loefzijde — wind waait ertegenaan</text></g></svg>","cap":"De vier landvasten plus wind-begrippen: de wind komt van hogerwal en waait naar lagerwal."}],"vragen":[{"s":"D.7","t":"Je meert af op een rivier met stroom recht van voren. Welke lijn maak je als eerste vast?","o":["De voortros — je vaart de stroom dood en laat je rustig inscheren","De achtertros — die houdt het schip tegen de stroom in op zijn plaats","De middenbolderspring — altijd de eerste keus"],"u":"Kerntabel eerste lijn: stroom of wind van voren → voortros; van achteren → achtertros; hogerwal of box invaren → voorspring. Met stroom van voren draai je zachtjes vooruit tot je stilligt ten opzichte van de bodem, dan de voortros vast.","a":"Toetsterm D.7"},{"s":"D.7","t":"Wanneer is de middenbolderspring ideaal?","o":["Solo aanleggen, vrijwel onafhankelijk van wind en stroom — midden én achterschip komen klem te liggen","Alleen bij storm vanaf zee","Uitsluitend op drijvende steigers"],"u":"Korte lijn met lus van de middenbolder om de walbolder, gas vooruit en van de wal af sturen. Werkt bij zo'n 7–14 m bootlengte vrijwel altijd.","a":"Toetsterm D.7"},{"s":"D.7","t":"Je meert af langs een damwand met een golvend profiel. Hoe hang je de stootwillen?","o":["Horizontaal — verticaal verdwijnen ze in de sleuven van de wand","Verticaal — zoals altijd","Om en om verticaal en horizontaal"],"u":"Standaard hangen fenders verticaal, óók tegen een vlakke (natte) sluiswand. Bij een golvend profiel — damwand of palenrij — leg je ze horizontaal, zodat ze op de uitstekende delen blijven dragen.","a":"Toetsterm D.7"},{"s":"D.7","t":"Afmeren aan bakboordwal, rechtse schroef, geen wind of stroom. Twee manieren: I) onder een hoek naderen en vlak voor de wal achteruitslaan · II) evenwijdig stilleggen en de boot met de hand naar de kant trekken zonder lijn. Wat is goed uitvoerbaar?","o":["Alleen manier I","Alleen manier II","Beide manieren"],"u":"Manier I gebruikt het wieleffect: achteruitslaan remt én trekt het hek naar bakboord — parallel tegen de wal. Manier II houdt niets vast zodra jij loslaat. Onthoud: bij dit vraagtype kan óók 'beide fout' het juiste antwoord zijn.","a":"Toetsterm D.7","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 190\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <line x1=\"215\" y1=\"12\" x2=\"215\" y2=\"178\" stroke=\"#c6d2dc\" stroke-width=\"1.5\"></line><rect x=\"10\" y=\"130\" width=\"185\" height=\"14\" fill=\"#9fbf8f\"></rect><rect x=\"235\" y=\"130\" width=\"185\" height=\"14\" fill=\"#9fbf8f\"></rect><text x=\"105\" y=\"30\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">Manier I</text><text x=\"322\" y=\"30\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">Manier II</text><use href=\"#kschip\" transform=\"translate(95,90) rotate(24) scale(.9)\"></use><path d=\"M128,104 C140,112 146,118 150,126\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.4\" stroke-dasharray=\"6,5\" marker-end=\"url(#ah)\"></path><text x=\"105\" y=\"166\" text-anchor=\"middle\" font-size=\"10\">hoek aanvaren + achteruitslaan</text><use href=\"#kschip\" transform=\"translate(322,108) scale(.9)\"></use><text x=\"322\" y=\"166\" text-anchor=\"middle\" font-size=\"10\">stilleggen, met de hand houden</text></svg>"}]};
CONTENT["2.2.2"]={"theorie":"<p>Wie zijn ligplaats verlaat, mag dat pas doen na zich ervan te hebben <b>vergewist dat het zonder gevaar kan</b>. Vertrek waar mogelijk tegen stroom of wind in.</p><h4>De twee spring-regels</h4><ul><li>Wind of stroom <b>van voren</b>: alleen voortros en achterspring staan strak. Motor zachtjes vooruit, voortros los, wind tussen wal en schip laten komen — <b>vooruit wegvaren doe je op de achterspring</b> (die gaat als laatste los).</li><li>Wind of stroom <b>van achteren</b>: achtertros en voorspring staan strak. Motor zachtjes achteruit, achtertros los — <b>achteruit wegvaren doe je op de voorspring</b>.</li></ul><h4>Hogerwal en lagerwal</h4><p>Van <b>hogerwal</b> wegvaren is nooit een probleem: je wordt vanzelf van de wal geblazen. Aan <b>lagerwal</b> word je juist tegen de wal gedrukt; vooruit lukt niet (de kop waait steeds terug), dus vertrek je <b>achteruit</b>.</p><p>Onthoud: in principe altijd vooruit wegvaren, <b>behalve</b> bij wind of stroom van achteren en aan lagerwal.</p>","vragen":[{"s":"D.8","t":"Je ligt afgemeerd met wind en stroom recht van achteren en wilt vertrekken. Welke lijn gooi je als láátste los?","o":["De voorspring — je vertrekt achteruit","De achterspring — je vertrekt vooruit","De voortros"],"u":"Wind/stroom van achteren: motor zachtjes achteruit ontlast de lijnen, achtertros los, en op de voorspring vaar je gecontroleerd achteruit weg. Onthoud: vooruit vertrek je op de achterspring, achteruit op de voorspring.","a":"Toetsterm D.8"},{"s":"D.8","t":"Aan welke wal is vertrekken het lastigst, en wat is dan de aanpak?","o":["Aan lagerwal: de kop waait steeds terug — vertrek achteruit","Aan hogerwal: je waait van de wal af","Dat maakt niet uit met een sterke motor"],"u":"Aan lagerwal drukt de wind je boeg telkens tegen de kant: eerst het achterschip vrijzetten op de voorspring (roer van de wal) en achteruit wegvaren. Hogerwal is juist gratis: je waait vanzelf los.","a":"Toetsterm D.8"},{"s":"D.8","t":"Je ligt afgemeerd met wind en stroom recht van voren en wilt vooruit wegvaren. Welke lijn gooi je als laatste los?","o":["De achterspring — 'vooruit wegvaren doe je op achterspring'","De voortros — die staat immers het strakst","De achtertros — die houdt het achterschip tegen"],"u":"Bij wind/stroom van voren staan voortros en achterspring strak. Motor zachtjes vooruit ontlast de voortros; die gaat los, waarna de achterspring het schip als laatste onder controle houdt tot je wegvaart. Spiegelbeeld: achteruit wegvaren (wind/stroom van achteren) doe je op de voorspring.","a":"Toetsterm D.8"}]};
CONTENT["2.3.1"]={"theorie":"<h4>Dode hoek en niet-bezeilde sector</h4><ul><li>De <b>dode hoek</b> is het water vóór de boeg van een binnenschip dat de schipper vanuit de stuurhut niet ziet — tot wel <b>350 m</b>. Kijk regelmatig achterom en blijf eruit; als jij de stuurhut kunt zien, kan de schipper jou zien.</li><li>Een zeilschip kan niet recht tegen de wind in: de <b>niet-bezeilde sector</b> is 2 × 45° = 90°; met wind van voren moet het <b>laveren</b>.</li></ul><h4>Golven, stopweg en zuiging</h4><ul><li>Een planerende boot maakt weinig golven; een <b>waterverplaatser</b> des te meer naarmate hij harder vaart. Boven de <b>rompsnelheid</b> kost elke km/u veel brandstof en golfslag. Neem je plots gas terug, dan haalt de <b>hekgolf</b> je in en loopt hij de boot voorbij.</li><li>De <b>stopweg</b> is de afstand die een schip nodig heeft om stil te liggen — bij een vrachtschip 2–3 scheepslengtes.</li><li><b>Zuiging</b>: word je opgelopen door een groot schip, dan krijg je halverwege méér snelheid en word je naar het schip toe getrokken — houd afstand. Vaar je dicht langs de wal, dan trekt het achterschip naar de dichtstbijzijnde oever (<b>oevereffect</b>). Luistert de boot in ondiep water slecht naar het roer: <b>vaart minderen</b>.</li></ul><h4>Ankeren</h4><ul><li>Anker <b>tegen wind en/of stroom in</b>: stroom doodvaren, en zodra je iets naar achteren drijft het anker laten vallen; vier de lijn tot ± <b>4 × de waterdiepte</b>. Slepen met een anker mag niet.</li><li>Overdag de zwarte <b>ankerbol</b> hijsen, 's nachts een rondom schijnend wit <b>ankerlicht</b>. Controleer met een <b>ankerpeiling</b> of het anker <b>krabt</b>; zo ja: lijn <b>vieren</b> (langer = beter houden). Tegen <b>gieren</b> helpt een tweede anker onder ± 30°.</li><li>Zwaar anker + ketting houdt het best; middenmaat gebruikt een <b>voorloper</b> (stuk ketting, dan lijn).</li><li>Ankerplaats: 2–5 m diep, <b>buiten de vaargeul</b>, voor de nacht beschut aan <b>hogerwal</b> — en bedenk dat wind en stroom kunnen draaien.</li><li>Stilliggen op <b>spudpalen</b> staat juridisch gelijk aan ankeren (ankerbol verplicht). Zit het anker muurvast: lijn strak op de kopbolder en er rustig <b>overheen varen</b>.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <clipPath id=\"cb26_ank\"><circle cx=\"0\" cy=\"0\" r=\"26\"></circle></clipPath>\n  <clipPath id=\"cb22_ank\"><circle cx=\"0\" cy=\"-24\" r=\"22\"></circle></clipPath>\n  <g id=\"romp_ank\"><path d=\"M-118,0 L-98,-26 L60,-26 Q86,-26 100,-8 Q106,0 106,0 L-118,0 Z\" fill=\"#16283c\" stroke=\"#2c4763\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <text x=\"215\" y=\"24\" text-anchor=\"middle\" font-size=\"11.8\" fill=\"#fff\" font-weight=\"bold\">Ankerlichten: vóórste hoger — bij toplichten andersom!</text>\n <line x1=\"215\" y1=\"42\" x2=\"215\" y2=\"204\" stroke=\"#22374d\" stroke-width=\"1.5\"></line>\n <g transform=\"translate(107,0)\"><circle cx=\"0\" cy=\"112\" r=\"7\" fill=\"#fff\"></circle>\n  <path d=\"M-52,168 Q-50,152 -36,148 L38,148 Q52,152 54,168 Q0,176 -52,168 Z\" fill=\"#16283c\" stroke=\"#2c4763\"></path>\n  <text x=\"0\" y=\"196\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"bold\">klein: 1 wit rondom</text></g>\n <g transform=\"translate(322,0)\"><circle cx=\"-62\" cy=\"94\" r=\"7\" fill=\"#fff\"></circle><circle cx=\"60\" cy=\"116\" r=\"7\" fill=\"#fff\"></circle>\n  <path d=\"M-86,168 Q-84,148 -68,144 L70,144 Q86,150 88,168 Q0,178 -86,168 Z\" fill=\"#16283c\" stroke=\"#2c4763\"></path>\n  <line x1=\"-62\" y1=\"144\" x2=\"-62\" y2=\"98\" stroke=\"#2c4763\" stroke-width=\"3\"></line><line x1=\"60\" y1=\"144\" x2=\"60\" y2=\"120\" stroke=\"#2c4763\" stroke-width=\"3\"></line>\n  <text x=\"0\" y=\"196\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"bold\">groot: 2 wit — VOORSTE hoger</text></g>\n <text x=\"215\" y=\"224\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8fb3d1\">Overdag: zwarte bol · vast kruisvraag-paar met C1</text>\n</svg>","cap":"Ten anker: klein schip met ankerbol en één ankerlicht; een groot schip voert er twee (voor hoger dan achter)."}],"vragen":[{"s":"D.3","t":"Hoeveel ankerlijn steek je als vuistregel?","o":["Ongeveer 4× de waterdiepte","Gelijk aan de waterdiepte","Minstens 10× de waterdiepte"],"u":"Meer lijn = vlakkere trekhoek = meer houdkracht. Kies een ankerplaats van zo'n 2–5 m diep, buiten de vaargeul (20 m diepte zou 60–80 m lijn vragen — onwerkbaar).","a":"Toetsterm D.3"},{"s":"D.3","t":"Voor anker merk je via je ankerpeiling dat het anker krabt. Beste actie?","o":["Meer ankerlijn steken (vieren)","Lijn inkorten zodat het anker dieper grijpt","Direct het anker ophalen en opnieuw laten vallen"],"u":"Meer lijn = vlakkere trekhoek = meer houdkracht (vuistregel ±4× de waterdiepte). Gieren bij harde wind: tweede anker onder ±30°. En anker aan de hógerwal: krab je, dan drijf je naar open water.","a":"Toetsterm D.3"},{"s":"D.3","t":"Waar anker je voor de nacht het rustigst?","o":["Beschut aan hogerwal (bijvoorbeeld achter een eiland), buiten de vaargeul — en houd rekening met draaiende wind","Aan lagerwal — daar drukt de wind je stabiel op het anker","Midden in de vaargeul — daar is het water het diepst"],"u":"Aan hogerwal ligt het water vlak en drijf je bij krabbend anker naar open water in plaats van naar de wal. In of nabij de vaargeul ankeren is verboden én gevaarlijk; wie bij draaiende wind de geul in kan zwaaien, ligt fout.","a":"Toetsterm D.3"},{"s":"D.4","t":"Een groot beladen schip loopt jouw sloep in een kanaal op. Wat merk je halverwege het passeren?","o":["Je sloep krijgt meer vaart en wordt naar het grote schip toegetrokken","Je wordt krachtig van het schip afgeduwd","Niets, zolang je koers houdt"],"u":"'Groot overheerst klein': de retourstroom van het grote schip zuigt je aan én versnelt je. Snelheid eruit halen maakt het erger. Houd r
