<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klein Vaarbewijs — leeromgeving</title>
<style>
 :root{--blauw:#1a5e8f;--donker:#134a70;--groen:#1e6b30;--rood:#c22222;--ink:#1a1a2e}
 body{font-family:Helvetica,Arial,sans-serif;background:#eef3f8;color:var(--ink);margin:0;padding:0;line-height:1.55}
 header{background:var(--donker);color:#fff;padding:22px}
 header h1{margin:0 0 4px;font-size:22px}
 header p{margin:0;opacity:.9;font-size:13.5px}
 header a{color:#bfe0f5}
 main{max-width:820px;margin:0 auto;padding:20px 16px 60px}
 h2{font-size:17px;border-bottom:2px solid var(--blauw);padding-bottom:5px;margin-top:30px;color:var(--donker)}
 .kaart{display:block;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:14px 16px;margin:10px 0;text-decoration:none;color:inherit;border-left:4px solid var(--blauw);cursor:pointer;transition:box-shadow .15s}
 .kaart:hover{box-shadow:0 3px 12px rgba(0,0,0,.18)}
 .kaart .titel{font-size:15.5px;font-weight:bold;color:var(--blauw)}
 .kaart .sub{font-size:12.5px;color:#555;margin-top:2px}
 .kaart.af{border-left-color:var(--groen)}
 .voortgang{height:7px;background:#e1e9f0;border-radius:4px;margin-top:9px}
 .voortgang>div{height:100%;background:var(--blauw);border-radius:4px;transition:width .25s}
 .af .voortgang>div{background:var(--groen)}
 .pct{font-size:11.5px;color:#777;margin-top:3px}
 .paneel{background:#fff;border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.12);padding:16px 18px;margin-top:14px}
 .para{border-top:1px solid #e4ebf1;padding:12px 0}
 .para:first-of-type{border-top:none}
 .para .pkop{display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap}
 .para .pnr{font-size:12px;font-weight:bold;color:var(--blauw);background:#e8f1f8;border-radius:6px;padding:2px 8px;white-space:nowrap}
 .para .ptitel{font-weight:bold;font-size:15px;flex:1}
 .para.gelezen .ptitel{color:var(--groen)}
 .placeholder{font-size:13px;color:#888;font-style:italic;margin:8px 0 0}
 .inhoud{font-size:14.5px;margin-top:8px}
 button{font-size:13.5px;padding:8px 14px;border-radius:8px;border:1.5px solid var(--blauw);background:#fff;color:var(--blauw);cursor:pointer;font-weight:bold;margin:8px 6px 0 0}
 button.primair{background:var(--blauw);color:#fff}
 button.vink{border-color:#9db8c9;color:#557;font-weight:normal;font-size:12.5px;padding:5px 10px}
 button.vink.aan{border-color:var(--groen);background:#e3f2e6;color:var(--groen);font-weight:bold}
 .kruimel{font-size:13px;margin:14px 0 4px}
 .kruimel a{color:var(--blauw);text-decoration:none;font-weight:bold;cursor:pointer}
 .lesnav{display:flex;justify-content:space-between;margin-top:18px}
 footer{text-align:center;font-size:12px;color:#888;padding:20px}
 footer a{color:var(--blauw)}
</style>
</head>
<body>
<header>
 <h1>📖 Klein Vaarbewijs — leeromgeving</h1>
 <p>Theorie per les volgens de cursusopbouw, met visuals en oefenvragen uit de <a href="index.html">oefenbanken</a>. Je voortgang wordt lokaal in je browser bewaard.</p>
</header>
<main id="app"></main>
<footer>Leeromgeving · eigen samenvattingen van de examenstof · <a href="index.html">terug naar overzicht</a></footer>

<script>
/* ===== DATA ===== */
/* Lesstructuur volgt de inhoudsopgave van het cursusboek (16e druk 2025):
   KVB1 = les 1–4, KVB2 = les 5–8. Paragraaf-ids zijn de boeknummering. */
const LESSEN=[
 {nr:1,deel:"KVB1",titel:"Het schip en de omgeving",oefen:"kvb1-oefenbank.html",paras:[
  ["1.1.1","Klein Vaarbewijs 1: inleiding"],
  ["1.2.1","Uitrusting"],
  ["1.3.1","Veiligheid, brand"],
  ["1.3.2","Brandpreventie"],
  ["1.3.3","Voorkomen van verdrinking"],
  ["1.4.1","Motortechniek"],
  ["1.4.2","Basiskennis elektrotechniek"],
  ["1.5.1","Milieu"],
  ["1.6.1","Waterkaarten"],
  ["1.7.1","Meteorologie"]]},
 {nr:2,deel:"KVB1",titel:"Varen, ankeren en betonning",oefen:"kvb1-oefenbank.html",paras:[
  ["2.1.1","Varen"],
  ["2.1.2","Varen met boeg- en hekschroef en hekaandrijving"],
  ["2.2.1","Aankomen"],
  ["2.2.2","Afvaren (ontmeren)"],
  ["2.3.1","Begrippen, waterbewegingen en ankeren"],
  ["2.3.2","Reddingsacties"],
  ["2.4.1","Laterale betonning: inleiding"],
  ["2.4.2","Laterale betonning: vervolg"],
  ["2.5.1","Cardinale betonning"],
  ["2.6.1","Betonningslichten"]]},
 {nr:3,deel:"KVB1",titel:"Reglementen, lichten en seinen",oefen:"kvb1-oefenbank.html",paras:[
  ["3.1.1","Wetten en reglementen"],
  ["3.1.2","Definities, BPR"],
  ["3.1.3","Leeftijd en marifoon"],
  ["3.2.1","Lichten en dagmerken kleine schepen"],
  ["3.2.2","Extra lichten en dagmerken grote schepen"],
  ["3.2.3","Extra lichten en dagmerken grote schepen (vervolg)"],
  ["3.2.4","Lichten ’s nachts"],
  ["3.3.1","Geluidsseinen"],
  ["3.4.1","Verbods- en gebodstekens"],
  ["3.4.2","Aanbevelingsborden en lichten"]]},
 {nr:4,deel:"KVB1",titel:"Vaarregels",oefen:"kvb1-oefenbank.html",paras:[
  ["4.1.1","Basisregels kleine schepen onderling"],
  ["4.2.1","Hoofdvaarwater – nevenvaarwater"],
  ["4.2.2","Gestrekte koers stuurboordzijde"],
  ["4.2.3","Groot–klein en klein onderling"],
  ["4.3.1","Engtes"],
  ["4.4.1","Oversteken en sluis"],
  ["4.4.2","Bijzondere bepalingen"],
  ["4.5.1","Verkeerde wal varen"],
  ["4.6.1","Verschillen BPR – RPR"],
  ["4.6.2","Vervolg BPR – RPR"]]},
 {nr:5,deel:"KVB2",titel:"Navigatie: koersen",oefen:"kvb2-oefenbank.html",paras:[
  ["5.1.1","Klein Vaarbewijs 2: inleiding"],
  ["5.2.1","Coördinaten en koersen"],
  ["5.2.2","Koersen en eindpunt"],
  ["5.2.3","Koerscorrecties"],
  ["5.3.1","Van kompaskoers naar grondkoers"],
  ["5.4.1","Van grondkoers naar kompaskoers"],
  ["5.5.1","Lichtenlijn en berekeningen"]]},
 {nr:6,deel:"KVB2",titel:"Navigatie: berekeningen",oefen:"kvb2-oefenbank.html",paras:[
  ["6.1.1","Peilingen"],
  ["6.2.1","Berekening positie, snelheid en kompaskoers"],
  ["6.2.2","Berekening kompaskoers, snelheid en aankomsttijd"],
  ["6.2.3","Berekening kompaskoers, snelheid en aankomsttijd (vervolg)"],
  ["6.3.1","Berekening grondkoers en positie"],
  ["6.3.2","Berekening positie, grondkoers en snelheid"],
  ["6.4.1","Sectorlicht en andere berekeningen"],
  ["6.4.2","Algemene vragen les 5 en 6"]]},
 {nr:7,deel:"KVB2",titel:"Kaart, getijden en meteo",oefen:"kvb2-oefenbank.html",paras:[
  ["7.1.1","Kaart en kaartsymbolen"],
  ["7.2.1","Laterale betonning"],
  ["7.2.2","Cardinale betonning"],
  ["7.3.1","Getijden algemeen"],
  ["7.3.2","Getijden: berekeningen"],
  ["7.4.1","Meteorologie: inleiding"],
  ["7.4.2","Meteorologie: vervolg"]]},
 {nr:8,deel:"KVB2",titel:"Scheepvaartreglement Westerschelde",oefen:"kvb2-oefenbank.html",paras:[
  ["8.1.1","SRW: definities en vaarregels"],
  ["8.2.1","SRW: lichten en dagmerken"],
  ["8.3.1","SRW: specifiek"]]}
];

/* Lesinhoud wordt per les toegevoegd: CONTENT["1.1.1"]={...} met theorie,
   visuals en vraagverwijzingen. Leeg = paragraaf toont een placeholder. */
const CONTENT={};

/* ===== ENGINE ===== */
const LSKEY="kvb-leeromgeving-v1";
let gelezen={};
try{gelezen=JSON.parse(localStorage.getItem(LSKEY)||"{}")}catch(e){gelezen={}}
function bewaar(){try{localStorage.setItem(LSKEY,JSON.stringify(gelezen))}catch(e){}}

const app=document.getElementById("app");
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;");

function lesVoortgang(les){
 const af=les.paras.filter(p=>gelezen[p[0]]).length;
 return {af,tot:les.paras.length,pct:Math.round(100*af/les.paras.length)};
}

function toonHome(){
 let h="";
 for(const deel of ["KVB1","KVB2"]){
  h+=`<h2>${deel==="KVB1"?"Deel 1 — Klein Vaarbewijs 1 (les 1–4)":"Deel 2 — Klein Vaarbewijs 2 (les 5–8)"}</h2>`;
  for(const les of LESSEN.filter(l=>l.deel===deel)){
   const v=lesVoortgang(les);
   h+=`<a class="kaart${v.af===v.tot?" af":""}" href="#les${les.nr}">
    <div class="titel">Les ${les.nr} · ${esc(les.titel)} →</div>
    <div class="sub">${les.paras.length} paragrafen</div>
    <div class="voortgang"><div style="width:${v.pct}%"></div></div>
    <div class="pct">${v.af} van ${v.tot} paragrafen gelezen</div></a>`;
  }
 }
 app.innerHTML=h;
}

function toonLes(nr){
 const les=LESSEN.find(l=>l.nr===nr);
 if(!les){location.hash="";return}
 const v=lesVoortgang(les);
 let h=`<div class="kruimel"><a href="#">← Alle lessen</a></div>
  <div class="paneel">
   <div class="titel" style="font-size:18px;font-weight:bold;color:var(--donker)">Les ${les.nr} · ${esc(les.titel)}</div>
   <div class="sub" style="font-size:13px;color:#555">${les.deel} · ${les.paras.length} paragrafen</div>
   <div class="voortgang"><div style="width:${v.pct}%"></div></div>
   <div class="pct">${v.af} van ${v.tot} paragrafen gelezen</div>`;
 for(const [id,titel] of les.paras){
  const c=CONTENT[id];
  h+=`<div class="para${gelezen[id]?" gelezen":""}" id="p${id.replace(/\./g,"-")}">
   <div class="pkop"><span class="pnr">${id}</span><span class="ptitel">${esc(titel)}</span>
    <button class="vink${gelezen[id]?" aan":""}" onclick="vink('${id}')">${gelezen[id]?"✓ gelezen":"markeer als gelezen"}</button></div>`;
  h+=c?`<div class="inhoud">${c.html||""}</div>`
      :`<div class="placeholder">Inhoud volgt — theorie, visuals en oefenvragen worden per les toegevoegd.</div>`;
  h+=`</div>`;
 }
 h+=`</div>
  <div class="lesnav">
   <span>${nr>1?`<button onclick="location.hash='#les${nr-1}'">← Les ${nr-1}</button>`:""}</span>
   <span><a href="${les.oefen}"><button>Oefenbank ${les.deel} ↗</button></a>
   ${nr<8?`<button class="primair" onclick="location.hash='#les${nr+1}'">Les ${nr+1} →</button>`:""}</span>
  </div>`;
 app.innerHTML=h;
 window.scrollTo(0,0);
}

function vink(id){
 gelezen[id]=!gelezen[id];
 if(!gelezen[id])delete gelezen[id];
 bewaar();render();
}

function render(){
 const m=location.hash.match(/^#les(\d+)$/);
 if(m)toonLes(+m[1]);else toonHome();
}
window.addEventListener("hashchange",render);
render();
</script>
</body>
</html>
