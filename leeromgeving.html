CONTENT["6.4.2"]={"theorie":"<p>De examenvragen over les 5 en 6 mixen alles door elkaar: verheden meten, koersen halen en zetten, de formule beide kanten op, peilingen en de stroomconstructies. Een goede zelftest: kun je bij elke vraag benoemen wélk gereedschap er gevraagd wordt vóór je gaat rekenen?</p><ul><li>Richting zonder correcties → plotter (5.2.1).</li><li>Correcties in graden gegeven → koersformule (5.3.1/5.4.1).</li><li>Stroomrichting en -snelheid gegeven → constructie (6.2.x/6.3.x), met de spiegelregel.</li><li>\"Waar ben ik?\" met zichtbare objecten → peiling (6.1.1).</li></ul>","vragen":[{"typ":"in","t":"Grondkoers 048°. De stroom zet je 5° naar bakboord (−5°), de drift is +6°, variatie 2° West en de deviatie bij de magnetische koers is +3°. Welke kompaskoers stuur je? (hele graden)","ans":46,"marge":2,"fmt":"num","eh":"°","u":"BWK = 48 − (−5) = 53 · WK = 53 − 6 = 47 · MK = 47 − (−2) = 49 · KK = 49 − 3 = <b>46°</b>.","a":"Koersformule (marge ±2°)"}]};
CONTENT["7.1.1"]={"theorie":"<p>Deze paragraaf herhaalt kort het schip (groot ≥ 20 m, klein &lt; 20 m; rondspant voor ruim water) en de aanbevolen uitrusting — nieuw is de SOLAS-V-basis: minimaal <b>één reddingsvest per opvarende</b>. De kern is echter de <b>zeekaart</b>.</p><h4>De 1800-serie</h4><ul><li>De officiële zeekaarten voor kust- en binnenwater verschijnen <b>jaarlijks</b> en zijn bijgewerkt tot de datum op de <b>binnenzijde van de omslag</b>; wijzigingen daarna staan in de <b>Berichten aan Zeevarenden</b> (BaZ).</li><li>Zeemijlen pas je af langs de staande rand. Schaal omrekenen: bij 1:75.000 is 1 cm = 750 m; 22 cm ≈ 16,5 km ≈ 9 zeemijl (km ÷ 1,852).</li></ul><h4>Symbolen die het examen vraagt</h4><ul><li><b>Dieptecijfers</b>: 2<sub>5</sub> = 2,5 m diep bij kaartpeil; een <b>streep onder het cijfer</b> = droogvalling bóven het reductievlak; een kader eromheen = nagestreefde (gebaggerde) diepte.</li><li><b>Wrakken</b>: half scheepje = (deels) zichtbaar bij kaartpeil; gevarenomkadering zonder diepte = gevaarlijk wrak, diepte onbekend; met <b>dregbeugel</b>-symbool = afgedregde (veilig bekende) diepte; Mt(s) = mast(en) zichtbaar.</li><li><b>Kunstwerken</b>: cijfers bij bruggen zijn doorvaarthoogtes in meters (vast, of gesloten/geheven bij beweegbaar); een getal in een sluis- of havensymbool is het <b>VHF-kanaal</b>. Let op: ANWB-binnenwaterkaarten geven hoogtes in decimeters.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<line x1=\"24\" y1=\"58\" x2=\"406\" y2=\"58\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,40)\"><text x=\"0\" y=\"4\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"13\" font-weight=\"bold\" fill=\"#2c2a72\" font-style=\"italic\">2₅</text></g><text x=\"140\" y=\"44\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">diepte 2 meter en 5 dm (t.o.v. reductievlak)</text><line x1=\"24\" y1=\"96\" x2=\"406\" y2=\"96\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,78)\"><text x=\"0\" y=\"4\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12\" font-weight=\"bold\" fill=\"#2c2a72\" font-style=\"italic\">(1₅ – 2₄)</text></g><text x=\"140\" y=\"82\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">diepte in haven varieert: 1,5 tot 2,4 m</text><line x1=\"24\" y1=\"134\" x2=\"406\" y2=\"134\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,116)\"><text x=\"0\" y=\"4\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\" font-style=\"italic\" fill=\"#1e6b30\" text-decoration=\"underline\">2₁</text><rect x=\"-34\" y=\"-10\" width=\"22\" height=\"20\" fill=\"#cfe6d4\"></rect></g><text x=\"140\" y=\"120\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">droogvalling: 2,1 m bóven reductievlak (groen vlak)</text><line x1=\"24\" y1=\"172\" x2=\"406\" y2=\"172\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,154)\"><circle r=\"11\" fill=\"none\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></circle><text x=\"0\" y=\"4\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"10\" font-weight=\"bold\" fill=\"#2c2a72\" font-style=\"italic\">2₅</text><rect x=\"18\" y=\"-9\" width=\"26\" height=\"18\" fill=\"none\" stroke=\"#2c2a72\" stroke-width=\"1.2\" stroke-dasharray=\"4,3\"></rect><text x=\"31\" y=\"4\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" fill=\"#2c2a72\">3</text></g><text x=\"140\" y=\"158\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">nagestreefde diepte in haven / gebaggerde geul</text><line x1=\"24\" y1=\"210\" x2=\"406\" y2=\"210\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,192)\"><path d=\"M-30,4 Q-12,-6 6,2 Q22,8 38,0\" fill=\"none\" stroke=\"#39a0d6\" stroke-width=\"1.6\"></path><text x=\"-30\" y=\"-8\" font-size=\"8\" fill=\"#39a0d6\" font-weight=\"bold\">5</text><text x=\"-6\" y=\"-10\" font-size=\"8\" fill=\"#39a0d6\" font-weight=\"bold\">10</text><text x=\"20\" y=\"-8\" font-size=\"8\" fill=\"#39a0d6\" font-weight=\"bold\">20</text></g><text x=\"140\" y=\"196\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">dieptelijnen van 5, 10 en 20 meter</text>\n<text x=\"215\" y=\"226\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">dieptecijfers op de 1800-serie</text>\n<text x=\"215\" y=\"242\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">cijfer = meters, subscript = decimeters — alles t.o.v. het reductievlak (LAT)</text>\n</svg>","cap":"Dieptecijfer-notaties: diepte, droogvalling (streep) en gebaggerde diepte."},{"svg":"<svg viewBox=\"0 0 430 330\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<line x1=\"24\" y1=\"56\" x2=\"406\" y2=\"56\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,38)\"><path d=\"M-16,2 Q-8,-8 2,-4 L16,-10 L18,-6 L6,0 Q14,6 4,8 L-14,8 Z\" fill=\"#1a1a2e\"></path><circle cx=\"-2\" cy=\"8\" r=\"2.5\" fill=\"none\" stroke=\"#1a1a2e\" stroke-width=\"1.4\"></circle></g><text x=\"140\" y=\"42\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">wrak, (gedeeltelijk) zichtbaar bij kaartpeil</text><line x1=\"24\" y1=\"94\" x2=\"406\" y2=\"94\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,76)\"><ellipse rx=\"24\" ry=\"13\" fill=\"#cfe0f2\" stroke=\"#1a1a2e\" stroke-width=\"1.3\" stroke-dasharray=\"3,3\"></ellipse><g fill=\"#1a1a2e\" stroke=\"#1a1a2e\"><line x1=\"-14\" y1=\"0\" x2=\"14\" y2=\"0\" stroke-width=\"3\"></line><line x1=\"-8\" y1=\"-5\" x2=\"-8\" y2=\"5\" stroke-width=\"3\"></line><line x1=\"8\" y1=\"-5\" x2=\"8\" y2=\"5\" stroke-width=\"3\"></line>< 2\" stroke-width=\"1.2\"></path><text x=\"0\" y=\"-18\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#c2258e\">22</text><circle cx=\"24\" cy=\"-20\" r=\"7\" fill=\"none\" stroke=\"#c2258e\" stroke-width=\"1.2\"></circle></g></g><text x=\"140\" y=\"132\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">brug/schutsluis met VHF-kanaal (22)</text><line x1=\"24\" y1=\"190\" x2=\"406\" y2=\"190\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,172)\"><path d=\"M-34,-8 L34,-8 M-34,8 L34,8\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></path><path d=\"M-8,-8 L0,0 L-8,8 M8,-8 L16,0 L8,8\" fill=\"none\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></path></g><text x=\"140\" y=\"176\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">spui- of keersluis</text><line x1=\"24\" y1=\"234\" x2=\"406\" y2=\"234\" stroke=\"#c6d4e2\" stroke-width=\"1\"></line><g transform=\"translate(70,216)\"><line x1=\"-34\" y1=\"0\" x2=\"34\" y2=\"0\" stroke=\"#2c2a72\" stroke-width=\"1.3\" stroke-dasharray=\"6,4\"></line><circle r=\"4\" fill=\"none\" stroke=\"#c2258e\" stroke-width=\"1.3\"></circle><text x=\"0\" y=\"-10\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#c2258e\">44</text></g><text x=\"140\" y=\"220\" font-family=\"Helvetica,Arial\" font-size=\"10.5\" fill=\"#2c2a72\" font-weight=\"bold\">bovenwaterkabel — veilige doorvaarthoogte 44 m</text>\n<text x=\"215\" y=\"256\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">cijfers bij kunstwerken</text>\n<text x=\"215\" y=\"272\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">magenta cijfers = doorvaarthoogte of VHF-kanaal · ANWB-binnenwaterkaarten: hoogte in dm!</text>\n</svg>","cap":"Cijfers bij kunstwerken: maat in meters of marifoonkanaal.","half":true}],"vragen":[{"t":"Op de kaart staat dit dieptecijfer (zie beeld). Wat betekent het?","v":"<svg viewBox=\"0 0 430 130\"><rect x=\"0\" y=\"0\" width=\"430\" height=\"130\" fill=\"#cfe3f2\"/><text x=\"200\" y=\"76\" font-size=\"30\" font-weight=\"bold\">2<tspan font-size=\"19\" dy=\"-9\">1</tspan></text><line x1=\"194\" y1=\"84\" x2=\"238\" y2=\"84\" stroke=\"#1a1a2e\" stroke-width=\"3\"/></svg>","o":["Droogvalling: de bodem ligt hier 2,1 m bóven het reductievlak","Diepte 2,1 m onder het reductievlak","Nagestreefde baggerdiepte 2,1 m"],"u":"Het <b>onderstreepte</b> cijfer = droogvalling boven het reductievlak (LAT). Zonder streep: diepte ónder LAT; klein verhoogd cijfer = decimeters.","a":"Les 7.1 (1800-serie)"},{"t":"Op de kaart staat een wraksymbool met een gevarenomkadering, zónder dieptevermelding. Wat betekent dit?","o":["Een gevaarlijk wrak waarvan de diepte onbekend is","Een wrak dat bij kaartpeil (gedeeltelijk) zichtbaar is","Een afgedregd en daarmee ongevaarlijk wrak"],"u":"Omkadering zonder diepte = <b>gevaarlijk, diepte onbekend</b>. Een getal erbij = minst gelode diepte; met dregbeugel = afgedregd; Mt(s) = mast(en) zichtbaar.","a":"Les 7.1 (1800-serie)"},{"t":"De gegevens op de kaarten van de 1800-serie veranderen tussentijds. Waar worden die wijzigingen gepubliceerd?","o":["In de Berichten aan Zeevarenden","In de Vaarkrant","In de Wateralmanak deel 2"],"u":"De 1800-serie verschijnt jaarlijks, bijgewerkt tot de datum op de <b>binnenzijde van de omslag</b>; daarna houd je hem bij met de <b>Berichten aan Zeevarenden</b>.","a":"Les 7.1 (1800-serie)"},{"t":"Kaartschaal 1:75.000. Twee havens liggen op de kaart 22 cm uit elkaar. Hoeveel zeemijl is dat ongeveer?","o":["Circa 9 zeemijl","Circa 16,5 zeemijl","Circa 22 zeemijl"],"u":"22 cm × 750 m = 16,5 km; gedeeld door 1,852 = <b>± 9 zeemijl</b>. De valkuil is stoppen bij 16,5 (dat zijn kilometers).","a":"Les 7.1 (schaal)"},{"t":"Bij een licht op de kaart staat 'Oc'. Wat zie je?","o":["Een onderbroken licht dat lánger aan dan uit is","Een licht dat korter aan dan uit is","Een licht dat even lang aan als uit is"],"u":"Oc (occulting) = vooral áán. Fl (schitterlicht) is het spiegelbeeld: vooral uit. Iso = even lang aan als uit.","a":"Les 7.2 (lichtkarakters)"}]};
CONTENT["7.2.1"]={"theorie":"<p>Op zee geldt het <b>Maritiem Betonningsstelsel systeem-A (IALA-A)</b>. Hét verschil met SIGNI is de <b>betonningsrichting</b>: niet \"van de berg naar de zee\", maar de aanlooprichting <b>vanuit zee naar het land</b> — met de vloedstroom mee. De tonnen liggen op dezelfde plek; alleen de richting draait om. In de betonningsrichting varend liggen de <b>rode (stompe) tonnen dus aan bakboord</b> en de groene (spitse) aan stuurboord.</p><h4>Scheidingstonnen</h4><ul><li><b>Hoofdvaarwater rechts</b>: stomp, rood-groen-rood, <b>rood boven</b>, rode cilinder — ligt in de rode reeks.</li><li><b>Hoofdvaarwater links</b>: spits, groen-rood-groen, <b>groen boven</b>, groene kegel — ligt in de groene reeks.</li><li>Denkstappen bij examenvragen: (1) vaar je mét of tegen de betonningsrichting en waar liggen dan de gewone tonnen, (2) welke scheidingston is het, (3) wordt gevraagd waarheen je vaart of aan welke kant je de ton houdt?</li><li>Een splitsing van vaarwateren van <b>gelijk belang</b> krijgt in IALA-A géén scheidingston maar een <b>cardinale ton</b>.</li></ul><h4>Aanvullende betonning</h4><p>Geel = bijzondere betekenis. De zwarte boei met <b>rode horizontale band</b> en twee zwarte bollen markeert een <b>afzonderlijk gevaar</b> (rondom bevaarbaar). De rood-wit <b>verticaal</b> gestreepte bolton is de <b>verkenningston</b> (uiterton) voor het aanlopen van een betond vaarwater.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 230\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_ir\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_ir\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_ir\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_ir\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <line x1=\"215\" y1=\"14\" x2=\"215\" y2=\"216\" stroke=\"#c6d2dc\" stroke-width=\"1.5\"></line>\n <text x=\"110\" y=\"26\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">IALA-A (zee)</text>\n <rect x=\"20\" y=\"40\" width=\"180\" height=\"120\" fill=\"#a9cde6\"></rect>\n <rect x=\"20\" y=\"40\" width=\"180\" height=\"26\" fill=\"#dfe8d2\"></rect>\n <text x=\"110\" y=\"57\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">land / haven</text>\n <text x=\"110\" y=\"152\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#134a70\">zee</text>\n <path d=\"M110,140 L110,80\" stroke=\"#e07b00\" stroke-width=\"3.5\" stroke-dasharray=\"8,5\" marker-end=\"url(#ah_ir)\"></path>\n <line x1=\"52\" y1=\"132\" x2=\"52\" y2=\"92\" stroke=\"#134a70\" stroke-width=\"5\" marker-end=\"url(#ah_ir)\"></line>\n <text x=\"34\" y=\"86\" font-size=\"9\" font-weight=\"bold\" fill=\"#134a70\">vloed</text>\n <text x=\"110\" y=\"178\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" fill=\"#7a4400\">van zee → land, mét de vloed mee</text>\n <text x=\"322\" y=\"26\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">SIGNI (binnenwater)</text>\n <path d=\"M250,60 L394,140 L394,168 L250,88 Z\" fill=\"#a9cde6\"></path>\n <text x=\"262\" y=\"54\" font-size=\"9.5\" font-weight=\"bold\">berg (bovenstrooms)</text>\n <text x=\"352\" y=\"188\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#134a70\">zee</text>\n <path d=\"M282,88 L360,132\" stroke=\"#e07b00\" stroke-width=\"3.5\" stroke-dasharray=\"8,5\" marker-end=\"url(#ah_ir)\"></path>\n <text x=\"322\" y=\"212\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" fill=\"#7a4400\">van de berg → de zee (stroomafwaarts)</text>\n</svg>","cap":"IALA-A: betonningsrichting vanuit zee, met de vloedstroom mee — het omgekeerde van SIGNI."},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_bz\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_bz\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_bz\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_bz\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <rect x=\"150\" y=\"0\" width=\"130\" height=\"250\" fill=\"#a9cde6\"></rect>\n <path d=\"M0,0 L150,0 Q158,36 148,72 Q138,110 152,148 Q162,186 146,222 Q140,238 144,250 L0,250 Z\" fill=\"#dfe8d2\" stroke=\"#b7c7a0\" stroke-width=\"2.5\"></path><path d=\"M430,0 L280,0 Q272,40 284,78 Q294,114 278,152 Q268,190 286,228 Q290,240 286,250 L430,250 Z\" fill=\"#dfe8d2\" stroke=\"#b7c7a0\" stroke-width=\"2.5\"></path>\n <g transform=\"translate(172,60)\"><use href=\"#tonR_bz\"></use></g><g transform=\"translate(172,130)\"><use href=\"#tonR_bz\"></use></g><g transform=\"translate(172,200)\"><use href=\"#tonR_bz\"></use></g>\n <g transform=\"translate(258,60)\"><use href=\"#tonG_bz\"></use></g><g transform=\"translate(258,130)\"><use href=\"#tonG_bz\"></use></g><g transform=\"translate(258,200)\"><use href=\"#tonG_bz\"></use></g>\n <use href=\"#kschip_bz\" transform=\"translate(215,190) rotate(-90)\"></use>\n <line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"90\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_bz)\"></line>\n <text x=\"215\" y=\"26\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">↑ haven (betonningsrichting)</text>\n <text x=\"70\" y=\"120\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#a12020\">rood = stomp</text>\n <text x=\"70\" y=\"136\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#a12020\">aan bakboord</text>\n <text x=\"356\" y=\"120\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#1e6b30\">groen = spits</text>\n <text x=\"356\" y=\"136\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#1e6b30\">aan stuurboord</text>\n</svg>","cap":"Binnenlopen vanuit zee: rood aan bakboord, groen aan stuurboord."},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\">\n<defs><marker id=\"ah_st\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker></defs>\n<g transform=\"translate(0,26) scale(.488)\"><path d=\"M0,210 L0,0 L56,0 C84,34 122,86 150,128 C164,152 170,180 171,210 Z\" fill=\"#3f8f4f\" stroke=\"#2c6b3a\" stroke-width=\"2\"></path><path d=\"M430,210 L430,0 L372,0 C342,18 314,52 296,92 C276,136 262,172 259,210 Z\" fill=\"#3f8f4f\" stroke=\"#2c6b3a\" stroke-width=\"2\"></path><path d=\"M146,0 C170,34 196,78 215,112 C236,74 258,34 280,0 Z\" fill=\"#3f8f4f\" stroke=\"#2c6b3a\" stroke-width=\"2\"></path><path d=\"M215,204 C213,168 196,140 166,108 C146,86 122,56 102,28\" fill=\"none\" stroke=\"#0d4ea0\" stroke-width=\"2.6\" stroke-dasharray=\"8,6\" marker-end=\"url(#ah_st)\"></path><g transform=\"translate(180 ill=\"#0e2a40\" opacity=\".75\">hoofdvaarwater</text>\n<text transform=\"translate(138,64) rotate(-58)\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\" fill=\"#0e2a40\" opacity=\".65\">nevenvaarwater</text><g transform=\"translate(215,144) scale(1.8)\"><rect x=\"-8\" y=\"-7\" width=\"16\" height=\"14\" rx=\"1.5\" fill=\"#d23b2e\" stroke=\"#7c1d14\" stroke-width=\"1\"></rect><rect x=\"-8\" y=\"-2.3\" width=\"16\" height=\"4.6\" fill=\"#2f8f4f\"></rect></g></g>\n<rect x=\"210\" y=\"0\" width=\"10\" height=\"210\" fill=\"#eef3f8\"></rect>\n<text x=\"105\" y=\"18\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#0e2a40\">groen boven: hoofd links</text>\n<text x=\"325\" y=\"18\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#0e2a40\">rood boven: hoofd rechts</text>\n<text x=\"215\" y=\"226\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">de twee scheidingstonnen</text>\n<text x=\"215\" y=\"242\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">de kleur boven verklapt waar het hoofdvaarwater ligt — blijf in de reeks van het hoofdvaarwater</text>\n</svg>","cap":"De twee IALA-scheidingstonnen: rood boven = hoofdvaarwater rechts, groen boven = links."},{"svg":"<svg viewBox=\"0 0 430 280\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<g transform=\"translate(120,110)\"><line x1=\"0\" y1=\"-22\" x2=\"0\" y2=\"0\" stroke=\"#1a1a2e\" stroke-width=\"3\"></line><g transform=\"translate(0,-28)\"><circle cy=\"-16\" r=\"6.5\" fill=\"#1a1a2e\"></circle><circle cy=\"0\" r=\"6.5\" fill=\"#1a1a2e\"></circle></g><rect x=\"-13\" y=\"0\" width=\"26\" height=\"26\" fill=\"#1a1a2e\" stroke=\"#111\" stroke-width=\".8\"></rect><rect x=\"-13\" y=\"26\" width=\"26\" height=\"22\" fill=\"#d23b2e\" stroke=\"#111\" stroke-width=\".8\"></rect><rect x=\"-13\" y=\"48\" width=\"26\" height=\"20\" fill=\"#1a1a2e\" stroke=\"#111\" stroke-width=\".8\"></rect><path d=\"M-21,68 L21,68 L17,80 L-17,80 Z\" fill=\"#5a6a7c\"></path></g><text x=\"120\" y=\"196\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#2c2a72\">afzonderlijk gevaar</text><text x=\"120\" y=\"211\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\">zwart-rood-zwart · 2 zwarte bollen</text><text x=\"120\" y=\"223\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\">rondom bevaarbaar</text><g transform=\"translate(300,150)\"><path d=\"M-20,0 A20,20 0 0 1 20,0 Z\" fill=\"#fff\" stroke=\"#7c1d14\" stroke-width=\"1\"></path><path d=\"M-20,0 A20,20 0 0 1 -12,-16 L-12,0 Z M-4,-19.6 L-4,0 L4,0 L4,-19.6 A20,20 0 0 0 -4,-19.6 Z M12,-16 A20,20 0 0 1 20,0 L12,0 Z\" fill=\"#d23b2e\"></path><path d=\"M-22,0 L22,0 L18,10 L-18,10 Z\" fill=\"#5a6a7c\"></path></g><text x=\"300\" y=\"196\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#2c2a72\">verkenningston</text><text x=\"300\" y=\"211\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\">bolton, rood-wit verticaal</text><text x=\"300\" y=\"223\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\">aanloop van betond vaarwater</text>\n<text x=\"215\" y=\"256\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">bijzondere markeringen</text>\n<text x=\"215\" y=\"272\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">afzonderlijk gevaar: eromheen is water · verkenningston: hier begint het vaarwater</text>\n</svg>","cap":"Afzonderlijk gevaar (zwart-rood, twee bollen) en de verkenningston (rood-wit verticaal)."}],"vragen":[{"t":"Hoe is de betonningsrichting in het Maritiem Betonningsstelsel systeem-A (IALA-A) vastgesteld?","o":["Als de aanlooprichting vanuit zee naar een haven of riviermonding — met de vloedstroom mee","Van de berg naar de zee, net als bij SIGNI","Per gebied vrij te bepalen door de vaarwegbeheerder"],"u":"IALA-A: <b>van zee naar het land, mét de vloed mee</b> — precies tegengesteld aan SIGNI. De tonnen liggen fysiek op dezelfde plek; alleen de kijkrichting draait om.","a":"Les 7.2 (IALA-A)"},{"t":"Je loopt vanuit zee een betond vaarwater binnen (in de betonningsrichting). Welke tonnen liggen aan stuurboord?","o":["Groene spitse tonnen","Stompe rode tonnen","Bolvormige rood-witte tonnen"],"u":"Binnenlopen: <b>rood (stomp) aan bakboord, groen (spits) aan stuurboord</b> — de KVB1-brug 'groen aan stuurboord bij stroomopwaarts varen' blijft kloppen.","a":"Les 7.2 (IALA-A)"},{"t":"Je ziet deze ton (zie beeld): stomp, horizontaal rood-groen-rood gestreept met een rode cilinder als topteken. Wat markeert hij?","v":"<svg viewBox=\"0 0 430 160\"><rect x=\"0\" y=\"0\" width=\"430\" height=\"160\" fill=\"#a9cde6\"/><g transform=\"translate(215,92) scale(1.6)\"><path d=\"M-12,16 L12,16 L12,-14 L-12,-14 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.3\"/><rect x=\"-12\" y=\"-4\" width=\"24\" height=\"9\" fill=\"#2e7d32\"/><rect x=\"-3\" y=\"-26\" width=\"6\" height=\"12\" fill=\"#c62828\" stroke=\"#7a1010\"/></g></svg>","o":["De splitsing waarbij het hoofdvaarwater réchts ligt — rood boven, hij hoort bij de rode tonnenrij","De splitsing waarbij het hoofdvaarwater links ligt","Een afzonderlijk gevaar met rondom vaarwater"],"u":"<b>Rechts = rood boven</b> (stomp, rode cilinder); links = groen boven (spits, groene kegel). De bovenkleur volgt de tonnenrij van het hoofdvaarwater.","a":"Les 7.2 (scheidingstonnen)"},{"t":"Hoe markeert IALA-A een splitsing van twee vaarwateren van gelijk belang?","o":["Met een cardinale ton (geel-zwart) bij het obstakel","Met een rood-groen horizontaal gestreepte bolton","Met een gele ton met liggend kruis"],"u":"Bij gelijk belang géén rood-groene scheidingston maar een <b>cardinaal</b> — bijvoorbeeld een zuidcardinaal als de bank ten noorden ervan ligt.","a":"Les 7.2 (IALA-A)"}]};
CONTENT["7.2.2"]={"theorie":"<p>De <b>cardinale betonning</b> werkt op zee precies zoals je in les 2 leerde: de naam zegt aan welke kant het <b>veilige</b> water ligt. Toptekens: punten omhoog = noord, omlaag = zuid, van elkaar af = oost, naar elkaar toe = west.</p><ul><li><b>Kleurregel</b> (het gele schoolpotlood met zwarte punt): de zwarte band zit waar de punten heen wijzen — noord zwart boven, zuid zwart onder, west zwart in het midden, oost zwart boven én onder.</li><li><b>Witte lichten via de klok</b>: oost 3 flitsen, zuid 6 + lange flits (LFl), west 9, noord doorlopend (VQ of Q). De zuid krijgt zijn LFl zodat je 6 en 9 flitsen nooit verwart.</li><li>Lichtkarakters lezen: VQ ¼ s, Q ½ s, Fl korter aan dan uit, LFl 2 s, Iso even lang aan als uit, Oc langer aan dan uit, F vast. \"Fl(2) 10s\" = telkens 2 schitteringen in een cyclus van 10 seconden.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 280\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<g transform=\"translate(64,86)\"><line x1=\"0\" y1=\"-24\" x2=\"0\" y2=\"0\" stroke=\"#1a1a2e\" stroke-width=\"3\"></line><g transform=\"translate(0,-30)\"><path d=\"M-9,-7 L9,-7 L0,-21 Z\" fill=\"#1a1a2e\"></path><path d=\"M-9,9 L9,9 L0,-5 Z\" fill=\"#1a1a2e\"></path></g><rect x=\"-13\" y=\"0\" width=\"26\" height=\"34\" fill=\"#1a1a2e\" stroke=\"#111\" stroke-width=\".8\"></rect><rect x=\"-13\" y=\"34\" width=\"26\" height=\"34\" fill=\"#f2c500\" stroke=\"#111\" stroke-width=\".8\"></rect><path d=\"M-21,68 L21,68 L17,80 L-17,80 Z\" fill=\"#5a6a7c\"></path></g><text x=\"64\" y=\"182\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#2c2a72\">noord</text><text x=\"64\" y=\"197\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#0e2a40\">VQ / Q</text><text x=\"64\" y=\"211\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\">onafgebroken snel</text><g transform=\"translate(164,86)\"><line x1=\"0\" y1=\"-24\" x2=\"0\" y2=\"0\" stroke=\"#1a1a2e\" stroke-width=\"3\"></line><g transform=\"translate(0,-30)\"><path d=\"M-9,-9 L9,-9 L0,-23 Z\" fill=\"#1a1a2e\"></path><path d=\"M-9,-3 L9,-3 L0,11 Z\" fill=\"#1a1a2e\"></path></g><rect x=\"-13\" y=\"0\" width=\"26\" height=\"22\" fill=\"#1a1a2e\" stroke=\"#111\" stroke-width=\".8\"></rect><rect x=\"-13\" y=\"22\" width=\"26\" height=\"24\" fill=\"#f2c500\" stroke=\"#111\" stroke-width=\".8\"></rect><rect x=\"-13\" y=\"46\" width=\"26\" height=\"22\" fill=\"#1a1a2e\" stroke=\"#111\" stroke-width=\".8\"></rect><path d=\"M-21,68 L21,68 L17,80 L-17,80 Z\" fill=\"#5a6a7c\"></path></g><text x=\"164\" y=\"182\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#2c2a72\">oost</text><text x=\"164\" y=\"197\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#0e2a40\">VQ(3) 5s</text><text x=\"164\" y=\"211\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\">3 flitsen · 3 uur-stand</text><g transform=\"translate(264,86)\"><line x1=\"0\" y1=\"-24\" x2=\"0\" y2=\"0\" stroke=\"#1a1a2e\" stroke-width=\"3\"></line><g transform=\"translate(0,-30)\"><path d=\"M-9,-21 L9,-21 L0,-7 Z\" fill=\"#1a1a2e\"></path><path d=\"M-9,-5 L9,-5 L0,9 Z\" fill=\"#1a1a2e\"></path></g><rect x=\"-13\" y=\"0\" width=\"26\" height=\"34\" fill=\"#f2c500\" stroke=\"#111\" stroke-width=\".8\"></rect><rect x=\"-13\" y=\"34\" width=\"26\" height=\"34\" fill=\"#1a1a2e\" stroke=\"#111\" stroke-width=\".8\"></rect><path d=\"M-21,68 L21,68 L17,80 L-17,80 Z\" fill=\"#5a6a7c\"></path></g><text x=\"264\" y=\"182\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#2c2a72\">zuid</text><text x=\"264\" y=\"197\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#0e2a40\">VQ(6)+LFl 10s</text><text x=\"264\" y=\"211\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\">6 + lange flits</text><g transform=\"translate(364,86)\"><line x1=\"0\" y1=\"-24\" x2=\"0\" y2=\"0\" stroke=\"#1a1a2e\" stroke-width=\"3\"></line><g transform=\"translate(0,-30)\"><path d=\"M-9,-23 L9,-23 L0,-9 Z\" fill=\"#1a1a2e\"></path><path d=\"M-9,11 L9,11 L0,-3 Z\" fill=\"#1a1a2e\"></path></g><rect x=\"-13\" y=\"0\" width=\"26\" height=\"22\" fill=\"#f2c500\" stroke=\"#111\" stroke-width=\".8\"></rect><rect x=\"-13\" y=\"22\" width=\"26\" height=\"24\" fill=\"#1a1a2e\" stroke=\"#111\" stroke-width=\".8\"></rect><rect x=\"-13\" y=\"46\" width=\"26\" height=\"22\" fill=\"#f2c500\" stroke=\"#111\" stroke-width=\".8\"></rect><path d=\"M-21,68 L21,68 L17,80 L-17,80 Z\" fill=\"#5a6a7c\"></path></g><text x=\"364\" y=\"182\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#2c2a72\">west</text><text x=\"364\" y=\"197\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#0e2a40\">VQ(9) 10s</text><text x=\"364\" y=\"211\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\">9 flitsen · 9 uur-stand</text><text x=\"215\" y=\"30\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#2c2a72\">toptekens wijzen naar het zwart · veilig water aan de kant van de naam</text>\n<text x=\"215\" y=\"256\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">de vier cardinalen: kleur, topteken én lichtkarakter</text>\n<text x=\"215\" y=\"272\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">klok-ezelsbrug: O=3 · Z=6+LFl · W=9 · N=doorlopend — toptekens wijzen naar het zwart</text>\n</svg>","cap":"Het cardinalen-kwadrant: topteken, kleurverdeling en licht in één beeld."},{"svg":"<svg viewBox=\"0 0 500 230\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_tk\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_tk\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a7 rcle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_ls\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_ls\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <g font-size=\"9.5\" font-weight=\"bold\">\n <text x=\"14\" y=\"46\">VQ</text><g fill=\"#f2c500\" stroke=\"#8a6d00\"><rect x=\"52\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"61\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"70\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"79\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"88\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"97\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"106\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"115\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"124\" y=\"36\" width=\"3\" height=\"12\"></rect><rect x=\"133\" y=\"36\" width=\"3\" height=\"12\"></rect></g><text x=\"270\" y=\"46\" font-size=\"9\">zeer snel flikkeren (flits ¼ s)</text>\n <text x=\"14\" y=\"82\">Q</text><g fill=\"#f2c500\" stroke=\"#8a6d00\"><rect x=\"52\" y=\"72\" width=\"5\" height=\"12\"></rect><rect x=\"68\" y=\"72\" width=\"5\" height=\"12\"></rect><rect x=\"84\" y=\"72\" width=\"5\" height=\"12\"></rect><rect x=\"100\" y=\"72\" width=\"5\" height=\"12\"></rect><rect x=\"116\" y=\"72\" width=\"5\" height=\"12\"></rect><rect x=\"132\" y=\"72\" width=\"5\" height=\"12\"></rect></g><text x=\"270\" y=\"82\" font-size=\"9\">flikkerlicht (flits ½ s)</text>\n <text x=\"14\" y=\"118\">Fl</text><g fill=\"#f2c500\" stroke=\"#8a6d00\"><rect x=\"52\" y=\"108\" width=\"12\" height=\"12\"></rect><rect x=\"120\" y=\"108\" width=\"12\" height=\"12\"></rect><rect x=\"188\" y=\"108\" width=\"12\" height=\"12\"></rect></g><text x=\"270\" y=\"118\" font-size=\"9\">schitterlicht: korter áán dan uit</text>\n <text x=\"14\" y=\"154\">LFl</text><g fill=\"#f2c500\" stroke=\"#8a6d00\"><rect x=\"52\" y=\"144\" width=\"26\" height=\"12\"></rect><rect x=\"150\" y=\"144\" width=\"26\" height=\"12\"></rect></g><text x=\"270\" y=\"154\" font-size=\"9\">lange schittering (2 s)</text>\n <text x=\"14\" y=\"190\">Iso</text><g fill=\"#f2c500\" stroke=\"#8a6d00\"><rect x=\"52\" y=\"180\" width=\"34\" height=\"12\"></rect><rect x=\"120\" y=\"180\" width=\"34\" height=\"12\"></rect><rect x=\"188\" y=\"180\" width=\"34\" height=\"12\"></rect></g><text x=\"270\" y=\"190\" font-size=\"9\">even lang aan als uit</text>\n <text x=\"14\" y=\"226\">Oc</text><g fill=\"#f2c500\" stroke=\"#8a6d00\"><rect x=\"52\" y=\"216\" width=\"52\" height=\"12\"></rect><rect x=\"118\" y=\"216\" width=\"52\" height=\"12\"></rect><rect x=\"184\" y=\"216\" width=\"52\" height=\"12\"></rect></g><text x=\"270\" y=\"226\" font-size=\"9\">langer áán dan uit</text>\n <text x=\"14\" y=\"262\">F</text><g fill=\"#f2c500\" stroke=\"#8a6d00\"><rect x=\"52\" y=\"252\" width=\"184\" height=\"12\"></rect></g><text x=\"270\" y=\"262\" font-size=\"9\">vast licht</text>\n </g>\n <text x=\"215\" y=\"290\" text-anchor=\"middle\" font-size=\"10\" fill=\"#134a70\">boeien knipperen — haven- en scheepslichten branden vast (F)</text>\n</svg>","cap":"Lichtkarakters op de secondenlijn.","half":true}],"vragen":[{"t":"Op de Waddenzee zie je een gele boei met zwart ondervlak en dit topteken: twee kegels met de punten omlaag (zie beeld). Waar ligt het veilige vaarwater?","v":"<svg viewBox=\"0 0 430 170\"><rect x=\"0\" y=\"0\" width=\"430\" height=\"170\" fill=\"#a9cde6\"/><g transform=\"translate(215,108) scale(1.5)\"><path d=\"M-11,18 L11,18 L8,-16 L-8,-16 Z\" fill=\"#f2c500\" stroke=\"#7a5c00\" stroke-width=\"1.3\"/><path d=\"M-10,4 L10,4 L11,18 L-11,18 Z\" fill=\"#1a1a2e\"/><line x1=\"0\" y1=\"-16\" x2=\"0\" y2=\"-32\" stroke=\"#333\" stroke-width=\"2\"/><g fill=\"#1a1a2e\"><path d=\"M-7,-44 L7,-44 L0,-32 Z\"/><path d=\"M-7,-26 L7,-26 L0,-14 Z\"/></g></g></svg>","o":["Ten zuiden van de boei — dit is een zuidcardinaal","Ten noorden van de boei","Ten westen van de boei"],"u":"Punten omlaag = zwart ónder = <b>zuidcardinaal</b>: passeer aan de zuidzijde. De pijlpunten wijzen altijd naar de zwarte band(en).","a":"Les 7.2 (cardinalen)"},{"t":"Een boei is geel met één brede zwarte band in het midden. Welke cardinaal is dit?","o":["Westcardinaal (topteken: punten naar elkaar toe)","Oostcardinaal (punten van elkaar af)","Noordcardinaal (punten omhoog)"],"u":"Zwart in het <b>midden</b> = punten naar elkaar toe = <b>west</b> ('wespentaille'). Oost heeft juist twee zwarte banden (boven én onder).","a":"Les 7.2 (cardinalen)"},{"t":"Welk lichtkarakter hoort bij een lichtboei ten óósten van een gevaar?","o":["VQ(3) 5s — drie flitsen, zoals 3 uur op de klok","VQ(6) + LFl 10s","VQ(9) 10s"],"u":"Cardinale lichten volgen de klok: N = continu · <b>O = 3</b> · Z = 6 + lange flits · W = 9.","a":"Les 7.2 (cardinalen)"},{"t":"Waarom volgt er bij het licht van een zuidcardinaal een lange schittering (LFl) op de zes flitsen?","o":["Zodat je zes flitsen niet verwart met negen — de lange flits markeert het einde van de reeks","Omdat zuid het gevaarlijkste kwadrant is","Om het bereik van het licht te vergroten"],"u":"VQ(6)+LFl of Q(6)+LFl: de <b>lange flits (± 2 s)</b> sluit de telreeks af en onderscheidt zuid (6) van west (9).","a":"Les 7.2 (lichtkarakters)"},{"t":"Op de kaart staat bij een licht 'Fl(2) 10s'. Wat zie je?","o":["Twee korte schitteringen kort na elkaar, daarna donker; de hele cyclus duurt 10 seconden","Een licht dat 2 seconden aan en 10 seconden uit is","Tien flitsen in groepen van twee"],"u":"Fl = schitterlicht (vooral uít); (2) = twee schitteringen per groep; 10s = de periode van de volledige cyclus, gemeten van het begin van de ene groep tot het begin van de volgende.","a":"Les 7.2 (lichtkarakters)","v":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"> <defs><marker id=\"ah_F17\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker></defs> <line x1=\"40\" y1=\"124\" x2=\"390\" y2=\"124\" stroke=\"#2c2a72\" stroke-width=\"2\"></line><line x1=\"40\" y1=\"120\" x2=\"40\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"40\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">0</text><line x1=\"75\" y1=\"120\" x2=\"75\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"75\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">1</text><line x1=\"110\" y1=\"120\" x2=\"110\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"110\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">2</text><line x1=\"145\" y1=\"120\" x2=\"145\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"145\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">3</text><line x1=\"180\" y1=\"120\" x2=\"180\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"180\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">4</text><line x1=\"215\" y1=\"120\" x2=\"215\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"215\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">5</text><line x1=\"250\" y1=\"120\" x2=\"250\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"250\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">6</text><line x1=\"285\" y1=\"120\" x2=\"285\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"285\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">7</text><line x1=\"320\" y1=\"120\" x2=\"320\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"320\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">8</text><line x1=\"355\" y1=\"120\" x2=\"355\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"355\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">9</text><line x1=\"390\" y1=\"120\" x2=\"390\" y2=\"128\" stroke=\"#2c2a72\" stroke-width=\"1.4\"></line><text x=\"390\" y=\"142\" text-anchor=\"middle\" font-size=\"8\" fill=\"#2c2a72\">10</text> <rect x=\"40\" y=\"96\" width=\"350\" height=\"18\" fill=\"#1a2433\"></rect><rect x=\"40\" y=\"96\" width=\"28\" height=\"18\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1\"></rect><rect x=\"92.5\" y=\"96\" width=\"28\" height=\"18\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1\"></rect> <circle cx=\"215\" cy=\"52\" r=\"14\" fill=\"#1a2433\"></circle> <circle cx=\"215\" cy=\"52\" r=\"14\" fill=\"#f2c500\"></circle> <text x=\"215\" y=\"80\" text-anchor=\"middle\" font-size=\"9\" fill=\"#123a56\">seconden →</text> <text x=\"215\" y=\"226\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">dit licht knippert volgens de tijdbalk</text> <text x=\"215\" y=\"242\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">twee korte schitteringen, dan donker; de cyclus duurt 10 s — welk lichtkarakter is dit?</text> </svg>"}]};
CONTENT["7.3.1"]={"theorie":"<p>Het getij komt vooral van de aantrekkingskracht tussen <b>aarde en maan</b>. In ruim een etmaal is het twee keer hoog- en twee keer laagwater (ruim 6 uur ertussen).</p><h4>Spring en dood</h4><ul><li><b>Springtij</b>: twee dagen ná volle maan en ná nieuwe maan — HW extra hoog, LW extra laag.</li><li><b>Doodtij</b>: twee dagen ná eerste en laatste kwartier — alles gedempt.</li><li>Het hoogteverschil tussen HW en LW heet het <b>verval</b>; hoe groter het verval, hoe sterker de eb- en vloedstromen. Spring en dood wisselen elkaar per week af.</li></ul><h4>Reductievlak en rijzing</h4><ul><li>Kaartdieptes gelden vanaf het reductievlak <b>LAT</b> (Lowest Astronomical Tide): het laagste astronomisch berekende tij. In de praktijk staat er dus vrijwel altijd méér water dan de kaart aangeeft.</li><li>De <b>rijzing</b> is de waterstand boven LAT — veel bij HW, weinig bij LW. Wind rekent níét mee (aanlandig verhoogt, aflandig verlaagt, maar dat is niet te voorspellen).</li><li>LAT ligt op getijdenwater altijd <b>onder NAP</b>, en de afstand NAP–LAT verschilt <b>per haven</b>.</li><li>Bronnen: <b>HP33</b> (Hydrografische Dienst) geeft getijtafels t.o.v. LAT én stroomatlassen; de RWS-getijtafels en Wateralmanak deel 2 geven waterstanden t.o.v. NAP.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 210\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_ms\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_ms\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_ms\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_ms\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <g transform=\"translate(80,70)\"><circle r=\"24\" fill=\"#1a1a2e\"></circle><text y=\"44\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">NM</text></g>\n <g transform=\"translate(180,70)\"><circle r=\"24\" fill=\"#fff\" stroke=\"#333\"></circle><path d=\"M0,-24 A24,24 0 0 1 0,24 Z\" fill=\"#1a1a2e\"></path><text y=\"44\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">EK</text></g>\n <g transform=\"translate(280,70)\"><circle r=\"24\" fill=\"#fff\" stroke=\"#333\"></circle><text y=\"44\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">VM</text></g>\n <g transform=\"translate(380,70)\"><circle r=\"24\" fill=\"#fff\" stroke=\"#333\"></circle><path d=\"M0,-24 A24,24 0 0 0 0,24 Z\" fill=\"#1a1a2e\"></path><text y=\"44\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">LK</text></g>\n <g font-size=\"10.5\" font-weight=\"bold\" text-anchor=\"middle\"><text x=\"80\" y=\"150\" fill=\"#1a5e8f\">+2 dagen → SPRINGTIJ</text><text x=\"180\" y=\"150\" fill=\"#a12020\">+2 dagen → doodtij</text><text x=\"280\" y=\"150\" fill=\"#1a5e8f\">+2 dagen → SPRINGTIJ</text><text x=\"380\" y=\"150\" fill=\"#a12020\">+2 dagen → doodtij</text></g>\n <text x=\"215\" y=\"190\" text-anchor=\"middle\" font-size=\"10.5\">2× spring en 2× dood per ± 28 dagen · spring = groot verval = sterke stromen</text>\n</svg>","cap":"Spring twee dagen na volle en nieuwe maan; dood twee dagen na de kwartieren.","half":true},{"svg":"<svg viewBox=\"0 0 440 280\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<rect x=\"30\" y=\"20\" width=\"370\" height=\"184\" fill=\"#fff\" stroke=\"#2c2a72\" stroke-width=\"1.6\"></rect><text x=\"38\" y=\"36\" font-size=\"11\" font-weight=\"bold\" fill=\"#2c2a72\">IJmuiden — december · tijden in MET</text><line x1=\"30\" y1=\"44\" x2=\"400\" y2=\"44\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></line><text x=\"49\" y=\"58\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#2c2a72\">Dag</text><text x=\"115\" y=\"58\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#2c2a72\">Hoogwater (tijd · hgt)</text><text x=\"213\" y=\"58\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#2c2a72\">Laagwater (tijd · hgt)</text><text x=\"332\" y=\"58\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#2c2a72\">uurstanden in dm t.o.v. LAT</text><line x1=\"30\" y1=\"64\" x2=\"400\" y2=\"64\" stroke=\"#2c2a72\" stroke-width=\".8\"></line><text x=\"49\" y=\"80\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#2c2a72\">D 1</text><text x=\"115\" y=\"80\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#2c2a72\">04:11 · 21</text><text x=\"213\" y=\"80\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#2c2a72\">12:20 · 4</text><text x=\"271\" y=\"80\" text-anchor=\"start\" font-size=\"8\" fill=\"#2c2a72\">4 · 5 · 8 · 16 · 21 · 20 · 17 …</text><text x=\"49\" y=\"96\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#2c2a72\">W 2</text><text x=\"115\" y=\"96\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#2c2a72\">04:45 · 21</text><text x=\"213\" y=\"96\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#2c2a72\">00:05 · 4</text><text x=\"271\" y=\"96\" text-anchor=\"start\" font-size=\"8\" fill=\"#2c2a72\">4 · 4 · 6 · 11 · 19 · 21 · 18 …</text><text x=\"49\" y=\"112\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#2c2a72\">D 3</text><text x=\"115\" y=\"112\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#2c2a72\">05:16 · 21</text><text x=\"213\" y=\"112\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#2c2a72\">00:54 · 4</text><text x=\"271\" y=\"112\" text-anchor=\"start\" font-size=\"8\" fill=\"#2c2a72\">5 · 4 · 5 · 7 · 14 · 20 · 19 …</text><line x1=\"30\" y1=\"132\" x2=\"400\" y2=\"132\" stroke=\"#2c2a72\" stroke-width=\".8\" stroke-dasharray=\"3,3\"></line><circle cx=\"86\" cy=\"76\" r=\"11\" fill=\"none\" stroke=\"#c8102e\" stroke-width=\"1.8\"></circle><text x=\"60\" y=\"152\" font-size=\"9\" font-weight=\"bold\" fill=\"#c8102e\">① tijd + hoogte HW (dm!)</text><circle cx=\"196\" cy=\"76\" r=\"11\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"1.8\"></circle><text x=\"60\" y=\"168\" font-size=\"9\" font-weight=\"bold\" fill=\"#e8862c\">② tijd + hoogte LW — verval = HW − LW</text><rect x=\"264\" y=\"68\" width=\"132\" height=\"14\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"1.6\"></rect><text x=\"60\" y=\"184\" font-size=\"9\" font-weight=\"bold\" fill=\"#2f8f4f\">③ uurstanden: waterstand per klokuur, in dm t.o.v. LAT</text><text x=\"366\" y=\"198\" font-size=\"8\" fill=\"#123a56\">bron-lay-out: HP 33</text>\n<text x=\"215\" y=\"256\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">de getijtabel lezen (HP 33)</text>\n<text x=\"215\" y=\"272\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">maansymbolen in de marge markeren spring/doodtij · alle hoogten in decimeters t.o.v. LAT</text>\n</svg>","cap":"De getijtabel lezen: tijden en rijzing per dag.","half":true}],"vragen":[{"t":"Wanneer is het in Nederland springtij?","o":["Ongeveer twee dagen ná volle maan en ná nieuwe maan","Precies bij eerste en laatste kwartier","Tweemaal per jaar, in voor- en najaar"],"u":"Spring ≈ <b>2 dagen ná VM en NM</b> (HW extra hoog, LW extra laag, groot verval, sterke stromen); dood ≈ 2 dagen ná EK en LK. Zo'n twee keer per maand dus.","a":"Les 7.3 (getijden)"},{"t":"Waarom gebruikt de Hydrografische Dienst LAT als reductievlak van de kaart?","o":["Omdat de waterstand daar vrijwel nooit onder komt — er staat in de praktijk dus bijna altijd méér water dan de kaart aangeeft","Omdat LAT gelijk is aan NAP","Omdat LAT de gemiddelde waterstand is"],"u":"LAT = laagste astronomisch berekende tij. Alles op de kaart is daaraan gerelateerd; de rijzing komt er nog bovenop. De afstand NAP↔LAT verschilt per haven.","a":"Les 7.3 (getijden)"},{"t":"Wat is het 'verval'?","o":["Het hoogteverschil tussen hoogwater en het eerstvolgende laagwater","De jaarlijkse daling van de zeebodem","Het vaste verschil tussen LAT en NAP"],"u":"Verval = HW − eerstvolgend LW. Bij <b>springtij</b> is het verval groot en zijn de eb- en vloedstromen het sterkst.","a":"Les 7.3 (getijden)"},{"t":"Wanneer is het doodtij, en wat betekent dat voor verval en stroom?","o":["Ongeveer twee dagen ná eerste en laatste kwartier — klein verval en zwakke getijstromen","Ongeveer twee dagen ná volle en nieuwe maan — groot verval en sterke stromen","Precies bij volle maan — het water staat dan stil"],"u":"Dood ≈ 2 dagen na EK en LK: zon en maan werken elkaar tegen, dus klein verval en zwakke eb- en vloedstromen. Spring is het spiegelbeeld: ≈ 2 dagen na VM en NM, groot verval, sterke stromen.","a":"Les 7.3 (getijden)"}]};
CONTENT["7.3.2"]={"theorie":"<h4>Rijzing berekenen: het lagenmodel</h4><p>Teken altijd drie lijnen: (1) het reductievlak LAT, (2) de <b>kaartdiepte</b> eronder — of erbóven bij een onderstreept cijfer (droogvalling), (3) de <b>rijzing</b> boven LAT. De afstand tussen bodem en rijzing is de werkelijke diepte; trek daar je diepgang af voor het water onder de kiel.</p><h4>De 1/12-regel</h4><p>Tussen HW en LW (± 6 uur) verloopt het tij niet gelijkmatig maar in twaalfden van het verval: <b>1-2-3-3-2-1</b> per uur. Twee uur na HW is dus al 3/12 (een kwart) gezakt, na drie uur de helft. Zo bereken je op elk tussenliggend tijdstip de waterstand — bijvoorbeeld vanaf welk uur een <b>wantij</b> diep genoeg is.</p><h4>Stroomatlas</h4><p>De horizontale beweging vind je in de <b>stroomatlas</b> (HP33): 13 kaartjes, van 6 uur vóór tot 6 uur ná hoogwater. In elke stroompijl staan twee getallen, bijvoorbeeld 1.2|2.0: <b>doodtij- | springtijsnelheid</b> in knopen. De stroom is rond halftij het sterkst en bij springtij (groot verval) sterker dan bij doodtij.</p>","vis":[{"svg":"<svg viewBox=\"0 0 535 270\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_lm\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_lm\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_lm\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_lm\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <line x1=\"40\" y1=\"170\" x2=\"400\" y2=\"170\" stroke=\"#1a5e8f\" stroke-width=\"2.4\"></line>\n <text x=\"404\" y=\"174\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#1a5e8f\">LAT</text>\n <line x1=\"40\" y1=\"150\" x2=\"400\" y2=\"150\" stroke=\"#888\" stroke-width=\"1.4\" stroke-dasharray=\"6,4\"></line>\n <text x=\"404\" y=\"154\" font-size=\"9\" fill=\"#888\">NAP</text>\n <line x1=\"40\" y1=\"60\" x2=\"400\" y2=\"60\" stroke=\"#134a70\" stroke-width=\"2.4\"></line>\n <text x=\"404\" y=\"64\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#134a70\">water</text>\n <path d=\"M40,142 L220,142 L220,230 L400,230 L400,250 L40,250 Z\" fill=\"#c9b489\" stroke=\"#8f7a4a\"></path>\n <g stroke=\"#1e6b30\" stroke-width=\"2\"><line x1=\"90\" y1=\"170\" x2=\"90\" y2=\"142\" marker-start=\"url(#ah_lm)\" marker-end=\"url(#ah_lm)\"></line></g>\n <text x=\"98\" y=\"160\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#1e6b30\">droogvalling 0,7 (onderstreept cijfer)</text>\n <g stroke=\"#e07b00\" stroke-width=\"2\"><line x1=\"70\" y1=\"170\" x2=\"70\" y2=\"60\" marker-start=\"url(#ah_lm)\" marker-end=\"url(#ah_lm)\"></line></g>\n <text x=\"24\" y=\"118\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#7a4400\" transform=\"rotate(-90 24,118)\">rijzing 2,0</text>\n <g stroke=\"#1a1a2e\" stroke-width=\"2\"><line x1=\"180\" y1=\"142\" x2=\"180\" y2=\"60\" marker-start=\"url(#ah_lm)\" marker-end=\"url(#ah_lm)\"></line></g>\n <text x=\"188\" y=\"106\" font-size=\"9.5\" font-weight=\"bold\">werkelijke diepte 1,3</text>\n <g stroke=\"#c22222\" stroke-width=\"2\"><line x1=\"330\" y1=\"230\" x2=\"330\" y2=\"170\" marker-start=\"url(#ah_lm)\" marker-end=\"url(#ah_lm)\"></line></g>\n <text x=\"338\" y=\"204\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#a12020\">kaartdiepte (níét onderstreept): onder LAT</text>\n <use href=\"#kschip_lm\" transform=\"translate(150,52) scale(.7)\"></use>\n <text x=\"215\" y=\"26\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">teken: LAT → bodem → rijzing → aflezen</text>\n</svg>","cap":"Het lagenmodel: LAT, kaartdiepte en rijzing in één tekening."},{"svg":"<svg viewBox=\"0 0 430 280\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<line x1=\"42\" y1=\"40\" x2=\"398\" y2=\"40\" stroke=\"#9fb2c6\" stroke-width=\"1\"></line>\n<line x1=\"42\" y1=\"180\" x2=\"398\" y2=\"180\" stroke=\"#9fb2c6\" stroke-width=\"1\"></line>\n<text x=\"38\" y=\"44\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#2c2a72\">HW</text>\n<text x=\"38\" y=\"184\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#2c2a72\">LW</text>\n<path d=\"M50.0,40.0 L55.7,40.1 L61.3,40.4 L67.0,40.9 L72.7,41.5 L78.3,42.4 L84.0,43.4 L89.7,44.6 L95.3,46.1 L101.0,47.6 L106.7,49.4 L112.3,51.3 L118.0,53.4 L123.7,55.6 L129.3,58.0 L135.0,60.5 L140.7,63.2 L146.3,65.9 L152.0,68.9 L157.7,71.9 L163.3,75.0 L169.0,78.2 L174.7,81.5 L180.3,84.9 L186.0,88.4 L191.7,91.9 L197.3,95.4 L203.0,99.0 L208.7,102.7 L214.3,106.3 L220.0,110.0 L225.7,113.7 L231.3,117.3 L237.0,121.0 L242.7,124.6 L248.3,128.1 L254.0,131.6 L259.7,135.1 L265.3,138.5 L271.0,141.8 L276.7,145.0 L282.3,148.1 L288.0,151.1 L293.7,154.1 L299.3,156.8 L305.0,159.5 L310.7,162.0 L316.3,164.4 L322.0,166.6 L327.7,168.7 L333.3,170.6 L339.0,172.4 L344.7,173.9 L350.3,175.4 L356.0,176.6 L361.7,177.6 L367.3,178.5 L373.0,179.1 L378.7,179.6 L384.3,179.9 L390.0,180.0 \" fill=\"none\" stroke=\"#39a0d6\" stroke-width=\"1.6\" opacity=\".7\"></path><path d=\"M50,40 L106.66666666666666,51.666666666666664 L163.33333333333331,75 L220,110 L276.66666666666663,145 L333.3333333333333,168.33333333333334 L390,180\" fill=\"none\" stroke=\"#2c2a72\" stroke-width=\"2.6\"></path><line x1=\"106.66666666666666\" y1=\"34\" x2=\"106.66666666666666\" y2=\"186\" stroke=\"#9fb2c6\" stroke-width=\"1\" stroke-dasharray=\"3,3\"></line><text x=\"78.33333333333333\" y=\"102\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#c8102e\">1/12</text><text x=\"106.66666666666666\" y=\"200\" text-anchor=\"middle\" font-size=\"9\" fill=\"#2c2a72\">1e uur</text><line x1=\"163.33333333333331\" y1=\"34\" x2=\"163.33333333333331\" y2=\"186\" stroke=\"#9fb2c6\" stroke-width=\"1\" stroke-dasharray=\"3,3\"></line><text x=\"135\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#c8102e\">2/12</text><text x=\"163.33333333333331\" y=\"200\" text-anchor=\"middle\" font-size=\"9\" fill=\"#2c2a72\">2e uur</text><line x1=\"220\" y1=\"34\" x2=\"220\" y2=\"186\" stroke=\"#9fb2c6\" stroke-width=\"1\" stroke-dasharray=\"3,3\"></line><text x=\"191.66666666666666\" y=\"146\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#c8102e\">3/12</text><text x=\"220\" y=\"200\" text-anchor=\"middle\" font-size=\"9\" fill=\"#2c2a72\">3e uur</text><line x1=\"276.66666666666663\" y1=\"34\" x2=\"276.66666666666663\" y2=\"186\" stroke=\"#9fb2c6\" stroke-width=\"1\" stroke-dasharray=\"3,3\"></line><text x=\"248.33333333333334\" y=\"146\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#c8102e\">3/12</text><text x=\"276.66666666666663\" y=\"200\" text-anchor=\"middle\" font-size=\"9\" fill=\"#2c2a72\">4e uur</text><line x1=\"333.3333333333333\" y1=\"34\" x2=\"333.3333333333333\" y2=\"186\" stroke=\"#9fb2c6\" stroke-width=\"1\" stroke-dasharray=\"3,3\"></line><text x=\"305\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#c8102e\">2/12</text><text x=\"333.3333333333333\" y=\"200\" text-anchor=\"middle\" font-size=\"9\" fill=\"#2c2a72\">5e uur</text><line x1=\"390\" y1=\"34\" x2=\"390\" y2=\"186\" stroke=\"#9fb2c6\" stroke-width=\"1\" stroke-dasharray=\"3,3\"></line><text x=\"361.6666666666667\" y=\"102\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#c8102e\">1/12</text><text x=\"390\" y=\"200\" text-anchor=\"middle\" font-size=\"9\" fill=\"#2c2a72\">6e uur</text>\n<text x=\"215\" y=\"256\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">de 1/12-regel: van HW naar LW in 6 uur</text>\n<text x=\"215\" y=\"272\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">per uur: 1-2-3-3-2-1 twaalfden van het verval — traag, snel, traag (blauw: de werkelijke kromme)</text>\n</svg>","cap":"De getijkromme met de 1/12-regel: 1-2-3-3-2-1.","half":true},{"svg":"<svg viewBox=\"0 0 430 230\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<rect x=\"20\" y=\"14\" width=\"390\" height=\"164\" fill=\"#cfe0ee\" stroke=\"#333\" stroke-width=\"1.6\"></rect>\n<path d=\"M410,14 L410,70 Q360,86 330,70 Q300,54 320,30 Q334,14 366,14 Z\" fill=\"#f2e9c4\" stroke=\"#c9b878\" stroke-width=\"1.6\"></path>\n<path d=\"M20,178 L20,140 Q84,132 118,150 Q150,166 132,178 Z\" fill=\"#f2e9c4\" stroke=\"#c9b878\" stroke-width=\"1.6\"></path>\n<g transform=\"translate(58,46) rotate(-18)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"2.3\"></path></g><g transform=\"translate(112,54) rotate(-16)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"3\"></path></g><g transform=\"translate(166,46) rotate(-14)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"1.6\"></path></g><g transform=\"translate(220,54) rotate(-12)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"2.3\"></path></g><g transform=\"translate(274,46) rotate(-10)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"3\"></path></g><g transform=\"translate(328,54) rotate(-8)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"1.6\"></path></g><g transform=\"translate(58,78) rotate(-14)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"2.3\"></path></g><g transform=\"translate(112,86) rotate(-12)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"3\"></path></g><g transform=\"translate(166,78) rotate(-10)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"1.6\"></path></g><g transform=\"translate(220,86) rotate(-8)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"2.3\"></path></g><g transform=\"translate(274,78) rotate(-6)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"3\"></path></g><g transform=\"translate(328,86) rotate(-4)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"1.6\"></path></g><g transform=\"translate(58,110) rotate(-10)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"2.3\"></path></g><g transform=\"translate(112,118) rotate(-8)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"3\"></path></g><g transform=\"translate(166,110) rotate(-6)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"1.6\"></path></g><g transform=\"translate(220,118) rotate(-4)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"2.3\"></path></g><g transform=\"translate(274,110) rotate(-2)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"3\"></path></g><g transform=\"translate(328,118) rotate(0)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"1.6\"></path></g><g transform=\"translate(58,142) rotate(-6)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"2.3\"></path></g><g transform=\"translate(112,150) rotate(-4)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"3\"></path></g><g transform=\"translate(166,142) rotate(-2)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#e8862c\" stroke-width=\"1.6\"></path></g><g transform=\"translate(220,150) rotate(0)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"2.3\"></path></g><g transform=\"translate(274,142) rotate(2)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"3\"></path></g><g transform=\"translate(328,150) rotate(4)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#2f8f4f\" stroke-width=\"1.6\"></path></g><g transform=\"translate(160,108) rotate(-8)\"><path d=\"M-16,0 L8,0 M8,0 L2,-4 M8,0 L2,4\" fill=\"none\" stroke=\"#c8102e\" stroke-width=\"2.2\"></path><rect x=\"-14\" y=\"-4.5\" width=\"20\" height=\"9\" fill=\"#c8102e\"></rect><text x=\"-4\" y=\"2.6\" text-anchor=\"middle\" font-size=\"6.5\" font-weight=\"bold\" fill=\"#fff\">1,6/2,4</text></g>\n<text x=\"38\" y=\"30\" font-size=\"9\" font-weight=\"bold\" fill=\"#2c2a72\">3h VOOR HW Vlissingen</text>\n<circle cx=\"160\" cy=\"108\" r=\"17\" fill=\"none\" stroke=\"#2c2a72\" stroke-width=\"1.8\"></circle>\n<text x=\"214\" y=\"170\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" fill=\"#c8102e\">rood: 1,6 kn doodtij · 2,4 kn springtij</text>\n<text x=\"215\" y=\"206\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">de stroomatlas lezen (HP 33)</text>\n<text x=\"215\" y=\"222\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">13 kaartjes rond HW Vlissingen · pijlrichting = stroomrichting, dikte + cijfers = sterkte</text>\n</svg>","cap":"De stroomatlas: twee getallen per pijl — doodtij | springtij.","half":true}],"vragen":[{"t":"Kaartdiepte 0,4 m. De rijzing bij hoogwater doodtij is 2,1 m. Wat is de werkelijke diepte op dat moment?","o":["2,5 m","1,7 m","2,1 m"],"u":"Werkelijke diepte = rijzing + kaartdiepte = 2,1 + 0,4 = <b>2,5 m</b> (teken het lagenmodel: LAT → bodem → rijzing).","a":"Les 7.3 (berekeningen)"},{"t":"Voor een haven geldt: LAT = NAP − 250 cm. De actuele waterstand is NAP + 10 cm. Wat is de rijzing?","o":["26 dm","24 dm","16 dm"],"u":"Rijzing = afstand boven LAT = 250 + 10 = 260 cm = <b>26 dm</b>. RWS-getijtafels geven NAP-standen; tel de NAP–LAT-afstand erbij op.","a":"Les 7.3 (NAP↔LAT)"},{"t":"Kaartdiepte 1,8 m; rijzing op dit moment 0,9 m; je diepgang is 1,2 m. Hoeveel water houd je onder de kiel?","o":["1,5 m","0,9 m","2,1 m"],"u":"Werkelijke diepte = 1,8 + 0,9 = 2,7 m; kielspeling = 2,7 − 1,2 = <b>1,5 m</b>.","a":"Les 7.3 (berekeningen)"},{"t":"In een stroomatlaspijl staat '1.2|2.0'. Wat lees je?","o":["Stroomsnelheid 1,2 kn bij doodtij en 2,0 kn bij springtij","Minimale en maximale waterdiepte","Ebsnelheid en vloedsnelheid"],"u":"Het cijferpaar = <b>doodtij | springtij</b>; de pijlrichting = stroomrichting. Deze gegevens voeden de constructies van les 6.","a":"Les 7.3 (stroomatlas)"},{"t":"Volgens de 1/12-regel: welk deel van het verval is twee uur ná hoogwater verstreken?","o":["3/12 — een kwart (1/12 in het eerste uur + 2/12 in het tweede)","2/12","6/12 — de helft"],"u":"Per uur 1-2-3-3-2-1 twaalfden; cumulatief 1/12 · <b>3/12</b> · 6/12 · 9/12 · 11/12 · 12/12.","a":"Les 7.3 (1/12-regel)"},{"typ":"in","t":"Wantijpassage. Laagwater is om 07:40; het verval is 2,4 m. Je hebt 1,2 m stijging boven het LW-niveau nodig om veilig te passeren. Gebruik de 1/12-regel: vanaf welk tijdstip kan het? (UU:MM)","ans":"10:40","marge":2,"fmt":"tijd","eh":"uur","u":"Stijging per uur: 1/12 = 0,2 · 2/12 = 0,4 · 3/12 = 0,6 → cumulatief 0,2 / 0,6 / <b>1,2 m na 3 uur</b> → 07:40 + 3:00 = <b>10:40</b>.","a":"1/12-regel (marge ±2 min)"}]};
CONTENT["7.4.1"]={"theorie":"<p>De meteo-basis ken je uit les 1: gemiddelde luchtdruk 1013 hPa, isobaren dicht bij elkaar = veel wind, lucht stroomt van hoog naar laag met een afwijking naar <b>rechts</b> (noordelijk halfrond), H spiraalt rechtsom eruit, L linksom erin, krimpen = tegen de klok (verslechtering), ruimen = met de klok. <b>Mist</b> = zicht onder 1 km; windwaarschuwingen vanaf kracht 6.</p><h4>Fronten</h4><ul><li>Een <b>frontvlak</b> is de overgangszone tussen twee luchtsoorten.</li><li><b>Warmtefront</b>: warme lucht glijdt óver de koude heen — stratusbewolking en langdurige (mot)regen bij passage.</li><li><b>Koufront</b>: koude lucht wringt zich ónder de warme — daarachter heldere lucht, losse stapelwolken, korte buien en W- tot NW-wind met stoten.</li><li>Bij een <b>trog</b> (dicht opeengepakte isobaren achter het depressiecentrum): buien met veel wind en windstoten. Passeert een depressie ten zuiden van je, dan <b>krimpt</b> de wind bij jou.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_hl7\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_hl7\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_hl7\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_hl7\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <g transfor f\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_fr\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_fr\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <line x1=\"215\" y1=\"14\" x2=\"215\" y2=\"200\" stroke=\"#c6d2dc\" stroke-width=\"1.5\"></line>\n <text x=\"110\" y=\"26\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#a12020\">warmtefront</text>\n <path d=\"M20,180 L200,60\" stroke=\"#c22222\" stroke-width=\"2.4\" fill=\"none\"></path>\n <path d=\"M20,180 L200,180 Z\" stroke=\"#333\" stroke-width=\"1.2\"></path>\n <text x=\"60\" y=\"120\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#a12020\" transform=\"rotate(-33 60,120)\">warme lucht glijdt óp en óver</text>\n <text x=\"150\" y=\"168\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#1a5e8f\">koude lucht</text>\n <g fill=\"#8a9aa8\"><rect x=\"34\" y=\"132\" width=\"30\" height=\"8\" rx=\"3\"></rect><rect x=\"58\" y=\"108\" width=\"34\" height=\"8\" rx=\"3\"></rect><rect x=\"86\" y=\"84\" width=\"38\" height=\"8\" rx=\"3\"></rect></g>\n <g stroke=\"#1a5e8f\" stroke-width=\"1.6\"><line x1=\"46\" y1=\"146\" x2=\"42\" y2=\"158\"></line><line x1=\"60\" y1=\"146\" x2=\"56\" y2=\"158\"></line><line x1=\"76\" y1=\"122\" x2=\"72\" y2=\"134\"></line><line x1=\"90\" y1=\"122\" x2=\"86\" y2=\"134\"></line></g>\n <text x=\"110\" y=\"212\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">stratus · langdurige (mot)regen</text>\n <text x=\"322\" y=\"26\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#1a5e8f\">koufront</text>\n <path d=\"M250,180 L318,64 L410,64\" stroke=\"#1a5e8f\" stroke-width=\"2.4\" fill=\"none\"></path>\n <text x=\"256\" y=\"150\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#1a5e8f\">koude lucht</text>\n <text x=\"262\" y=\"134\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#1a5e8f\">dringt eronder</text>\n <text x=\"352\" y=\"120\" font-size=\"9.5\" font-weight=\"bold\" fill=\"#a12020\">warme lucht omhoog</text>\n <g fill=\"#8a9aa8\"><path d=\"M330,92 q6,-18 16,-18 q14,-2 16,10 q12,-2 12,8 q0,10 -12,10 l-28,0 q-8,0 -4,-10 Z\"></path></g>\n <g stroke=\"#1a5e8f\" stroke-width=\"1.8\"><line x1=\"340\" y1=\"108\" x2=\"334\" y2=\"122\"></line><line x1=\"354\" y1=\"108\" x2=\"348\" y2=\"122\"></line><line x1=\"368\" y1=\"108\" x2=\"362\" y2=\"122\"></line></g>\n <text x=\"330\" y=\"212\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">erna: heldere lucht · stapelwolken · buien · W–NW-wind met stoten</text>\n <text x=\"215\" y=\"234\" text-anchor=\"middle\" font-size=\"10\">frontvlak = overgangszone tussen twee lúchtsoorten · trog = dichte isobaren achter het centrum → buien en windstoten</text>\n</svg>","cap":"Warmtefront: opglijdende warme lucht en motregen · koufront: buien en opklaringen erachter."},{"svg":"<svg viewBox=\"0 0 430 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_wt\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_wt\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_wt\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_wt\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <path d=\"M20,120 Q50,96 80,120 T140,120 T200,120 T260,120 T320,120 T380,120\" fill=\"none\" stroke=\"#134a70\" stroke-width=\"3\"></path>\n <path d=\"M30,150 L110,150\" stroke=\"#134a70\" stroke-width=\"5\" marker-end=\"url(#ah_wt)\"></path>\n <text x=\"34\" y=\"174\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#134a70\">noordelijke stroom (gáát naar N →)</text>\n <path d=\"M400,60 L320,60\" stroke=\"#888\" stroke-width=\"4\" marker-end=\"url(#ah_wt)\"></path>\n <text x=\"252\" y=\"44\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#555\">noordenwind (kómt uit N ←)</text>\n <path d=\"M150,116 Q166,84 186,116 M210,116 Q226,80 246,116 M270,116 Q286,84 306,116\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"3\"></path>\n <text x=\"215\" y=\"192\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#a12020\">zelfde naam = tegengesteld = korte, steile golfslag</text>\n</svg>","cap":"Wind tegen stroom: korte, steile golven — zelfde naam = tegengesteld!","half":true}],"vragen":[{"t":"De luchtdruk daalt, de wind krimpt en er verschijnen cirruswolken. Wat verwacht je?","o":["Weersverslechtering","Weersverbetering","Geen verandering"],"u":"Het klassieke trio: <b>dalende druk + krimpende wind (tegen de klok in) + cirrus</b> als eerste bode. Ruimen = met de klok mee.","a":"Les 7.4 (meteo)"},{"t":"Wat kenmerkt het weer áchter een koufront?","o":["Heldere lucht, losse stapelwolken, kortstondige buien en W–NW-wind met windstoten","Langdurige motregen onder een gesloten wolkendek","Windstilte en mist"],"u":"Koude lucht dringt zich onder de warme: buiig en vlagerig, maar helder tussendoor. Warmtefront = opglijdende warme lucht: stratus en langdurige (mot)regen.","a":"Les 7.4 (fronten)"},{"t":"Op de Waddenzee staat de wind pal tégen de getijstroom in. Wat doet dat met de golven?","o":["Korte, steile golven — onaangenaam en riskant voor kleine schepen","Langere, vlakkere golven dan normaal","Niets; golven worden alleen door de wind bepaald"],"u":"Wind tegen stroom stuwt de golven op: ze worden korter en steiler, met brekende koppen. Draait de stroom mee met de wind, dan strekken de golven juist. Plan een wantij- of zeegatpassage dus ook op de stroomrichting.","a":"Les 7.4 (meteo/zeegang)","v":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\"> <defs><marker id=\"ah_F21\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker></defs> <rect x=\"0\" y=\"84\" width=\"430\" height=\"106\" fill=\"#3a7ab8\" opacity=\".35\"></rect><path d=\"M20,96 Q36,82 50,96 Q66,82 80,96 Q96,82 110,96 Q126,82 140,96 Q156,82 170,96 Q186,82 200,96 Q216,82 230,96 Q246,82 260,96 Q276,82 290,96 Q306,82 320,96 Q336,82 350,96 Q366,82 380,96 Q396,82 410,96\" fill=\"none\" stroke=\"#0d4ea0\" stroke-width=\"2\"></path><path d=\"M44,85 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M104,85 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M164,85 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M224,85 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M284,85 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M344,85 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M404,85 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M20,114 Q36,100 50,114 Q66,100 80,114 Q96,100 110,114 Q126,100 140,114 Q156,100 170,114 Q186,100 200,114 Q216,100 230,114 Q246,100 260,114 Q276,100 290,114 Q306,100 320,114 Q336,100 350,114 Q366,100 380,114 Q396,100 410,114\" fill=\"none\" stroke=\"#0d4ea0\" stroke-widt
