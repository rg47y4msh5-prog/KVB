th d=\"M104,139 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M164,139 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M224,139 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M284,139 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M344,139 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M404,139 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M20,168 Q36,154 50,168 Q66,154 80,168 Q96,154 110,168 Q126,154 140,168 Q156,154 170,168 Q186,154 200,168 Q216,154 230,168 Q246,154 260,168 Q276,154 290,168 Q306,154 320,168 Q336,154 350,168 Q366,154 380,168 Q396,154 410,168\" fill=\"none\" stroke=\"#0d4ea0\" stroke-width=\"2\"></path><path d=\"M44,157 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M104,157 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M164,157 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M224,157 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M284,157 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M344,157 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path><path d=\"M404,157 q4,-5 9,-2\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.4\"></path> <g transform=\"translate(105,44)\"><line x1=\"-34\" y1=\"0\" x2=\"34\" y2=\"0\" stroke=\"#0d4ea0\" stroke-width=\"3.4\" marker-end=\"url(#ah_F21)\"></line></g><text x=\"105\" y=\"28\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#0d4ea0\">wind</text> <g transform=\"translate(325,44) rotate(180)\"><line x1=\"-34\" y1=\"0\" x2=\"34\" y2=\"0\" stroke=\"#2f8f4f\" stroke-width=\"3.4\" marker-end=\"url(#ah_F21)\"></line></g><text x=\"325\" y=\"28\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#2f8f4f\">stroom</text> <text x=\"215\" y=\"226\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">wind tegen stroom</text> <text x=\"215\" y=\"242\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">korte, steile golven met brekende koppen — wat doet deze combinatie met de golven?</text> </svg>"}]};
CONTENT["7.4.2"]={"theorie":"<h4>Wolken lezen</h4><p>Opstijgende lucht koelt af; het teveel aan waterdamp condenseert tot wolken (heel hoog: ijskristallen). De ladder van hoog naar laag: <b>cirrus</b> (windveren, ijskristallen — vaak de eerste bode van slechter weer), cirrostratus/cirrocumulus, <b>altostratus/altocumulus</b>, <b>nimbostratus</b> (regen), <b>stratus</b>/stratocumulus (laag), en de stapelwolken <b>cumulus</b> en <b>cumulonimbus</b> — die laatste (helderwit van buiten, donker van binnen) brengt zware buien met windstoten. Bij naderend onweer: pas op voor een plotselinge winddraaiing die een veilige hogerwal in een lagerwal verandert.</p><h4>Luchtsoorten en golven</h4><ul><li>Een luchtsoort krijgt zijn karakter door lang verblijf in het <b>brongebied</b>: arctisch (winter, vorst, strak zicht), polair-maritiem (koel, vochtig, stapelwolken, NW–N), Afrikaans-tropisch ('s zomers droog en warm, stoffig, matig zicht).</li><li><b>Wind tegen stroom</b> geeft korte, steile golfslag. Ezelsbrug: stroom heet naar waar hij heen gáát, wind naar waar hij vandaan kómt — dus <b>zelfde naam = tegengesteld</b> (noordenwind tegen noordgaande stroom).</li><li>Beaufort blijft de meetlat: 5 = vrij krachtig (overal schuimkoppen), 6 = krachtig, 7 = hard.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 478 250\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_wl\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_wl\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_wl\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_wl\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <g font-size=\"9.5\">\n <rect x=\"20\" y=\"30\" width=\"390\" height=\"52\" fill=\"#e8f0fa\" stroke=\"#c6d2dc\"></rect><text x=\"28\" y=\"46\" font-weight=\"bold\">hoog (ijskristallen)</text><text x=\"28\" y=\"62\">cirrus = windveren (éérste bode!) · cirrostratus = sluier · cirrocumulus = hoge schaapjes</text>\n <rect x=\"20\" y=\"88\" width=\"390\" height=\"52\" fill=\"#dde8f4\" stroke=\"#c6d2dc\"></rect><text x=\"28\" y=\"104\" font-weight=\"bold\">middelhoog</text><text x=\"28\" y=\"120\">altostratus · altocumulus · nimbostratus = regenwolk</text>\n <rect x=\"20\" y=\"146\" width=\"390\" height=\"44\" fill=\"#cfdeee\" stroke=\"#c6d2dc\"></rect><text x=\"28\" y=\"162\" font-weight=\"bold\">laag</text><text x=\"28\" y=\"178\">stratocumulus · stratus</text>\n <rect x=\"20\" y=\"196\" width=\"390\" height=\"44\" fill=\"#c2d5e8\" stroke=\"#c6d2dc\"></rect><text x=\"28\" y=\"212\" font-weight=\"bold\">stapel</text><text x=\"28\" y=\"228\">cumulus · <tspan fill=\"#a12020\" font-weight=\"bold\">cumulonimbus = onweer: wit van buiten, donker van binnen → zware buien + windstoten</tspan></text>\n </g>\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">stijgende lucht koelt af → condensatie → wolken (hygrometer meet waterdamp)</text>\n</svg>","cap":"De wolkenladder van cirrus tot cumulonimbus."},{"svg":"<svg viewBox=\"0 0 430 220\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_bf\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_bf\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"tonR_bf\"><path d=\"M-11,14 L11,14 L11,-12 L-11,-12 Z\" fill=\"#c62828\" stroke=\"#7a1010\" stroke-width=\"1.5\"></path></g>\n  <g id=\"tonG_bf\"><path d=\"M-11,14 L11,14 L0,-16 Z\" fill=\"#2e7d32\" stroke=\"#14401a\" stroke-width=\"1.5\"></path></g>\n </defs>\n\n <g font-size=\"9\" text-anchor=\"middle\">\n <g transform=\"translate(0,30)\">\n <rect x=\"20\" y=\"0\" width=\"58\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"49\" y=\"14\" font-weight=\"bold\">0</text><text x=\"49\" y=\"27\">windstil</text>\n <rect x=\"82\" y=\"0\" width=\"58\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"111\" y=\"14\" font-weight=\"bold\">1–2</text><text x=\"111\" y=\"27\">zwak</text>\n <rect x=\"144\" y=\"0\" width=\"58\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"173\" y=\"14\" font-weight=\"bold\">3–4</text><text x=\"173\" y=\"27\">matig</text>\n <rect x=\"206\" y=\"0\" width=\"58\" height=\"34\" fill=\"#fde8c8\" stroke=\"#e07b00\" stroke-width=\"2\"></rect><text x=\"235\" y=\"14\" font-weight=\"bold\">5</text><text x=\"235\" y=\"27\">vrij krachtig</text>\n <rect x=\"268\" y=\"0\" width=\"58\" height=\"34\" fill=\"#fdd\" stroke=\"#c22222\" stroke-width=\"2\"></rect><text x=\"297\" y=\"14\" font-weight=\"bold\">6</text><text x=\"297\" y=\"27\">krachtig</text>\n <rect x=\"330\" y=\"0\" width=\"58\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"359\" y=\"14\" font-weight=\"bold\">7</text><text x=\"359\" y=\"27\">hard</text>\n </g>\n <g transform=\"translate(0,84)\">\n <rect x=\"20\" y=\"0\" width=\"70\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"55\" y=\"14\" font-weight=\"bold\">8</text><text x=\"55\" y=\"27\">stormachtig</text>\n <rect x=\"94\" y=\"0\" width=\"70\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"129\" y=\"14\" font-weight=\"bold\">9</text><text x=\"129\" y=\"27\">storm</text>\n <rect x=\"168\" y=\"0\" width=\"70\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"203\" y=\"14\" font-weight=\"bold\">10</text><text x=\"203\" y=\"27\">zware storm</text>\n <rect x=\"242\" y=\"0\" width=\"78\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"281\" y=\"14\" font-weight=\"bold\">11</text><text x=\"281\" y=\"27\">zeer zware storm</text>\n <rect x=\"324\" y=\"0\" width=\"64\" height=\"34\" fill=\"#fff\" stroke=\"#c6d2dc\"></rect><text x=\"356\" y=\"14\" font-weight=\"bold\">12</text><text x=\"356\" y=\"27\">orkaan</text>\n </g></g>\n <text x=\"215\" y=\"156\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#e07b00\">5 Bft = overal witte schuimkoppen (observatievraag!)</text>\n <text x=\"215\" y=\"178\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#c22222\">vanaf 6 Bft: windwaarschuwing voor kust- en binnenwateren</text>\n <text x=\"215\" y=\"202\" text-anchor=\"middle\" font-size=\"10\">mist (scheepvaart) = zicht &lt; 1 km</text>\n</svg>","cap":"De Beaufort-strip: herken de windkracht aan het wateroppervlak."}],"vragen":[{"t":"Op het water zie je overal witte schuimkoppen. Welke windkracht hoort daarbij?","o":["5 Bft — vrij krachtige wind","3 Bft — matige wind","8 Bft — stormachtige wind"],"u":"<b>Overal schuimkoppen = 5 Bft.</b> Het rijtje: 5 vrij krachtig · 6 krachtig (vanaf hier windwaarschuwingen) · 7 hard.","a":"Les 7.4 (Beaufort)"}]};
CONTENT["8.1.1"]={"theorie":"<p>De Westerschelde is de drukke corridor naar Antwerpen; het <b>SRW</b> mengt daarom BPR-logica met zeerecht (BVA). Eerst de begrippen die nét anders zijn dan je gewend bent:</p><ul><li><b>Klein schip</b>: korter dan 20 m — maar een sleepboot, duwboot of vissend vissersschip telt <b>nooit</b> als klein, hoe kort ook.</li><li><b>Zeilschip</b>: alleen onder zeil zónder draaiende motor; zeil + motor = motorschip. Een <b>waterscooter</b> is hier een klein schip &gt; 20 km/u dat skiënd door of over het water gaat.</li><li><b>Bovenmaats zeeschip</b>: door de Rijkshavenmeester Westerschelde als zodanig aangemerkt vanwege lengte/diepgang. <b>Varend</b> = niet ten anker, niet gemeerd, niet aan de grond.</li><li><b>Vaarwater</b> = wat bevaarbaar is; <b>vaargeul</b> = het betonde deel; hoofd- en nevenvaargeul wijst de Rijkshavenmeester aan.</li></ul><h4>Vaarregels kleine schepen onderling</h4><p>Grotendeels vertrouwd: gestrekte koers stuurboordzijde gaat voor · zeil → roei → motor · ontmoetende motorboten beide naar stuurboord · kruisend: rechts gaat voor, nooit vóórlangs · zeilboten: bakboordzeil vóór stuurboordzeil, loef wijkt voor lij — plus een SRW-extra: twijfel je over de boeg van een loefwaartse zeiler, wijk dan uit. Goed zeemanschap blijft het vangnet.</p><h4>Marifoon en watersport</h4><p>Marifoonplicht voor grote schepen én voor kleine schepen met goedgekeurde radar; vrijwillige marifoon = regels naleven. Zwemmen, waterskiën, zeilplanken en waterscooters: verboden in de vaargeul, bij veerpontroutes, haveningangen, ankerplaatsen en meergelegenheden. Verkeersaanwijzingen van de Rijkshavenmeester zijn bindend, en (behalve op open bootjes) horen het SRW en de actuele zeekaart aan boord — papier of digitaal.</p>","vis":[{"svg":"<svg viewBox=\"-10 0 450 230\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_md\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_md\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"gschip_md\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-66\" y=\"-9\" width=\"14\" height=\"18\" rx=\"2\" fill=\"#2aa89f\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><rect x=\"-46\" y=\"-9\" width=\"26\" height=\"18\" rx=\"2\" fill=\"#2aa89f\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><rect x=\"-14\" y=\"-9\" width=\"26\" height=\"18\" rx=\"2\" fill=\"#2aa89f\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><rect x=\"18\" y=\"-9\" width=\"26\" height=\"18\" rx=\"2\" fill=\"#2aa89f\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"66\" cy=\"0\" r=\"3\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"zboot_md\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-20\" y=\"-5.5\" width=\"17\" height=\"11\" rx=\"4\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"4\" cy=\"0\" r=\"2.5\" fill=\"#2c2a72\"></circle></g>\n  <g id=\"gzeil_md\"><path d=\"M-58,-13 L42,-13 Q58,-13 58,0 Q58,13 42,13 L-58,13 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-40\" y=\"-8\" width=\"52\" height=\"16\" rx=\"2\" fill=\"#2aa89f\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"0\" cy=\"0\" r=\"3\" fill=\"#2c2a72\"></circle><line x1=\"0\" y1=\"0\" x2=\"-40\" y2=\"9\" stroke=\"#2c2a72\" stroke-width=\"3\"></line></g>\n </defs>\n\n <g font-size=\"10.5\">\n <rect x=\"24\" y=\"34\" width=\"382\" height=\"36\" rx=\"6\" fill=\"#fde8e8\" stroke=\"#a12020\"></rect><text x=\"34\" y=\"57\" font-weight=\"bold\" fill=\"#a12020\">groot (≥ 20 m): marifoonplichtig</text>\n <rect x=\"24\" y=\"78\" width=\"382\" height=\"36\" rx=\"6\" fill=\"#fde8c8\" stroke=\"#e07b00\"></rect><text x=\"34\" y=\"101\" font-weight=\"bold\" fill=\"#7a4400\">klein mét binnenvaart-radar: óók marifoonplichtig</text>\n <rect x=\"24\" y=\"122\" width=\"382\" height=\"36\" rx=\"6\" fill=\"#e6f2e6\" stroke=\"#1e6b30\"></rect><text x=\"34\" y=\"145\" font-weight=\"bold\" fill=\"#1e6b30\">klein zonder radar: niet verplicht — maar héb je er een: gebruiken en uitluisteren</text>\n </g>\n <text x=\"215\" y=\"188\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#a12020\">wachthouden: altijd uitluisteren en reageren — ook gemeerd/ten anker, ook bij mooi weer</text>\n <text x=\"215\" y=\"214\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">radarreflector: elk klein schip, áltijd (enige uitzondering: zeilplank)</text>\n</svg>","cap":"De marifoon-drietrap: groot verplicht, klein met radar verplicht, vrijwillig = regels naleven."}],"vragen":[{"t":"Je vaart op de Westerschelde onder zeil en zet ook de motor bij. Wat ben je volgens het SRW?","o":["Een motorschip — een zeilschip is alleen een schip onder zeil waarvan de motor níét wordt gebruikt","Een zeilschip, want de zeilen staan nog","Een motorsailer, een aparte categorie"],"u":"<b>Zeil + motor = motorschip.</b> De definitie van zeilschip eist dat de voortstuwingswerktuigen niet worden gebruikt. Overdag hoort daar de zwarte kegel (punt omlaag) bij.","a":"SRW art. 2 (definities)"},{"t":"Een vissersschip van 16 m is op de Westerschelde aan het vissen. Is het volgens het SRW een 'klein schip'?","o":["Nee — sleepboten, duwboten en vissende vissersschepen zijn nooit 'klein schip', ook niet onder de 20 m","Ja — de 20 m-grens geldt voor elk schip zonder uitzondering","Alleen zolang het niet daadwerkelijk vist"],"u":"De definitie van 'klein schip' kent uitzonderingen: een sleepboot, duwboot of vissend vissersschip valt er nooit onder, ongeacht de lengte. Zo'n schip heeft dus altijd de rechten van een groot schip.","a":"SRW art. 2 (definities)"},{"t":"Twee kleine zeilschepen naderen elkaar op de Westerschelde met gevaar voor aanvaring. Het ene voert het zeil over bakboord, het andere over stuurboord. Wie gaat vóór?","o":["Het schip met het zeil over bakboord (wind van stuurboord) — het schip over stuurboordboeg wijkt","Het schip met het zeil over stuurboord — bakboordboeg wijkt","Het loefwaartse schip gaat altijd vóór"],"u":"SRW-boegtaal: het schip dat <b>over stuurboordboeg ligt</b> (zeil over stuurboord, wind van bakboord) <b>wijkt</b>. Uitkomst identiek aan de KVB1-regel: wind van stuurboord gaat vóór. Zelfde boeg: loef wijkt voor lij.","a":"SRW art. 42 (kleine schepen onderling)"},{"t":"Twee kleine zeilschepen naderen elkaar op de Westerschelde over dezélfde boeg; het ene ligt loefwaarts van het andere. Wie wijkt?","o":["Het loefwaartse schip — loef wijkt voor lij","Het lijwaartse schip — lij wijkt voor loef","Geen van beiden; over dezelfde boeg geldt rechts gaat voor"],"u":"Bij gelijke boeg beslist de windzijde: het loefwaartse schip (aan de kant waar de wind vandaan komt) wijkt voor het lijwaartse. Bij verschíllende boegen beslist de boeg: het schip over stuurboordboeg wijkt.","a":"SRW art. 42","v":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\"> <defs><marker id=\"ah_E3\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker></defs> <g transform=\"translate(70,44) rotate(0)\"><line x1=\"-22\" y1=\"0\" x2=\"22\" y2=\"0\" stroke=\"#0d4ea0\" stroke-width=\"3\" marker-end=\"url(#ah_E3)\"></line></g><text x=\"70\" y=\"32\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#0d4ea0\">wind</text><g transform=\"translate(150,140) rotate(0)\"><path d=\"M0,-22 C9,-12 10,6 6,20 L-6,20 C-10,6 -9,-12 0,-22 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><line x1=\"0\" y1=\"-4\" x2=\"14\" y2=\"16\" stroke=\"#7c1d14\" stroke-width=\"2.6\"></line></g><g transform=\"translate(300,120) rotate(0)\"><path d=\"M0,-22 C9,-12 10,6 6,20 L-6,20 C-10,6 -9,-12 0,-22 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><line x1=\"0\" y1=\"-4\" x2=\"14\" y2=\"16\" stroke=\"#7c1d14\" stroke-width=\"2.6\"></line></g> <text x=\"215\" y=\"226\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">twee zeilboten over dezelfde boeg</text> <text x=\"215\" y=\"242\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">wind zoals aangegeven — wie wijkt?</text> </svg>"},{"t":"Je kleine motorjacht (11 m) is uitgerust met een voor de binnenvaart goedgekeurde radar. Ben je op de Westerschelde marifoonplichtig?","o":["Ja — een klein schip mét binnenvaartradar is wél marifoonplichtig","Nee, de marifoonplicht geldt alleen voor grote schepen","Alleen bij beperkt zicht"],"u":"De drietrap: groot (≥ 20 m) altijd plichtig · klein niet · <b>klein mét goedgekeurde binnenvaartradar wél</b>. En wie vrijwillig een marifoon heeft, moet hem gebruiken en uitluisteren waar voorgeschreven.","a":"SRW (marifoonbepalingen)"}]};
CONTENT["8.2.1"]={"theorie":"<p>De verlichting op de Westerschelde volgt de KVB1-lijn, met SRW-accenten:</p><ul><li><b>Open bootjes &lt; 7 m</b> (≤ 13 km/u): één wit rondomschijnend licht. Let op: een open <b>zeilboot van 8 m</b> is te lang voor deze uitzondering — die voert boordlichten + heklicht (of driekleurenlicht).</li><li><b>Motorboten &lt; 20 m</b>: minimaal gecombineerde boordlichten + wit rondomschijnend licht (toplicht/heklicht ineen; in het SRW mag die samenvoeging tot 12 m); maximaal de grote-schip-opstelling.</li><li><b>Zeilboten</b>: als motorboot maar zonder toplicht, óf het driekleurenlicht — <b>óf-óf</b>, nooit samen, en motor aan = motorbootverlichting + overdag de zwarte kegel.</li><li><b>Grote schepen</b>: tweede toplicht (achterste hoger) verplicht boven 110 m; ten anker twee ankerlichten (voorste hoger); grote zeilschepen rood-boven-groen.</li></ul><h4>Bijzondere beelden</h4><ul><li><b>Onmanoeuvreerbaar</b>: twee rode rondomlichten / twee ballen. <b>Beperkt manoeuvreerbaar</b> (werkzaamheden): bol-ruit-bol, rood-wit-rood; de vrije zijde toont twee ruiten/dubbel groen, de gesloten zijde twee bollen/dubbel rood.</li><li><b>Aan de grond of gezonken</b>: ankerlichten + twee rode lichten boven elkaar / drie ballen.</li><li><b>Voorzichtig voorbijvaren</b> (golfslaggevoelig): rood bóven wit licht, overdag een rood-wit gebaand bord of vlag.</li><li><b>Slepen</b>: twee toplichten + geel heklicht (meerdere slepers: drie toplichten); gesleept binnenschip wit rondomlicht, de laatste ook een heklicht. <b>Vissersschip</b>: diabolo / wit met groen erboven. Geel flikkerlicht = werkzaamheden, blauw flikkerlicht = politieopdracht (tussen twee blauwe flikkerlichten: verboden zone!).</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" class=\"nacht\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#16202e\">\n<defs>\n  <marker id=\"ah_kn\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><  opacity=\".3\"></circle><circle cx=\"34\" cy=\"0\" r=\"5\" fill=\"#ffd93b\"></circle><text y=\"42\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#dfe8f2\" font-weight=\"bold\">sleepboot: 2 toplichten + géél heklicht</text><text y=\"56\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#9fb2c6\">2 of meer sleepboten aan één sleep: elk 3 toplichten</text></g>\n <line x1=\"158\" y1=\"114\" x2=\"252\" y2=\"114\" stroke=\"#9fb2c6\" stroke-width=\"2\" stroke-dasharray=\"6,5\"></line>\n <g transform=\"translate(310,120)\"><use href=\"#kschip_sc\" transform=\"scale(.9)\"></use><line x1=\"-4\" y1=\"-11\" x2=\"-4\" y2=\"-46\" stroke=\"#5a6a7c\" stroke-width=\"3\"></line><circle cx=\"-4\" cy=\"-50\" r=\"15.6\" fill=\"#ffffff\" opacity=\".14\"></circle><circle cx=\"-4\" cy=\"-50\" r=\"9.6\" fill=\"#ffffff\" opacity=\".3\"></circle><circle cx=\"-4\" cy=\"-50\" r=\"6\" fill=\"#ffffff\"></circle><circle cx=\"34\" cy=\"0\" r=\"13.0\" fill=\"#ffffff\" opacity=\".14\"></circle><circle cx=\"34\" cy=\"0\" r=\"8.0\" fill=\"#ffffff\" opacity=\".3\"></circle><circle cx=\"34\" cy=\"0\" r=\"5\" fill=\"#ffffff\"></circle><text y=\"42\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#dfe8f2\" font-weight=\"bold\">gesleept: wit rondomlicht</text><text y=\"56\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#9fb2c6\">laatste van de sleep: óók wit heklicht</text></g>\n <text x=\"215\" y=\"26\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#dfe8f2\">binnenschip dat sleept: heklicht → geel sleeplicht</text>\n <text x=\"215\" y=\"232\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#9fb2c6\">werk in/nabij het vaarwater: extra geel flikkerlicht</text><text x=\"215\" y=\"245\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#9fb2c6\">politieopdracht: blauw flikkerlicht (zone tussen twee schepen = verboden)</text>\n</svg>","cap":"Slepen op de Westerschelde: toplichten tellen en geel heklicht."}],"vragen":[{"t":"Het is nacht. Je zeilt op de Westerschelde met een open zeilboot van 8 meter en voert alleen een wit rondomschijnend licht in de masttop (zie beeld). Is dat voldoende?","v":"<svg viewBox=\"0 0 430 200\" class=\"nacht\"><line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"50\" stroke=\"#5a6a7c\" stroke-width=\"3\"/><circle cx=\"215\" cy=\"44\" r=\"8\" fill=\"#fff\"/><path d=\"M150,150 L280,150 Q296,150 296,160 Q296,170 280,170 L150,170 Z\" fill=\"#2a3a4c\" stroke=\"#5a6a7c\" stroke-width=\"2\"/><text x=\"215\" y=\"192\" text-anchor=\"middle\" font-size=\"11\" fill=\"#dfe8f2\" font-weight=\"bold\">zeilboot 8 m — alleen wit rondomlicht</text></svg>","o":["Nee — één wit rondomlicht volstaat alleen voor boten korter dan 7 m (en niet sneller dan 13 km/u)","Ja, voor elk klein zeilschip is dit voldoende","Ja, want een open boot hoeft geen boordlichten te voeren"],"u":"De alleen-witlicht-regel stopt bij <b>7 m</b>. Een zeilboot van 8 m voert minimaal boordlichten + heklicht (of een driekleurenlicht in de top).","a":"SRW art. 41"},{"t":"Je zeilt 's nachts met het driekleurenlicht in de masttop en start de motor. Wat doe je met de verlichting?","o":["Driekleurenlicht uit; boordlichten, toplicht en heklicht aan (en overdag: zwarte kegel hijsen)","Niets — het driekleurenlicht blijft geldig","Driekleurenlicht aan laten en er een toplicht bij voeren"],"u":"Met de motor bij ben je een <b>motorschip</b>: motorverlichting voeren. Driekleurenlicht + toplicht combineren mag nooit. Het is óf-óf — en zeilend een haven binnenlopen mag niet, dus alléén een driekleurenlicht installeren is onhandig.","a":"SRW art. 25/41"},{"t":"Je motorjacht is 10,5 m lang. Mag je 's nachts het toplicht en heklicht vervangen door één wit rondomschijnend licht?","o":["Ja — onder de 12 m mag dat, maar altijd in combinatie met de boordlichten","Nee, dat mag alleen onder de 7 m","Ja, en de boordlichten mogen dan ook uit"],"u":"De <b>12 m-regel</b>: top- + heklicht → één wit rondomlicht, mét boordlichten. De alleen-witlicht-regel (zónder boordlichten) stopt al bij 7 m en ≤ 13 km/u.","a":"SRW art. 41"},{"t":"Je nadert 's nachts op de Westerschelde een baggerwerktuig dat aan de ene zijde twee rode lichten en aan de andere zijde twee groene lichten boven elkaar toont. Aan welke kant passeer je?","v":"<svg viewBox=\"0 0 430 200\" class=\"nacht\"><rect x=\"150\" y=\"90\" width=\"130\" height=\"32\" rx=\"6\" fill=\"#3a4656\" stroke=\"#5a6a7c\" stroke-width=\"2\"/><line x1=\"130\" y1=\"90\" x2=\"130\" y2=\"46\" stroke=\"#5a6a7c\" stroke-width=\"2\"/><circle cx=\"130\" cy=\"52\" r=\"7\" fill=\"#c62828\"/><circle cx=\"130\" cy=\"74\" r=\"7\" fill=\"#c62828\"/><line x1=\"300\" y1=\"90\" x2=\"300\" y2=\"46\" stroke=\"#5a6a7c\" stroke-width=\"2\"/><circle cx=\"300\" cy=\"52\" r=\"7\" fill=\"#2e7d32\"/><circle cx=\"300\" cy=\"74\" r=\"7\" fill=\"#2e7d32\"/><text x=\"215\" y=\"160\" text-anchor=\"middle\" font-size=\"11\" fill=\"#dfe8f2\" font-weight=\"bold\">baggerwerktuig, nacht</text></svg>","o":["Aan de zijde met de twee groene lichten — die kant van het vaarwater is vrij","Aan de zijde met de twee rode lichten","Aan beide zijden, mits langzaam"],"u":"Dubbel <b>groen</b> (dag: twee ruiten) = vaarwater aan die zijde vrij; dubbel rood (twee bollen) = niet vrij. Hoofdteken beperkt manoeuvreerbaar: rood-wit-rood / bol-ruit-bol.","a":"SRW (lichten en dagmerken)"},{"t":"Je ziet 's nachts op de Westerschelde een schip met drie rode rondomschijnende lichten loodrecht boven elkaar. Wat is dit?","o":["Een bovenmaats zeeschip (door zijn diepgang beperkt manoeuvreerbaar) — overdag: een zwarte cilinder","Een onmanoeuvreerbaar schip","Een vissersschip met uitstaand vistuig"],"u":"<b>3× rood = bovenmaats</b>: door de Rijkshavenmeester aangemerkt wegens lengte/diepgang. Onmanoeuvreerbaar = 2× rood (2 ballen); vissersschip = groen boven wit (diabolo).","a":"SRW art. 28"},{"t":"'s Nachts nadert een schip met twee witte toplichten recht boven elkaar, boordlichten en een géél heklicht. Wat is dit?","o":["Een sleepboot met een sleep erachter — het gele licht is het sleeplicht","Een vissersschip met uitstaand tuig","Een schip met politieopdracht"],"u":"Zeesleep-conventie: <b>2 toplichten + geel heklicht</b>. Varen er twee of meer sleepboten aan één sleep, dan voert elk er drie. Het gesleepte schip: wit rondomlicht.","a":"SRW (slepen)"}]};
CONTENT["8.3.1"]={"theorie":"<h4>Voorrang: de SRW-eigenaardigheden</h4><ul><li><b>Klein wijkt voor groot</b> — óók met gestrekte koers stuurboordzijde (die regel geldt alleen nog tussen kleine schepen onderling).</li><li>Wie voorrang heeft, moet zijn <b>koers</b> behouden — de snelheid mag wél veranderen (BPR/BVA eisen koers én vaart).</li><li><b>Opdraaien</b> (van vóór naar tegen stroom) geeft voorrang; kop-voor-nemen niet.</li><li>Groot zeilschip wijkt voor groot motorschip. Schepen in een <b>vaargeul</b> hebben voorrang op alles wat die geul kruist of invaart.</li></ul><h4>Engtes en bochten</h4><ul><li><b>Engte mét stroom</b>: het tegen de stroom in varende schip houdt zich <b>gaande</b> (stroom \"doodvaren\") tot de tegenligger door is.</li><li><b>Nauwe bocht zónder stroom</b>: wie de buitenbocht aan stuurboord heeft, vaart door; de ander wacht.</li><li>Kleine hoofdvaargeulen (Oostgat, Sardijngeul, Walsoorden): schepen &lt; 12 m blijven eruit waar dat veilig kan, en moeten een startklare motor hebben die minstens 6 km/u door het water haalt.</li></ul><h4>Overige SRW-plichten</h4><ul><li><b>Radarreflector altijd</b> voeren (elk klein schip, behalve zeilplanken) — ook bij mooi weer.</li><li><b>Wacht houden</b>: met marifoon altijd uitluisteren en reageren, ook gemeerd of ten anker.</li><li><b>Ankerverbod</b> binnen 200 m van een kabel (geel bord met zwarte K); niets over de grond slepen.</li><li>Mistsein varend: één lange stoot per maximaal <b>twee</b> minuten (BPR: één minuut). Noodseinen: SOS, \"mayday\", oranje rook, armen op en neer, reeksen klokslagen of lange stoten.</li><li><b>Voorzorgsgebied Vlissingen</b>: denkbeeldige scheidingslijn — oostwaarts verkeer eronder, westwaarts erboven; ankeren verboden; geel schitterlicht op de radartoren = schepen komen via Sardijngeul/Oostgat van zee naar binnen.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_gg\" viewBox= width=\"188\" height=\"94\" rx=\"8\" fill=\"#fde8e8\" stroke=\"#a12020\"></rect>\n <text x=\"316\" y=\"52\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#a12020\">SRW</text>\n <text x=\"316\" y=\"70\" text-anchor=\"middle\" font-size=\"9.5\">de héle Westerschelde</text>\n <text x=\"316\" y=\"84\" text-anchor=\"middle\" font-size=\"9.5\">ook ter hoogte van Terneuzen</text>\n <text x=\"316\" y=\"98\" text-anchor=\"middle\" font-size=\"9.5\">= combinatie BPR + BVA</text>\n <rect x=\"20\" y=\"136\" width=\"190\" height=\"88\" rx=\"8\" fill=\"#e6f2e6\" stroke=\"#1e6b30\"></rect>\n <text x=\"115\" y=\"158\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#1e6b30\">SRE (+ BVA)</text>\n <text x=\"115\" y=\"176\" text-anchor=\"middle\" font-size=\"9.5\">Eemsmonding (NL/D)</text>\n <text x=\"115\" y=\"190\" text-anchor=\"middle\" font-size=\"9.5\">áánvulling op de BVA:</text>\n <text x=\"115\" y=\"204\" text-anchor=\"middle\" font-size=\"9.5\">daar gelden ze sámen</text>\n <rect x=\"222\" y=\"136\" width=\"188\" height=\"88\" rx=\"8\" fill=\"#f2f2f2\" stroke=\"#888\"></rect>\n <text x=\"316\" y=\"158\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#666\">BVA</text>\n <text x=\"316\" y=\"176\" text-anchor=\"middle\" font-size=\"9.5\">op zee (Noordzee)</text>\n <text x=\"316\" y=\"190\" text-anchor=\"middle\" font-size=\"9.5\">buiten de KVB2-examenstof</text>\n <text x=\"215\" y=\"244\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">routes: Breskens→Waarde = alléén SRW · Lauwersmeer→Delfzijl = BPR + SRE + BVA</text>\n</svg>","cap":"Tot slot: welk reglement waar geldt op het ruime water."}],"vragen":[{"t":"Je vaart met je jacht (9 m) een gestrekte koers langs de stuurboordzijde van het vaarwater. Een groot motorschip nadert met kruisende koers. Wie wijkt op de Westerschelde?","o":["Jij — op de Westerschelde wijkt klein áltijd voor groot; de gestrekte-koersregel geldt alleen tussen kleine schepen onderling","Het grote schip — gestrekte koers stuurboordzijde gaat altijd vóór","Beide schepen moeten naar stuurboord uitwijken"],"u":"<b>Dé SRW-flip:</b> in het BPR beschermt de gestrekte koers je ook tegen groot; in het SRW niet. Klein wijkt voor groot, altijd.","a":"SRW art. 18"},{"t":"Je hebt op de Westerschelde voorrang op een kruisend schip. Wat moet je doen?","o":["Je koers behouden — je snelheid mág je wel aanpassen","Koers én vaart behouden, zoals overal","Niets: het wijkende schip regelt alles"],"u":"In het SRW betekent voorrang hebben: <b>alleen koers behouden</b>; de snelheid mag wijzigen (BPR en BVA eisen koers én vaart). Redt de wijker het alleen niet, dan moet ook jij meewerken om de aanvaring te voorkomen.","a":"SRW art. 17"},{"t":"In een nauwe, stromende engte van de Westerschelde nadert een tegenligger. Jij vaart tégen de stroom in. Wat schrijft het SRW voor?","o":["Jij houdt je gaande — je vaart de stroom 'dood' (snelheid door het water = stroomsnelheid) tot de tegenligger gepasseerd is","De tegenligger wacht, want jij hebt stuurboordwal","Wie het eerst bij de engte is, vaart door"],"u":"Bij een engte, bocht of aanlegplaats mét stroom houdt het <b>opvarende</b> (tegen de stroom in varende) schip zich gaande. Zonder stroom in een nauwe bocht: het schip met de <b>buitenbocht aan stuurboord</b> vervolgt zijn weg.","a":"SRW art. 6/9"},{"t":"In een nauwe bocht van de Westerschelde zónder stroom naderen twee schepen elkaar van weerszijden. Wie vervolgt zijn weg?","o":["Het schip dat de buitenbocht aan stuurboord heeft","Het schip dat de binnenbocht aan stuurboord heeft","Het grootste schip, ongeacht de bocht"],"u":"Zonder stroom beslist de bocht: wie de búitenbocht aan stuurboordzijde heeft, vervolgt zijn weg; de ander wacht. Mét stroom geldt een andere regel: dan houdt het opvarende schip zich gaande tot de afvaart gepasseerd is.","a":"SRW art. 9","v":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\"> <defs><marker id=\"ah_E7\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker></defs> <path d=\"M0,0 L430,0 L430,58 C330,66 250,96 210,150 L150,210 L0,210 Z\" fill=\"#3f8f4f\" stroke=\"#2c6b3a\" stroke-width=\"2\"></path> <path d=\"M0,0 L0,-0 Z\" fill=\"none\"></path> <path d=\"M430,150 C360,150 300,176 268,210 L430,210 Z\" fill=\"#3f8f4f\" stroke=\"#2c6b3a\" stroke-width=\"2\"></path> <g transform=\"translate(360,100)\"><path d=\"M0,-22 C9,-12 10,6 6,20 L-6,20 C-10,6 -9,-12 0,-22 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\" transform=\"rotate(236)\"></path></g> <path d=\"M342,114 Q300,142 262,158\" fill=\"none\" stroke=\"#2c2a72\" stroke-width=\"2\" stroke-dasharray=\"6,5\" marker-end=\"url(#ah_E7)\"></path> <g transform=\"translate(215,182)\"><path d=\"M0,-22 C9,-12 10,6 6,20 L-6,20 C-10,6 -9,-12 0,-22 Z\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"2\" transform=\"rotate(68)\"></path></g> <path d=\"M235,172 Q255,164 272,158\" fill=\"none\" stroke=\"#7c1d14\" stroke-width=\"2\" stroke-dasharray=\"6,5\" marker-end=\"url(#ah_E7)\"></path> <text x=\"215\" y=\"226\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">nauwe bocht, geen stroom</text> <text x=\"215\" y=\"242\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">twee schepen naderen de bocht van weerszijden — wie vervolgt zijn weg?</text> </svg>"},{"t":"Op de radartoren van Vlissingen brandt een geel schitterlicht. Wat betekent dit?","o":["Er komen schepen van zee naar binnen via de Sardijngeul / het Oostgat","Het veer Vlissingen–Breskens steekt over","De haven van Vlissingen is gestremd"],"u":"Het gele schitterlicht waarschuwt voor <b>binnenkomend verkeer door de Sardijngeul (Oostgat)</b>. In het hele voorzorgsgebied geldt bovendien een ankerverbod; oostgaand verkeer blijft ten zuiden, westgaand ten noorden van de scheidingslijn.","a":"SRW art. 46/47"},{"t":"Je vaart van Breskens naar Waarde (zie kaartje). Met welke reglementen krijg je onderweg te maken?","v":"<svg viewBox=\"0 0 430 190\"><rect x=\"0\" y=\"0\" width=\"430\" height=\"70\" fill=\"#dfe8d2\"/><rect x=\"0\" y=\"130\" width=\"430\" height=\"60\" fill=\"#dfe8d2\"/><path d=\"M0,70 L430,70 L430,130 L0,130 Z\" fill=\"#a9cde6\"/><text x=\"60\" y=\"30\" font-size=\"10\" font-weight=\"bold\">Vlissingen</text><text x=\"215\" y=\"120\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#134a70\">Westerschelde</text><circle cx=\"60\" cy=\"140\" r=\"6\" fill=\"#134a70\"/><text x=\"60\" y=\"162\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">Breskens</text><text x=\"230\" y=\"152\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">Terneuzen</text><circle cx=\"386\" cy=\"66\" r=\"6\" fill=\"#134a70\"/><text x=\"386\" y=\"52\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">Waarde</text><path d=\"M70,134 Q210,96 378,72\" fill=\"none\" stroke=\"#e07b00\" stroke-width=\"3.5\" stroke-dasharray=\"9,6\"/></svg>","o":["Uitsluitend het SRW — dat geldt op de héle Westerschelde, óók ter hoogte van Terneuzen","Het SRW, en bij Terneuzen het SRKGT","Het SRW en op het brede westelijke deel de BVA"],"u":"Het SRKGT geldt alleen ín het Kanaal Gent–Terneuzen; de BVA geldt op zee. De hele rivier valt onder <b>één reglement: het SRW</b>.","a":"Toepassingsgebied reglementen"},{"t":"Wat geldt er in het voorzorgsgebied vóór Vlissingen?","o":["Een ankerverbod; oostgaand verkeer blijft ten zuiden en westgaand verkeer ten noorden van de scheidingslijn","Een algeheel vaarverbod voor kleine schepen","Alleen een meldplicht op het blokkanaal; verder gelden geen bijzondere regels"],"u":"Het voorzorgsgebied ordent het drukke verkeer vóór de rede: ankeren is er verboden en het verkeer wordt gescheiden — oostgaand ten zuiden, westgaand ten noorden van de scheidingslijn. Het gele schitterlicht op de radartoren waarschuwt daarbij voor binnenkomend verkeer via Sardijngeul/Oostgat.","a":"SRW art. 46/47"}]};

const app=document.getElementById("app");
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
const uHtml=u=>/<[a-z]/i.test(u)?u:esc(u); // uitleg mag opmaak bevatten (KVB2)

function lesVoortgang(les){
 const af=les.paras.filter(p=>gelezen[p[0]]).length;
 return {af,tot:les.paras.length,pct:Math.round(100*af/les.paras.length)};
}

function toonHome(){
 let h="";
 for(const deel of ["KVB1","KVB2"]){
  h+=`<h2>${deel==="KVB1"?"Deel 1 — Klein Vaarbewijs 1 (les 1–4)":"Deel 2 — Klein Vaarbewijs 2 (les 5–8)"}</h2>`;
  for(const les of LESSEN.filter(l=>l.deel===deel)){
   const v=lesVoortgang(les);
   h+=`<a class="kaart${v.af===v.tot?" af":""}" href="#les${les.nr}">
    <div class="titel">Les ${les.nr} · ${esc(les.titel)} →</div>
    <div class="sub">${les.paras.length} paragrafen</div>
    <div class="voortgang"><div style="width:${v.pct}%"></div></div>
    <div class="pct">${v.af} van ${v.tot} paragrafen gelezen</div></a>`;
  }
 }
 app.innerHTML=h;
}

function toonLes(nr){
 const les=LESSEN.find(l=>l.nr===nr);
 if(!les){location.hash="";return}
 const v=lesVoortgang(les);
 let h=`<div class="kruimel"><a href="#">← Alle lessen</a></div>
  <div class="paneel">
   <div class="titel" style="font-size:18px;font-weight:bold;color:var(--donker)">Les ${les.nr} · ${esc(les.titel)}</div>
   <div class="sub" style="font-size:13px;color:#555">${les.deel} · ${les.paras.length} paragrafen</div>
   <div class="voortgang"><div style="width:${v.pct}%"></div></div>
   <div class="pct">${v.af} van ${v.tot} paragrafen gelezen</div>`;
 for(const [id,titel] of les.paras){
  const c=CONTENT[id];
  h+=`<div class="para${gelezen[id]?" gelezen":""}" id="p${id.replace(/\./g,"-")}">
   <div class="pkop"><span class="pnr">${id}</span><span class="ptitel">${esc(titel)}</span>
    <button class="vink${gelezen[id]?" aan":""}" onclick="vink('${id}')">${gelezen[id]?"✓ gelezen":"markeer als gelezen"}</button></div>`;
  h+=c?renderInhoud(id,c)
      :`<div class="placeholder">Inhoud volgt — theorie, visuals en oefenvragen worden per les toegevoegd.</div>`;
  h+=`</div>`;
 }
 h+=`</div>
  <div class="lesnav">
   <span>${nr>1?`<button onclick="location.hash='#les${nr-1}'">← Les ${nr-1}</button>`:""}</span>
   <span><a href="${les.oefen}"><button>Oefenbank ${les.deel} ↗</button></a>
   ${nr<8?`<button class="primair" onclick="location.hash='#les${nr+1}'">Les ${nr+1} →</button>`:""}</span>
  </div>`;
 app.innerHTML=h;
 window.scrollTo(0,0);
}

/* Vraagweergave: vragen komen ongewijzigd uit de oefenbanken; de eerste
   optie in q.o is altijd het juiste antwoord, de weergavevolgorde wordt
   geschud. VORD/ANS onthouden volgorde en antwoord binnen de sessie. */
const VORD={},ANS={};
function shuf(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function renderInhoud(id,c){
 let h=`<div class="inhoud">`;
 if(c.theorie)h+=`<div class="theorie">${c.theorie}</div>`;
 const vis=c.vis||[];
 for(let i=0;i<vis.length;i++){
  const kaart=v=>`<div class="vis">${v.svg}<div class="cap">${esc(v.cap||"")}</div></div>`;
  if(vis[i].half){
   let j=i;while(j<vis.length&&vis[j].half)j++;
   h+=`<div class="visrij">${vis.slice(i,j).map(kaart).join("")}</div>`;
   i=j-1;
  }else h+=kaart(vis[i]);
 }
 if((c.vragen||[]).length){
  h+=`<div class="oefkop">Oefenvragen (uit de oefenbank)</div>`;
  c.vragen.forEach((q,i)=>{
   const uid=id.replace(/\./g,"-")+"-"+i;
   const beantw=ANS[uid]!==undefined,keuze=ANS[uid];
   h+=`<div class="vraag" id="v${uid}"><div class="vt"><b>${i+1}.</b> ${esc(q.t)}</div>${q.v||""}`;
   if(q.typ==="in"){
    /* invulvraag (KVB2): numeriek antwoord met marge */
    const goed=beantw&&Math.abs(parseFloat(String(keuze).replace(",","."))-q.ans)<=(q.marge||0);
    h+=`<div class="invul"><input type="text" inputmode="decimal" id="in${uid}" value="${beantw?esc(String(keuze)):""}" ${beantw?"disabled":""} placeholder="antwoord"> <span class="eh">${esc(q.eh||"")}</span> <button class="check" ${beantw?"disabled":""} onclick="antwoordIn('${uid}',${i},'${id}')">controleer</button></div>`;
    if(beantw)h+=`<div class="uitleg${goed?"":" fout"}">${goed?"✔ Goed!":"✘ Niet juist."} Juiste antwoord: <b>${q.ans}${esc(q.eh||"")}</b>${q.marge?` (marge ±${String(q.marge).replace(".",",")}${esc(q.eh||"")})`:""}. ${q.u}<div class="artref">${esc(q.a)}</div></div>`;
   }else{
    if(!VORD[uid])VORD[uid]=shuf(q.o.map((_,k)=>k));
    for(const o of VORD[uid]){
     let cls="optie";
     if(beantw){if(o===0)cls+=" goed";else if(o===keuze)cls+=" fout"}
     h+=`<button class="${cls}" ${beantw?"disabled":""} onclick="antwoord('${uid}',${i},'${id}',${o})">${esc(q.o[o])}</button>`;
    }
    if(beantw)h+=`<div class="uitleg${keuze===0?"":" fout"}">${keuze===0?"✔ Goed!":"✘ Niet juist."} ${uHtml(q.u)}<div class="artref">${esc(q.a)}</div></div>`;
   }
   h+=`</div>`;
  });
 }
 if(c.noot)h+=`<div class="placeholder">${esc(c.noot)}</div>`;
 return h+`</div>`;
}
function antwoordIn(uid,i,pid){
 if(ANS[uid]!==undefined)return;
 const el=document.getElementById("in"+uid);
 const ruw=(el.value||"").trim();
 if(!ruw)return;
 ANS[uid]=ruw;
 const q=CONTENT[pid].vragen[i];
 const goed=Math.abs(parseFloat(ruw.replace(",","."))-q.ans)<=(q.marge||0);
 el.disabled=true;
 const kader=document.getElementById("v"+uid);
 kader.querySelector(".check").disabled=true;
 const u=document.createElement("div");
 u.className="uitleg"+(goed?"":" fout");
 u.innerHTML=`${goed?"✔ Goed!":"✘ Niet juist."} Juiste antwoord: <b>${q.ans}${esc(q.eh||"")}</b>${q.marge?` (marge ±${String(q.marge).replace(".",",")}${esc(q.eh||"")})`:""}. ${q.u}<div class="artref">${esc(q.a)}</div>`;
 kader.appendChild(u);
}
function antwoord(uid,i,pid,gekozen){
 if(ANS[uid]!==undefined)return;
 ANS[uid]=gekozen;
 const q=CONTENT[pid].vragen[i],el=document.getElementById("v"+uid);
 const btns=el.querySelectorAll(".optie");
 btns.forEach(b=>b.disabled=true);
 VORD[uid].forEach((o,p)=>{
  if(o===0)btns[p].classList.add("goed");
  else if(o===gekozen)btns[p].classList.add("fout");
 });
 const u=document.createElement("div");
 u.className="uitleg"+(gekozen===0?"":" fout");
 u.innerHTML=`${gekozen===0?"✔ Goed!":"✘ Niet juist."} ${uHtml(q.u)}<div class="artref">${esc(q.a)}</div>`;
 el.appendChild(u);
}
function vink(id){
 gelezen[id]=!gelezen[id];
 if(!gelezen[id])delete gelezen[id];
 bewaar();render();
}

function render(){
 const m=location.hash.match(/^#les(\d+)$/);
 if(m)toonLes(+m[1]);else toonHome();
}
window.addEventListener("hashchange",render);
render();
</script>
</body>
</html>
