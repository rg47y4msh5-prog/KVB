=\"#333\" stroke-width=\"2\"></line><path d=\"M209,158 q6,10 12,0\" fill=\"none\" stroke=\"#333\" stroke-width=\"2\"></path>\n <text x=\"215\" y=\"180\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">voor anker</text>\n <g stroke=\"#134a70\" stroke-width=\"5\"><line x1=\"40\" y1=\"60\" x2=\"130\" y2=\"60\" marker-end=\"url(#ah_lg)\"></line><line x1=\"40\" y1=\"200\" x2=\"130\" y2=\"200\" marker-end=\"url(#ah_lg)\"></line></g>\n <text x=\"44\" y=\"48\" font-size=\"10.5\" fill=\"#134a70\" font-weight=\"bold\">stroom 2 kn</text>\n <rect x=\"300\" y=\"34\" width=\"116\" height=\"52\" rx=\"6\" fill=\"#fff\" stroke=\"#c22222\" stroke-width=\"2\"></rect>\n <text x=\"358\" y=\"54\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#c22222\">LOG: 2,0 kn</text>\n <text x=\"358\" y=\"72\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#c22222\">na 10 u: “20 M afgelegd”</text>\n <rect x=\"300\" y=\"150\" width=\"116\" height=\"52\" rx=\"6\" fill=\"#fff\" stroke=\"#1e6b30\" stroke-width=\"2\"></rect>\n <text x=\"358\" y=\"170\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#1e6b30\">GPS: SOG 0,0 kn</text>\n <text x=\"358\" y=\"188\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#1e6b30\">positie verandert niet</text>\n</svg>","cap":"Log = door het water, GPS = over de grond."},{"svg":"<svg viewBox=\"0 0 430 230\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_gs\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_gs\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_gs\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_gs\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_gs\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_gs\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_gs\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <rect x=\"40\" y=\"24\" width=\"220\" height=\"182\" rx=\"10\" fill=\"#10202e\"></rect>\n <g font-family=\"monospace\" font-size=\"12.5\" fill=\"#7fe08a\"><text x=\"56\" y=\"54\">POS 52°26,2&#39;N</text><text x=\"86\" y=\"72\">005°12,2&#39;E</text><text x=\"56\" y=\"100\">COG 316°</text><text x=\"56\" y=\"126\">SOG 2,6 kn</text><text x=\"56\" y=\"152\">DST 5,2 M</text><text x=\"56\" y=\"178\">XTE 0,0</text><text x=\"56\" y=\"198\">ETA 14:13</text></g>\n <g font-size=\"10\" font-weight=\"bold\"><text x=\"278\" y=\"100\" fill=\"#1e6b30\">= grondkoers (GrK)</text><text x=\"278\" y=\"126\" fill=\"#1e6b30\">snelheid over de grond</text><text x=\"278\" y=\"152\" fill=\"#134a70\">afstand tot volgend waypoint</text><text x=\"278\" y=\"178\" fill=\"#134a70\">afwijking van de koerslijn</text><text x=\"278\" y=\"198\" fill=\"#134a70\">verwachte aankomsttijd</text></g>\n</svg>","cap":"Het GPS-scherm: COG, SOG, DST, XTE en ETA."}],"vragen":[{"t":"De officiële zeekaarten voor kust- en binnenwater zijn mercatorprojecties. Wat is daarvan hét kenmerk?","o":["Hoeken op de kaart zijn gelijk aan de hoeken in werkelijkheid en een koerslijn is een rechte lijn","Afstanden zijn overal op de kaart gelijk af te passen","Lengtecirkels lopen evenwijdig aan elkaar"],"u":"Mercator: <b>hoekgetrouw</b> en de koerslijn is recht — precies wat je voor het uitzetten van koersen nodig hebt.","a":"Les 5.1 (VBO)"},{"t":"Wat is juist over meridianen (lengtecirkels)?","o":["Ze lopen van pool tot pool en zijn állemaal even lang","Ze lopen evenwijdig aan de evenaar en worden richting de polen kleiner","Ze lopen tot maximaal 90° oost en west"],"u":"Meridianen: pool → pool, even lang, tot 180° O/W. <b>Parallellen</b> lopen evenwijdig aan de evenaar en krimpen richting de polen (tot 90° N/Z).","a":"Les 5.1 (VBO)"},{"t":"Wat is de 'verheid'?","o":["De afstand tussen twee punten, uitgedrukt in zeemijlen","De in één uur afgelegde afstand","De afstand waarop je een object kunt waarnemen"],"u":"Verheid = afstand in zeemijlen (afpassen met de passer). 1 zeemijl = 1852 m; 1 knoop = 1 zeemijl per uur.","a":"Les 5.1 (VBO)"},{"t":"Hoe bepaalt het GPS-systeem jouw positie?","o":["Door de afstanden te berekenen tussen de satellieten boven de horizon en de ontvanger","Door het tijdsverschil tussen jouw klok en de tijdzone","Door peilingen op de dichtstbijzijnde walstations"],"u":"Afstandsmeting tot satellieten; vanaf elke plek op aarde zijn er minimaal <b>4</b> zichtbaar. Instellen: kaartdatum (WGS 84), eenheden en tijdzone.","a":"Les 5.1 (VBO)"}]};
CONTENT["5.2.1"]={"theorie":"<p>Elk object op de kaart heeft een klein <b>cirkeltje</b> dat de exacte plaats aangeeft (bij een kerk onder de toren, bij een vuurtoren de stip in de gele cirkel). Vandaaruit werk je met de <b>passer</b>:</p><ul><li><b>Breedte</b>: passerpunt in het cirkeltje, andere been naar de dichtstbijzijnde horizontale lijn; passer omklappen naar de <b>staande rand</b> en de minuten aflezen (bv. 52° 38,1' N).</li><li><b>Lengte</b>: hetzelfde via de dichtstbijzijnde verticale lijn en de <b>liggende rand</b> (bv. 005° 07,4' E).</li></ul><p>Een <b>koers</b> is een richting. De koers uit de kaart halen doe je met de <b>plotter</b>: leg hem als liniaal langs de twee cirkeltjes (pijl in de vaarrichting!), draai de kompasroos tot de N exact naar het kaartnoorden wijst (lijnen van de roos evenwijdig aan de kaartlijnen) en lees de <b>grondkoers</b> af bij de nul. Het kompas aan boord geeft de <b>kompaskoers (KK)</b>; de GPS toont de <b>grondkoers (GrK)</b>.</p><p>Voor de invulvragen op het examen gelden vaste <b>marges</b> (bv. Markermeer: koers/peiling ±2°, afstand ±0,2 km; Wadden: koers ±3°, afstand ±0,1 mijl) — de oefenvragen hieronder rekenen daarmee.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 260\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_cp\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_cp\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_cp\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_cp\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_cp\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_cp\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_cp\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <rect x=\"46\" y=\"10\" width=\"374\" height=\"210\" fill=\"#cfe3f2\"></rect>\n <rect x=\"10\" y=\"10\" width=\"36\" height=\"210\" fill=\"#fff\" stroke=\"#1a5e8f\"></rect>\n <g stroke=\"#7fa8c9\"><line x1=\"46\" y1=\"60\" x2=\"420\" y2=\"60\"></line><line x1=\"46\" y1=\"180\" x2=\"420\" y2=\"180\"></line><line x1=\"250\" y1=\"10\" x2=\"250\" y2=\"220\"></line></g>\n <text x=\"254\" y=\"24\" font-size=\"8.5\" fill=\"#1a5e8f\" font-weight=\"bold\">005°10&#39;E</text>\n <use href=\"#kerkje_cp\" transform=\"translate(180,130)\"></use>\n <g fill=\"none\" stroke=\"#e07b00\" stroke-width=\"2.2\" stroke-dasharray=\"6,4\">\n  <line x1=\"180\" y1=\"133\" x2=\"180\" y2=\"60\"></line>\n  <path d=\"M180,60 Q120,44 46,52\"></path>\n  <line x1=\"180\" y1=\"133\" x2=\"250\" y2=\"133\"></line>\n  <path d=\"M250,133 Q250,60 250,30\"></path>\n </g>\n <line x1=\"34\" y1=\"52\" x2=\"46\" y2=\"52\" stroke=\"#c22222\" stroke-width=\"3\"></line>\n <g fill=\"#fff\" stroke=\"#1a5e8f\"><circle cx=\"180\" cy=\"80\" r=\"9\"></circle><circle cx=\"60\" cy=\"70\" r=\"9\"></circle><circle cx=\"215\" cy=\"133\" r=\"9\"></circle><circle cx=\"250\" cy=\"52\" r=\"9\"></circle></g>\n <g font-size=\"10\" font-weight=\"bold\" fill=\"#1a5e8f\" text-anchor=\"middle\"><text x=\"180\" y=\"84\">1</text><text x=\"60\" y=\"74\">2</text><text x=\"215\" y=\"137\">3</text><text x=\"250\" y=\"56\">4</text></g>\n <text x=\"60\" y=\"245\" font-size=\"10\" fill=\"#134a70\">1 prik in het cirkeltje → 2 omklappen naar de staande rand (breedte) → 3 en 4 idem via de meridiaan (lengte)</text>\n</svg>","cap":"Coördinaten bepalen: van het cirkeltje naar de randen van de kaart."},{"svg":"<svg viewBox=\"0 0 430 220\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_bv\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_bv\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_bv\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_bv\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_bv\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_bv\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_bv\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <text x=\"215\" y=\"22\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">1 minuut = 1 zeemijl — maar de blokjes verschillen</text>\n <rect x=\"80\" y=\"45\" width=\"34\" height=\"150\" fill=\"#fff\" stroke=\"#1a5e8f\"></rect>\n <g stroke=\"#1a5e8f\"><line x1=\"80\" y1=\"75\" x2=\"114\" y2=\"75\"></line><line x1=\"80\" y1=\"105\" x2=\"114\" y2=\"105\"></line><line x1=\"80\" y1=\"135\" x2=\"114\" y2=\"135\"></line><line x1=\"80\" y1=\"165\" x2=\"114\" y2=\"165\"></line></g>\n <g fill=\"#1a5e8f\" font-size=\"9\"><text x=\"120\" y=\"49\">45&#39;</text><text x=\"120\" y=\"199\">44&#39;</text></g>\n <text x=\"97\" y=\"212\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">Markermeer: 5 blokjes</text>\n <text x=\"97\" y=\"34\" text-anchor=\"middle\" font-size=\"10\" fill=\"#1e6b30\" font-weight=\"bold\">1 blokje = 0,2&#39;</text>\n <rect x=\"280\" y=\"45\" width=\"34\" height=\"150\" fill=\"#fff\" stroke=\"#1a5e8f\"></rect>\n <g stroke=\"#1a5e8f\"><line x1=\"280\" y1=\"60\" x2=\"314\" y2=\"60\"></line><line x1=\"280\" y1=\"75\" x2=\"314\" y2=\"75\"></line><line x1=\"280\" y1=\"90\" x2=\"314\" y2=\"90\"></line><line x1=\"280\" y1=\"105\" x2=\"314\" y2=\"105\"></line><line x1=\"280\" y1=\"120\" x2=\"314\" y2=\"120\"></line><line x1=\"280\" y1=\"135\" x2=\"314\" y2=\"135\"></line><line x1=\"280\" y1=\"150\" x2=\"314\" y2=\"150\"></line><line x1=\"280\" y1=\"165\" x2=\"314\" y2=\"165\"></line><line x1=\"280\" y1=\"180\" x2=\"314\" y2=\"180\"></line></g>\n <text x=\"297\" y=\"212\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">Wadden: 10 blokjes</text>\n <text x=\"297\" y=\"34\" text-anchor=\"middle\" font-size=\"10\" fill=\"#1e6b30\" font-weight=\"bold\">1 blokje = 0,1&#39;</text>\n</svg>","cap":"Let op de schaal: Markermeer 5 blokjes per minuut, Wadden 10."}],"vragen":[{"t":"Hoe noteer je een positie op de zeekaart?","o":["Eerst de breedte (graden en minuten met tienden, N of Z), daarna de lengte (O of W)","Eerst de lengte, daarna de breedte — zoals op een GPS-scherm","In graden, minuten en seconden; tienden van minuten bestaan op de kaart niet"],"u":"Conventie: breedte vóór lengte, elk met graden en minuten in tienden (bv. 52° 28,3' N — 5° 04,1' O). Zeekaarten en getijtafels werken met tienden van minuten, niet met seconden.","a":"Les 5.1 (VBO)"},{"t":"Waar pas je op een zeekaart een afstand af?","o":["Op de staande rand — 1 breedteminuut = 1 zeemijl (1852 m)","Op de liggende rand — daar staan de minuten het dichtst bij elkaar","Op beide randen, dat maakt niet uit"],"u":"Alleen de <b>staande rand</b>: breedteminuten zijn overal 1 zeemijl. Lengteminuten (liggende rand) krimpen richting de polen.","a":"Les 5.1 (VBO)"}]};
CONTENT["5.2.2"]={"theorie":"<p>Andersom kan ook: een koers <b>in de kaart zetten</b>. Zet de kompasroos van de plotter op de gewenste graden, prik de passer in het vertrekpunt, schuif de plotter erlangs tot de N naar het noorden wijst (draai aan de plotter, niet meer aan de roos!) en trek de koerslijn.</p><p><b>Eindpunt berekenen</b>: weet je vertrekpunt, grondkoers en snelheid, dan weet je waar je na een uur bent. Pas de gevaren afstand (snelheid × tijd, in zeemijlen = minuten) af op de staande rand, cirkel die vanaf het vertrekpunt om en het snijpunt met de koerslijn is je nieuwe positie. De GPS doet hetzelfde automatisch (ETA), maar op het examen doe jij het met passer en plotter.</p><p>Handig om te onthouden: vaar je pal noord of zuid, dan verandert alleen je <b>breedte</b> — elke gevaren zeemijl is precies één minuut op de staande rand.</p>","vragen":[{"typ":"in","t":"Markermeer. Je vertrekt van 52° 28,0' N en vaart pal noord (ware koers 000°) met 4 knopen. Geen wind, geen stroom. Op welke breedte ben je na 1 uur? Vul alléén de minuten in (in tienden, bv. 31,5).","ans":32,"marge":0.2,"fmt":"num","eh":"′ N","u":"4 kn × 1 u = 4 zeemijl = 4 breedteminuten noordwaarts: 28,0' + 4,0' = <b>52° 32,0' N</b>.","a":"Eindpunt (marge ±0,2′)"},{"typ":"in","t":"Markermeer. Je vertrekt van 52° 41,5' N en vaart pal zuid (ware koers 180°) met 3 knopen, anderhalf uur lang. Geen wind, geen stroom. Op welke breedte ben je dan? Vul alléén de minuten in (in tienden).","ans":37,"marge":0.2,"fmt":"num","eh":"′ N","u":"3 kn × 1,5 u = 4,5 zeemijl zuidwaarts: 41,5' − 4,5' = <b>52° 37,0' N</b>.","a":"Eindpunt (marge ±0,2′)"}]};
CONTENT["5.2.3"]={"theorie":"<p>De kompaskoers is zelden de koers die je werkelijk over de grond maakt. Vier \"fouten\" zitten ertussen:</p><ul><li><b>Deviatie</b>: afwijking van het eigen (stalen) schip, vastgelegd in de <b>stuurtafel</b> (deviatietabel) — afhankelijk van de voorliggende kompaskoers. Polyester schip of handpeilkompas zonder tabel? Dan deviatie = 0.</li><li><b>Variatie</b>: de hoek tussen het magnetische en het ware (geografische) noorden — staat in de kompasroos op de kaart, afhankelijk van plaats en jaar, niet van je koers. Op de examenkaart: 2° West.</li><li><b>Miswijzing</b> = deviatie + variatie.</li><li><b>Drift</b> (wind) en <b>stroom</b>: afwijkingen door weer en water. Onthoud het benoemen: wind heet naar waar hij <b>vandaan</b> komt, stroom naar waar hij <b>naartoe</b> gaat.</li></ul><p>Alle afwijkingen krijgen een teken via de <b>klokregel</b>: met de klok mee (naar stuurboord) = <b>+</b>, tegen de klok in (naar bakboord) = <b>−</b>.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 230\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_vn\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_vn\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_vn\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_vn\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_vn\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_vn\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_vn\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <g transform=\"translate(150,190)\">\n <line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"-150\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_vn)\"></line>\n <text x=\"8\" y=\"-140\" font-size=\"11\" font-weight=\"bold\" fill=\"#1e6b30\">waar (geografisch) noorden</text>\n <line x1=\"0\" y1=\"0\" x2=\"-38\" y2=\"-145\" stroke=\"#c22222\" stroke-width=\"3\" marker-end=\"url(#ah_vn)\"></line>\n <text x=\"-135\" y=\"-125\" font-size=\"11\" font-weight=\"bold\" fill=\"#c22222\">magnetisch noorden</text>\n <path d=\"M0,-70 A70,70 0 0 0 -18,-67\" fill=\"none\" stroke=\"#1a1a2e\" stroke-width=\"1.6\"></path>\n <text x=\"-32\" y=\"-84\" font-size=\"11\" font-weight=\"bold\">var.</text></g>\n <g transform=\"translate(340,110)\"><use href=\"#wroos_vn\" transform=\"scale(1.9)\"></use><text y=\"48\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#a12020\">kaartroos: Var. 2° W = −2°</text></g>\n <text x=\"215\" y=\"222\" text-anchor=\"middle\" font-size=\"10.5\">plaats- en jaargebonden · onafhankelijk van je koers · deviatie is juist wél koersafhankelijk</text>\n</svg>","cap":"Variatie: het verschil tussen het ware en het magnetische noorden."},{"svg":"<svg viewBox=\"0 0 430 230\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_kr\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_kr\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_kr\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_kr\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_kr\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_kr\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_kr\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <g transform=\"translate(215,118)\"><circle r=\"80\" fill=\"#fff\" stroke=\"#1a5e8f\" stroke-width=\"2\"></circle>\n <g font-size=\"12\" font-weight=\"bold\" fill=\"#1a5e8f\" text-anchor=\"middle\"><text y=\"-64\">N 360°</text><text x=\"66\" y=\"4\">O 90°</text><text y=\"74\">Z 180°</text><text x=\"-66\" y=\"4\">W 270°</text></g>\n <path d=\"M28,-52 A60,60 0 0 1 52,28\" fill=\"none\" stroke=\"#1e6b30\" stroke-width=\"4\" marker-end=\"url(#ah_kr)\"></path>\n <text x=\"52\" y=\"-34\" font-size=\"15\" font-weight=\"bold\" fill=\"#1e6b30\">+</text>\n <path d=\"M-28,-52 A60,60 0 0 0 -52,28\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"4\" marker-end=\"url(#ah_kr)\"></path>\n <text x=\"-60\" y=\"-34\" font-size=\"15\" font-weight=\"bold\" fill=\"#c22222\">−</text></g>\n <text x=\"215\" y=\"222\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">met de klok mee (naar stuurboord) = + · tegen de klok in (naar bakboord) = −</text>\n</svg>","cap":"De klokregel: rechtsom is plus, linksom is min.","half":true},{"svg":"<svg viewBox=\"0 0 430 210\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_ws\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_ws\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_ws\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_ws\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_ws\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_ws\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_ws\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <text x=\"215\" y=\"24\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">Zelfde woord, andere richting</text>\n <g transform=\"translate(110,110)\"><use href=\"#wroos_ws\" transform=\"scale(1.7)\"></use><line x1=\"-46\" y1=\"0\" x2=\"18\" y2=\"0\" stroke=\"#888\" stroke-width=\"4\" marker-end=\"url(#ah_ws)\"></line></g>\n <text x=\"110\" y=\"170\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">westenwind: kómt uit het westen</text>\n <g transform=\"translate(320,110)\"><use href=\"#wroos_ws\" transform=\"scale(1.7)\"></use><line x1=\"46\" y1=\"0\" x2=\"-18\" y2=\"0\" stroke=\"#134a70\" stroke-width=\"5\" marker-end=\"url(#ah_ws)\"></line></g>\n <text x=\"320\" y=\"170\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#134a70\">westelijke stroom: gáát naar het westen</text>\n <text x=\"215\" y=\"196\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#a12020\" font-weight=\"bold\">zelfde naam = tegengestelde richting!</text>\n</svg>","cap":"Wind heet naar waar hij vandaan komt, stroom naar waar hij naartoe gaat.","half":true}],"vragen":[{"t":"Waarvan is de variatie afhankelijk?","o":["Van de plaats op aarde (en het jaar) — niet van je koers","Van de voorliggende kompaskoers","Van het staal aan boord"],"u":"Variatie = plaatsgebonden (staat op de kaartroos; examenkaart 2° W = −2). <b>Deviatie</b> is juist koersafhankelijk en scheepsgebonden (stuurtafel). Miswijzing = dev + var.","a":"Les 5.2.3 (VBO)"},{"t":"Waarvan hangt de deviatie van je stuurkompas af?","o":["Van de voorliggende koers en van het eigen schip — je leest hem uit de stuurtafel","Van je positie op aarde en het jaartal","Van de sterkte van de wind en de stroom"],"u":"Deviatie is scheepsmagnetisme: per schip uniek én per koers verschillend — daarom bestaat de stuurtafel. Variatie is juist plaatsgebonden (kaartroos). Samen vormen ze de miswijzing.","a":"Les 5.2.3 (VBO)"},{"t":"Je peilt met een handpeilkompas. Welke deviatie gebruik je?","o":["0 — van een los kompas bestaat geen stuurtafel, dus de deviatie is onbekend","De deviatie van het stuurkompas bij de voorliggende koers","De deviatie is gelijk aan de variatie"],"u":"Handpeilkompas → dev = 0 (miswijzing = variatie). Gebruik nóóit de stuurtafel van het stuurkompas; elke stuurtafel is uniek.","a":"Les 5/6 (VBO)"},{"typ":"in","t":"Je log geeft 5,0 knopen aan. Je vaart recht tégen een stroom van 1,4 knopen in. Wat is je snelheid over de grond? (knopen, in tienden)","ans":3.6,"marge":0.2,"fmt":"num","eh":"kn","u":"Recht tegen de stroom: SOG = 5,0 − 1,4 = <b>3,6 kn</b>. De log meet dóór het water; de GPS zou dit als SOG tonen.","a":"SOG (marge ±0,2 kn)"}]};
CONTENT["5.3.1"]={"theorie":"<p>Alle correcties zitten in één <b>koersformule</b>, het \"treintje\":</p><p style=\"text-align:center;font-weight:bold\">KK → dev. → MK → var. → WK → drift → BWK → stroom → GrK</p><ul><li>Van <b>kompaskoers naar grondkoers</b> vul je hem van links naar rechts in: tel bij elke stap de afwijking met het juiste teken (klokregel) erbij op.</li><li>Teken er altijd een kompasroosje bij met de koers, de windrichting en de stroomrichting — dan zie je meteen of een afwijking + of − is.</li><li>Begrippen: <b>MK</b> magnetische koers · <b>WK</b> ware koers · <b>BWK</b> behouden ware koers · <b>GrK</b> = wat de GPS toont (COG). Bijhouden waar je ongeveer bent op basis van koers en snelheid heet het <b>gegist bestek</b>.</li></ul><p>Voorbeeld uit het boek: KK 30°, deviatie −2°, variatie 2° W (−2°), drift +12°, stroom −5° → GrK 33°.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 190\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_kf\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_kf\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_kf\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_kf\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_kf\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_kf\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_kf\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <g font-size=\"13\" font-weight=\"bold\" text-anchor=\"middle\">\n  <rect x=\"18\" y=\"60\" width=\"52\" height=\"34\" rx=\"6\" fill=\"#1a5e8f\"></rect><text x=\"44\" y=\"82\" fill=\"#fff\">KK</text>\n  <rect x=\"106\" y=\"60\" width=\"52\" height=\"34\" rx=\"6\" fill=\"#fff\" stroke=\"#1a5e8f\"></rect><text x=\"132\" y=\"82\" fill=\"#1a5e8f\">MK</text>\n  <rect x=\"194\" y=\"60\" width=\"52\" height=\"34\" rx=\"6\" fill=\"#fff\" stroke=\"#1a5e8f\"></rect><text x=\"220\" y=\"82\" fill=\"#1a5e8f\">WK</text>\n  <rect x=\"282\" y=\"60\" width=\"52\" height=\"34\" rx=\"6\" fill=\"#fff\" stroke=\"#1a5e8f\"></rect><text x=\"308\" y=\"82\" fill=\"#1a5e8f\">BWK</text>\n  <rect x=\"370\" y=\"60\" width=\"52\" height=\"34\" rx=\"6\" fill=\"#1e6b30\"></rect><text x=\"396\" y=\"82\" fill=\"#fff\">GrK</text>\n </g>\n <g stroke=\"#333\" stroke-width=\"2\"><line x1=\"70\" y1=\"77\" x2=\"106\" y2=\"77\" marker-end=\"url(#ah_kf)\"></line><line x1=\"158\" y1=\"77\" x2=\"194\" y2=\"77\" marker-end=\"url(#ah_kf)\"></line><line x1=\"246\" y1=\"77\" x2=\"282\" y2=\"77\" marker-end=\"url(#ah_kf)\"></line><line x1=\"334\" y1=\"77\" x2=\"370\" y2=\"77\" marker-end=\"url(#ah_kf)\"></line></g>\n <g font-size=\"10.5\" font-weight=\"bold\" text-anchor=\"middle\" fill=\"#a12020\"><text x=\"88\" y=\"52\">dev.</text><text x=\"176\" y=\"52\">var.</text><text x=\"264\" y=\"52\">drift</text><text x=\"352\" y=\"52\">stroom</text></g>\n <text x=\"215\" y=\"128\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#1e6b30\">links → rechts: correctie optellen (MK = KK + dev, enz.)</text>\n <text x=\"215\" y=\"148\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#c22222\">rechts → links: correctie aftrekken</text>\n <text x=\"215\" y=\"174\" text-anchor=\"middle\" font-size=\"10\">KK = sturen (kompas) · GrK = kaart en GPS · de rest zijn tussenstappen</text>\n</svg>","cap":"Het treintje: van kompaskoers naar grondkoers en terug."},{"svg":"<svg viewBox=\"0 0 430 170\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_kg\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_kg\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_kg\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_kg\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_kg\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_kg\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_kg\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <text x=\"215\" y=\"24\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">KK 30° · dev −2° · var 2°W · drift +12° · stroom −5°</text>\n <g font-size=\"12.5\" font-weight=\"bold\" text-anchor=\"middle\">\n  <text x=\"45\" y=\"80\">30°</text><text x=\"129\" y=\"80\">28°</text><text x=\"213\" y=\"80\">26°</text><text x=\"297\" y=\"80\">38°</text><text x=\"381\" y=\"80\" fill=\"#1e6b30\">33°</text>\n </g>\n <g font-size=\"10\" text-anchor=\"middle\" fill=\"#a12020\" font-weight=\"bold\"><text x=\"87\" y=\"60\">−2</text><text x=\"171\" y=\"60\">−2</text><text x=\"255\" y=\"60\">+12</text><text x=\"339\" y=\"60\">−5</text></g>\n <g stroke=\"#333\" stroke-width=\"1.8\"><line x1=\"62\" y1=\"76\" x2=\"112\" y2=\"76\" marker-end=\"url(#ah_kg)\"></line><line x1=\"146\" y1=\"76\" x2=\"196\" y2=\"76\" marker-end=\"url(#ah_kg)\"></line><line x1=\"230\" y1=\"76\" x2=\"280\" y2=\"76\" marker-end=\"url(#ah_kg)\"></line><line x1=\"314\" y1=\"76\" x2=\"364\" y2=\"76\" marker-end=\"url(#ah_kg)\"></line></g>\n <g font-size=\"9.5\" text-anchor=\"middle\" fill=\"#666\"><text x=\"45\" y=\"100\">KK</text><text x=\"129\" y=\"100\">MK</text><text x=\"213\" y=\"100\">WK</text><text x=\"297\" y=\"100\">BWK</text><text x=\"381\" y=\"100\">GrK</text></g>\n <text x=\"215\" y=\"134\" text-anchor=\"middle\" font-size=\"10.5\">westenwind zet rechtsom weg (+12) · noordelijke stroom zet linksom weg (−5)</text>\n <text x=\"215\" y=\"154\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#1e6b30\" font-weight=\"bold\">GrK 33° in de kaart zetten → snelheid × tijd afpassen = gegiste positie</text>\n</svg>","cap":"Ingevuld van links naar rechts: van kompas- naar grondkoers."}],"vragen":[{"t":"KK 100°, deviatie −2°, variatie 2° West. Geen wind, geen stroom. Wat is de grondkoers?","o":["096°","104°","100°"],"u":"Links→rechts optellen: 100 − 2 = 98 (MK); 98 − 2 = <b>96° (WK = GrK</b>, want drift en stroom zijn 0).","a":"Koersformule (les 5.3)"},{"t":"KK 220°, deviatie +2°, variatie 2° West, drift −6°, stroom +9°. Wat is de grondkoers?","o":["223°","217°","229°"],"u":"Links→rechts: 220 + 2 = 222 (MK) · − 2 = 220 (WK) · − 6 = 214 (BWK) · + 9 = <b>223° (GrK)</b>.","a":"Koersformule (les 5.3)"}]};
CONTENT["5.4.1"]={"theorie":"<p>Wil je juist weten <b>welke kompaskoers je moet sturen</b> om een gewenste grondkoers te maken, dan vul je hetzelfde treintje van <b>rechts naar links</b> in: bij elke stap haal je de afwijking er weer af.</p><ul><li>Begin met de grondkoers uit de kaart (plotter), verwerk stroom en drift terug naar de ware koers, dan de variatie naar de magnetische koers.</li><li><b>Let op de deviatie</b>: die hangt af van de voorliggende koers die je nog niet kent — kies daarom de deviatie bij de dichtstbijzijnde <b>magnetische koers</b> uit de stuurtafel.</li><li>Onderweg zie je het verschil gewoon staan: het kompas toont de KK, de GPS de GrK — dat hoort zo.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 170\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_gk2\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_gk2\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_gk2\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_gk2\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_gk2\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_gk2\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_gk2\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <text x=\"215\" y=\"24\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">GrK 350° · stroom −3° · drift +15° · var 2°W · dev bij MK</text>\n <g font-size=\"12.5\" font-weight=\"bold\" text-anchor=\"middle\">\n  <text x=\"45\" y=\"80\" fill=\"#1e6b30\">340°</text><text x=\"129\" y=\"80\">340°</text><text x=\"213\" y=\"80\">338°</text><text x=\"297\" y=\"80\">353°</text><text x=\"381\" y=\"80\">350°</text>\n </g>\n <g font-size=\"10\" text-anchor=\"middle\" fill=\"#a12020\" font-weight=\"bold\"><text x=\"87\" y=\"60\">dev −0</text><text x=\"171\" y=\"60\">−2</text><text x=\"255\" y=\"60\">+15</text><text x=\"339\" y=\"60\">−3</text></g>\n <g stroke=\"#333\" stroke-width=\"1.8\"><line x1=\"112\" y1=\"76\" x2=\"62\" y2=\"76\" marker-end=\"url(#ah_gk2)\"></line><line x1=\"196\" y1=\"76\" x2=\"146\" y2=\"76\" marker-end=\"url(#ah_gk2)\"></line><line x1=\"280\" y1=\"76\" x2=\"230\" y2=\"76\" marker-end=\"url(#ah_gk2)\"></line><line x1=\"364\" y1=\"76\" x2=\"314\" y2=\"76\" marker-end=\"url(#ah_gk2)\"></line></g>\n <g font-size=\"9.5\" text-anchor=\"middle\" fill=\"#666\"><text x=\"45\" y=\"100\">KK</text><text x=\"129\" y=\"100\">MK</text><text x=\"213\" y=\"100\">WK</text><text x=\"297\" y=\"100\">BWK</text><text x=\"381\" y=\"100\">GrK</text></g>\n <text x=\"215\" y=\"134\" text-anchor=\"middle\" font-size=\"10.5\">BWK = GrK − stroom = 353 · WK = 353 − 15 = 338 · MK = 338 + 2 = 340</text>\n <text x=\"215\" y=\"154\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#1e6b30\" font-weight=\"bold\">deviatie bij MK 340° (dichtstbij 337,5° → 0°) → KK 340°: dit stuur je</text>\n</svg>","cap":"Ingevuld van rechts naar links: van gewenste grondkoers naar te sturen kompaskoers."}],"vragen":[{"t":"BWK 090°, drift +5°, variatie 3° West, deviatie +7°. Geen stroom. Welke kompaskoers stuur je?","o":["081°","099°","086°"],"u":"Rechts→links aftrekken: WK = 90 − 5 = 85; MK = 85 − (−3) = 88; KK = 88 − 7 = <b>81°</b>.","a":"Koersformule (les 5.4)"},{"typ":"in","t":"Grondkoers uit de kaart: 085°. De stroom zet je 6° naar bakboord weg (−6°), een zuidenwind geeft +4° drift, de variatie is 2° West en de deviatie bij de gevonden magnetische koers is +1°. Welke kompaskoers stuur je? (hele graden)","ans":88,"marge":2,"fmt":"num","eh":"°","u":"Rechts→links: BWK = 85 − (−6) = 91 · WK = 91 − 4 = 87 · MK = 87 − (−2) = 89 · KK = 89 − 1 = <b>88°</b>.","a":"Koersformule (marge ±2°)"},{"typ":"in","t":"Grondkoers 152°. Er staat geen wind; de stroom zet je 4° naar bakboord weg (−4°). Variatie 2° West, deviatie 0°. Welke kompaskoers stuur je? (hele graden)","ans":158,"marge":2,"fmt":"num","eh":"°","u":"BWK = 152 − (−4) = 156 · WK = 156 (geen drift) · MK = 156 − (−2) = 158 · KK = <b>158°</b>.","a":"Koersformule (marge ±2°)"}]};
CONTENT["5.5.1"]={"theorie":"<p>Een <b>lichtenlijn</b> is behalve een veilige aanloop ook een gratis <b>deviatiecontrole</b>. Vaar je er precies in, dan kén je de ware koers (staat op de kaart). Lees tegelijk je stuurkompas af en reken terug:</p><p style=\"text-align:center;font-weight:bold\">WK + variatie = MK · verschil met KK = deviatie</p><p>Voorbeeld uit het boek: lichtenlijn 037° (WK), variatie −2° → MK 039°; het kompas wijst 042° → deviatie −3°. Vergelijk dat met je stuurtafel. Onthoud: een stuurtafel hoort bij één vast opgesteld kompas op één schip — voor een handpeilkompas bestaat er geen (deviatie 0).</p><p>Op ruim water zonder herkenningspunten houd je met koers en snelheid het <b>gegist bestek</b> bij; de plek waar je jezelf op grond daarvan waant is de <b>gegiste positie</b>.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n <marker id=\"ah_ld\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n <g id=\"bcirc_ld\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n <g id=\"kerk_ld\"><rect x=\"-4\" y=\"-14\" width=\"8\" height=\"14\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-14 L0,-22 L4,-14 Z\" fill=\"#4d3010\"></path></g>\n <g id=\"toren_ld\"><circle r=\"6\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.4\"></circle><circle r=\"1.4\" fill=\"#1a1a2e\"></circle></g>\n <g id=\"kschip_ld\"><path d=\"M-16,-5.5 L7,-5.5 Q16,-5.5 16,0 Q16,5.5 7,5.5 L-16,5.5 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"1.6\"></path><rect x=\"-12\" y=\"-3.2\" width=\"12\" height=\"6.4\" rx=\"2.5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\".8\"></rect></g>\n</defs>\n<rect x=\"14\" y=\"8\" width=\"402\" height=\"204\" fill=\"#ffffff\" stroke=\"#333\" stroke-width=\"1.6\"></rect>\n<g stroke=\"#333\" stroke-width=\"1.4\"><line x1=\"60\" y1=\"8\" x2=\"60\" y2=\"13\"></line><line x1=\"60\" y1=\"207\" x2=\"60\" y2=\"212\"></line><line x1=\"110\" y1=\"8\" x2=\"110\" y2=\"13\"></line><line x1=\"110\" y1=\"207\" x2=\"110\" y2=\"212\"></line><line x1=\"160\" y1=\"8\" x2=\"160\" y2=\"13\"></line><line x1=\"160\" y1=\"207\" x2=\"160\" y2=\"212\"></line><line x1=\"210\" y1=\"8\" x2=\"210\" y2=\"13\"></line><line x1=\"210\" y1=\"207\" x2=\"210\" y2=\"212\"></line><line x1=\"260\" y1=\"8\" x2=\"260\" y2=\"13\"></line><line x1=\"260\" y1=\"207\" x2=\"260\" y2=\"212\"></line><line x1=\"310\" y1=\"8\" x2=\"310\" y2=\"13\"></line><line x1=\"310\" y1=\"207\" x2=\"310\" y2=\"212\"></line><line x1=\"360\" y1=\"8\" x2=\"360\" y2=\"13\"></line><line x1=\"360\" y1=\"207\" x2=\"360\" y2=\"212\"></line><line x1=\"14\" y1=\"50\" x2=\"19\" y2=\"50\"></line><line x1=\"411\" y1=\"50\" x2=\"416\" y2=\"50\"></line><line x1=\"14\" y1=\"90\" x2=\"19\" y2=\"90\"></line><line x1=\"411\" y1=\"90\" x2=\"416\" y2=\"90\"></line><line x1=\"14\" y1=\"130\" x2=\"19\" y2=\"130\"></line><line x1=\"411\" y1=\"130\" x2=\"416\" y2=\"130\"></line><line x1=\"14\" y1=\"170\" x2=\"19\" y2=\"170\"></line><line x1=\"411\" y1=\"170\" x2=\"416\" y2=\"170\"></line></g>\n<g stroke=\"#b5d8bf\" stroke-dasharray=\"4,4\"><line x1=\"14\" y1=\"90\" x2=\"416\" y2=\"90\"></line><line x1=\"210\" y1=\"8\" x2=\"210\" y2=\"212\"></line></g>\n<text x=\"200\" y=\"86\" font-size=\"8\" fill=\"#2f8f4f\" font-weight=\"bold\">53°00&#39;</text><text x=\"18\" y=\"103\" font-size=\"8\" fill=\"#2f8f4f\" font-weight=\"bold\">5°E</text>\n<path d=\"M416,8 L416,86 Q380,96 352,80 Q322,62 336,34 Q346,12 380,8 Z\" fill=\"#f2e9c4\" stroke=\"#c9b878\" stroke-width=\"2\"></path><path d=\"M410,92 Q376,104 348,88 Q318,70 330,40\" fill=\"none\" stroke=\"#d4e9f6\" stroke-width=\"10\" opacity=\".8\"></path><g font-size=\"7.5\" fill=\"#5a6a7c\" font-style=\"italic\"><text x=\"150\" y=\"70\">8₂</text><text x=\"240\" y=\"60\">12</text><text x=\"300\" y=\"130\">9₄</text><text x=\"160\" y=\"120\">6₁</text><text x=\"250\" y=\"170\">7₅</text><text x=\"330\" y=\"180\">11</text><text x=\"120\" y=\"60\">4₂</text></g><g transform=\"translate(392,36)\"><line y2=\"-14\" stroke=\"#333\" stroke-width=\"2\"></line><circle cy=\"-17\" r=\"4\" fill=\"#f2c500\" stroke=\"#8a6d00\"></circle></g><g transform=\"translate(360,58)\"><line y2=\"-9\" stroke=\"#333\" stroke-width=\"2\"></line><circle cy=\"-12\" r=\"4\" fill=\"#f2c500\" stroke=\"#8a6d00\"></circle></g><line x1=\"392\" y1=\"30\" x2=\"120\" y2=\"188\" stroke=\"#2c2a72\" stroke-width=\"2\" stroke-dasharray=\"9,6\"></line><text x=\"180\" y=\"136\" font-family=\"Helvetica,Arial\" font-size=\"12\" font-weight=\"bold\" fill=\"#2c2a72\">lichtenlijn 300°</text><use href=\"#kschip_ld\" transform=\"translate(140,178) rotate(-30)\"></use><text x=\"72\" y=\"206\" font-size=\"9.5\" fill=\"#2c2a72\" font-weight=\"bold\">kompas zegt 303° → deviatie −3°</text>\n<text x=\"215\" y=\"228\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">lichtenlijn: deviatie controleren</text>\n<text x=\"215\" y=\"242\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">twee lichten in lijn (achterste hoger) markeren een ware richting — vergelijk met je kompaspeiling</text>\n</svg>","cap":"Varen in de lichtenlijn: de kaart geeft de ware koers, het kompas verraadt zijn deviatie."},{"svg":"<svg viewBox=\"0 0 430 210\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_dg\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_dg\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_dg\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_dg\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_dg\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_dg\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_dg\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <rect x=\"30\" y=\"30\" width=\"130\" height=\"64\" rx=\"8\" fill=\"#10202e\"></rect>\n <g font-family=\"monospace\" font-size=\"12\" fill=\"#7fe08a\"><text x=\"44\" y=\"56\">COG 316°</text><text x=\"44\" y=\"78\">SOG 2,6 kn</text></g>\n <rect x=\"30\" y=\"116\" width=\"130\" height=\"46\" rx=\"8\" fill=\"#fff\" stroke=\"#1a5e8f\" stroke-width=\"2\"></rect>\n <text x=\"95\" y=\"144\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">kompas: KK 322°</text>\n <text x=\"290\" y=\"52\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">windstil + geen stroom →</text>\n <text x=\"290\" y=\"70\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#1e6b30\">GrK = BWK = WK = COG = 316°</text>\n <text x=\"290\" y=\"110\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">MK = WK − var = 316 + 2 = 318°</text>\n <text x=\"290\" y=\"140\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#1e6b30\">dev = MK − KK = 318 − 322 = −4°</text>\n <text x=\"290\" y=\"164\" text-anchor=\"middle\" font-size=\"10.5\">(4° west) — de moderne lichtenlijn-methode</text>\n <text x=\"215\" y=\"196\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#a12020\" font-weight=\"bold\">werkt alléén zonder drift en stroom: dan pas is COG gelijk aan WK</text>\n</svg>","cap":"Zelfde truc zonder lichtenlijn: vergelijk de COG van de GPS met je kompaskoers."}],"vragen":[{"t":"Je vaart exact in een lichtenlijn die op de kaart 040° aangeeft. Je stuurkompas toont 037°. Variatie 2° West. Wat is de deviatie bij deze koers?","o":["+5°","−5°","+1°"],"u":"WK = 040; MK = WK − var = 40 + 2 = 042; dev = MK − KK = 42 − 37 = <b>+5°</b>. Zo controleer je je stuurtafel.","a":"Lichtenlijn (les 5.5)"},{"typ":"in","t":"Grondkoers 300°. Stroom: +5°. Drift door een noordoostenwind: −8°. Variatie 2° West, deviatie bij de magnetische koers −2°. Welke kompaskoers stuur je? (hele graden)","ans":307,"marge":2,"fmt":"num","eh":"°","u":"BWK = 300 − 5 = 295 · WK = 295 − (−8) = 303 · MK = 303 − (−2) = 305 · KK = 305 − (−2) = <b>307°</b>.","a":"Koersformule (marge ±2°)"}]};
CONTENT["6.1.1"]={"theorie":"<p>Peilen doe je om je positie te bepalen aan de hand van herkenbare objecten (kerktorens, vuurtorens). Een peiling is een <b>momentopname</b>: wind en stroom spelen géén rol. De koersformule verliest daarom haar staart en de K wordt een P:</p><p style=\"text-align:center;font-weight:bold\">KP → dev. → MP → var. → WP</p><ul><li><b>Cruciale valkuil</b>: de deviatie hoort bij de <b>voorliggende kompaskoers</b> van het schip, niet bij de peilrichting! Peil je met een handpeilkompas, dan is de deviatie 0.</li><li>Deviatie + variatie mag je vooraf optellen tot één <b>miswijzing</b> en in één stap verwerken.</li><li>Bij een <b>kruispeiling</b> kies je twee objecten die elkaar het liefst onder ± <b>90°</b> snijden; het snijpunt van de twee ware peillijnen (plotter!) is je positie.</li><li>Noteer op het moment van peilen minimaal: de kompaspeiling(en), de <b>tijd</b> en de <b>logstand</b> — en bij het stuurkompas ook de voorliggende koers.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 170\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_pf\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_pf\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_pf\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_pf\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_pf\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_pf\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_pf\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <g font-size=\"13\" font-weight=\"bold\" text-anchor=\"middle\">\n  <rect x=\"40\" y=\"50\" width=\"56\" height=\"34\" rx=\"6\" fill=\"#1a5e8f\"></rect><text x=\"68\" y=\"72\" fill=\"#fff\">KP</text>\n  <rect x=\"150\" y=\"50\" width=\"56\" height=\"34\" rx=\"6\" fill=\"#fff\" stroke=\"#1a5e8f\"></rect><text x=\"178\" y=\"72\" fill=\"#1a5e8f\">MP</text>\n  <rect x=\"260\" y=\"50\" width=\"56\" height=\"34\" rx=\"6\" fill=\"#1e6b30\"></rect><text x=\"288\" y=\"72\" fill=\"#fff\">WP</text>\n </g>\n <g stroke=\"#333\" stroke-width=\"2\"><line x1=\"96\" y1=\"67\" x2=\"150\" y2=\"67\" marker-end=\"url(#ah_pf)\"></line><line x1=\"206\" y1=\"67\" x2=\"260\" y2=\"67\" marker-end=\"url(#ah_pf)\"></line></g>\n <g font-size=\"10.5\" font-weight=\"bold\" text-anchor=\"middle\" fill=\"#a12020\"><text x=\"123\" y=\"42\">dev.</text><text x=\"233\" y=\"42\">var.</text></g>\n <g transform=\"translate(370,67)\"><text x=\"0\" y=\"-24\" text-anchor=\"middle\" font-size=\"10\" fill=\"#888\">drift · stroom</text><line x1=\"-24\" y1=\"-14\" x2=\"24\" y2=\"10\" stroke=\"#c22222\" stroke-width=\"3\"></line><line x1=\"-24\" y1=\"10\" x2=\"24\" y2=\"-14\" stroke=\"#c22222\" stroke-width=\"3\"></line></g>\n <text x=\"215\" y=\"122\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">een peiling is een momentopname → wind en stroom vervallen</text>\n <text x=\"215\" y=\"146\" text-anchor=\"middle\" font-size=\"10.5\">korte vorm: KP + miswijzing (dev + var) = WP · handpeilkompas → dev = 0</text>\n</svg>","cap":"De peilformule: de koersformule zonder wind en stroom.","half":true},{"svg":"<svg viewBox=\"0 0 430 240\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_dk\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_dk\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_dk\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_dk\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_dk\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_dk\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_dk\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <use href=\"#kschip text x=\"376\" y=\"90\">vuurtoren + lichtkarakter</text>\n <use href=\"#sp_mk\" transform=\"translate(365,104)\"/><text x=\"376\" y=\"103\">spitse ton (groen)</text>\n <use href=\"#st_mk\" transform=\"translate(365,119)\"/><text x=\"376\" y=\"118\">stompe ton (rood)</text>\n <use href=\"#gs_mk\" transform=\"translate(365,135)\"/><text x=\"376\" y=\"133\">gele spar</text>\n <text x=\"359\" y=\"150\" font-style=\"italic\" fill=\"#5a6a7c\">1₆</text><text x=\"376\" y=\"150\">diepte: 1,6 m</text>\n <line x1=\"364\" y1=\"184\" x2=\"364\" y2=\"166\" stroke=\"#333\" stroke-width=\"1.4\" marker-end=\"url(#ah_mk)\"/><text x=\"360\" y=\"194\" font-weight=\"bold\">N</text><text x=\"376\" y=\"176\">variatie 2°W</text><text x=\"376\" y=\"184\" fill=\"#7c8a99\">(examenkaart)</text>\n</g>\n<text x=\"235\" y=\"316\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" fill=\"#0e2a40\">de kruispeiling van hierboven, op de echte kaart</text>\n<text x=\"235\" y=\"330\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\" paint-order=\"stroke\" stroke=\"#ffffff\" stroke-width=\"2.4\" stroke-linejoin=\"round\">\"Paard van Marken\" WP 149° × kerk Monnickendam WP 235° → positie 52°29,4'N / 005°06,6'E</text>\n</svg>","cap":"Kruispeiling in de praktijk: gestileerd fragment van de examenkaart met 1:1 overgetrokken kustlijn en de echte betonning en lichten rond de Gouwzee."}],"vragen":[{"typ":"in","t":"Tussen twee kruispeilingen leg je 2,7 zeemijl over de grond af, in precies 45 minuten. Wat was je snelheid over de grond? (knopen, in tienden)","ans":3.6,"marge":0.2,"fmt":"num","eh":"kn","u":"45 min = 0,75 u → SOG = 2,7 ÷ 0,75 = <b>3,6 kn</b>.","a":"SOG (marge ±0,2 kn)"},{"t":"Wat is de miswijzing?","o":["Deviatie + variatie — de hoek tussen de kompaskoers en de ware koers","Alleen de variatie","De hoek tussen grondkoers en ware koers"],"u":"Miswijzing = <b>dev + var</b>. Bij een handpeilkompas (dev 0) is de miswijzing dus gelijk aan de variatie.","a":"Les 5.2.3 (VBO)"}]};
CONTENT["6.2.1"]={"theorie":"<p>In les 5 kreeg je de stroomafwijking cadeau in graden; in werkelijkheid beïnvloedt stroom ook je <b>snelheid</b>. Daarom werk je nu met een <b>constructie</b> op de kaart, met de stroomrichting en -snelheid uit de stroomatlas.</p><h4>Van grondkoers naar kompaskoers (stroom bij het vertrekpunt)</h4><ol><li>Zet de gewenste <b>GrK</b> in de kaart (lijn 1).</li><li>Teken vanuit het <b>vertrekpunt</b> de stroomrichting (lijn 2) en pas daarop de stroomsnelheid af → punt A.</li><li>Cirkel vanuit A je snelheid <b>door het water</b> om; het snijpunt met lijn 1 is punt B — daar ben je na een uur.</li><li>De richting A→B is de <b>BWK</b>; daarmee vul je de formule verder naar links in tot de kompaskoers.</li></ol><p>De <b>snelheid over de grond</b> is de lengte van vertrekpunt→B (afpassen op de staande rand): met stroom mee méér, tegen de stroom in minder dan de log aangeeft.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\" font-family=\"Helvetica,Arial\">\n<defs>\n <marker id=\"ah_d1t\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"/></marker>\n <g id=\"kerk_d1t\"><rect x=\"-4\" y=\"-14\" width=\"8\" height=\"14\" fill=\"#8a5a2b\" stroke=\"#4d3010\"/><path d=\"M-4,-14 L0,-22 L4,-14 Z\" fill=\"#4d3010\"/></g>\n <g id=\"toren_d1t\"><circle r=\"6\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.4\"/><circle r=\"1.4\" fill=\"#1a1a2e\"/></g>\n <g id=\"kschip_d1t\"><path d=\"M-16,-5.5 L7,-5.5 Q16,-5.5 16,0 Q16,5.5 7,5.5 L-16,5.5 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"1.6\"/><rect x=\"-12\" y=\"-3.2\" width=\"12\" height=\"6.4\" rx=\"2.5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\".8\"/></g>\n <clipPath id=\"kader_d1t\"><rect x=\"14\" y=\"8\" width=\"402\" height=\"204\"/></clipPath>\n</defs>\n<rect x=\"14\" y=\"8\" width=\"402\" height=\"2 /text>\n <rect x=\"281\" y=\"119\" width=\"9\" height=\"7\" fill=\"#d9e8cf\"/><text x=\"296\" y=\"125\">droogvallend wad</text>\n <text x=\"280\" y=\"139\" font-style=\"italic\" fill=\"#5a6a7c\">1₆</text><text x=\"296\" y=\"139\">diepte: 1,6 m</text>\n <text x=\"278\" y=\"160\" font-weight=\"bold\" fill=\"#0e2a40\">de constructie (1 uur):</text>\n <line x1=\"280\" y1=\"169\" x2=\"292\" y2=\"169\" stroke=\"#2c2a72\" stroke-width=\"2\"/><text x=\"296\" y=\"171\">1 · GrK 030° naar T 12</text>\n <line x1=\"280\" y1=\"181\" x2=\"292\" y2=\"181\" stroke=\"#c0392b\" stroke-width=\"2\"/><text x=\"296\" y=\"183\">2 · stroom: 0,8 kn richting 045°</text>\n <line x1=\"280\" y1=\"193\" x2=\"292\" y2=\"193\" stroke=\"#2f8f4f\" stroke-width=\"2\" stroke-dasharray=\"5,3\"/><text x=\"296\" y=\"195\">3 · BWK 026°, 3 kn door het water</text>\n <text x=\"296\" y=\"207\" fill=\"#7c8a99\">B = gegiste positie na 1 uur:</text>\n <text x=\"296\" y=\"215\" fill=\"#7c8a99\">53°01,3'N / 004°50,6'E</text>\n <line x1=\"286\" y1=\"243\" x2=\"286\" y2=\"225\" stroke=\"#333\" stroke-width=\"1.4\" marker-end=\"url(#ah_tx)\"/><text x=\"282\" y=\"253\" font-weight=\"bold\">N</text><text x=\"296\" y=\"235\">variatie 2°W</text><text x=\"296\" y=\"243\" fill=\"#7c8a99\">(examenkaart)</text>\n</g>\n<text x=\"235\" y=\"316\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" fill=\"#0e2a40\">de constructie van hierboven, op de echte kaart</text>\n<text x=\"235\" y=\"330\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#123a56\" paint-order=\"stroke\" stroke=\"#ffffff\" stroke-width=\"2.4\" stroke-linejoin=\"round\">Den Helder → Oudeschild: na 1 uur ben je in B — snelheid over de grond 3,7 kn, kompaskoers 030°</text>\n</svg>","cap":"Het boekscenario op de echte kaart: van MH4/M1 bij Den Helder naar T 12 voor Oudeschild — geometrie 1:1 van de examenkaart, met de stroomdriehoek erop getekend."}],"vragen":[{"typ":"in","t":"Je vaart 3,2 knopen door het water met de stroom (1,1 kn) recht mee. Wat is je snelheid over de grond? (knopen, in tienden)","ans":4.3,"marge":0.2,"fmt":"num","eh":"kn","u":"Recht mee: SOG = 3,2 + 1,1 = <b>4,3 kn</b>.","a":"SOG (marge ±0,2 kn)"},{"typ":"in","t":"Je log geeft 4,0 knopen aan. Na precies één uur blijkt uit de kaart dat je 3,4 zeemijl over de grond hebt afgelegd. Wat was je snelheid over de grond? (knopen, in tienden)","ans":3.4,"marge":0.2,"fmt":"num","eh":"kn","u":"SOG = afgelegde weg over de grond per uur = <b>3,4 kn</b> — de afstand vertrekpunt→eindpunt op de staande rand, niet de logwaarde.","a":"SOG (marge ±0,2 kn)"}]};
CONTENT["6.2.2"]={"theorie":"<p>Met de snelheid over de grond bereken je de <b>aankomsttijd</b>:</p><ul><li>Reistijd = afstand tot bestemming ÷ snelheid over de grond. Voorbeeld uit het boek: 2,4 mijl ÷ 2 knopen = 1,2 uur.</li><li><b>Let op komma versus dubbele punt</b>: 1,2 uur is 1 uur en 12 minuten (0,1 uur = 6 minuten) — 1:12 dus, niet 1:20.</li><li>Vertrektijd + reistijd = aankomsttijd (de ETA die je GPS ook toont).</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 190\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_tr\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_tr\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_tr\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_tr\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_tr\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_tr\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_tr\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <rect x=\"40\" y=\"46\" width=\"350\" height=\"24\" rx=\"6\" fill=\"#fff\" stroke=\"#1a5e8f\"></rect>\n <g stroke=\"#1a5e8f\"><line x1=\"75\" y1=\"46\" x2=\"75\" y2=\"70\"></line><line x1=\"110\" y1=\"46\" x2=\"110\" y2=\"70\"></line><line x1=\"145\" y1=\"46\" x2=\"145\" y2=\"70\"></line><line x1=\"180\" y1=\"46\" x2=\"180\" y2=\"70\"></line><line x1=\"215\" y1=\"46\" x2=\"215\" y2=\"70\"></line><line x1=\"250\" y1=\"46\" x2=\"250\" y2=\"70\"></line><line x1=\"285\" y1=\"46\" x2=\"285\" y2=\"70\"></line><line x1=\"320\" y1=\"46\" x2=\"320\" y2=\"70\"></line><line x1=\"355\" y1=\"46\" x2=\"355\" y2=\"70\"></line></g>\n <text x=\"40\" y=\"38\" font-size=\"10\" font-weight=\"bold\">0 u</text><text x=\"376\" y=\"38\" font-size=\"10\" font-weight=\"bold\">1 u</text>\n <text x=\"215\" y=\"92\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" fill=\"#1e6b30\">0,1 uur = 6 minuten · 0,2 uur = 12 minuten</text>\n <text x=\"215\" y=\"126\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">reistijd 5,0 M ÷ 4,1 kn = 1,22 uur = <tspan fill=\"#1e6b30\">1:13</tspan></text>\n <text x=\"215\" y=\"152\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#c22222\">✘ niet 1:22 — de komma is géén dubbele punt</text>\n <text x=\"215\" y=\"176\" text-anchor=\"middle\" font-size=\"10.5\">vertrek 13:00 + 1:13 → ETA 14:13</text>\n</svg>","cap":"Tijdrekenen: 0,1 uur = 6 minuten — de komma is geen dubbele punt."}],"vragen":[{"typ":"in","t":"De afstand tot de haven is 4,8 zeemijl en je snelheid over de grond is 4,0 knopen. Je vertrekt om 10:00 uur. Hoe laat kom je aan? (UU:MM)","ans":"11:12","marge":2,"fmt":"tijd","eh":"uur","u":"4,8 ÷ 4,0 = 1,2 uur = 1 uur 12 min (0,1 u = 6 min!) → 10:00 + 1:12 = <b>11:12</b>. Valkuil: 1,2 u is níét 1:20.","a":"ETA (marge ±2 min)"},{"typ":"in","t":"Je passeert om 13:20 een boei; tot je bestemming is het 6,3 zeemijl en je snelheid over de grond is 4,2 knopen. Hoe laat verwacht je aan te komen? (UU:MM)","ans":"14:50","marge":2,"fmt":"tijd","eh":"uur","u":"6,3 ÷ 4,2 = 1,5 uur = 1:30 → 13:20 + 1:30 = <b>14:50</b>.","a":"ETA (marge ±2 min)"}]};
CONTENT["6.2.3"]={"theorie":"<p>Dezelfde constructie duikt in examenvragen op in allerlei jasjes: vertrekken uit een lichtenlijn, een drift die er wél bij komt, of een GPS die kilometers in plaats van mijlen toont. Het recept blijft gelijk:</p><ol><li>GrK uit de kaart · stroom bij het vertrekpunt · eigen snelheid vanuit A omcirkelen → BWK én punt B.</li><li>Formule van rechts naar links → kompaskoers (deviatie pas bij de gevonden MK opzoeken).</li><li>Afstand ÷ snelheid over de grond → reistijd → aankomsttijd.</li></ol><p>Controleer jezelf altijd even met de kompasroos-schets: klopt het teken van drift en stroom met de klokregel?</p>","vragen":[{"typ":"in","t":"Om 09:35 passeer je een boei. Tot de haven is het 5,4 zeemijl; je snelheid over de grond is 3,6 knopen. Hoe laat kom je aan? (UU:MM)","ans":"11:05","marge":2,"fmt":"tijd","eh":"uur","u":"5,4 ÷ 3,6 = 1,5 u = 1:30 → 09:35 + 1:30 = <b>11:05</b>.","a":"ETA (marge ±2 min)"}]};
CONTENT["6.3.1"]={"theorie":"<p>Andersom: je <b>kent</b> je kompaskoers en wilt weten waar je uitkomt. Dan vul je de formule eerst van links naar rechts in <b>tot en met de BWK</b> — de kompaskoers mag immers nooit zomaar de kaart in — en dán pas komt de stroom, <b>bij het eindpunt</b>:</p><ol><li>Zet de BWK-lijn vanuit je vertrekpunt in de kaart (lijn 1).</li><li>Pas daarop je snelheid door het water af → punt A (waar je zónder stroom zou zijn).</li><li>Teken vanuit A de stroomrichting en pas de stroomsnelheid af → punt B: je werkelijke gegiste positie.</li><li>De lijn vertrekpunt→B is je <b>grondkoers</b> (richting met de plotter aflezen).</li></ol>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\" font-family=\"Helvetica,Arial\">\n<defs>\n <marker id=\"ah_d2t\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"/></marker>\n <g id=\"kerk_d2t\"><rect x=\"-4\" y=\"-14\" width=\"8\" height=\"14\" fill=\"#8a5a2b\" stroke=\"#4d3010\"/><path d=\"M-4,-14 L0,-22 L4,-14 Z\" fill=\"#4d3010\"/></g>\n <g id=\"toren_d2t\"><circle r=\"6\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.4\"/><circle r=\"1.4\" fill=\"#1a1a2e\"/></g>\n <g id=\"kschip_d2t\"><path d=\"M-16,-5.5 L7,-5.5 Q16,-5.5 16,0 Q16,5.5 7,5.5 L-16,5.5 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"1.6\"/><rect x=\"-12\" y=\"-3.2\" width=\"12\" height=\"6.4\" rx=\"2.5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\".8\"/></g>\n <clipPath id=\"kader_d2t\"><rect x=\"14\" y=\"8\" width=\"402\" height=\"204\"/></clipPath>\n</defs>\n<rect x=\"14\" y=\"8\" width=\"402\" height=\"204\" fill=\"#ffffff\" stroke=\"#333\" stroke-width=\"1.6\"/><g clip-path=\"url(#kader_d2t)\"><g transform=\"matrix(1.7978,0,0,1.7739,-60.1,-233.1)\"><path d=\"M204.3,170.0 L205.9,171.3 L206.4,175.1 L205.4,177.1 L203.5,178.3 L192.3,178.6 L189.0,177.4 L188 CONTENT["6.3.2"]={"theorie":"<p>Uit dezelfde constructie rolt ook de <b>snelheid over de grond</b>: de lengte van vertrekpunt→B. In het boekvoorbeeld (KK 250°, 4 knopen door het water, stroom 090°/1 knoop tegen) blijft daar 3,2 knopen van over.</p><p>De onthoudregel — de <b>spiegelregel</b> — vat beide constructies samen:</p><ul><li><b>GrK → KK</b> (koers plannen): stroom bij het <b>vertrekpunt</b>.</li><li><b>KK → GrK</b> (positie bepalen): stroom bij het <b>eindpunt</b>.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 190\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_sr\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_sr\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_sr\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n  <g id=\"bcirc_sr\"><circle r=\"4.5\" fill=\"none\" stroke=\"#333\" stroke-width=\"1.6\"></circle><circle r=\"1.2\" fill=\"#333\"></circle></g>\n  <g id=\"kerkje_sr\"><rect x=\"-4\" y=\"-16\" width=\"8\" height=\"16\" fill=\"#8a5a2b\" stroke=\"#4d3010\"></rect><path d=\"M-4,-16 L0,-24 L4,-16 Z\" fill=\"#4d3010\"></path><rect x=\"4\" y=\"-9\" width=\"14\" height=\"9\" fill=\"#b98a52\" stroke=\"#4d3010\"></rect><use href=\"#bcirc_sr\" transform=\"translate(0,3)\"></use></g>\n  <g id=\"toren_sr\"><circle r=\"7\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.5\"></circle><circle r=\"1.6\" fill=\"#1a1a2e\"></circle></g>\n </defs>\n\n <line x1=\"215\" y1=\"14\" x2=\"215\" y2=\"176\" stroke=\"#c6d2dc\" stroke-width=\"1.5\"></line>\n <text x=\"110\" y=\"30\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">GrK → KK</text>\n <use href=\"#bcirc_sr\" transform=\"translate(40,140)\"></use>\n <line x1=\"40\" y1=\"140\" x2=\"176\" y2=\"64\" stroke=\"#666\" stroke-width=\"1.8\"></line>\n <line x1=\"40\" y1=\"140\" x2=\"76\" y2=\"108\" stroke=\"#134a70\" stroke-width=\"4.5\" marker-end=\"url(#ah_sr)\"></line>\n <line x1=\"80\" y1=\"105\" x2=\"146\" y2=\"82\" stroke=\"#1e6b30\" stroke-width=\"2.6\" marker-end=\"url(#ah_sr)\"></line>\n <text x=\"110\" y=\"168\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#134a70\">stroom bij het vertrekpunt</text>\n <text x=\"322\" y=\"30\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">KK → GrK</text>\n <use href=\"#bcirc_sr\" transform=\"translate(250,140)\"></use>\n <line x1=\"250\" y1=\"140\" x2=\"352\" y2=\"92\" stroke=\"#1e6b30\" stroke-width=\"2.6\"></line>\n <line x1=\"352\" y1=\"92\" x2=\"390\" y2=\"62\" stroke=\"#134a70\" stroke-width=\"4.5\" marker-end=\"url(#ah_sr)\"></line>\n <path d=\"M250,140 L386,66\" stroke=\"#e07b00\" stroke-width=\"2\" stroke-dasharray=\"7,5\" fill=\"none\"></path>\n <text x=\"322\" y=\"168\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#134a70\">stroom bij het eindpunt</text>\n</svg>","cap":"De spiegelregel: waar de stroom in de constructie staat, hangt af van de rekenrichting."}],"vragen":[{"typ":"in","t":"Markermeer. Je vertrekt van 52° 18,4' N en vaart pal noord met 3,6 knopen gedurende anderhalf uur. Geen wind, geen stroom. Op welke breedte ben je? Vul alléén de minuten in (in tienden).","ans":23.8,"marge":0.2,"fmt":"num","eh":"′ N","u":"3,6 × 1,5 = 5,4 zeemijl = 5,4': 18,4' + 5,4' = <b>52° 23,8' N</b>.","a":"Eindpunt (marge ±0,2′)"},{"t":"Je GPS toont SOG 4,2 kn, terwijl je log 5,0 kn aangeeft. Hoe verklaar je het verschil?","o":["De log meet de snelheid dóór het water, de GPS óver de grond — je vaart kennelijk tegen de stroom in","Eén van beide instrumenten is defect; de waarden horen gelijk te zijn","De GPS loopt achter door de satellietvertraging"],"u":"Log = door het water, GPS/SOG = over de grond. Het verschil ís de stroom: 5,0 door het water en 4,2 over de grond betekent zo'n 0,8 kn tegenstroom. Met stroom mee zou de SOG juist hóger zijn dan de log.","a":"Les 5.1 (VBO)","v":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\"> <defs><marker id=\"ah_F11\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker></defs> <g transform=\"translate(190,110)\"><path d=\"M0,-26 C11,-14 12,8 7,24 L-7,24 C-12,8 -11,-14 0,-26 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2.2\" transform=\"rotate(90)\"></path></g> <path d=\"M228,110 L318,110\" stroke=\"#2c2a72\" stroke-width=\"2.6\" marker-end=\"url(#ah_F11)\"></path> <g transform=\"translate(330,148) rotate(180)\"><line x1=\"-30\" y1=\"0\" x2=\"30\" y2=\"0\" stroke=\"#2f8f4f\" stroke-width=\"3\" marker-end=\"url(#ah_F11)\"></line></g> <text x=\"330\" y=\"168\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" fill=\"#2f8f4f\">stroom</text> <rect x=\"60\" y=\"44\" width=\"120\" height=\"34\" fill=\"#fff\" stroke=\"#2c2a72\" stroke-width=\"1.6\"></rect> <text x=\"120\" y=\"58\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\" fill=\"#2c2a72\">log</text><text x=\"120\" y=\"72\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" fill=\"#2c2a72\">6,0 kn</text> <rect x=\"250\" y=\"44\" width=\"120\" height=\"34\" fill=\"#fff\" stroke=\"#2c2a72\" stroke-width=\"1.6\"></rect> <text x=\"310\" y=\"58\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\" fill=\"#2c2a72\">GPS (SOG)</text><text x=\"310\" y=\"72\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" fill=\"#2c2a72\">4,5 kn</text> <text x=\"215\" y=\"226\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"12.5\" font-weight=\"bold\" fill=\"#0e2a40\">log en GPS geven verschillende snelheden</text> <text x=\"215\" y=\"242\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" font-size=\"9.5\" fill=\"#123a56\">waarom verschillen deze twee waarden?</text> </svg>"}]};
CONTENT["6.4.1"]={"theorie":"<p>Een <b>sectorlicht</b> is een hoog geplaatst lichtbaken waarvan de kleur afhangt van de richting waaruit je kijkt. De sectorgrenzen staan als peilingen op de kaart; een kleurwissel betekent dat je een grens passeert. Vuistregel: <b>zolang je het witte licht ziet, zit je in veilig vaarwater</b> (wit wordt op de kaart geel getekend). Rond de zuidpunt van Texel werken de sectorlichten van Schilbolsnol en veerhaven 't Horntje samen met twee lichtenlijnen als nachtelijke wegwijzers.</p><p>Verder verwacht het examen dat je losse bouwstenen kunt combineren: een positie plus COG en DST van de GPS omrekenen naar een waypoint, een deviatie afleiden uit het verschil tussen GPS-koers en kompaskoers, of een drijvend schip twee uur stroom laten verzetten. Alle gereedschappen daarvoor heb je nu: passer, plotter, koersformule en de twee stroomconstructies.</p>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\" font-family=\"Helvetica,Arial\">\n<defs>\n <marker id=\"ah_sec2\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"/></marker>\n <g id=\"kerk_sec2\"><rect x=\"-4\" y=\"-14\" width=\"8\" height=\"14\" fill=\"#8a5a2b\" stroke=\"#4d3010\"/><path d=\"M-4,-14 L0,-22 L4,-14 Z\" fill=\"#4d3010\"/></g>\n <g id=\"toren_sec2\"><circle r=\"6\" fill=\"#f2c500\" stroke=\"#8a6d00\" stroke-width=\"1.4\"/><circle r=\"1.4\" fill=\"#1a1a2e\"/></g>\n <g id=\"kschip_sec2\"><path d=\"M-16,-5.5 L7,-5.5 Q16,-5.5 16,0 Q16,5.5 7,5.5 L-16,5.5 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"1.6\"/><rect x=\"-12\" y=\"-3.2\" width=\"12\" height=\"6.4\" rx=\"2.5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\".8\"/></g>\n <clipPath id=\"kader_sec2\"><rect x=\"14\" y=\"8\" width=\"402\" height=\"204\"/></clipPath>\n</defs>\n<rect x=\"14\" y=\"8\" width=\"402\" height=\"204\" fill=\"#ffffff\
