10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_hk\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_hk\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_hk\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_hk\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Klein uit de haven mag medewerking verlangen van klein</text>\n <text x=\"215\" y=\"37\" text-anchor=\"middle\" font-size=\"10.5\">Samen oplossen — wie eerst mag hangt van de omstandigheden af</text>\n <rect x=\"0\" y=\"62\" width=\"430\" height=\"95\" fill=\"#a9cde6\"></rect>\n <rect x=\"235\" y=\"157\" width=\"110\" height=\"93\" fill=\"#a9cde6\"></rect>\n <rect x=\"0\" y=\"157\" width=\"235\" height=\"93\" fill=\"#9fbf8f\"></rect><rect x=\"345\" y=\"157\" width=\"85\" height=\"93\" fill=\"#9fbf8f\"></rect>\n <text x=\"16\" y=\"82\" font-size=\"11\" font-weight=\"bold\" fill=\"#134a70\">HOOFDVAARWATER</text>\n <text x=\"290\" y=\"240\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" fill=\"#134a70\">HAVEN</text>\n <use href=\"#kschip_hk\" transform=\"translate(108,112) scale(.9)\"></use><text x=\"108\" y=\"92\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">Cor (klein)</text>\n <path d=\"M143,112 L187,112\" stroke=\"#e08a00\" stroke-width=\"2.6\" stroke-dasharray=\"3,5\" marker-end=\"url(#ah_hk)\"></path>\n <text x=\"52\" y=\"140\" font-size=\"10.5\" fill=\"#b46e00\" font-weight=\"bold\">Cor verleent medewerking</text>\n <use href=\"#kschip_hk\" transform=\"translate(290,196) scale(.85) rotate(-90)\"></use><text x=\"335\" y=\"202\" font-size=\"11.5\" font-weight=\"bold\">Dik</text>\n <path d=\"M290,158 C290,132 302,118 324,114\" fill=\"none\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_hk)\"></path>\n</svg>","cap":"Klein uit de haven: klein op het hoofdvaarwater werkt mee.","half":true},{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_b9\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_b9\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_b9\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_b9\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_b9\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_b9\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_b9\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">BPR: B.9 → óók groot schip Ben verleent voorrang aan Ab</text>\n <text x=\"215\" y=\"37\" text-anchor=\"middle\" font-size=\"10.5\">Ab kan het bord niet zien — koers en snelheid gewoon houden</text>\n <rect x=\"0\" y=\"62\" width=\"430\" height=\"95\" fill=\"#a9cde6\"></rect>\n <rect x=\"235\" y=\"157\" width=\"110\" height=\"93\" fill=\"#a9cde6\"></rect>\n <rect x=\"0\" y=\"157\" width=\"235\" height=\"93\" fill=\"#9fbf8f\"></rect><rect x=\"345\" y=\"157\" width=\"85\" height=\"93\" fill=\"#9fbf8f\"></rect>\n <text x=\"16\" y=\"82\" font-size=\"11\" font-weight=\"bold\" fill=\"#134a70\">HOOFDVAARWATER</text>\n <use href=\"#kschip_b9\" transform=\"translate(108,112) scale(.9)\"></use><text x=\"108\" y=\"92\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">Ab (klein)</text>\n <line x1=\"143\" y1=\"112\" x2=\"205\" y2=\"112\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_b9)\"></line>\n <use href=\"#gschip_b9\" transform=\"translate(290,196) scale(.72) rotate(-90)\"></use><text x=\"290\" y=\"243\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">Ben (groot)</text>\n <g transform=\"translate(358,170)\"><rect x=\"-12\" y=\"-12\" width=\"24\" height=\"24\" fill=\"#fff\" stroke=\"#c62828\" stroke-width=\"3.5\"></rect><rect x=\"-8\" y=\"-3.5\" width=\"16\" height=\"7\" fill=\"#1a1a2e\"></rect><text x=\"0\" y=\"23\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">B.9</text></g>\n <path d=\"M290,168 L290,152\" stroke=\"#c22222\" stroke-width=\"2.6\" stroke-dasharray=\"7,5\" marker-end=\"url(#ah_b9)\"></path>\n</svg>","cap":"Bord B.9: wie het nevenvaarwater uitvaart geeft álles op het hoofdvaarwater voorrang."}],"vragen":[{"s":"A.13","t":"Bij de uitmonding van een nevenvaarwater staat bord B.9. Een gróót schip vaart daar het hoofdvaarwater op, waar jij met je sloep aankomt. Wie verleent voorrang (BPR)?","o":["Het grote schip — B.9 geldt voor iedereen die dat nevenvaarwater verlaat","Jij — klein wijkt altijd voor groot","Niemand: dit is een medewerkingssituatie"],"u":"Bord B.9 draait alles om: wie het nevenvaarwater verlaat verleent voorrang aan ál het verkeer op het hoofdvaarwater — óók een groot schip aan een sloep. Jij ziet het bord meestal niet eens: koers en snelheid houden. Op RPR-water klapt de uitkomst om (groot vóór klein).","a":"Art. 6.16 lid 8 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 200\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"26\" width=\"430\" height=\"82\" fill=\"#a9cde6\"></rect><rect x=\"235\" y=\"108\" width=\"110\" height=\"92\" fill=\"#a9cde6\"></rect><rect x=\"0\" y=\"108\" width=\"235\" height=\"92\" fill=\"#9fbf8f\"></rect><rect x=\"345\" y=\"108\" width=\"85\" height=\"92\" fill=\"#9fbf8f\"></rect><text x=\"14\" y=\"44\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#134a70\">HOOFDVAARWATER</text><use href=\"#kschip\" transform=\"translate(105,72) scale(.85)\"></use><text x=\"105\" y=\"99\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">jouw sloep</text><use href=\"#gschip\" transform=\"translate(290,152) scale(.62) rotate(-90)\"></use><g transform=\"translate(352,122)\"><rect x=\"-11\" y=\"-11\" width=\"22\" height=\"22\" fill=\"#fff\" stroke=\"#c62828\" stroke-width=\"3\"></rect><rect x=\"-7\" y=\"-3\" width=\"14\" height=\"6\" fill=\"#1a1a2e\"></rect><text x=\"0\" y=\"21\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">B.9</text></g></svg>"},{"s":"A.13","t":"Wat is de status van een haven ten opzichte van het vaarwater ervoor?","o":["Een haven is altijd een nevenvaarwater","Een haven telt als hoofdvaarwater zodra er beroepsvaart ligt","Dat bepaalt de havenmeester per dag"],"u":"Wie een haven in- of uitvaart, zit dus per definitie in een 6.16-situatie: vergewisplicht plus de voorrangs-/medewerkingsregels. Herken de borden: hoofdvaarwater = dikke witte streep, nevenvaarwater = dunne streep.","a":"Art. 6.16 BPR"},{"s":"A.13","t":"Zonder bord B.9 verlaat een klein motorschip een haven; op het hoofdvaarwater nadert een ander klein motorschip. Hoe zit de verhouding?","o":["De uitvarende mag medewerking verlangen; samen oplossen","De uitvarende heeft voorrang en mag eerst","Het schip op het hoofdvaarwater heeft altijd voorrang"],"u":"Klein-uit-nevenvaarwater vs. klein-op-hoofdvaarwater = medewerkingsregel: niemand 'mag eerst', de ander mag alleen niet plotseling en in sterke mate hoeven uitwijken. Bij medewerking vraagt het examen nóóit wie eerst mag.","a":"Art. 6.16 lid 4 + 6.03 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 200\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"26\" width=\"430\" height=\"82\" fill=\"#a9cde6\"></rect><rect x=\"235\" y=\"108\" width=\"110\" height=\"92\" fill=\"#a9cde6\"></rect><rect x=\"0\" y=\"108\" width=\"235\" height=\"92\" fill=\"#9fbf8f\"></rect><rect x=\"345\" y=\"108\" width=\"85\" height=\"92\" fill=\"#9fbf8f\"></rect><text x=\"14\" y=\"44\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#134a70\">HOOFDVAARWATER</text><text x=\"290\" y=\"190\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#134a70\">HAVEN</text><use href=\"#kschip\" transform=\"translate(105,72) scale(.85)\"></use><use href=\"#kschip\" transform=\"translate(290,155) scale(.8) rotate(-90)\"></use><text x=\"424\" y=\"128\" text-anchor=\"end\" font-size=\"10\" font-weight=\"bold\">géén bord B.9 geplaatst</text></svg>"}]};
CONTENT["4.2.2"]={"theorie":"<p>Speciaal voor kleine schepen geldt in het BPR-gebied: <b>gestrekte koers stuurboordzijde gaat voor</b>. Vaar je netjes rechts langs de rand van het vaarwater, dan heb je voorrang op álle schepen die je koers kruisen of tegemoetkomen — groot of klein, zeil of motor.</p><ul><li>Een opkruisende zeilboot verleent dus voorrang aan een boot die gestrekte koers stuurboordzijde vaart; de zeilstand speelt dan geen rol.</li><li>De regel geldt alleen binnen <b>één</b> vaarwater — niet in hoofd-/nevenvaarwatersituaties.</li><li>In het RPR-gebied geeft gestrekte koers stuurboordzijde <b>geen</b> voorrang op grote schepen (zie 4.6.1).</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_gk\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_gk\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_gk\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_gk\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_gk\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_gk\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_gk\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">BPR: de stuurboordzijde-volger gaat vóór álles — ook groot</text>\n <rect x=\"0\" y=\"72\" width=\"430\" height=\"102\" fill=\"#a9cde6\"></rect>\n <g fill=\"#2e7d32\"><circle cx=\"55\" cy=\"84\" r=\"5.5\"></circle><circle cx=\"165\" cy=\"84\" r=\"5.5\"></circle><circle cx=\"275\" cy=\"84\" r=\"5.5\"></circle><circle cx=\"385\" cy=\"84\" r=\"5.5\"></circle></g>\n <g fill=\"#c62828\"><circle cx=\"55\" cy=\"162\" r=\"5.5\"></circle><circle cx=\"165\" cy=\"162\" r=\"5.5\"></circle><circle cx=\"275\" cy=\"162\" r=\"5.5\"></circle><circle cx=\"385\" cy=\"162\" r=\"5.5\"></circle></g>\n <use href=\"#kschip_gk\" transform=\"translate(118,146) scale(.85)\"></use><text x=\"118\" y=\"192\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">Yan — rechts, rechte koers</text>\n <line x1=\"150\" y1=\"146\" x2=\"228\" y2=\"146\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_gk)\"></line>\n <use href=\"#gschip_gk\" transform=\"translate(325,100) scale(.62) rotate(135)\"></use><text x=\"322\" y=\"52\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">Demi (groot) steekt over</text>\n <path d=\"M293,122 C276,140 268,150 262,161\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.6\" stroke-dasharray=\"7,5\" marker-end=\"url(#ah_gk)\"></path>\n <text x=\"215\" y=\"215\" text-anchor=\"middle\" font-size=\"10.5\">Voorwaarde: één vaarwater (geen hoofd/neven-situatie)</text>\n <text x=\"215\" y=\"232\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#a12020\">RPR: deze regel geeft géén voorrang op groot</text>\n</svg>","cap":"Wie de stuurboordzijde gestrekt volgt, heeft voorrang — ook op groot en op zeil."}],"noot":"De oefenbank toetst deze regel binnen de situatievragen van 4.1.1 en 4.6.1; een apart vragenblok is er niet."};
CONTENT["4.2.3"]={"theorie":"<p>Is er geen sprake van gestrekte koers stuurboordzijde of een hoofd-/nevenvaarwatersituatie, dan geldt: <b>groot gaat voor klein</b>. \"Groot\" zijn ook de vijf gelijkgestelden: sleepboot met groot schip, passagiersschip met gele ruit, veerpont, vissend vissersschip en duwbak.</p><ul><li><b>Uitzondering</b>: een <b>snel schip</b> (groot, &gt; 40 km/u, twee gele flikkerlichten) moet in het BPR aan álle schepen voorrang verlenen — ook aan kleine.</li><li><b>Kleine boten onderling</b> (buiten de eerdere regels): volgorde van voorrang is <b>zeilboot → roeiboot → motorboot</b>. Een motorboot wijkt dus voor allebei.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_ss\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_ss\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_ss\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_ss\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_ss\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_ss\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_ss\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">BPR: snel schip verleent voorrang — zonder uitzondering</text>\n <rect x=\"0\" y=\"52\" width=\"430\" height=\"150\" fill=\"#a9cde6\"></rect>\n <use href=\"#sschip_ss\" transform=\"translate(140,130) scale(1.15)\"></use>\n <text x=\"140\" y=\"168\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">snel schip (&gt;40 km/u, 2 gele flikkers)</text>\n <use href=\"#kschip_ss\" transform=\"translate(335,95) scale(.85) rotate(180)\"></use>\n <text x=\"335\" y=\"70\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">klein motorschip</text>\n <path d=\"M186,124 C232,132 252,152 264,172\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.6\" stroke-dasharray=\"7,5\" marker-end=\"url(#ah_ss)\"></path>\n <line x1=\"300\" y1=\"95\" x2=\"238\" y2=\"95\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_ss)\"></line>\n <text x=\"215\" y=\"226\" text-anchor=\"middle\" font-size=\"11\" fill=\"#a12020\">RPR-spiegel: omgekeerd — daar geeft klein het snelle schip de ruimte</text>\n</svg>","cap":"Het snelle schip (twee gele flikkerlichten) wijkt in het BPR voor iedereen."}],"noot":"Ook deze regels komen in de bank terug via de situatievragen van 4.1.1 en 4.6.1."};
CONTENT["4.3.1"]={"theorie":"<p>Een <b>engte</b> is een vernauwing waar je niet met twee schepen tegelijk doorheen kunt (smalle brugopening, openstaande sluis, bij een gierpont). Doorvaren zonder onnodig oponthoud; <b>voorbijlopen is er verboden</b>. Geen vrij uitzicht? Geef vóór het invaren <b>één lange stoot</b> (herhaal in een lange engte).</p><h4>Engte mét stroom</h4><p>Heel simpel: <b>wie de stroom mee heeft, heeft voorrang</b> — groot of klein, zeil of motor. Wie tegen de stroom in vaart kan de stroom \"doodvaren\" en blijft zo bestuurbaar liggen wachten; wie vóór stroom vaart en inhoudt, drijft stuurloos mee. (RPR: hier gaat groot vóór, ook met stroom tegen.)</p><h4>Engte zonder stroom</h4><ul><li>Volgorde: groot voor klein; daarna zeil → roei → motor.</li><li><b>Uitzondering</b>: een zeilschip dat de engte niet bezeild kan doorvaren (moet opkruisen) heeft nooit voorrang op een ander klein schip — laveren lukt in een engte niet.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_es\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_es\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_es\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_es\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_es\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_es\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_es\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Samen erdoor kan niet. Wie verleent voorrang?</text>\n <path d=\"M0,58 L150,58 Q205,74 205,120 Q205,166 150,182 L0,182 Z\" fill=\"#a9cde6\"></path>\n <path d=\"M430,58 L280,58 Q225,74 225,120 Q225,166 280,182 L430,182 Z\" fill=\"#a9cde6\"></path>\n <rect x=\"150\" y=\"88\" width=\"130\" height=\"64\" fill=\"#a9cde6\"></rect>\n <path d=\"M0,30 L430,30 L430,58 L280,58 Q215,71 215,58 L150,58 L0,58 Z\" fill=\"#9fbf8f\"></path>\n <path d=\"M0,240 L430,240 L430,182 L280,182 Q215,169 215,182 L150,182 L0,182 Z\" fill=\"#9fbf8f\"></path>\n <g stroke=\"#134a70\" fill=\"#134a70\"><line x1=\"332\" y1=\"120\" x2=\"262\" y2=\"120\" stroke-width=\"5\" marker-end=\"url(#ah_es)\"></line><text x=\"352\" y=\"124\" font-size=\"11.5\" font-weight=\"bold\">stroom</text></g>\n <use href=\"#kschip_es\" transform=\"translate(78,120) scale(.85)\"></use><text x=\"78\" y=\"149\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">Loa (opvarend)</text>\n <use href=\"#kschip_es\" transform=\"translate(362,150) scale(.85) rotate(180)\"></use><text x=\"362\" y=\"176\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">Nia (afvarend)</text>\n</svg>","cap":"Engte met stroom: mee-stroom heeft voorrang, tegen-stroom vaart de stroom dood en wacht.","half":true},{"svg":"<svg viewBox=\"0 0 430 240\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_eo\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_eo\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_eo\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_eo\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_eo\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_eo\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_eo\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Zeil &gt; motor — maar de opkruiser verliest zijn voorrang</text>\n <path d=\"M0,58 L150,58 Q205,74 205,120 Q205,166 150,182 L0,182 Z\" fill=\"#a9cde6\"></path>\n <path d=\"M430,58 L280,58 Q225,74 225,120 Q225,166 280,182 L430,182 Z\" fill=\"#a9cde6\"></path>\n <rect x=\"150\" y=\"88\" width=\"130\" height=\"64\" fill=\"#a9cde6\"></rect>\n <path d=\"M0,30 L430,30 L430,58 L280,58 Q215,71 215,58 L150,58 L0,58 Z\" fill=\"#9fbf8f\"></path>\n <path d=\"M0,240 L430,240 L430,182 L280,182 Q215,169 215,182 L150,182 L0,182 Z\" fill=\"#9fbf8f\"></path>\n <g transform=\"translate(50,120)\"><use href=\"#wroos_eo\"></use><path d=\"M0,-14 L0,8\" transform=\"rotate(75)\" stroke=\"#c22222\" stroke-width=\"2.2\" marker-end=\"url(#ah_eo)\"></path></g>\n <g transform=\"translate(112,158) scale(.85)\"><use href=\"#zboot_eo\"></use><line x1=\"2\" y1=\"0\" x2=\"-22\" y2=\"13\" stroke=\"#333\" stroke-width=\"3\"></line></g>\n <text x=\"112\" y=\"185\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">Ali (moet opkruisen)</text>\n <path d=\"M140,155 C152,152 158,146 162,138\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.6\" stroke-dasharray=\"7,5\" marker-end=\"url(#ah_eo)\"></path>\n <use href=\"#kschip_eo\" transform=\"translate(358,120) scale(.85) rotate(180)\"></use><text x=\"358\" y=\"149\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">Mo (motor)</text>\n <line x1=\"325\" y1=\"120\" x2=\"255\" y2=\"120\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_eo)\"></line>\n <text x=\"215\" y=\"228\" text-anchor=\"middle\" font-size=\"10.5\">Wind uit oost (roos): Ali kan de engte niet bezeilen → Ali wacht</text>\n</svg>","cap":"Engte zonder stroom: de opkruisende zeiler heeft geen voorrang.","half":true}],"vragen":[{"s":"A.12","t":"In een engte met stroom nadert een klein motorschip mét de stroom mee een opvarend klein zeilschip. Beide kunnen er niet tegelijk door. Wie gaat voor (BPR)?","o":["De motorboot — stroom mee heeft in een engte altijd voorrang","Het zeilschip — zeil gaat voor motor","Beiden wachten en lossen het samen op"],"u":"BPR-engteregel: wie de stroom mee heeft gaat áltijd voor, ongeacht scheepstype. Ratio: de opvarende kan de stroom doodvaren en blijft bestuurbaar. (RPR: klein wijkt daar tóch voor groot!)","a":"Art. 6.07 BPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 190\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <path d=\"M0,30 L150,30 Q205,46 205,92 Q205,138 150,154 L0,154 Z\" fill=\"#a9cde6\"></path><path d=\"M430,30 L280,30 Q225,46 225,92 Q225,138 280,154 L430,154 Z\" fill=\"#a9cde6\"></path><rect x=\"150\" y=\"62\" width=\"130\" height=\"60\" fill=\"#a9cde6\"></rect><rect x=\"0\" y=\"0\" width=\"430\" height=\"30\" fill=\"#9fbf8f\"></rect><rect x=\"0\" y=\"154\" width=\"430\" height=\"36\" fill=\"#9fbf8f\"></rect><g stroke=\"#134a70\" fill=\"#134a70\"><line x1=\"330\" y1=\"92\" x2=\"262\" y2=\"92\" stroke-width=\"5\" marker-end=\"url(#ah)\"></line><text x=\"345\" y=\"96\" font-size=\"11\" font-weight=\"bold\">stroom</text></g><g transform=\"translate(78,92) scale(.85)\"><use href=\"#zboot\"></use><line x1=\"2\" y1=\"0\" x2=\"-22\" y2=\"13\" stroke=\"#333\" stroke-width=\"3\"></line></g><text x=\"78\" y=\"126\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">zeil (opvarend)</text><use href=\"#kschip\" transform=\"translate(362,120) scale(.85) rotate(180)\"></use><text x=\"362\" y=\"150\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">motor (afvarend)</text></svg>"},{"s":"A.12","t":"Engte zonder stroom: een klein zeilschip dat de engte bezeild kan doorvaren en een klein motorschip naderen van weerszijden. Wie gaat voor?","o":["Het zeilschip — zonder stroom geldt in de engte de soortvolgorde (zeil > spierkracht > motor)","De motorboot — in engtes tellen alleen motoren","Wie het eerst bij de engte aankomt"],"u":"Zonder stroom: eerst groot vóór klein, daarna tussen kleintjes de soortregel — mits de zeiler de engte bezeild (zonder kruisen) kan doorvaren.","a":"Art. 6.07 BPR"},{"s":"A.12","t":"In een engte zonder stroom naderen elkaar een bezeild klein zeilschip en een klein motorschip. Wie gaat voor?","o":["Het zeilschip — mits het de engte bezeild (zonder opkruisen) kan doorvaren","Het motorschip — in een engte vervallen de soortregels","Geen van beiden — wie het eerst bij de engte is, vaart eerst"],"u":"Zonder stroom geldt in de engte de soortvolgorde: groot > klein, en tussen kleintjes zeil > roei > motor. Eén uitzondering: een zeilschip dat de engte níét bezeild heeft (moet laveren) heeft nooit voorrang — opkruisen past niet in een engte.","a":"Art. 6.07 BPR"},{"s":"A.12","t":"Je nadert een engte zonder vrij uitzicht op tegenliggers. Welk geluidssein geef je?","o":["Eén lange stoot vóór het invaren (in een lange engte zo nodig herhalen)","Drie korte stoten","Geen sein — rustig doorvaren volstaat"],"u":"Eén lange stoot (±4 sec) kondigt je aan. Verder in de engte: voorbijlopen verboden en zonder onnodig oponthoud doorvaren.","a":"Art. 6.07 BPR"}]};
CONTENT["4.4.1"]={"theorie":"<h4>Keren, vertrekken, oversteken</h4><p>Mag alleen na <b>vergewissen</b> dat het zonder gevaar kan. Daarbij: een groot schip mag medewerking verlangen; een klein schip moet voorrang verlenen aan groot en mag medewerking verlangen van andere kleine schepen. Bij dreigende aanvaring: vaar van het andere schip áf, nooit \"even snel\" vóórlangs.</p><h4>Veerpont</h4><p>De pont (ook &lt; 20 m) heeft grote-schip-rechten: bij vertrek en oversteken <b>voorrang op alle kleine schepen</b> en medewerking van grote — maar de veerman moet zich eerst vergewissen dat het veilig kan, ten opzichte van iedereen.</p><h4>Sluis</h4><ul><li><b>Volgorde</b> (als de sluismeester niets aanwijst): eerst de grote schepen op volgorde van aankomst, dan de kleine; uitvaren in dezelfde volgorde.</li><li>Rustig invaren; leg aan waar de sluiswachter aanwijst, anders bakboordzijde (rechtse schroef). Meer bij voorkeur af met twee <b>sliptrossen</b> (uiteinde in de hand); bij sterke stroom of klein verval juist beleggen. Schroef in de vrijloop zodra je vastligt; (bij)tanken is verboden behalve met toestemming in nood.</li><li>Let op <b>valwind</b> (dwarswind draait onderin de sluis om), de <b>drempel</b> onder de sluisdeuren en de <b>stopstrepen</b>: daarbinnen blijven.</li><li>Marifoon aan boord? <b>Uitluisterplicht</b> op het sluis- of brugkanaal, ook wachtend.</li><li>Remmingswerken: verboden aan te meren; wachtsteiger: overnachten alleen met toestemming van de sluismeester.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_vp\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_vp\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_vp\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_vp\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_vp\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_vp\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_vp\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Veerpont: voorrang op klein, medewerking van groot</text>\n <rect x=\"0\" y=\"55\" width=\"430\" height=\"150\" fill=\"#a9cde6\"></rect>\n <rect x=\"0\" y=\"30\" width=\"430\" height=\"25\" fill=\"#9fbf8f\"></rect><rect x=\"0\" y=\"205\" width=\"430\" height=\"45\" fill=\"#9fbf8f\"></rect>\n <use href=\"#pont_vp\" transform=\"translate(215,150) rotate(-90)\"></use>\n <text x=\"258\" y=\"158\" font-size=\"11\" font-weight=\"bold\">pont</text>\n <line x1=\"215\" y1=\"112\" x2=\"215\" y2=\"78\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_vp)\"></line>\n <use href=\"#kschip_vp\" transform=\"translate(95,95) scale(.85)\"></use><text x=\"95\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">klein</text>\n <path d=\"M130,95 C158,95 168,104 176,114\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.6\" stroke-dasharray=\"7,5\" marker-end=\"url(#ah_vp)\"></path>\n <use href=\"#gschip_vp\" transform=\"translate(345,95) scale(.7) rotate(180)\"></use><text x=\"345\" y=\"126\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">groot</text>\n <path d=\"M295,95 L262,95\" stroke=\"#e08a00\" stroke-width=\"2.6\" stroke-dasharray=\"3,5\" marker-end=\"url(#ah_vp)\"></path>\n <text x=\"215\" y=\"232\" text-anchor=\"middle\" font-size=\"10.5\">Pont heeft vergewisplicht t.o.v. iedereen vóór hij vertrekt (art. 6.23)</text>\n</svg>","cap":"De veerpont kruist het vaarwater met grote-schip-rechten — maar vergewist zich eerst."},{"svg":"<svg viewBox=\"0 0 430 250\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_sl\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_sl\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_sl\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_sl\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_sl\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_sl\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_sl\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"18\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">Invaren · schutten · volgorde</text>\n <g transform=\"translate(8,34)\"><rect x=\"0\" y=\"0\" width=\"130\" height=\"150\" fill=\"#a9cde6\" stroke=\"#5b87a8\"></rect><rect x=\"0\" y=\"0\" width=\"14\" height=\"150\" fill=\"#8a919b\"></rect><rect x=\"116\" y=\"0\" width=\"14\" height=\"150\" fill=\"#8a919b\"></rect>\n  <use href=\"#kschip_sl\" transform=\"translate(65,110) scale(.7) rotate(-90)\"></use>\n  <path d=\"M65,74 L65,44\" stroke=\"#1e6b30\" stroke-width=\"2.6\" marker-end=\"url(#ah_sl)\"></path>\n  <text x=\"65\" y=\"166\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">rustig invaren · rechtse schroef:</text><text x=\"65\" y=\"178\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">bakboordwand kiezen</text></g>\n <g transform=\"translate(150,34)\"><rect x=\"0\" y=\"0\" width=\"130\" height=\"150\" fill=\"#a9cde6\" stroke=\"#5b87a8\"></rect><rect x=\"0\" y=\"0\" width=\"14\" height=\"150\" fill=\"#8a919b\"></rect><rect x=\"116\" y=\"0\" width=\"14\" height=\"150\" fill=\"#8a919b\"></rect>\n  <use href=\"#kschip_sl\" transform=\"translate(56,75) scale(.7) rotate(-90)\"></use>\n  <path d=\"M44,48 L16,40 M44,102 L16,112\" stroke=\"#7a5c00\" stroke-width=\"2.4\"></path>\n  <text x=\"65\" y=\"166\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">sliptros vóór + achter,</text><text x=\"65\" y=\"178\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">uiteinde in de hand · schroef uit</text></g>\n <g transform=\"translate(292,34)\"><rect x=\"0\" y=\"0\" width=\"130\" height=\"150\" fill=\"#a9cde6\" stroke=\"#5b87a8\"></rect>\n  <use href=\"#gschip_sl\" transform=\"translate(65,40) scale(.5) rotate(-90)\"></use><text x=\"100\" y=\"44\" font-size=\"10\" font-weight=\"bold\">1</text>\n  <use href=\"#gschip_sl\" transform=\"translate(38,105) scale(.5) rotate(-90)\"></use><text x=\"70\" y=\"109\" font-size=\"10\" font-weight=\"bold\">2</text>\n  <use href=\"#kschip_sl\" transform=\"translate(100,112) scale(.6) rotate(-90)\"></use><text x=\"118\" y=\"94\" font-size=\"10\" font-weight=\"bold\">3</text>\n  <text x=\"65\" y=\"166\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">groot eerst, dan klein</text><text x=\"65\" y=\"178\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">(elk op aankomst) · zelfde eruit</text></g>\n <text x=\"215\" y=\"226\" text-anchor=\"middle\" font-size=\"10\">Verdieping (drempel, valwind, tros verleggen) volgt als aparte serie in de oefenbank</text>\n</svg>","cap":"De sluis in drie momenten: rustig invaren, vastmaken met sliptrossen, schutten."}],"vragen":[{"s":"A.14","t":"Een veerpont wil vertrekken terwijl jij met je kleine motorschip passeert. Wat geldt?","o":["De pont mag vertrekken; jij verleent als klein schip voorrang — maar hij moet zich eerst vergewissen","Jij gaat altijd voor: de pont wacht op al het verkeer","De pont heeft alleen voorrang op zeilschepen"],"u":"De veerpont is gelijkgesteld aan een groot schip (grote vijf): voorrang op kleine schepen, medewerking verlangen van grote — maar met vergewisplicht t.o.v. iedereen vóór vertrek.","a":"Art. 6.23 BPR"},{"s":"A.14","t":"Je wilt met je kleine motorschip keren op druk vaarwater. Wat geldt?","o":["Keren mag na vergewissen: voorrang verlenen aan groot, medewerking verlangen van klein","Tijdens het keren heb je voorrang op iedereen","Keren op druk vaarwater is verboden"],"u":"Keren en vertrekken mogen pas als je je hebt vergewist dat het zonder gevaar kan. Daarna gelden de bekende verhoudingen: klein verleent voorrang aan groot en mag medewerking verlangen van klein.","a":"Art. 6.13 / 6.14 BPR"},{"s":"A.15","t":"In welke volgorde vaart men een sluis in als de sluismeester niets aanwijst?","o":["Eerst de grote schepen op volgorde van aankomst, daarna de kleine op volgorde van aankomst","Puur op volgorde van aankomst, groot of klein","Kleine schepen eerst — die zijn wendbaarder"],"u":"Groot eerst, dan klein — en er in dezelfde volgorde weer uit. In de kolk meert een klein schip het liefst langszij een grotere afgemeerde boot; zodra je gemeerd ligt: schroef uit.","a":"Art. 6.28 BPR"},{"s":"A.14","t":"Mag je met je sloep vlak vóór een overstekende veerpont langs varen?","o":["Nee — de pont heeft bij het oversteken voorrang op alle kleine schepen","Ja — een pont is een klein schip en jij vaart de stuurboordzijde","Ja, mits je één lange stoot geeft"],"u":"De veerpont is gelijkgesteld aan een groot schip: bij vertrekken en oversteken heeft hij voorrang op kleine schepen en mag hij medewerking verlangen van grote. Wel geldt voor de pont een vergewisplicht vooraf.","a":"Art. 6.23 BPR"}]};
CONTENT["4.4.2"]={"theorie":"<h4>Ligplaatsverboden</h4><p>Geen ligplaats nemen: waar een vaarweg of haven uitmondt · onder bruggen en hoogspanningsleidingen (radar-onzichtbaar) · bij keerplaatsen, engtes en veerponten · en binnen de kegel-afstanden van een schip met gevaarlijke lading: <b>1 kegel 10 m, 2 kegels 50 m, 3 kegels 100 m</b>.</p><h4>Slecht zicht</h4><ul><li>Houd bij slecht zicht altijd zoveel mogelijk <b>stuurboordwal</b>.</li><li>Op de drukke <b>Bijlage 9-vaarwegen</b> mag een klein schip alleen doorvaren <b>op radar</b> (met marifoongebruik: uitluisteren, informeren, en bij gevaar melden dat je klein bent en welke kant je uitwijkt).</li><li>Elders mag je zonder radar varen, maar héb je een marifoon, dan moet je hem gebruiken.</li></ul><h4>Bijlage 15A en 15B</h4><ul><li><b>15A</b>: alleen varen met een direct startklare motor die minstens <b>6 km/u door het water</b> haalt; opkruisen verboden; en zoveel mogelijk stuurboordwal houden (die walplicht geldt níét op de RPR-wateren en de Gelderse IJssel, vanwege verkeerde-wal-varende grote schepen).</li><li><b>15B</b>: bij slecht zicht een goed werkende <b>radarreflector</b> verplicht, varend én ten anker.</li></ul><p>Verder: laat je nooit zonder voortstuwing met de stroom meedrijven (onbestuurbaar), en wie voorrang heeft <b>houdt koers en snelheid</b> — wie moet wijken doet dat tijdig en vaart achterlangs.</p>","vragen":[{"s":"A.17","t":"Waarom is ligplaats nemen onder een brug verboden?","o":["Je bent daar onzichtbaar voor de radar van de beroepsvaart","Bruggen zijn eigendom van Rijkswaterstaat","Alleen vanwege golfslag"],"u":"Onder bruggen (en hoogspanningsleidingen) verdwijn je in de radarschaduw. Ook verboden: bij uitmondingen, engtes, veerponten, keerplaatsen en binnen 10/50/100 m van kegelvoerders.","a":"Art. 7.02 BPR"},{"s":"A.17","t":"Op welke afstand moet je minimaal ligplaats nemen van een schip dat twee blauwe kegels voert?","o":["50 meter","10 meter","100 meter"],"u":"Vuistregel 1-2-3 = 10/50/100 meter: 1 kegel = 10 m, 2 kegels = 50 m, 3 kegels = 100 m. Hoe meer kegels (gevaarlijker lading), hoe groter de verplichte afstand.","a":"Art. 7.07 BPR"},{"s":"A.17","t":"Mag je met je sloep overnachten aan het remmingswerk van een sluis?","o":["Nee — afmeren aan remmingswerk is voor kleine schepen verboden; de wachtsteiger mag alleen met toestemming van de sluismeester","Ja — remmingswerk is juist bedoeld voor wachtende schepen","Ja, mits je vóór de eerste schutting weer vertrekt"],"u":"Remmingswerk geleidt schepen de kolk in en is verboden afmeerplek voor kleine schepen. Overnachten op de wáchtsteiger kan alleen met toestemming van de sluismeester.","a":"Art. 6.28 BPR (ordebepalingen)"},{"s":"A.16","t":"Dichte mist op een Bijlage 9-vaarweg (drukke hoofdvaarweg). Jouw sloep heeft geen radar. Wat moet je?","o":["Niet (verder) varen: zo snel mogelijk een veilige ligplaats zoeken","Doorvaren met mistseinen, dicht langs de stuurboordwal","Doorvaren zolang je een marifoon hebt"],"u":"Op Bijlage 9-wegen mag een klein schip bij slecht zicht alléén op goedgekeurde radar (plus marifoon) varen. Zonder radar: ligplaats zoeken. Op overige wateren mag het wel, zoveel mogelijk stuurboordwal en mét marifoongebruik als je die hebt.","a":"Art. 6.29/6.30 BPR"},{"s":"A.19","t":"Wat eist het BPR op Bijlage 15A-vaarwegen nog meer van kleine schepen, naast de stuurboordwalplicht?","o":["Motor gebruiksklaar en ten minste 6 km/u door het water kunnen lopen; opkruisen is er verboden","Alleen een marifoonplicht","Een algeheel verbod voor zeilschepen"],"u":"Bijlage 15A-wegen zijn drukke doorgaande vaarwegen: gebruiksklare motor, minimaal 6 km/u door het water en een opkruisverbod voor kleine schepen.","a":"Hfdst. 9 + Bijlage 15A BPR"}]};
CONTENT["4.5.1"]={"theorie":"<p>Op bochtige, snelstromende rivieren (Gelderse IJssel, Limburgse Maas) kiezen opvarende grote schepen graag de <b>binnenbocht</b>: daar staat minder stroom tegen. Ze varen dan \"verkeerde wal\".</p><ul><li>Het opvarende grote schip toont het <b>lichtblauwe bord met witte rand</b> plus een wit flikkerlicht: verzoek om <b>stuurboord-op-stuurboord</b> te passeren.</li><li>Het afvarende grote schip antwoordt bij voorkeur met zijn eigen blauwe bord. Wordt het niet begrepen, dan geeft de opvaart <b>twee korte stoten</b> (\"ik ga bakboord uit\") — of <b>één korte stoot</b> als het juist gewoon bakboord-op-bakboord wil.</li><li><b>Alleen grote schepen</b> mogen het blauwe bord zetten. Als klein schip reageer je door mee te werken: ga — als het kan — naar bakboordwal en passeer stuurboord-op-stuurboord.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 260\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_vb\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_vb\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_vb\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_vb\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_vb\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_vb\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_vb\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"18\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\">Gelderse IJssel / Maas: passeren stuurboord op stuurboord</text>\n <text x=\"215\" y=\"34\" text-anchor=\"middle\" font-size=\"10\">Geen reactie? → 2 korte stoten · klein schip antwoordt nóóit met een bord</text>\n <path d=\"M0,260 Q45,140 185,105 Q325,72 430,105 L430,205 Q320,152 205,180 Q95,205 72,260 Z\" fill=\"#a9cde6\"></path>\n <g stroke=\"#134a70\" fill=\"#134a70\"><path d=\"M392,118 Q305,88 222,105\" fill=\"none\" stroke-width=\"4.5\" marker-end=\"url(#ah_vb)\"></path><text x=\"402\" y=\"132\" text-anchor=\"end\" font-size=\"11\" font-weight=\"bold\">stroom</text></g>\n <use href=\"#gschip_vb\" transform=\"translate(150,205) scale(.62) rotate(-22)\"></use>\n <text x=\"118\" y=\"248\" font-size=\"11\" font-weight=\"bold\">opvaart — binnenbocht (bakboordwal)</text>\n <g transform=\"translate(196,172)\"><rect x=\"-10\" y=\"-10\" width=\"20\" height=\"20\" fill=\"#5aa7e0\" stroke=\"#fff\" stroke-width=\"2.5\"></rect><circle cx=\"0\" cy=\"0\" r=\"4\" fill=\"#fff\"></circle></g>\n <text x=\"214\" y=\"200\" font-size=\"10\" font-weight=\"bold\" fill=\"#134a70\">blauw bord + wit flikkerlicht</text>\n <use href=\"#gschip_vb\" transform=\"translate(330,128) scale(.62) rotate(194)\"></use>\n <text x=\"416\" y=\"160\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\">afvaart antwoordt met eigen bord</text>\n</svg>","cap":"De opvarende vrachtvaarder kiest de binnenbocht en kondigt dat aan met het blauwe bord."}],"vragen":[{"s":"A.21","t":"Op de Waal toont een tegemoetkomend groot schip het blauwe bord met wit flikkerlicht, aan jouw stuurboordzijde van het vaarwater. Wat doe jij met je sloep?","o":["Meewerken: naar de andere zijde gaan en stuurboord op stuurboord passeren — zelf géén bord tonen","Je eigen blauwe bord tonen en koers houden","Stuurboordwal claimen: jij hebt voorrang"],"u":"Kleine schepen tonen nóóit een blauw bord, ook niet als antwoord. Op de Rijntakken laat klein bovendien altijd ruimte aan groot; stuurboordwal geeft daar geen enkele aanspraak.","a":"Art. 6.02/6.04 RPR","v":"<svg class=\"qv\" viewBox=\"0 0 430 190\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <rect x=\"0\" y=\"24\" width=\"430\" height=\"140\" fill=\"#8fb8d8\"></rect><text x=\"14\" y=\"44\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#0d3350\">WAAL (RPR)</text><use href=\"#gschip\" transform=\"translate(140,95) scale(.8)\"></use><g transform=\"translate(205,68)\"><rect x=\"-9\" y=\"-9\" width=\"18\" height=\"18\" fill=\"#5aa7e0\" stroke=\"#fff\" stroke-width=\"2.2\"></rect><circle r=\"3.5\" fill=\"#fff\"></circle></g><use href=\"#kschip\" transform=\"translate(345,130) scale(.85) rotate(180)\"></use><text x=\"345\" y=\"160\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">jouw sloep</text></svg>"}]};
CONTENT["4.6.1"]={"theorie":"<p>Het RPR geldt op de Boven-Rijn, Waal, Pannerdensch Kanaal, Neder-Rijn en Lek — de drukste vrachtroute van Europa. Kernprincipe: <b>op de Rijn gaat groot altijd voor klein</b>; kleine schepen mogen de vlotte vaart nooit belemmeren.</p><h4>De belangrijkste verschillen</h4><table><tr><th>Onderwerp</th><th>BPR</th><th>RPR</th></tr><tr><td>Gestrekte koers SB-zijde</td><td>klein heeft voorrang, ook op groot</td><td>geen voorrang op groot</td></tr><tr><td>Stuurboordwalplicht klein</td><td>verplicht op 15A-wegen</td><td>niet verplicht; hinder groot niet</td></tr><tr><td>Engte met stroom</td><td>stroom mee = voorrang</td><td>klein wijkt voor groot, ook met stroom mee</td></tr><tr><td>Snel schip (&gt;40 km/u)</td><td>wijkt voor iedereen</td><td>klein geeft het snelle schip de ruimte</td></tr><tr><td>Bord B.9</td><td>klein op hoofdvaarwater heeft voorrang</td><td>groot uit nevenvaarwater gaat vóór klein</td></tr><tr><td>Slecht zicht</td><td>doorvaren mag (behalve bijlage 9)</td><td>alleen met radar + marifoon</td></tr><tr><td>Reglement aan boord</td><td>verplicht, ook klein</td><td>klein hoeft niet</td></tr><tr><td>Sleepboot &lt;20 m zonder sleep</td><td>klein schip</td><td>groot schip</td></tr></table>","vis":[{"svg":"<svg viewBox=\"0 0 430 250\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_rw\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_rw\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-24\" y=\"-6\" width=\"20\" height=\"12\" rx=\"3\" fill=\"#d8dde3\" stroke=\"#333\"></rect></g>\n  <g id=\"gschip_rw\"><path d=\"M-72,-15 L52,-15 Q72,-15 72,0 Q72,15 52,15 L-72,15 Z\" fill=\"#e3a44a\" stroke=\"#5a3d10\" stroke-width=\"2\"></path><rect x=\"-68\" y=\"-9\" width=\"16\" height=\"18\" rx=\"2\" fill=\"#f2e4c8\" stroke=\"#5a3d10\"></rect><rect x=\"-44\" y=\"-9\" width=\"80\" height=\"18\" rx=\"2\" fill=\"#c9871f\" stroke=\"#5a3d10\"></rect></g>\n  <g id=\"zboot_rw\"><path d=\"M-26,-9 L14,-9 Q26,-9 26,0 Q26,9 14,9 L-26,9 Z\" fill=\"#f5f5f0\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"2\" cy=\"0\" r=\"2.5\" fill=\"#333\"></circle></g>\n  <g id=\"sschip_rw\"><path d=\"M-36,-8 L14,-8 Q36,-8 36,0 Q36,8 14,8 L-36,8 Z\" fill=\"#eef2f6\" stroke=\"#333\" stroke-width=\"2\"></path><rect x=\"-28\" y=\"-5\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#c9d4de\" stroke=\"#333\"></rect><g fill=\"#f2c500\" stroke=\"#8a6d00\"><circle cx=\"4\" cy=\"0\" r=\"3\"></circle><circle cx=\"14\" cy=\"0\" r=\"3\"></circle></g></g>\n  <g id=\"pont_rw\"><path d=\"M-30,-12 L30,-12 L38,0 L30,12 L-30,12 L-38,0 Z\" fill=\"#dfe6ec\" stroke=\"#333\" stroke-width=\"2\"></path><circle cx=\"0\" cy=\"-3.5\" r=\"3\" fill=\"#2e7d32\"></circle><circle cx=\"0\" cy=\"3.5\" r=\"3\" fill=\"#fff\" stroke=\"#888\"></circle></g>\n  <g id=\"wroos_rw\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</text><text x=\"-12\" y=\"3\">W</text></g></g>\n </defs>\n\n <text x=\"215\" y=\"20\" text-anchor=\"middle\" font-size=\"12.3\" font-weight=\"bold\">RPR: groot gaat vóór klein — de B.9-uitkomst klapt om</text>\n <text x=\"215\" y=\"37\" text-anchor=\"middle\" font-size=\"10.5\">Klein mag nooit verlangen dat groot voor hem wijkt (art. 6.02 RPR)</text>\n <rect x=\"0\" y=\"62\" width=\"430\" height=\"95\" fill=\"#8fb8d8\"></rect>\n <rect x=\"235\" y=\"157\" width=\"110\" height=\"93\" fill=\"#8fb8d8\"></rect>\n <rect x=\"0\" y=\"157\" width=\"235\" height=\"93\" fill=\"#9fbf8f\"></rect><rect x=\"345\" y=\"157\" width=\"85\" height=\"93\" fill=\"#9fbf8f\"></rect>\n <text x=\"16\" y=\"82\" font-size=\"11\" font-weight=\"bold\" fill=\"#0d3350\">WAAL (RPR)</text>\n <use href=\"#kschip_rw\" transform=\"translate(108,112) scale(.9)\"></use><text x=\"108\" y=\"92\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">Ab (klein)</text>\n <path d=\"M143,112 C172,112 182,124 192,136\" fill=\"none\" stroke=\"#c22222\" stroke-width=\"2.6\" stroke-dasharray=\"7,5\" marker-end=\"url(#ah_rw)\"></path>\n <text x=\"40\" y=\"146\" font-size=\"10.5\" fill=\"#c22222\" font-weight=\"bold\">Ab laat ruimte (klein wijkt)</text>\n <use href=\"#gschip_rw\" transform=\"translate(290,196) scale(.72) rotate(-90)\"></use><text x=\"290\" y=\"243\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\">Ben (groot)</text>\n <g transform=\"translate(358,170)\"><rect x=\"-12\" y=\"-12\" width=\"24\" height=\"24\" fill=\"#fff\" stroke=\"#c62828\" stroke-width=\"3.5\"></rect><rect x=\"-8\" y=\"-3.5\" width=\"16\" height=\"7\" fill=\"#1a1a2e\"></rect><text x=\"0\" y=\"23\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">B.9</text></g>\n <path d=\"M290,148 C290,124 301,113 322,111\" fill=\"none\" stroke=\"#1e6b30\" stroke-width=\"3\" marker-end=\"url(#ah_rw)\"></path>\n</svg>","cap":"Zelfde B.9-situatie, andere uitkomst: op de Waal (RPR) gaat het grote schip vóór."}],"vragen":[{"s":"A.19","t":"Geldt de stuurboordwalplicht voor kleine schepen op de Waal?","o":["Nee — de Waal is er expliciet van uitgezonderd","Ja, op alle drukke vaarwegen","Alleen voor zeilschepen"],"u":"Art. 9.04 lid 2 zondert Waal, Boven-Rijn, Geldersche IJssel, Neder-Rijn en Pannerdensch Kanaal uit; Maas en Lek staan niet in Bijlage 15a. Op die rivieren is 'varen met of zonder blauw bord' de hoofdregel.","a":"Art. 9.04 lid 2 BPR"},{"s":"A.21","t":"Engte in de Waal, sterke stroom. Jouw sloep vaart mét de stroom mee; een opvarend groot vrachtschip nadert. Wie gaat voor?","o":["Het grote schip — op het RPR wijkt klein óók met stroom mee","Jij — stroom mee heeft in een engte altijd voorrang","Beiden tegelijk half snelheid"],"u":"De BPR-engteregel (stroom-mee gaat voor) geldt níét tussen klein en groot op de Rijntakken: art. 6.02 RPR schakelt die artikelen uit. Klein laat groot altijd de ruimte.","a":"Art. 6.02 lid 2 RPR"},{"s":"A.21","t":"Op de Waal verlaat een groot schip een nevenvaarwater waar bord B.9 staat; jij vaart met je sloep op het hoofdvaarwater. Wie gaat voor?","o":["Het grote schip — op het RPR gaat groot uit het B.9-nevenvaarwater vóór klein op het hoofdvaarwater","Jij — B.9 legt de voorrang altijd bij het hoofdvaarwater, ook op het RPR","Niemand: dit is een medewerkingssituatie"],"u":"De beroemde B.9-flip: in het BPR beschermt B.9 het hoofdvaarwater (jij zou vóórgaan), op de Rijntakken wint het grote schip tóch. Lees dus altijd of een vraag over BPR- of RPR-water gaat.","a":"Art. 6.16 RPR","v":"<svg class=\"qv dia\" viewBox=\"0 0 430 170\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" style=\"background:#bfd9ec\"> <line x1=\"215\" y1=\"150\" x2=\"215\" y2=\"60\" stroke=\"#6b4a2b\" stroke-width=\"5\"></line><g transform=\"translate(181,22) scale(0.3736)\"><rect x=\"0\" y=\"0\" width=\"182\" height=\"182\" fill=\"#c8102e\"></rect><rect x=\"22\" y=\"22\" width=\"138\" height=\"138\" fill=\"#ffffff\"></rect><rect x=\"30\" y=\"44\" width=\"122\" height=\"24\" fill=\"#111111\"></rect><rect x=\"79\" y=\"68\" width=\"24\" height=\"84\" fill=\"#111111\"></rect></g><text x=\"215\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\">B.9b</text></svg>"},{"s":"A.21","t":"Een snel schip (>40 km/u, twee gele flikkerlichten) nadert jouw sloep op de Waal. Wie maakt ruimte?","o":["Jij — op het RPR geven kleine schepen óók aan het snelle schip de ruimte","Het snelle schip — dat wijkt overal voor iedereen","Wie de ander aan stuurboord heeft"],"u":"BPR: het snelle schip wijkt voor iedereen, zonder uitzondering. RPR: precies andersom — klein maakt ruimte. Wéér zo'n spiegelpaar tussen de reglementen.","a":"RPR hfdst. 6","v":"<svg class=\"qv\" viewBox=\"0 0 430 190\"><rect x=\"0\" y=\"24\" width=\"430\" height=\"140\" fill=\"#8fb8d8\"/><text x=\"14\" y=\"44\" font-size=\"10.5\" font-weight=\"bold\" fill=\"#0d3350\">WAAL (RPR)</text><g transform=\"translate(140,95)\"><use href=\"#sschip\" transform=\"scale(1.1)\"/></g><line x1=\"182\" y1=\"95\" x2=\"232\" y2=\"95\" stroke=\"#1a1a2e\" stroke-width=\"2.2\" marker-end=\"url(#ah)\"/><text x=\"140\" y=\"130\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">snel schip (2 gele flikkers)</text><use href=\"#kschip\" transform=\"translate(345,130) scale(.85) rotate(180)\"/><text x=\"345\" y=\"160\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">jouw sloep</text></svg>"}]};
CONTENT["4.6.2"]={"theorie":"<h4>Slecht zicht zonder radar (RPR)</h4><p>Een schip zonder radar moet bij slecht zicht een ligplaats opzoeken; onderweg daarnaartoe: stuurboordzijde houden, elke minuut het mistsein (één lange stoot), een uitkijk voorop in contact met de schipper, en marifoon uitluisteren.</p><h4>Verlichting (soepeler dan het BPR)</h4><ul><li>Motorboten: minimaal boordlichten + wit rondomschijnend licht; een <b>bijbootje</b> volstaat met één wit licht bij nadering.</li><li><b>Alle kleine zeilboten</b> (tot 20 m!): een wit rondomschijnend licht plus een tweede wit licht bij nadering volstaat — boordlichten en heklicht mogen ook.</li></ul><h4>Ook anders in het RPR</h4><p>Drijvende werktuigen mogen als dagmerk de borden groen-wit-groen (vrije zijde) en rood-wit-rood (verboden zijde) voeren; vissersschepen zijn er \"gewone\" schepen zonder extra rechten; zeilboot/roeiboot besturen kent er géén minimumleeftijd (niet-snelle motorboten juist 16 jaar).</p><h4>Gelijk gebleven</h4><p>Kleine schepen tonen nooit een blauw bord; gele ruit geeft ook in het RPR grote-schip-rechten; registratieplicht en de algemene maximumsnelheid van 20 km/u gelden ook op het Nederlandse RPR-deel; en het alcoholmaximum is ook daar <b>0,5‰</b>.</p>","vragen":[{"s":"A.20","t":"RPR: mag een klein motorbootje (<7 m, ≤13 km/u) 's nachts volstaan met één wit rondom schijnend licht?","o":["Nee — het RPR eist ook boordlichten","Ja, net als in het BPR","Alleen op de Lek"],"u":"De BPR-uitzondering (alleen wit rondom voor kleine trage open motorbootjes) bestaat in het RPR niet: daar zijn boordlichten plus wit rondom licht vereist. Alleen bijboten mogen met één wit licht.","a":"Art. 3.13 RPR"},{"s":"A.20","t":"RPR: welke verlichting volstaat 's nachts voor kleine zeilschepen (tot 20 m)?","o":["Een wit rondom schijnend licht, met een tweede wit licht dat je bij nadering toont","Boordlichten plus heklicht zijn boven de 7 m verplicht, net als in het BPR","Uitsluitend een driekleurenlantaarn"],"u":"In het RPR mogen álle kleine zeilschepen met wit rondom + tweede wit licht volstaan; het BPR staat dat alleen onder de 7 m toe. Méér voeren (boordlichten, driekleurenlicht) mag altijd.","a":"Art. 3.13 RPR"},{"s":"A.20","t":"RPR: mag een 13-jarige op de Waal een zeilboot van 14 m sturen (zonder de motor te gebruiken)?","o":["Ja — het RPR kent geen minimumleeftijd voor kleine zeilschepen","Nee, hiervoor geldt 16 jaar","Nee, hiervoor geldt 18 jaar"],"u":"Verrassend maar waar: het BPR eist 16 jaar voor een zeilschip vanaf 7 m, het RPR niets — tótdat de motor bijstaat: dan is het een motorschip en geldt 16 jaar.","a":"Art. 1.09 RPR"}]};
CONTENT["5.1.1"]={"theorie":"<p>Welkom bij KVB2. De grootste nieuwe vaardigheid is <b>navigeren op de kaart</b> — daarom eerst het gereedschap.</p><h4>De kaart</h4><ul><li>Zeekaarten zijn <b>mercatorprojecties</b>: hoeken op de kaart zijn gelijk aan de werkelijkheid en een koerslijn is een rechte lijn.</li><li><b>Meridianen</b> (lengtecirkels) lopen van pool tot pool, zijn allemaal even lang en tellen tot 180° oost/west vanaf Greenwich. <b>Parallellen</b> (breedtecirkels) lopen evenwijdig aan de evenaar, tot 90° noord/zuid, en worden naar de polen toe steeds kleiner.</li><li>Eén boogminuut op een meridiaan = <b>1 zeemijl = 1852 m</b> (omtrek aarde 40.000 km ÷ 360 ÷ 60). Afstanden meet je dus uitsluitend op de <b>staande rand</b> van de kaart. De afstand tussen twee punten heet de <b>verheid</b>; snelheid gaat in <b>knopen</b> (1 knoop = 1 zeemijl/uur = 1,852 km/u).</li><li>Let op het verschil tussen de examenkaarten: op de Markermeerkaart is 1 minuut verdeeld in 5 blokjes van 0,2', op de Waddenkaart in 10 blokjes van 0,1'.</li></ul><h4>Log en GPS</h4><ul><li>De <b>log</b> meet snelheid en afstand <b>door het water</b> — voor anker in 2 knopen stroom \"vaar\" je volgens de log gewoon 2 knopen.</li><li>De <b>GPS</b> (32 satellieten in zes banen; overal minstens 4 zichtbaar) meet positie, werkelijke snelheid en afstand <b>over de grond</b>, door afstanden tot de satellieten te berekenen. In te stellen: kaartdatum (WGS 84), eenheden en tijdzone.</li><li>Schermtaal: <b>XTE</b> afwijking van de koerslijn · <b>COG</b> koers over de grond · <b>SOG</b> snelheid over de grond · <b>DST</b> afstand tot het volgende waypoint · <b>ETA</b> verwachte aankomsttijd. Een <b>waypoint</b> is een opgeslagen geografische positie.</li></ul>","vis":[{"svg":"<svg viewBox=\"0 0 430 240\" class=\"diagram\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#eef3f8\">\n<defs>\n  <marker id=\"ah_mp\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\  fill=\"none\" stroke=\"#1e6b30\" stroke-width=\"1.6\"></ellipse><line x1=\"-72\" y1=\"-38\" x2=\"72\" y2=\"-38\" stroke=\"#1e6b30\" stroke-width=\"1.6\"></line>\n <line x1=\"-42\" y1=\"-70\" x2=\"42\" y2=\"-70\" stroke=\"#1e6b30\" stroke-width=\"1.6\"></line>\n <circle cy=\"-82\" r=\"3\" fill=\"#1a1a2e\"></circle><text y=\"-90\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">N-pool</text></g>\n <g font-size=\"11\" font-weight=\"bold\"><text x=\"240\" y=\"70\" fill=\"#c22222\">meridianen (lengte)</text><text x=\"240\" y=\"86\" fill=\"#c22222\">pool → pool · allemaal even lang</text><text x=\"240\" y=\"102\" fill=\"#c22222\">tot 180° O/W</text>\n <text x=\"240\" y=\"150\" fill=\"#1e6b30\">parallellen (breedte)</text><text x=\"240\" y=\"166\" fill=\"#1e6b30\">evenwijdig aan de evenaar</text><text x=\"240\" y=\"182\" fill=\"#1e6b30\">steeds kléiner · tot 90° N/Z</text></g>\n</svg>","cap":"Meridianen zijn allemaal even lang; parallellen krimpen naar de polen.","half":true},{"svg":"<svg viewBox=\"0 0 430 240\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#bfd9ec\">\n<defs>\n  <marker id=\"ah_aa\" viewBox=\"0 0 10 10\" refX=\"7.5\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"context-stroke\"></path></marker>\n  <g id=\"kschip_aa\"><path d=\"M-32,-11 L14,-11 Q32,-11 32,0 Q32,11 14,11 L-32,11 Z\" fill=\"#ffffff\" stroke=\"#2c2a72\" stroke-width=\"2\"></path><rect x=\"-25\" y=\"-6.5\" width=\"24\" height=\"13\" rx=\"5\" fill=\"#e87722\" stroke=\"#2c2a72\" stroke-width=\"1.2\"></rect><circle cx=\"27\" cy=\"0\" r=\"2.6\" fill=\"#f7e26b\" stroke=\"#2c2a72\" stroke-width=\"1\"></circle></g>\n  <g id=\"wroos_aa\"><circle cx=\"0\" cy=\"0\" r=\"18\" fill=\"#ffffff\" fill-opacity=\".92\" stroke=\"#1a5e8f\" stroke-width=\"1.4\"></circle><g font-size=\"7.5\" fill=\"#1a5e8f\" text-anchor=\"middle\" font-weight=\"bold\"><text y=\"-10\">N</text><text x=\"12\" y=\"3\">O</text><text y=\"15\">Z</t
